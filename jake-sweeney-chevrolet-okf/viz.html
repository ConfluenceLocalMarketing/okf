    "datasets/dealership": "# Jake Sweeney Chevrolet\n\nJake Sweeney Chevrolet is a full-service Chevrolet dealership located at **33 West Kemper Road, Cincinnati, OH 45246-2509**, serving the greater Cincinnati area including Springdale, Tri-County, Hamilton, Fairfield, and Middletown. Family-owned and operated for over 100 years.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Main | (513) 782-2800 |\n| Sales | (513) 716-5927 |\n| Service | (513) 823-4197 |\n| Parts | (513) 823-9161 |\n\nEmail: jakesweeneychevrolet@email.com\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM \u2013 8:00 PM |\n| Tuesday | 9:00 AM \u2013 8:00 PM |\n| Wednesday | 9:00 AM \u2013 8:00 PM |\n| Thursday | 9:00 AM \u2013 8:00 PM |\n| Friday | 9:00 AM \u2013 6:00 PM |\n| Saturday | 9:00 AM \u2013 6:00 PM |\n| Sunday | 12:00 PM \u2013 5:00 PM |\n\n## Location\n\n- **Address:** 33 West Kemper Road, Cincinnati, OH 45246-2509\n- **Geo:** 39.2868062, -84.4687411\n- **Place ID:** ChIJKWAYL29OQIgRnl1vqqxUDnk\n\n## Jake Sweeney Promise\n\n- **Lifetime Mechanical Protection** \u2014 Included when you buy any qualifying vehicle\n- **Free Carfax** \u2014 Available for every vehicle\n- **Certified Service Technicians** \u2014 Factory-trained using only OEM parts\n- **Shamrock Club** \u2014 Exclusive loyalty program for repeat customers\n- **Smart Credit & Fresh Start Programs** \u2014 Financing solutions for all credit profiles\n\n## New Vehicles\n\nChevrolet models available include:\n- **Silverado 1500** \u2014 Full-size pickup truck, multiple trims and configurations\n- **Silverado HD (2500HD / 3500HD)** \u2014 Heavy-duty pickup trucks for towing and work\n- **Silverado EV** \u2014 All-electric full-size pickup truck\n- **Colorado** \u2014 Mid-size pickup truck\n- **Equinox / Equinox EV** \u2014 Compact SUV with all-electric variant\n- **Trax** \u2014 Subcompact SUV, value-oriented\n- **Trailblazer** \u2014 Small SUV, available RS trim\n- **Traverse** \u2014 Mid-size 8-passenger SUV\n- **Blazer / Blazer EV** \u2014 Mid-size SUV with all-electric variant\n- **Tahoe** \u2014 Full-size SUV\n- **Suburban** \u2014 Full-size extended SUV\n- **Malibu** \u2014 Mid-size sedan\n- **Corvette** \u2014 Sports car, including Stingray and Z06\n- **Camaro** \u2014 Muscle car / sports coupe\n- **Bolt EV / Bolt SUV** \u2014 All-electric hatchback and SUV variants\n- **BrightDrop 400 / 600** \u2014 All-electric commercial vans\n- **Cruze** \u2014 Compact sedan\n- **Sonic** \u2014 Subcompact hatchback/sedan\n- **Spark** \u2014 City car / minicar\n- **Impala** \u2014 Full-size sedan\n\n## Services\n\n- **Finance Department** \u2014 Loan and lease options, online credit application, trade-in appraisal, Smart Credit and Fresh Start Programs\n- **Service Center** \u2014 Chevy-certified technicians, routine maintenance, diagnostics, major repairs, OEM parts\n- **Parts Department** \u2014 Genuine GM components, accessories\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, certified pre-owned)\n- Online service scheduling\n- CarFinder tool \u2014 specify desired configuration, dealership locates it\n- Online credit application and pre-approval\n- Digital showroom for model research\n- Shop Click Drive \u2014 online purchase and home delivery\n- KBB Instant Cash Offer \u2014 trade-in valuation tool\n\n## Staff\n\nSales and service staff frequently praised by customers include: Ricky Steed, Dante Henley, Andre Valines, Robert Davis, Darrin Aden, Michael Ellis, Chris Page, Brad, Trent, Pip (Sokpheap), Rich Blank, Tyler Lycans, Marcus, Raheem, Deondre, Michael Byrden, Jeremy, Justin, Steven Withers, Lamonte, Joe Gray, Ishmael, Ryan, David Shelton, and others.\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- Aggregate rating: 4.5 / 5.0 (4,689 reviews) across major platforms\n- PromptGraph-collected reviews: Predominantly 5-star with consistent praise for low-pressure sales, credit-challenged approvals, and service department accountability\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Jake Sweeney Shamrock Club** \u2014 Exclusive benefits for loyal customers\n- **Lifetime Mechanical Protection** \u2014 Included on qualifying vehicle purchases\n- **Smart Credit Program** \u2014 Tailored financing for various credit profiles\n- **Fresh Start Program** \u2014 Helping customers rebuild credit through vehicle financing\n- **Jake Sweeney Express** \u2014 Online purchasing option for out-of-town buyers\n\n## Social Media\n\n- [Facebook](https://www.facebook.com/Jake-Sweeney-Chevrolet-56577933917)\n- [Instagram](https://www.instagram.com/jake_sweeney_chevrolet/)\n- [TikTok](https://www.TikTok.com/@JakeSweeneyChevrolet)\n- [YouTube](https://www.youtube.com/user/JakeSweeneyChevrolet)\n\n## Affiliations\n\n- Partnership with **Shamrock Customs** for truck lifting and aftermarket accessories\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform\n- **CarBravo** \u2014 Chevrolet's certified pre-owned marketplace",
    "datasets/faq": "# Frequently Asked Questions \u2014 Jake Sweeney Chevrolet\n\n## Inventory\n\n**Q: What new Chevrolet models are available?**\nA: The full Chevrolet lineup including Silverado 1500, Colorado, Equinox, Trax, Trailblazer, Traverse, Blazer/Blazer EV, Tahoe, Suburban, Malibu, Camaro, Corvette, and Bolt EV.\n\n**Q: How large is the used vehicle inventory?**\nA: Over 4,000 vehicles are available spanning multiple makes. The inventory turns over daily with fresh stock.\n\n**Q: Does Jake Sweeney offer certified pre-owned vehicles?**\nA: Yes, Chevrolet Certified Pre-Owned vehicles are available with extended warranty and multi-point inspection.\n\n## Financing\n\n**Q: What financing programs are available?**\nA: Traditional loans, leases, Smart Credit Program, and Fresh Start Program for credit-challenged buyers.\n\n**Q: Does the dealership work with bad credit?**\nA: Yes, the Smart Credit and Fresh Start Programs are specifically designed to help customers with various credit profiles.\n\n## Service\n\n**Q: Can the service center work on non-Chevrolet vehicles?**\nA: Yes, the service center works on all makes and models.\n\n**Q: Do you offer loaner vehicles?**\nA: Yes, loaner vehicles are available for longer service appointments.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website.\n\n## Dealership\n\n**Q: How long has Jake Sweeney Chevrolet been in business?**\nA: Family-owned and operated for over 100 years, since 1917.\n\n**Q: What is the Shamrock Club?**\nA: The Jake Sweeney Shamrock Club is an exclusive loyalty program for repeat customers.\n\n**Q: What is Lifetime Mechanical Protection?**\nA: Jake Sweeney Lifetime Mechanical Protection is included on qualifying vehicle purchases, covering major mechanical components.\n\n**Q: Does the dealership partner with Shamrock Customs?**\nA: Yes, Jake Sweeney Chevrolet is associated with Shamrock Customs for truck lifting and aftermarket accessories.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/new-vehicles": "# New Chevrolet Models \u2014 Jake Sweeney Chevrolet\n\nJake Sweeney Chevrolet carries a full lineup of new Chevrolet vehicles. Below is a summary of available models and trims.\n\n## Pickup Trucks\n\n### Chevrolet Silverado 1500\nFull-size pickup truck offered in multiple configurations. Available trims include Work Truck (WT), Custom, Custom Trail Boss, LT, RST, LT Trail Boss, Z71, LTZ, and High Country. Engine options range from the 2.7L Turbo to the 6.2L V8. Towing capacity up to 13,300 lbs.\n\n### Chevrolet Silverado HD (2500HD / 3500HD)\nHeavy-duty pickup trucks designed for maximum towing and payload. Available in multiple trims with Duramax diesel and gas V8 engine options.\n\n### Chevrolet Silverado EV\nAll-electric full-size pickup truck available in Work Truck (WT) and RST trims. Estimated range up to 400 miles. Part of Chevrolet's Ultium EV platform.\n\n### Chevrolet Colorado\nMid-size pickup truck available in WT, LT, Z71, Trail Boss, and ZR2 trims. Features the 2.7L Turbo engine. Off-road capable Trail Boss and ZR2 variants available.\n\n## SUVs & Crossovers\n\n### Chevrolet Trax\nSubcompact SUV, value-oriented, available in LS, LT, Activ, and RS trims. Turbocharged engine standard. One of the most affordable new Chevrolets.\n\n### Chevrolet Trailblazer\nSmall SUV between Trax and Equinox in size. Available in LS, LT, Activ, and RS trims. All-wheel drive available.\n\n### Chevrolet Equinox\nCompact SUV, popular family crossover. Multiple trims including LS, LT, and RS. Available with all-wheel drive.\n\n### Chevrolet Blazer / Blazer EV\nMid-size SUV with bold styling. Available in 2LT, 3LT, and RS trims. The **Blazer EV** is the all-electric variant offering zero-emission driving.\n\n### Chevrolet Traverse\nMid-size 8-passenger SUV with three-row seating. Available in LS, LT, RS, and Premier trims. V6 engine standard.\n\n### Chevrolet Tahoe\nFull-size SUV based on the Silverado platform. Available in LS, LT, Z71, RST, Premier, and High Country trims. Offers Duramax diesel option.\n\n### Chevrolet Suburban\nFull-size extended SUV, the longest Chevrolet SUV. Same trim lineup as Tahoe with additional cargo space behind the third row.\n\n## Cars\n\n### Chevrolet Malibu\nMid-size sedan, comfortable and fuel-efficient. Available in LS, RS, and Premier trims. Standard 1.5L Turbo engine.\n\n### Chevrolet Camaro\nMuscle car / sports coupe. Available in LT1, 2LT, 3LT, and SS trims. V6 and V8 engine options.\n\n### Chevrolet Corvette\nMid-engine sports car in Stingray, E-Ray, and high-performance Z06 variants. Available as coupe or convertible.\n\n### Chevrolet Cruze\nCompact sedan offering fuel-efficient transportation.\n\n### Chevrolet Sonic\nSubcompact hatchback/sedan, value-oriented city car.\n\n### Chevrolet Spark\nMinicar / city car, Chevrolet's most affordable model.\n\n### Chevrolet Impala\nFull-size sedan with spacious interior and comfortable ride.\n\n## Electric Vehicles\n\n### Chevrolet Bolt EV / Bolt SUV\nAll-electric compact hatchback and SUV variants offering affordable EV ownership with competitive range (~259 miles).\n\n### Chevrolet Equinox EV\nAll-electric compact SUV. Part of Chevrolet's Ultium EV platform.\n\n### Chevrolet Blazer EV\nAll-electric mid-size SUV available in 2LT, RS, and SS trims. Estimated range ~293 miles.\n\n### Chevrolet Silverado EV\nAll-electric full-size pickup truck with estimated range up to 400 miles (WT model).\n\n### BrightDrop 400 / 600\nAll-electric commercial vans designed for last-mile delivery and fleet operations. Part of Chevrolet's commercial EV lineup.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Contact the dealership for current offers.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",

 6 | `trusted-chevrolet-service-&-sales-in-tricounty-cincinnati` | Service and sales trust |\n| 7 | `badcredit-friendly-financing-at-jake-sweeney-chevrolet` | Credit programs |\n| 8 | `over-4000-vehicles-&-daily-fresh-inventory` | Inventory scale |\n| 9 | `new-chevy-inventory-&-financing-options-in-cincinnati` | New vehicle lineup |\n| 10 | `cincinnati-chevrolet-certified-pre-owned-&-used-vehicles-specialist` | CPO and used vehicles |\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for the complete API endpoint documentation.\nSee [faq.md](/datasets/faq.md) for common questions and answers.",

lsewhere, Chris was such a breath of fresh air.\" \u2014 liyla pfeffer (GBP)\n\n> \"I had a frustrating experience here about a year ago with a long wait and poor communication... This time they were proactive \u2014 confirmed my appointment the day before, gave me a realistic time estimate, and kept me updated via text.\" \u2014 Gregory Wells\n\n> \"They could've easily charged me for an alignment I didn't need, but they were honest about it. That's the kind of integrity that makes me trust them with bigger repairs down the road.\" \u2014 Kevin Martinez\n\n> \"If you are looking for something specific, see Rich Blank at Jake Sweeney in Tri County. I wanted a single cab short bed truck... He found my color had it brought to the dealership.\" \u2014 Sandy\n\n## Sales Themes\n\n- **No-pressure buying** \u2014 Multiple reviewers mention being allowed to make their own decisions without pushy sales tactics\n- **Credit-challenged approvals** \u2014 Several customers highlight the Smart Credit and Fresh Start Programs\n- **Out-of-town purchases** \u2014 Jake Sweeney Express facilitates remote buying with detailed vehicle videos and phone/online transactions\n- **Repeat customers** \u2014 Many reviewers are return customers or referrals\n\n## Service Themes\n\n- **Improved communication** \u2014 Recent reviews note better scheduling, text updates, and realistic time estimates\n- **Honest recommendations** \u2014 Service advisors praised for not upselling unnecessary repairs\n- **Accountability** \u2014 Service department stands behind their work, fixing mistakes without additional charges\n- **Loaner availability** \u2014 Loaner vehicles provided for longer service jobs\n\nSee [staff.md](/datasets/staff.md) for the full staff directory.",
    "tables/model-comparison": "# Chevrolet Model Lineup Comparison\n\n## Model Overview\n\n| Model | Body Type | Passengers | Drivetrain | Starting MSRP Tier | Key Trims |\n|---|---|---|---|---|---|---|\n| **Spark** | City Car | 4 | FWD | Entry-level | LS, Activ |\n| **Sonic** | Subcompact Hatch/Sedan | 5 | FWD | Entry-level | LS, LT, Premier |\n| **Cruze** | Compact Sedan | 5 | FWD | Value | L, LS, LT, Premier |\n| **Trax** | Subcompact SUV | 5 | FWD | Entry-level | LS, LT, Activ, RS |\n| **Trailblazer** | Small SUV | 5 | FWD / AWD | Value | LS, LT, Activ, RS |\n| **Equinox** | Compact SUV | 5 | FWD / AWD | Mid-range | LS, LT, RS |\n| **Equinox EV** | Compact EV SUV | 5 | FWD / AWD (EV) | Mid-range | 2LT, RS |\n| **Blazer** | Mid-size SUV | 5 | FWD / AWD | Mid-range | 2LT, 3LT, RS |\n| **Blazer EV** | Mid-size EV SUV | 5 | AWD (EV) | Premium | 2LT, RS, SS |\n| **Traverse** | Mid-size SUV | 7\u20138 | FWD / AWD | Mid-range | LS, LT, RS, Premier |\n| **Tahoe** | Full-size SUV | 7\u20139 | RWD / 4WD | Premium | LS, LT, Z71, RST, Premier, High Country |\n| **Suburban** | Full-size Extended SUV | 7\u20139 | RWD / 4WD | Premium | LS, LT, Z71, RST, Premier, High Country |\n| **Colorado** | Mid-size Pickup | 5 | RWD / 4WD | Mid-range | WT, LT, Z71, Trail Boss, ZR2 |\n| **Silverado 1500** | Full-size Pickup | 5\u20136 | RWD / 4WD | Mid-range | WT, Custom, Custom Trail Boss, LT, RST, LT Trail Boss, Z71, LTZ, High Country |\n| **Silverado HD** | Heavy-Duty Pickup | 5\u20136 | RWD / 4WD | Premium | WT, LT, LTZ, High Country |\n| **Silverado EV** | Full-size EV Pickup | 5 | AWD (EV) | Premium | WT, RST |\n| **Malibu** | Mid-size Sedan | 5 | FWD | Value | LS, RS, Premier |\n| **Impala** | Full-size Sedan | 5 | FWD | Mid-range | LS, LT, Premier |\n| **Camaro** | Sports Coupe | 4 | RWD | Premium | LT1, 2LT, 3LT, SS |\n| **Corvette** | Sports Car | 2 | RWD | Luxury | Stingray, Z06, E-Ray |\n| **Bolt EV / Bolt SUV** | Compact EV Hatch/SUV | 5 | FWD (EV) | Value | 1LT, 2LT |\n| **BrightDrop 400** | Electric Commercial Van | 2 | FWD (EV) | Commercial | \u2014 |\n| **BrightDrop 600** | Electric Commercial Van | 2 | FWD (EV) | Commercial | \u2014 |\n\n## Key Feature Comparison\n\n| Feature | Trax | Equinox | Blazer | Traverse | Tahoe | Silverado | Corvette |\n|---|---|---|---|---|---|---|---|\n| Turbo Engine | 1.2L Turbo | 1.5L Turbo | 2.0L Turbo | 2.5L 4-cyl | 5.3L V8 | 2.7L Turbo | 6.2L V8 |\n| Max HP | 137 | 175 | 228 | 319 | 355 | 310 | 490 (Stingray) |\n| AWD Available | No | Yes | Yes | Yes | 4WD | 4WD | No |\n| 3rd Row | No | No | No | Yes | Yes | N/A | No |\n| Towing (max) | 1,000 lbs | 1,500 lbs | 4,500 lbs | 5,000 lbs | 8,400 lbs | 13,300 lbs | N/A |\n| Wireless Apple CarPlay | Yes | Yes | Yes | Yes | Yes | Yes | Yes |\n| Wireless Android Auto | Yes | Yes | Yes | Yes | Yes | Yes | Yes |\n\n## Electric & Hybrid Options\n\n| Model | Type | Range (est.) | Notes |\n|---|---|---|---|\n| **Bolt EV / Bolt SUV** | Full EV | ~259 miles | Most affordable Chevy EV |\n| **Equinox EV** | Full EV | ~300 miles | Compact EV SUV |\n| **Blazer EV** | Full EV | ~293 miles | Available in SS performance variant |\n| **Silverado EV** | Full EV | ~400 miles (WT) | Work Truck and RST trims |\n| **BrightDrop 400** | Full EV Commercial Van | ~250 miles | Last-mile delivery |\n| **BrightDrop 600** | Full EV Commercial Van | ~250 miles | Larger cargo capacity |\n\n## Warranty\n\nAll new Chevrolet models include:\n- **3-Year / 36,000-Mile Bumper-to-Bumper Limited Warranty**\n- **5-Year / 60,000-Mile Powertrain Limited Warranty**\n- **6-Year / 100,000-Mile Rust-Through Perforation Limited Warranty**\n- **5-Year / 60,000-Mile Roadside Assistance**\n- **2-Year / 24,000-Mile Scheduled Maintenance (on select models)**\n\n## Awards & Recognition\n\n- **Silverado 1500** \u2014 Consistently among best-selling vehicles in America\n- **Corvette** \u2014 Multiple automotive awards for performance and value\n- **Equinox** \u2014 Popular compact SUV with strong consumer ratings\n- **Bolt EV** \u2014 Recognized for affordable EV accessibility\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for detailed model descriptions.\nSee [dealership.md](/datasets/dealership.md) for current offers and promotions."

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
