    "datasets/dealership": "# West Hills Ford\n\nWest Hills Ford is a full-service Ford dealership located at **1100 Oyster Bay Ave South, Bremerton, WA 98312**, serving the Kitsap Peninsula including Silverdale, Port Orchard, Poulsbo, Bainbridge Island, and surrounding communities.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Sales | (360) 842-2413 |\n| Service | (360) 842-2420 |\n| Parts | (360) 842-2475 |\n| Main | (360) 616-3277 |\n\nEmail: gsjones.haselwood@gmail.com\n\n## Hours\n\n| Day | Sales Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 8:00 PM |\n| Wednesday | 9:00 AM - 8:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 8:00 PM |\n| Saturday | 9:00 AM - 8:00 PM |\n| Sunday | 10:00 AM - 7:00 PM |\n\n## Location\n\n- **Address:** 1100 Oyster Bay Ave South, Bremerton, WA 98312\n- **Geo:** 47.5538477, -122.6751049\n\n## New Vehicles\n\nFord models available include:\n- **Bronco** - Iconic off-road SUV, multiple trims including Big Bend, Black Diamond, Outer Banks, Badlands, Wildtrak, and Raptor\n- **Bronco Sport** - Compact adventure SUV, available in Big Bend, Heritage, Outer Banks, Badlands trims\n- **Escape** - Compact crossover SUV, available with hybrid and plug-in hybrid options\n- **Explorer** - Mid-size 3-row SUV, available in XLT, Limited, ST-Line, ST, Platinum, and King Ranch trims\n- **Expedition / Expedition Max** - Full-size 3-row SUV, powerful EcoBoost V6 engine\n- **Edge** - Mid-size 2-row crossover SUV\n- **Mustang Mach-E** - All-electric crossover SUV, available in Select, Premium, GT trims\n- **F-150** - Full-size pickup truck, America's best-selling truck, multiple trims including XL, XLT, Lariat, King Ranch, Platinum, Tremor, Raptor, Lightning (electric)\n- **F-250 / Super Duty** - Heavy-duty pickup truck for maximum towing and payload\n- **Maverick** - Compact hybrid pickup truck, fuel-efficient and affordable\n- **Ranger** - Mid-size pickup truck, available in XL, XLT, Lariat, and Raptor trims\n- **Mustang** - Iconic sports car, available in EcoBoost, GT, Dark Horse trims\n- **E-Transit** - All-electric cargo van\n\n## Services\n\n- **Finance Department** - Loan and lease options, online credit application, trade-in appraisal, competitive rates\n- **Service Center** - Ford-certified technicians, routine maintenance, diagnostics, major repairs, genuine Ford parts\n- **Parts Department** - Genuine Ford components, Motorcraft parts, accessories, tires\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, certified pre-owned)\n- Online service scheduling\n- Online credit application and pre-approval\n- Car payment calculator\n- Click-N-Drive online purchasing\n- Trade-in valuation tool (KBB Instant Cash Offer)\n- Video Walkaround and Test Drive at Home\n- Home delivery and maintenance pick-up\n\n## Staff\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- Aggregate rating: 4.6 / 5.0 (3,135 reviews) across major platforms\n- Google Business Profile: 4.6 stars (2,960+ reviews)\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Haselwood Auto Group** - Part of the Haselwood family of dealerships\n- **Click-N-Drive Online Purchasing** - Complete vehicle purchase from home\n- **Home Delivery** - Vehicle delivery to your location\n- **Test Drive at Home** - Bring the test drive to you\n- **Maintenance Pick-up** - Vehicle pick-up for service appointments\n- **Video Walkaround** - Virtual vehicle tours\n- **Free Local Shuttle Service** - While your vehicle is being serviced\n\n## Affiliations\n\n- Part of the **Haselwood Auto Group**\n- **Ford Motor Company** - Authorized Ford dealership\n- Website powered by **Dealer.com / FordDirect**\n- Connected via **PromptGraph** AI platform",
    "datasets/faq": "# Frequently Asked Questions - West Hills Ford\n\n## Inventory\n\n**Q: What new Ford models are available at West Hills Ford?**\nA: The full Ford lineup including Bronco, Bronco Sport, Escape, Explorer, Expedition, Edge, Mustang Mach-E, F-150, F-250 Super Duty, Maverick, Ranger, Mustang, and E-Transit.\n\n**Q: What brands are available in the used vehicle inventory?**\nA: The pre-owned inventory spans multiple makes including Ford, Chevrolet, GMC, Toyota, Honda, Hyundai, Kia, Nissan, Jeep, Ram, Dodge, BMW, Mercedes-Benz, Subaru, and Volkswagen.\n\n**Q: Does West Hills Ford offer certified pre-owned vehicles?**\nA: Yes, Ford Certified Pre-Owned vehicles are available with factory-backed inspections, warranties, and 24/7 roadside assistance.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs. The dealership works with multiple lenders to find the best terms.\n\n**Q: Does the dealership work with all credit profiles?**\nA: Yes, the finance team works with a network of lenders to accommodate various credit situations including bad credit or no credit.\n\n**Q: Can I complete a purchase online?**\nA: Yes, the dealership offers Click-N-Drive online purchasing allowing customers to complete their vehicle purchase from home.\n\n## Service\n\n**Q: Do you offer mobile service or maintenance pick-up?**\nA: Yes, West Hills Ford offers maintenance pick-up and free local shuttle service while your vehicle is being serviced.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website.\n\n**Q: Can the service center work on non-Ford vehicles?**\nA: Yes, the service center can perform maintenance and repairs on various makes and models.\n\n## Dealership\n\n**Q: Where is West Hills Ford located?**\nA: 1100 Oyster Bay Ave South, Bremerton, WA 98312, serving Silverdale, Port Orchard, Poulsbo, Bainbridge Island, and the Kitsap Peninsula.\n\n**Q: What is the Haselwood Auto Group?**\nA: West Hills Ford is part of the Haselwood Auto Group, which includes multiple dealerships across the Kitsap Peninsula.\n\n**Q: Does the dealership offer home delivery?**\nA: Yes, home delivery is available for vehicle purchases.\n\n**Q: Can I test drive a vehicle at home?**\nA: Yes, the Test Drive at Home program brings the vehicle to your location for a test drive.\n\n**Q: Is there a vehicle hold policy?**\nA: Yes, the dealership allows customers to hold vehicles before arriving.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/new-vehicles": "# New Ford Models - West Hills Ford\n\nWest Hills Ford carries a full lineup of new Ford vehicles. Below is a summary of available models and trims.\n\n## SUVs & Crossovers\n\n### Ford Bronco\nIconic off-road SUV with removable doors and roof. Available trims include Big Bend, Black Diamond, Outer Banks, Badlands, Wildtrak, Everglades, Heritage, Heritage Limited, and Raptor. Powered by 2.3L EcoBoost (300 hp) or 2.7L EcoBoost V6 (330 hp). Available in 2-door and 4-door configurations. Features available 7-speed manual or 10-speed automatic transmission. Trail Toolbox includes Trail Control, Trail Turn Assist, and Trail One-Pedal Drive.\n\n### Ford Bronco Sport\nCompact adventure SUV designed for outdoor lifestyles. Available in Big Bend, Heritage, Outer Banks, Badlands, and Free Wheeling trims. Powered by 1.5L EcoBoost (181 hp) or 2.0L EcoBoost (250 hp) in Badlands trim. Standard 8-speed automatic transmission with available twin-clutch rear drive unit for enhanced off-road traction.\n\n### Ford Escape\nCompact crossover SUV with available hybrid and plug-in hybrid powertrains. Available in S, SE, SEL, ST-Line, Platinum, and Plug-In Hybrid trims. Features the 1.5L EcoBoost (180 hp) or 2.0L EcoBoost (250 hp). Hybrid models deliver excellent fuel economy with up to 2,000 lbs towing capacity.\n\n### Ford Explorer\nMid-size 3-row SUV seating up to 7 passengers. Available in XLT, ST-Line, Limited, ST, Platinum, and King Ranch trims. Powered by 2.3L EcoBoost (300 hp) or 3.0L EcoBoost V6 (400 hp in ST). Available in RWD and 4WD. Towing capacity up to 5,600 lbs. Ford Co-Pilot360 standard.\n\n### Ford Expedition / Expedition Max\nFull-size 3-row SUV seating up to 8 passengers. Powered by 3.5L EcoBoost V6 (375 hp) with 10-speed automatic transmission. Available in XL, XLT, Limited, King Ranch, and Platinum trims. Maximum towing capacity up to 9,300 lbs. Expedition Max offers additional cargo space behind the third row.\n\n### Ford Edge\nMid-size 2-row crossover SUV. Available in SE, SEL, ST-Line, Titanium, and ST trims. Powered by 2.0L EcoBoost (250 hp) or 2.7L EcoBoost V6 (335 hp in ST). Available in FWD and AWD. Ford Co-Pilot360 standard.\n\n### Ford Mustang Mach-E\nAll-electric crossover SUV available in Select, Premium, California Route 1, and GT trims. Up to 312 miles estimated range. Available in RWD and eAWD. Up to 480 hp in GT trim. BlueCruise hands-free highway driving available. DC fast charging capability.\n\n## Trucks\n\n### Ford F-150\nFull-size pickup truck, America's best-selling vehicle for over 40 years. Available in XL, XLT, Lariat, King Ranch, Platinum, Tremor, Raptor, and Lightning (all-electric) trims. Powertrain options include 2.7L EcoBoost V6, 3.3L V6, 5.0L V8, 3.5L EcoBoost V6, 3.5L PowerBoost Full Hybrid V6, and all-electric (Lightning). Maximum towing capacity up to 14,000 lbs. Available Features: Pro Power Onboard generator, 12-inch touchscreen, BlueCruise hands-free driving.\n\n### Ford F-250 / Super Duty\nHeavy-duty pickup truck for maximum capability. Available in XL, XLT, Lariat, King Ranch, Platinum, and Limited trims. Powered by 6.8L V8 or 7.3L V8 gasoline engines, plus 6.7L Power Stroke V8 Turbo Diesel. Maximum towing capacity up to 40,000 lbs (fifth wheel/gooseneck). Advanced toaling technology including Pro Trailer Hitch Assist.\n\n### Ford Maverick\nCompact hybrid pickup truck, starting under $25,000. Available in XL, XLT, Lariat, and Tremor trims. Standard 2.5L hybrid powertrain (191 hp) with CVT, achieving EPA-estimated 42 mpg city. Available 2.0L EcoBoost (250 hp) with 8-speed automatic. 4.5 ft bed with FLEXBED storage system. Standard towing capacity of 1,500 lbs (up to 4,000 lbs with EcoBoost and 4K Tow Package).\n\n### Ford Ranger\nMid-size pickup truck redesigned for 2024. Available in XL, XLT, Lariat, and Raptor trims. Powered by 2.3L EcoBoost (270 hp) or 3.0L EcoBoost V6 (405 hp in Raptor). 10-speed automatic transmission. Maximum towing capacity up to 7,500 lbs. Available with Pro Trailer Backup Assist and Trail Control.\n\n## Cars\n\n### Ford Mustang\nIconic sports car, seventh generation. Available in EcoBoost, GT, Dark Horse, and GTD trims. Powertrains: 2.3L EcoBoost (315 hp), 5.0L Coyote V8 (480 hp in GT, 500 hp in Dark Horse). Available 6-speed manual or 10-speed automatic. Performance features include MagneRide dampers, Electronic Limited-Slip Differential, and Track Apps.\n\n## Electric & Hybrid\n\n### Ford F-150 Lightning\nAll-electric version of America's best-selling truck. Available in Pro, XLT, Lariat, and Platinum trims. Dual motor AWD with up to 580 hp and 775 lb-ft torque. EPA-estimated range up to 320 miles. Mega Power Frunk with 400 liters of lockable storage. Pro Power Onboard up to 9.6 kW. DC fast charging from 15% to 80% in approximately 44 minutes.\n\n### Ford Mustang Mach-E\nSee SUV section above.\n\n### Ford Escape Hybrid / Plug-In Hybrid\nCompact SUV with hybrid or plug-in hybrid powertrain options. Hybrid delivers estimated 41 mpg city. Plug-In Hybrid offers up to 37 miles of EV-only range.\n\n### Ford Maverick Hybrid\nStandard hybrid powertrain on base model. EPA-estimated 42 mpg city. See Trucks section above.\n\n### Ford E-Transit\nAll-electric cargo van for commercial use. Available in 3 roof heights, 3 body lengths, and 2 wheelbases. Targeted range of 126 miles. DC fast charging capable.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Contact the dealership for current offers.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - West Hills Ford\n\nThe West Hills Ford Service Center provides certified maintenance and repair services at 1100 Oyster Bay Ave South, Bremerton, WA.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes, tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis\n- **Major Repairs** - Transmission service, engine repair, suspension work\n- **Ford Warranty & Recall Repairs** - OEM-specified recall and campaign work\n- **Tire Replacement and Alignment** - Full tire services\n- **Scheduled Maintenance** - Following Ford's recommended maintenance schedule\n- **EV & Hybrid Service** - Specialized service for Mustang Mach-E, F-150 Lightning, and hybrid models\n\n## Service Team\n\n- **Richard Palmer** - Service Manager; personally addresses customer concerns, test drives with customers to resolve issues\n- **Baer (Bear)** - Service Advisor; transparent, knowledgeable, excellent communicator\n- **Vincent (Vinnie)** - Service Advisor; personable, goes the extra mile, keeps customers informed\n- **Keanu** - Service Advisor; punctual, informative, honest, great communicator\n- **Caitlin** - Service Advisor; very thorough, knowledgeable, empathetic\n- **Connor** - Service Advisor; honest, straightforward, provides realistic expectations\n- **Nicholas** - Service Advisor; professional, knowledgeable about EVs\n- **Josh** - Service Advisor; professional, knowledgeable, helpful\n\n## Service Experience\n\n- **Online scheduling** available through the dealership website\n- **Free Local Shuttle Service** - Available while vehicle is being serviced\n- **Ford-Certified Technicians** - Factory-trained using genuine Ford parts\n- **Maintenance Pick-up** - Vehicle pick-up for service appointments\n- **Complimentary Amenities** - Coffee, snacks, indoor playground, and comfortable waiting area\n- **Text Updates** - Real-time status updates on vehicle servi ials.md](/references/testimonials.md) for detailed customer reviews referencing specific staff members.",
    "datasets/used-vehicles": "# Pre-Owned and Certified Pre-Owned Vehicles - West Hills Ford\n\nWest Hills Ford maintains a substantial pre-owned vehicle inventory in the Bremerton area with a wide selection spanning multiple makes and models.\n\n## Inventory Scope\n\n- **Total vehicles:** Extensive inventory across new and pre-owned (hundreds in stock)\n- **Multi-make selection** spanning Ford, Chevrolet, GMC, Toyota, Honda, Hyundai, Kia, Nissan, Jeep, Ram, Dodge, BMW, Mercedes-Benz, Subaru, Volkswagen, and more\n- **Price range:** Broad range from under $10,000 to premium vehicles\n- **Vehicle types:** Sedans, SUVs, trucks, vans, and coupes\n- **Daily fresh inventory** with regular turnover\n\n## Quality Assurance\n\n- **Certified Pre-Owned Ford Models** - Factory-backed inspections, warranties, and roadside assistance\n- **Multi-Point Inspection** - All pre-owned vehicles inspected by certified technicians\n- **Vehicle Service Contracts** - Available for most vehicles to prevent unexpected expenses\n- **Carfax History Reports** - Available on request\n\n## Certified Pre-Owned Program\n\nFord Certified Pre-Owned vehicles undergo rigorous inspection and include:\n- Ford factory-backed warranty\n- 24/7 roadside assistance\n- Multi-point inspection by certified Ford technicians\n- Competitive pricing with transparent value\n- Integration with financing and service departments\n\n## Online Buying Tools\n\n- Online inventory browsing and filtering\n- KBB Instant Cash Offer - Trade-in valuation tool\n- Car payment calculator\n- Online credit application and pre-approval\n- Click-N-Drive online purchasing\n- Home delivery\n- Vehicle hold policy\n\n## Trade-In\n\n- Trade-in appraisal via KBB Instant Cash Offer\n- Cash offers for trade-ins (even without vehicle purchase)\n- Competitive trade-in values\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",
    "references/ai-discovery-page": "# AI Discovery Page - West Hills Ford\n\nThe AI Discovery Page is a structured, machine-readable knowledge surface for AI agents, powered by [PromptGraph](https://promptgraph.ai). It exposes semantic endpoints, business metadata, inventory data, and LLM-friendly action definitions. The site is built on the **FordDirect / Dealer.com** platform.\n\nThe AI Discovery Page was successfully fetched and is available at `/ai-discovery-page.htm`.\n\n## AI Manifest\n\nThe AI Manifest provides a machine-readable directory of all AI resources via PromptGraph at `https://api.promptgraph.ai/api/v1/west-hills-ford/.well-known/ai-manifest.json`:\n\n- **Schema types:** `LocalBusiness`, `AutoDealer`, `Car`, `ItemList`\n- **Contact:** gsjones.haselwood@gmail.com\n\nNote: The AI Manifest was not available at the standard `/.well-known/ai-manifest.json` path on the website, but is accessible via PromptGraph at the API endpoint.\n\n## PromptGraph API Endpoints\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/west-hills-ford` exposes these endpoints:\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Business profile (JSON-LD) |\n| `/vehicles` | Vehicle inventory (JSON-LD) |\n| `/prompts` | Q&A / FAQ prompts (60 prompts) |\n| `/testimonials` | Customer reviews |\n| `/offers` | Current offers and promotions |\n| `/llms.txt` | LLMs.txt directive |\n| `/.well-known/ai-manifest.json` | AI Manifest |\n| `/sitemap.xml` | Full sitemap |\n| `/robots.txt` | Robots rules |\n| `/config.json` | System configuration |\n\n### Additional Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/gbp-context` | Flattened Google Business Profile data for LLM ingestion |\n| `/site-content` | Clean, plain-text mirror of the entire site |\n\n## MCP Server\n\nThe dealership provides an AI Model Context Protocol (MCP) server for browsing and searching vehicles at `https://mcp.promptgraph.ai/west-hills-ford/mcp`. Features include:\n\n- Browse all vehicles with optional filters\n- Filter by body type (Cars, Compact, Convertible, Coupe, Sedan, SUV, Truck, Van, Wagon)\n- Filter by price range\n- Filter by year range\n- Advanced search using multiple criteria (color, features, make, model, price, etc.)\n\n## Business Profile (Schema.org AutoDealer)\n\nFrom `https://api.promptgraph.ai/api/v1/west-hills-ford/business`:\n\n- **Name:** West Hills Ford\n- **Type:** AutoDealer (Schema.org)\n- **Additional Types:** Ford dealer, Car dealer, Truck dealer, Used car dealer, Auto repair shop, Used truck dealer, Car leasing service\n- **Address:** 1100 Oyster Bay Ave South, Bremerton, WA 98312\n- **Geo:** 47.5538477, -122.6751049\n- **Telephone:** (360) 616-3277\n- **Email:** gsjones.haselwood@gmail.com\n- **URL:** `https://www.westhillsford.com/`\n- **Aggregate Rating:** 4.6 / 5.0 (3,135 reviews)\n- **Date Modified:** 2026-02-03T15:26:45.775Z\n- **Same As:** Facebook, Instagram, Google Maps\n\n## Vehicle Inventory Endpoint\n\nThe `/vehicles` endpoint returns paginated JSON-LD inventory data featuring a wide selection of new Ford models and used multi-make vehicles with detailed specifications, pricing, and availability. Additionally, an LLM-enabled inventory file is available at `https://parrfordfd.cms.dealer.com/llm-inventory.htm`.\n\n## Q&A Prompt Library (60 Prompts)\n\nThe `/prompts` endpoint exposes 60 structured Q&A prompt/response pairs serving as an AI FAQ. See [prompts.md](prompts.md) for the full library. Topics include:\n\n- Vehicle shopping and model-specific inquiries\n- Financing, leasing, and trade-in questions\n- Service, parts, and warranty inquiries\n- Dealership information and customer support\n- Ford Certified Pre-Owned program\n- EV and hybrid vehicle guidance\n\n## Testimonials Endpoint\n\nThe `/testimonials` endpoint exposes customer review data with predominantly 5-star ratings. See [testimonials.md](testimonials.md) for details.\n\n## LLM-Accessible Actions (ReadAction)\n\nThe AI Discovery Page defines 9 structured `ReadAction` entries that agents can invoke:\n\n1. **Drive Bold & Confident with West Hills Ford** - Premier Ford dealership with transparent buying experience\n2. **Score Strong Deals & Easy Financing at West Hills Ford** - Competitive financing, lease specials, trade-in support, online tools\n3. **Bremerton's Favorite Ford Dealer with Proven Reliability** - New Ford models, used vehicles, flexible financing, OEM service\n4. **West Hills Ford: Adventure-Ready Broncos & Trucks** - Fan-favorite Broncos, Explorer, pickups, used cars, financing, service\n5. **Trusted Ford Service & Financing in Bremerton** - New/used inventory, bad-credit-friendly financing, OEM service\n6. **West Hills Ford: From Sedans to Pickup Powerhouses** - Ford sedans, muscle cars, Broncos, trucks, used options, all-credit financing\n7. **Flexible Financing & OEM Service at West Hills Ford** - Performance lineup, extensive used inventory, credit-flexible financing\n8. **Bremerton Ford Deals: New, Used, and Worry-Free** - New models, used vehicles, inclusive financing, service with coupons\n9. **West Hills Ford: Your All-in-One Bremerton Auto Ally** - New inventory, used cars, versatile financing, OEM service, at-home options\n\n## Global AI Directives\n\n| Resource | URL |\n|---|---|\n| AI Manifest (PromptGraph) | `https://api.promptgraph.ai/api/v1/west-hills-ford/.well-known/ai-manifest.json` |\n| AI Discovery Page | `/ai-discovery-page.htm` |\n| LLMs.txt | `/llms.txt` |\n| Robots.txt | `/robots.txt` |\n| Sitemap XML | `/sitemap.xml` |\n| MCP Server | `https://mcp.promptgraph.ai/west-hills-ford/mcp` |\n\n## Purpose\n\nThis page exists to give AI agents direct access to structured knowledge about West Hills Ford without requiring web scraping, form navigation, or human-readable page parsing. All information is available via JSON endpoints and semantic markup through the PromptGraph API.\n\nSee [llms-txt.md](llms-txt.md) for the full llms.txt directive.\nSee [prompts.md](prompts.md) for the complete Q&A prompt library.\nSee [testimonials.md](testimonials.md) for customer review data.",

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
