    "datasets/dealership": "# Ron Marhofer Buick GMC, INC.\n\nRon Marhofer Buick GMC is a full-service Buick and GMC dealership located at **5617 Whipple Avenue Northwest, North Canton, OH 44720**, serving the greater Canton and Akron area including Akron, Cuyahoga Falls, Massillon, Stow, and Northeast Ohio.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Main | (866) 230-8630 |\n| Sales | (844) 830-8733 |\n| Service | (330) 403-9027 |\n| Parts | (877) 448-5709 |\n\nEmail: marhofergmcron@gmail.com\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 6:00 PM |\n| Wednesday | 9:00 AM - 6:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 6:00 PM |\n| Saturday | 9:00 AM - 5:00 PM |\n| Sunday | Closed |\n\n## Location\n\n- **Address:** 5617 Whipple Avenue Northwest, North Canton, OH 44720\n- **Geo:** 40.8640053, -81.426129\n\n## New Vehicles\n\nGMC models available include:\n- **Sierra 1500** - Full-size pickup truck, multiple trims including AT4 and Denali\n- **Sierra 2500 HD** - Heavy-duty pickup truck\n- **Sierra 3500 HD** - Heavy-duty pickup truck\n- **Sierra 3500 HD Chassis Cab** - Commercial chassis cab configuration\n- **Sierra EV** - All-electric full-size pickup truck\n- **Canyon** - Mid-size pickup truck\n- **Yukon** - Full-size SUV\n- **Acadia** - Mid-size 3-row SUV\n- **Terrain** - Compact SUV\n- **HUMMER EV Pickup** - All-electric supertruck\n\nBuick models available include:\n- **Encore GX** - Subcompact luxury crossover SUV\n- **Envision** - Compact luxury crossover SUV\n- **Enclave** - Mid-size 3-row luxury SUV\n\n## Services\n\n- **Finance Department** - Loan and lease options, online credit application, trade-in appraisal\n- **Service Center** - Certified technicians, routine maintenance, diagnostics, major repairs, genuine OEM parts\n- **Parts Department** - Genuine Buick and GMC components, accessories, tires\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used)\n- Online service scheduling\n- Online credit application and pre-approval\n- Car payment calculator\n- Trade-in valuation tool\n- Vehicle hold policy\n\n## Staff\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- Aggregate rating: 4.7 / 5.0 (1,702 reviews) across major platforms\n- Google Business Profile: 4.7 stars (1,700+ reviews)\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Marhofer Auto Family** - Part of the Marhofer group of dealerships\n- **Dealer Discount** - \"1 Dealer Discount applied to everyone\"\n- **No-Appointment Test Drives** - Walk-ins welcome\n- **Transparent Pricing** - Upfront pricing structures\n- **Low-Stress Car Buying** - No-haggle, transparent process\n- **Extended Warranty Protection Plans** - Available for peace of mind\n\n## Affiliations\n\n- Part of the **Marhofer Auto Family**\n- **GMC Dealer** and **Buick Dealer**\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform",
    "datasets/faq": "# Frequently Asked Questions - Ron Marhofer Buick GMC\n\n## Inventory\n\n**Q: What new Buick and GMC models are available at Ron Marhofer Buick GMC?**\nA: Full GMC lineup including Sierra 1500, Sierra 2500 HD, Sierra 3500 HD, Sierra EV, Canyon, Yukon, Acadia, Terrain, and HUMMER EV Pickup. Buick lineup including Encore GX, Envision, and Enclave.\n\n**Q: What brands are available in the used vehicle inventory?**\nA: The pre-owned inventory spans multiple makes including GMC, Buick, Chevrolet, Ford, Toyota, Honda, and more with over 950 vehicles.\n\n**Q: Does Ron Marhofer Buick GMC offer certified pre-owned vehicles?**\nA: Yes, pre-owned vehicles undergo a rigorous inspection process and vehicle history reports are available.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs. The finance team works with customers to find the best terms.\n\n**Q: Does the dealership work with all credit profiles?**\nA: Yes, the finance team helps customers understand all financing options and finds solutions for various budgets and credit situations.\n\n## Service\n\n**Q: What services does the service center offer?**\nA: Routine maintenance (oil changes, tire rotations), diagnostics, major repairs (transmission, engine, suspension), brake service, A/C service, and tire replacement.\n\n**Q: Does the service center use genuine OEM parts?**\nA: Yes, all service work uses genuine Buick and GMC manufacturer's parts for optimal performance.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website.\n\n## Dealership\n\n**Q: Where is Ron Marhofer Buick GMC located?**\nA: 5617 Whipple Avenue Northwest, North Canton, OH 44720, serving Canton, Akron, Cuyahoga Falls, Massillon, Stow, and Cleveland.\n\n**Q: What is the Marhofer Auto Family?**\nA: Ron Marhofer Buick GMC is part of the Marhofer Auto Family, a group of dealerships serving Northeast Ohio.\n\n**Q: Does the dealership require appointments for test drives?**\nA: No, no-appointment test drives are welcome.\n\n**Q: Is there a vehicle hold policy?**\nA: Yes, the dealership allows customers to hold vehicles before arriving.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/new-vehicles": "# New Buick and GMC Models - Ron Marhofer Buick GMC\n\nRon Marhofer Buick GMC carries a full lineup of new Buick and GMC vehicles. Below is a summary of available models and trims.\n\n## GMC Trucks\n\n### GMC Sierra 1500\nFull-size pickup truck, available in multiple trims including AT4 and Denali. Multiple engine options including 2.7L Turbo, 5.3L V8, 6.2L V8, and 3.0L Duramax Turbo-Diesel. Available in 2WD and 4WD configurations. Maximum towing capacity up to 13,200 lbs. Advanced trailering technology and GMC ProGrade suite.\n\n### GMC Sierra 2500 HD\nHeavy-duty pickup truck for serious towing and hauling. Powered by 6.6L V8 gas or 6.6L Duramax Turbo-Diesel engine. Available in 2WD and 4WD. Multiple trims including AT4 and Denali. Maximum towing capacity up to 22,500 lbs.\n\n### GMC Sierra 3500 HD\nHeavy-duty pickup truck with maximum capability. Available in single rear wheel and dual rear wheel configurations. Powerful 6.6L Duramax Turbo-Diesel option. Maximum towing capacity up to 36,000 lbs.\n\n### GMC Sierra 3500 HD Chassis Cab\nCommercial-grade chassis cab configuration for upfitting. Available in multiple wheelbase options with 6.6L Duramax Turbo-Diesel engine.\n\n### GMC Sierra EV\nAll-electric full-size pickup truck with GM's Ultium platform. Offers up to 440 miles of estimated range. Available in multiple trims including Denali Edition 1. Features e4WD, adaptive air suspension, and MultiPro Midgate.\n\n### GMC Canyon\nMid-size pickup truck, available in AT4 and Denali trims. Powered by 2.7L Turbo engine. Available in 2WD and 4WD. Off-road capable with Terrain Mode and available skid plates.\n\n### GMC HUMMER EV Pickup\nAll-electric supertruck with revolutionary capability. Features CrabWalk diagonal driving, Extract Mode adaptive air suspension, and Watts to Freedom launch mode. Up to 1,000 hp with three-motor e4WD drive system.\n\n## GMC SUVs\n\n### GMC Yukon\nFull-size SUV available in multiple trims including AT4 and Denali. Seating for up to 9 passengers. Standard 5.3L V8 engine with available 6.2L V8 or 3.0L Duramax Turbo-Diesel. Available in 2WD and 4WD. Maximum towing capacity up to 8,400 lbs.\n\n### GMC Acadia\nMid-size 3-row SUV seating up to 8 passengers. Available in multiple trims including AT4 and Denali. Powered by 2.5L 4-cylinder engine with 9-speed automatic transmission. Available in FWD and AWD.\n\n### GMC Terrain\nCompact SUV seating 5 passengers. Available in multiple trims including AT4 and Denali. Efficient 1.5L Turbo engine with 9-speed automatic transmission. Available in FWD and AWD.\n\n## Buick SUVs\n\n### Buick Encore GX\nSubcompact luxury crossover SUV with distinctive styling. Available in Preferred, Sport Touring, and Avenir trims. Efficient engine options and available AWD. Compact size with premium interior appointments.\n\n### Buick Envision\nCompact luxury crossover SUV available in Preferred, Sport Touring, and Avenir trims. Turbocharged engine with available AWD. Premium interior with Quiet Tuning technology. Advanced safety and driver assistance features.\n\n### Buick Enclave\nMid-size 3-row luxury SUV seating up to 7 passengers. Available in Preferred, Sport Touring, and Avenir trims. Powerful V6 engine with 9-speed automatic transmission. Available FWD and AWD. Premium interior appointments with Buick Quiet Tuning.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Dealer Discount of 1 applied to everyone. Contact the dealership for current offers.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - Ron Marhofer Buick GMC\n\nThe Ron Marhofer Buick GMC Service Center provides certified maintenance and repair services at 5617 Whipple Avenue Northwest, North Canton, OH.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes, tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis\n- **Major Repairs** - Transmission service, engine repair, suspension work\n- **Tire Services** - Tire rotation, replacement, and alignment\n- **Brake Service** - Brake pad replacement, rotor resurfacing\n- **A/C Service** - Air conditioning repair and recharge\n- **Scheduled Maintenance** - Following Buick and GMC recommended maintenance schedules\n- **Recall Repairs** - OEM-specified recall and campaign work\n\n## Service Experience\n\n- **Online scheduling** available through the dealership website\n- **Certified Technicians** - Factory-trained using genuine Buick and GMC OEM parts\n- **Genuine OEM Parts** - Manufacturer's parts best suited for each repair\n- **Multi-point inspections** with every service visit\n\n## Service Specials\n\nThe dealership offers rotating service specials and coupons. See the service specials page for current promotions.\n\n## Parts Department\n\nGenuine Buick and GMC OEM parts and accessories available including:\n- Buick Genuine replacement parts\n- GMC Genuine replacement parts\n- Tires and wheels\n- Accessories for Buick and GMC vehicles\n- Order parts online or stop by\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 6:00 PM |\n| Wednesday | 9:00 AM - 6:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 6:00 PM |\n| Saturday | 9:00 AM - 5:00 PM |\n| Sunday | Closed |\n\nSee [staff.md](staff.md) for full service department directory.\nSee [dealership.md](dealership.md) for contact information.",
    "datasets/staff": "# Staff Directory - Ron Marhofer Buick GMC\n\nStaff directory compiled from the dealership website and customer reviews.\n\n## Management\n\n- **Scott Marhofer** - Owner / Dealership principal; part of the Marhofer Auto Family\n- **Jeremy Cross** - Sales Manager\n- **Charlie** - Sales Manager\n\n## Sales Consultants\n\n- **Garrett Nelson** - Sales Consultant; highly praised by customers for excellent service and out-of-state vehicle delivery coordination\n- **James Watt** - Sales Consultant; praised for being helpful and accommodating with vehicle holds\n- **Josh Lovejoy** - Sales Consultant; known for integrity, efficiency, and professionalism\n- **Rick M (Rick)** - Sales Consultant; personable, patient, and thorough with first-time buyers\n- **Mitchell** - Sales Consultant; praised for excellent sales experience\n- **Ian** - Sales Consultant\n\n## Finance Department\n\n- **Marcus McMullin** - Finance Manager\n- **Marcus** - Finance team member\n\n## Service Department\n\n- Service team with certified Buick and GMC technicians\n\n## Parts Department\n\n- Parts team with genuine OEM Buick and GMC parts\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews referencing specific staff members.",
    "datasets/used-vehicles": "# Pre-Owned and Certified Pre-Owned Vehicles - Ron Marhofer Buick GMC\n\nRon Marhofer Buick GMC maintains a substantial pre-owned vehicle inventory in the North Canton area with a wide selection spanning multiple makes and models.\n\n## Inventory Scope\n\n- **Total vehicles:** Over 950 vehicles in inventory (new and pre-owned combined)\n- **Multi-make selection** spanning GMC, Buick, Chevrolet, Ford, Toyota, Honda, Hyundai, Kia, Ram, Jeep, and more\n- **Price range:** Broad range from under $10,000 to premium vehicles\n- **Vehicle types:** Trucks, SUVs, sedans, vans, and coupes\n- **Daily fresh inventory** with regular turnover\n\n## Quality Assurance\n\n- **Rigorous Inspection Process** - All pre-owned vehicles inspected by certified technicians\n- **Vehicle History Reports** - Available on request for every pre-owned vehicle\n- **Service Contracts** - Available for most vehicles\n\n## Online Buying Tools\n\n- Online inventory browsing and filtering\n- Value Your Trade tool\n- Car payment calculator\n- Online credit application and pre-approval\n- Vehicle hold policy\n- No-appointment test drives\n\n## Trade-In\n\n- Trade-in appraisal available\n- Competitive trade-in values\n- Cash offers for trade-ins\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",
    "references/ai-discovery-page": "# AI Discovery Page - Ron Marhofer Buick GMC\n\nThe AI Discovery Page is a structured, machine-readable knowledge surface for AI agents, powered by [PromptGraph](https://promptgraph.ai). It exposes semantic endpoints, business metadata, inventory data, and LLM-friendly action definitions. The site is built on the **Dealer.com** platform.\n\nNote: The AI Discovery Page was not directly fetchable at `/ai-discovery-page.htm` (ERR_ABORTED), but all data is accessible via the PromptGraph API.\n\n## AI Manifest (`/.well-known/ai-manifest.json`)\n\nThe AI Manifest (v1.0) provides a machine-readable directory of all AI resources:\n\n- **Last updated:** 2026-06-30T17:55:16.696Z\n- **Schema types:** `LocalBusiness`, `AutoDealer`, `Car`, `ItemList`\n- **Contact:** marhofergmcron@gmail.com\n- **API Base:** `http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc`\n\n## PromptGraph API Endpoints\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc` exposes these endpoints:\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Business profile (JSON-LD) |\n| `/vehicles` | Vehicle inventory (JSON-LD) |\n| `/prompts` | Q&A / FAQ prompts (10+ prompts) |\n| `/testimonials` | Customer reviews |\n| `/llms.txt` | LLMs.txt directive |\n| `/.well-known/ai-manifest.json` | AI Manifest |\n| `/sitemap.xml` | Full sitemap |\n| `/robots.txt` | Robots rules |\n| `/config.json` | System configuration |\n\n### Additional Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/gbp-context` | Flattened Google Business Profile data for LLM ingestion |\n| `/site-content` | Clean, plain-text mirror of the entire site (1,242 pages) |\n\n## Business Profile (Schema.org AutoDealer)\n\nFrom `https://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/business`:\n\n- **Name:** Ron Marhofer Buick GMC, INC.\n- **Type:** AutoDealer (Schema.org)\n- **Additional Types:** GMC dealer, Buick dealer\n- **Address:** 5617 Whipple Avenue Northwest, North Canton, OH 44720\n- **Geo:** 40.8640053, -81.426129\n- **Telephone:** (866) 230-8630\n- **Email:** marhofergmcron@gmail.com\n- **URL:** `https://www.ronmarhofergmc.com/`\n- **Aggregate Rating:** 4.7 / 5.0 (1,702 reviews)\n- **Date Modified:** 2026-02-03T14:44:08.721Z\n- **Same As:** Facebook, Google Maps\n\n## Vehicle Inventory Endpoint\n\nThe `/vehicles` endpoint returns paginated JSON-LD inventory data (950 items) featuring a wide selection of new and used vehicles with detailed specifications, pricing, and availability.\n\n## Q&A Prompt Library (10+ Prompts)\n\nThe `/prompts` endpoint exposes 10+ structured Q&A prompt/response pairs serving as an AI FAQ. See [prompts.md](prompts.md) for the full library.\n\n## Testimonials Endpoint\n\nThe `/testimonials` endpoint exposes customer review data with predominantly 5-star ratings. See [testimonials.md](testimonials.md) for details.\n\n## LLM-Accessible Actions (ReadAction)\n\nThe PromptGraph API defines structured ReadAction entries covering:\n\n1. **Trusted Buick & GMC Dealer with Customer-First Service** - Reputation and customer-focused buying experience\n2. **Buick & GMC Value, Deals & Flexible Financing** - Financial value, specials, and financing solutions\n3. **New GMC Sierra & HUMMER EV Dealer** - Leading North Canton dealer for GMC trucks and SUVs\n4. **Quality Used Buick GMC Vehicles North Canton OH** - Used inventory with inspection and history reports\n5. **Expert Buick GMC Service Center North Canton, OH** - Certified service with OEM parts\n6. **Flexible Buick GMC Financing North Canton OH** - Lease and loan options\n7. **New Buick Encore GX & Envision Dealer** - Buick luxury lineup\n8. **Your North Canton Buick GMC Home - Sales to Service** - Complete dealership resource\n9. **Customer Experience and Reviews** - Dealing with Ron Marhofer Buick GMC\n\n## Global AI Directives\n\n| Resource | URL |\n|---|---|\n| AI Manifest (PromptGraph) | `https://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/.wel     "references/llms-txt": "# LLMs.txt - Ron Marhofer Buick GMC\n\nThe `llms.txt` file provides a structured directive for LLMs and AI agents interacting with Ron Marhofer Buick GMC's web properties. It indexes key pages and structured API endpoints.\n\n## API Endpoints\n\nStructured JSON-LD data endpoints optimized for AI consumption:\n\n- [Business Information](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/business) - Complete business profile with address, contact, hours, and location in JSON-LD format\n- [Vehicle Inventory](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/vehicles) - Complete inventory of available vehicles with specifications, pricing, and availability in JSON-LD format\n- [Prompts & FAQs](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/prompts) - 10+ structured prompts for consistent AI responses\n- [Customer Testimonials](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/testimonials) - Customer reviews and ratings in JSON-LD format\n- [Google Business Profile Context](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/gbp-context) - Flattened GBP data for LLM ingestion including business profile, recent reviews, latest posts, and image URLs\n- [Full Site JSON Mirror](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/site-content) - Clean, plain-text mirror of the entire site for LLM ingestion\n- [AI Manifest](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/.well-known/ai-manifest.json) - Machine-readable directory of all available AI resources\n- [Sitemap](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/sitemap.xml) - XML sitemap for search engine and AI crawler discovery\n- [Configuration](http://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/config.json) - System configuration and metadata\n\n## Available Schema Types\n\n- LocalBusiness / AutoDealer\n- Car (for vehicle inventory)\n- ItemList\n- Review / AggregateRating\n- Offer\n- CreativeWork (for prompts/FAQs)\n\n## Products\n\n ually-like-dealing-with-ron-marhofer-buick-gmc) - Customer experience\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for detailed endpoint documentation.",
    "references/prompts": "# PromptGraph Prompt Library - Ron Marhofer Buick GMC\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/ron-marhofer-buick-gmc/prompts` exposes 10+ structured Q&A prompt/response pairs. Below is a categorized summary.\n\n## Prompt Categories\n\n### Dealership & Reputation (3+ prompts)\n- Trusted Buick and GMC dealer with customer-first service\n- Customer experience and reviews\n- Employee experience at the dealership\n\n### Vehicle Shopping (3+ prompts)\n- New GMC Sierra and HUMMER EV dealer\n- New Buick Encore GX and Envision dealer\n- Quality used Buick GMC vehicles North Canton OH\n- GMC Terrain AT4 interest and inquiry\n\n### Financing (2+ prompts)\n- Buick and GMC value, deals and flexible financing\n- Flexible Buick GMC financing North Canton OH\n\n### Service & Parts (1+ prompts)\n- Expert Buick GMC service center North Canton, OH\n\n### Buying Experience (1+ prompts)\n- Your North Canton Buick GMC home - sales to service\n\n## Featured Prompts\n\n| # | Prompt Slug | Focus |\n|---|---|---|\n| 1 | `trusted-buick-&-gmc-dealer-with-customerfirst-service` | Dealership positioning |\n| 2 | `buick-&-gmc-value-deals-&-flexible-financing` | Financial value |\n| 3 | `new-gmc-sierra-&-hummer-ev-dealer` | GMC truck/SUV lineup |\n| 4 | `quality-used-buick-gmc-vehicles-north-canton-oh` | Used inventory |\n| 5 | `expert-buick-gmc-service-center-north-canton-oh` | Service department |\n| 6 | `flexible-buick-gmc-financing-north-canton-oh` | Financing options |\n| 7 | `new-buick-encore-gx-&-envision-dealer` | Buick lineup |\n| 8 | `your-north-canton-buick-gmc-home--sales-to-service` | Complete dealership |\n| 9 | `do-people-like-working-with-ron-marhofer-buick-gmc` | Employee experience |\n| 10 | `whats-it-actually-like-dealing-with-ron-marhofer-buick-gmc` | Customer experience |\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for the complete API endpoint documentation.\nSee [faq.md](/datasets/faq.md) for common questions and answers.",
    "references/testimonials": "# Customer Testimonials - Ron Marhofer Buick GMC\n\nRon Marhofer Buick GMC has collected customer testimonials through the PromptGraph platform and Google Business Profile. Reviews are predominantly 5-star with strong themes of professional sales service, respect, and transparency.\n\n## Aggregate Ratings\n\n- **Google Business Profile:** 4.7 / 5.0 (1,702 reviews)\n- **PromptGraph Reviews:** Predominantly 5-star\n\n## Most-Praised Staff (by frequency)\n\n- **Garrett Nelson** - Excellent salesperson, coordinated out-of-state delivery and trade-in\n- **James Watt** - Helpful, accommodating with vehicle holds, responsive\n- **Josh Lovejoy** - Integrity, efficiency, professionalism\n- **Rick M** - Personable, patient, thorough with first-time buyers\n- **Mitchell** - Awesome sales experience\n- **Jeremy Cross** - Sales Manager, professional\n- **Marcus McMullin** - Finance Manager, knowledgeable\n- **Charlie** - Sales Manager, excellent service\n\n## Notable Excerpts\n\n> \"I had the best experience purchasing my 2026 Yukon AT4 Ultimate. I worked with Garrett Nelson and he worked me out a great deal along with Scott Marhofer. I live in South Mississippi and Marhofer GMC had my AT4 brought down to me and took back my trade in.\" - Trevor\n\n> \"This is by far the best dealership I have bought a Truck from. From start to finish, the process was smooth, honest, and stress-free. Garrett was amazing to work with, knowledgeable, professional, and truly went above and beyond to make everything easy.\" - Reffner Lawn Care LLC\n\n> \"I found Ron Marhofer through GMC's website, looking at inventory near by. They had, by far, the best price in the entire region. I traveled 100 miles from PA. The buying process was the best I've ever experience. I dealt with Mitchell in sales. He was awesome to work with.\" - Dan Watkins\n\n> \"Very happy with the whole experience at Ron Marhofer. The selection and the price was the best around. No other dealer came close. James Watt my salesman is the best!!\" - Michael O'Brien\n\n> \"I've known Josh for several years... I highly recommend Josh if you are looking for a vehicle. He will take good care of you and your vehicle needs. He's a very efficient, professional, and knowledgeable salesman.\" - Chris Armentrout\n\n> \"Rick M was great! He is very personable and genuine. I'm young and on a budget. I've never leased a car before so I was anxious and uneducated but he was patient and thorough!\" - destiny knapp\n\n## Sales Themes\n\n- **Best pricing** - Multiple customers mention the best price in the region\n- **Out-of-state delivery** - Coordinated remote delivery and trade-in from hundreds of miles away\n- **Professional service** - Sales staff praised for knowledge, responsiveness, and smooth processes\n- **Honest and transparent** - Upfront about costs and terms, no-haggle process\n- **Vehicle holds** - Willing to hold vehicles for busy customers\n\n## Service Themes\n\n- **Smooth process** - Efficient move through sales and finance\n- **Not commissioned** - Sales team is not commissioned, providing red carpet treatment\n\nSee [staff.md](/datasets/staff.md) for the full staff directory.",
    "tables/model-comparison": "# Buick and GMC Model Lineup Comparison - Ron Marhofer Buick GMC\n\n## GMC Model Overview\n\n| Model | Body Type | Passengers | Drivetrain | Starting MSRP Tier | Key Trims |\n|---|---|---|---|---|---|\n| **Terrain** | Compact SUV | 5 | FWD / AWD | Mid-range | Elevation, AT4, Denali |\n| **Acadia** | Mid-size 3-Row SUV | 7-8 | FWD / AWD | Mid-range | Elevation, AT4, Denali |\n| **Yukon** | Full-size SUV | 7-9 | RWD / 4WD | Premium | Elevation, AT4, Denali |\n| **Canyon** | Mid-size Pickup | 5 | RWD / 4WD | Mid-range | Elevation, AT4, Denali |\n| **Sierra 1500** | Full-size Pickup | 5-6 | RWD / 4WD | Premium | Pro, SLE, Elevation, SLT, AT4, Denali |\n| **Sierra 2500 HD** | Heavy-Duty Pickup | 5-6 | RWD / 4WD | Premium | Pro, SLE, SLT, AT4, Denali |\n| **Sierra 3500 HD** | Heavy-Duty Pickup | 5-6 | RWD / 4WD | Premium | Pro, SLE, SLT, AT4, Denali |\n| **Sierra EV** | All-Electric Pickup | 5 | e4WD | Premium | Denali Edition 1 |\n| **HUMMER EV Pickup** | All-Electric Supertruck | 5 | e4WD | Ultra-Premium | EV2, EV3x, Edition 1 |\n\n## Buick Model Overview\n\n| Model | Body Type | Passengers | Drivetrain | Starting MSRP Tier | Key Trims |\n|---|---|---|---|---|---|\n| **Encore GX** | Subcompact Crossover | 5 | FWD / AWD | Entry-level | Preferred, Sport Touring, Avenir |\n| **Envision** | Compact Crossover | 5 | FWD / AWD | Mid-range | Preferred, Sport Touring, Avenir |\n| **Enclave** | Mid-size 3-Row SUV | 7 | FWD / AWD | Premium | Preferred, Sport Touring, Avenir |\n\n## Key Feature Comparison - GMC\n\n| Feature | Terrain | Acadia | Yukon | Canyon | Sierra 1500 | Sierra EV | HUMMER EV |\n|---|---|---|---|---|---|---|---|\n| Engine | 1.5L Turbo 4-cyl | 2.5L 4-cyl | 5.3L V8 / 6.2L V8 | 2.7L Turbo 4-cyl | 2.7L Turbo / 5.3L V8 / 6.2L V8 / 3.0L Diesel | Dual Motor Electric | 3-Motor Electric |\n| Horsepower | 175 hp | 193 hp | 355-420 hp | 310 hp | 310-420 hp | ~625 hp | ~1,000 hp |\n| AWD/4WD Available | AWD | AWD | 4WD | 4WD | 4WD | e4WD | e4WD |\n| 3rd Row | No | Yes | Yes | No | No | No | No |\n| Towing (max) | 1,500 lbs | 4,000 lbs | 8,400 lbs | 7,700 lbs | 13,200 lbs | 9,500 lbs | TBD |\n| ProGrade Trailering | No | No | Yes | No | Yes | Yes | No |\n\n## Key Feature Comparison - Buick\n\n| Feature | Encore GX | Envision | Enclave |\n|---|---|---|---|\n| Engine | 1.2L Turbo / 1.3L Turbo | 2.0L Turbo | 3.6L V6 |\n| Horsepower | 137-155 hp | 228 hp | 310 hp |\n| AWD Available | Yes | Yes | Yes |\n| 3rd Row | No | No | Yes |\n| Towing (max) | 1,000 lbs | 1,500 lbs | 5,000 lbs |\n| Buick Quiet Tuning | Yes | Yes | Yes |\n\n## Electric & High-Performance Options\n\n| Model | Type | Range (est.) | Notes |\n|---|---|---|---|\n| **Sierra EV** | Full EV | ~440 miles | Ultium platform, MultiPro Midgate |\n| **HUMMER EV Pickup** | Full EV | ~300+ miles | CrabWalk, Extract Mode, Watts to Freedom |\n\n## Warranty\n\nAll new GMC and Buick models include:\n- **3-Year / 36,000-Mile Bumper-to-Bumper Limited Warranty**\n- **5-Year / 60,000-Mile Powertrain Limited Warranty**\n- **5-Year / Unlimited-Mile Corrosion Perforation Limited Warranty**\n- **3-Year / 36,000-Mile Roadside Assistance**\n- **2-Year / 24,000-Mile Scheduled Maintenance**\n- **8-Year / 100,000-Mile EV Component Warranty** (electric models)\n\n## Safety & Technology\n\nStandard and available features across the lineup:\n- Automatic Emergency Braking\n- Lane Keep Assist with Lane Departure Warning\n- Forward Collision Alert\n- Front Pedestrian Braking\n- IntelliBeam Auto High Beams\n- Following Distance Indicator\n- GMC ProGrade Trailering System (truck models)\n- Buick Quiet Tuning (Buick models)\n- Wireless Apple CarPlay and Android Auto\n- Available Super Cruise (select models)\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for detailed model descriptions.\nSee [dealership.md](/datasets/dealership.md) for current offers and promotions."

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
