<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>full-circle-strategic-marketing - OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }
main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty { text-align: center; margin-top: 40px; }
.detail-header { margin-bottom: 12px; }
.detail-header h1 { font-size: 18px; margin: 4px 0 2px; font-weight: 600; }
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt { color: #64748b; font-weight: 500; }
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }
.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}
hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }
#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 { font-size: 16px; margin: 18px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #e2e8f0; }
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: ui-monospace, "SF Mono", Consolas, monospace; }
#detail-body pre { background: #0f172a; color: #e2e8f0; padding: 10px 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td { border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px; }
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }
#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }
</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>
<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>
<script>
window.BUNDLE_NAME = "full-circle-strategic-marketing";
window.BUNDLE = {
  "nodes": [
    {
      "data": {
        "id": "datasets/company",
        "label": "Full Circle Strategic Marketing",
        "type": "Marketing Agency",
        "description": "Full-service marketing company providing advertising strategy, campaign management, creative development, media buying, and data-driven marketing solutions.",
        "resource": "https://fullcirclemarketing.com/",
        "tags": [],
        "color": "#8b5cf6",
        "size": 19
      }
    },
    {
      "data": {
        "id": "references/ai-discovery-page",
        "label": "AI Discovery Page - Full Circle Strategic Marketing",
        "type": "Reference",
        "description": "Overview of AI visibility for Full Circle Strategic Marketing. (synthesized)",
        "resource": "",
        "tags": [],
        "color": "#10b981",
        "size": 29
      }
    },
    {
      "data": {
        "id": "references/llms-txt",
        "label": "Full Circle Strategic Marketing - llms.txt",
        "type": "llms.txt",
        "description": "AI context file for Full Circle Strategic Marketing. (synthesized)",
        "resource": "",
        "tags": [],
        "color": "#10b981",
        "size": 20
      }
    },
    {
      "data": {
        "id": "references/prompts",
        "label": "Full Circle Strategic Marketing - AI Prompts",
        "type": "Playbook",
        "description": "Curated AI prompts for client consultations and internal use at Full Circle Strategic Marketing. (synthesized)",
        "resource": "",
        "tags": [],
        "color": "#10b981",
        "size": 19
      }
    }
  ],
  "edges": [],
  "bodies": {
    "datasets/company": "# Full Circle Strategic Marketing\n\nFull Circle Strategic Marketing is a full-service marketing company based in Farmington Hills, MI, that helps clients leverage advanced technology, artificial intelligence (AI), and innovative marketing to fuel growth. The firm provides strategic guidance, comprehensive management, custom advertising campaigns, and marketing-as-a-service (MaaS) across multiple industries.\n\n## Location\n\n- **Address**: 27555 Executive Dr #100, Farmington Hills, MI 48331\n- **Phone**: (734) 744-6061\n- **Email**: Contact@FullCircleMarketing.com\n\n## Industries Served\n\n- Tourism and Nonprofits\n- Home Improvement\n- Automotive and Retail\n- Real Estate\n- Higher Education\n- Entertainment and Hospitality\n- Banking and Finance\n- Agriculture\n\n## Services\n\n### Strategy & Management\n- Advertising strategy development\n- Campaign management\n- Budget management\n- Supplier negotiation and auditing\n- Yield optimization\n- Public relations\n\n### Creative\n- Creative development and design\n- Copywriting\n- Video and multimedia production\n- Television commercial production\n- Post-production and editing\n\n### Media\n- Media planning and buying\n- OTT advertising and monetization\n- Multi-channel messaging\n\n### Data & Analytics\n- Data-driven marketing strategy\n- Customer prospect identification\n- ROI measurement and optimization\n- Consumer insights and behavioral targeting\n\n## Team Capabilities\n\n- **Marketing Strategists & Directors**: Strategic planning and goal-setting\n- **Creative Directors & Designers**: Graphic design, copywriting, video editing\n- **Media Planners & Buyers**: Rate negotiation, ad placement optimization\n- **Consultants & Advisors**: Yield optimization, margin analysis, sales strategy\n- **Video & Multimedia Producers**: TV commercials, product/event videos\n\n## Approach\n\n1. **Leverage Insights**: Use data to identify prospects and develop custom strategy\n2. **Customize Messaging**: Craft effective messages using data and storytelling\n3. **Maximize ROI**: Drive qualified traffic through multi-channel messaging\n\n## Data-Driven Strategy\n\nThe team collects, interprets, and humanizes data to drive transparent and intelligent strategy across three phases: Understand (identify prospects), Find (locate based on channels/preferences), Activate (deliver optimal message timing and channel).",
    "references/ai-discovery-page": "# AI Discovery Page \u2014 Full Circle Strategic Marketing\n\n## Overview\nFull Circle Strategic Marketing has no AI-specific discovery files. An llms.txt and prompts.txt have been synthesized.\n\n## Discovery Channels\n- **Website**: https://fullcirclemarketing.com/\n- **LinkedIn**: Full Circle Strategic Marketing\n- **Facebook**: Amplified Full Circle\n\n## Recommendation\nHost `/llms.txt` at the domain with structured service and industry data for AI-driven discovery.",
    "references/llms-txt": "# Full Circle Strategic Marketing\n\n> Full-service marketing company leveraging AI and data-driven strategies.\n\n## Key Information\n- **Location**: 27555 Executive Dr #100, Farmington Hills, MI 48331\n- **Website**: https://fullcirclemarketing.com/\n- **Phone**: (734) 744-6061\n- **Email**: Contact@FullCircleMarketing.com\n\n## Industries\nTourism, Home Improvement, Automotive, Real Estate, Higher Education, Entertainment, Banking, Agriculture\n\n## Services\n- Strategy: advertising strategy, campaign management, budget management, yield optimization\n- Creative: design, copywriting, video production, TV commercials\n- Media: planning, buying, OTT advertising, multi-channel messaging\n- Data: consumer insights, prospect identification, ROI optimization\n\n## Approach\n1. Leverage data insights to identify prospects\n2. Customize messaging via storytelling\n3. Maximize ROI through multi-channel messaging",
    "references/prompts": "# Full Circle Strategic Marketing \u2014 AI Prompts\n\n## Client Consultation\n\n**Prompt**: Act as a marketing strategist at Full Circle Strategic Marketing. A [home improvement / automotive / tourism] company wants to increase brand awareness and drive leads. Describe a data-driven multi-channel campaign strategy.\n\n**Prompt**: A prospective client asks how Full Circle differs from other agencies. Explain the data-driven approach, leverage of AI, and the full-service model from strategy through creative and media buying.\n\n## Internal\n\n**Prompt**: Draft a media brief for a [industry] client. Include campaign objectives, target audience, key messaging, and suggested channel mix.\n\n**Prompt**: Write a case study summary for a successful campaign. Highlight the challenge, approach, and ROI results."
  },
  "types": [
    "Marketing Agency",
    "Playbook",
    "Reference",
    "llms.txt"
  ],
  "palette": {
    "Marketing Agency": "#8b5cf6",
    "Reference": "#10b981",
    "llms.txt": "#10b981",
    "Playbook": "#10b981"
  }
};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
