ed M-Certified technicians for M performance vehicle service and repair.\n\n**Q: Does the center service electric BMW vehicles?**\nA: Yes, the service center is equipped for iPerformance electric vehicle service including high-voltage battery diagnostics and electric drivetrain repair.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website. Text message updates are provided during service visits.\n\n## Dealership\n\n**Q: How long has BMW of Cincinnati North been in business?**\nA: The dealership is part of the Jake Sweeney Company, family-owned and operated for over 100 years since 1917, now in its 4th generation.\n\n**Q: What is the BMW Value Service program?**\nA: BMW Value Service offers competitively priced maintenance for select out-of-warranty BMW models including oil service, brake service, microfilter replacement, and vehicle checks.\n\n**Q: Does the dealership have genuine BMW parts?**\nA: Yes, the parts department carries genuine Original BMW Parts, Original BMW Batteries, M Performance Parts, and BMW accessories.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/new-vehicles": "# New BMW Models - BMW of Cincinnati North\n\nBMW of Cincinnati North carries a full lineup of new BMW vehicles, including the latest iPerformance electric models, M performance variants, and ALPINA models.\n\n## Sedans\n\n### 2 Series Gran Coupe\nEntry-level BMW sedan. Available as **228i Gran Coupe** ($39,600) and **M235i Gran Coupe** ($50,000). Front-wheel drive based with xDrive available. Turbocharged 4-cylinder engines.\n\n### 3 Series Sedan\nThe iconic BMW sports sedan. Available as **330i** ($47,500) and **M340i** ($61,700). Turbocharged 4-cylinder (330i) and 6-cylinder (M340i) with xDrive all-wheel drive available.\n\n### 5 Series Sedan\nMid-size luxury sedan. Available as **530i** ($58,700), **540i** ($65,800), and **550e xDrive** plug-in hybrid ($75,500). Combines luxury, technology, and performance.\n\n### 7 Series Sedan\nFull-size flagship luxury sedan. Available as **740i** ($99,300), **750e xDrive** plug-in hybrid ($110,000), and **760i xDrive** V8 ($124,700). The pinnacle of BMW luxury.\n\n### i5 Sedan\nAll-electric mid-size luxury sedan. Starting MSRP $67,100. Part of BMW's electric iPerformance lineup.\n\n### i7 Sedan\nAll-electric full-size flagship sedan. Starting MSRP $105,700. Electric luxury at its finest.\n\n### M3 Sedan\nHigh-performance sports sedan. Starting MSRP $79,300. Turbocharged 6-cylinder with rear-wheel drive or M xDrive.\n\n### M5 Sedan\nUltimate high-performance luxury sedan. Starting MSRP $119,500. V8 engine with M xDrive. Available as M5 Touring ($125,300).\n\n## SUVs\n\n### X1\nSubcompact luxury SUV. Starting MSRP $43,200. xDrive all-wheel drive standard. Ideal entry point to BMW SUV ownership.\n\n### X2\nCompact sporty SUV. Starting MSRP $44,700. Distinctive coupe-like styling.\n\n### X3\nCompact luxury SUV. Starting MSRP $51,300. Popular family SUV with turbocharged engine and xDrive.\n\n### X4\nCompact SUV coupe. Starting MSRP $55,300. Sporty sloping roofline. Available as high-performance **X4 M** ($79,100).\n\n### X5\nMid-size luxury SUV. Starting MSRP $68,300. Available as **X5 xDrive40i**, **X5 xDrive50e** plug-in hybrid ($76,000), and high-performance **X5 M** ($131,000).\n\n### X6\nMid-size SUV coupe. Starting MSRP $77,300. Bold coupe-SUV styling. Available as **X6 M** ($136,100).\n\n### X7\nFull-size luxury SUV. Starting MSRP $87,500. Three-row seating, flagship SUV with commanding presence. Available with V8 engine.\n\n### XM\nHigh-performance plug-in hybrid SUV. Starting MSRP $159,600. The most powerful BMW M production vehicle with electrified V8 powertrain.\n\n### iX\nAll-electric mid-size luxury SUV. Starting MSRP $75,150. BMW's flagship electric SUV with advanced technology and sustainable materials.\n\n### ALPINA XB7\nUltra-luxury high-performance full-size SUV. Starting MSRP $156,000. Hand-assembled by ALPINA with bespoke interior and enhanced V8.\n\n## Coupes\n\n### 2 Series Coupe\nCompact rear-drive coupe. Available as **230i** ($41,700) and **M240i xDrive** ($53,000). Pure driving dynamics.\n\n### 4 Series Coupe\nStylish mid-size coupe. Available as **430i** ($51,500) and **M440i** ($65,050). Iconic kidney grille design.\n\n### 8 Series Coupe\nFlagship grand touring coupe. Available as **840i** ($91,700) and **M850i xDrive** ($110,500). Luxury and performance.\n\n### M2 Coupe\nHigh-performance compact coupe. Starting MSRP $68,200. Turbocharged 6-cylinder, rear-wheel drive, track-ready.\n\n### M4 Coupe\nLegendary high-performance coupe. Starting MSRP $80,100. Available with rear-wheel drive or M xDrive. Turbocharged 6-cylinder.\n\n### M8 Coupe\nFlagship high-performance coupe. Starting MSRP $138,800. V8 engine, M xDrive, ultimate grand tourer.\n\n## Convertibles\n\n### Z4 Roadster\nTwo-seat roadster. Starting MSRP $56,100. Retractable hardtop, rear-wheel drive, pure open-air driving.\n\n### 4 Series Convertible\nMid-size luxury convertible. Available as **430i** ($59,500) and **M440i** ($73,050). Power soft top.\n\n### 8 Series Convertible\nFlagship luxury convertible. Available as **840i** ($100,500) and **M850i** ($116,000). V8 power, open-air luxury.\n\n### M4 Convertible\nHigh-performance convertible. Starting MSRP $98,400. M power with open-air driving.\n\n### M8 Convertible\nFlagship high-performance convertible. Starting MSRP $150,000. V8 engine, ultimate open-air performance.\n\n## Gran Coupes\n\n### 2 Series Gran Coupe\nFour-door coupe. Available as **228i** ($39,600) and **M235i** ($50,000).\n\n### 4 Series Gran Coupe\nFour-door coupe. Available as **430i** ($50,600) and **M440i** ($64,400). Sleek four-door with sporty character.\n\n### 8 Series Gran Coupe\nFour-door flagship coupe. Available as **840i** ($90,800) and **M850i** ($110,500). Four-door grand tourer. Also available as **M8 Gran Coupe** ($140,000) and **ALPINA B8 Gran Coupe** ($151,500).\n\n## Electric iPerformance Models\n\n### i4 Hatchback\nAll-electric four-door Gran Coupe. Starting MSRP $57,900. Available in eDrive35, eDrive40, and M50 variants.\n\n### i5 Sedan\nAll-electric mid-size luxury sedan. Starting MSRP $67,100.\n\n### i7 Sedan\nAll-electric full-size flagship sedan. Starting MSRP $105,700.\n\n### iX SUV\nAll-electric mid-size luxury SUV. Starting MSRP $75,150. Available in xDrive50 and M60 variants.\n\n## M Performance Models\n\n| Model | Type | Starting MSRP | Engine |\n|---|---|---|---|\n| M2 | Coupe | $68,200 | Turbo 6-cyl |\n| M3 | Sedan | $79,300 | Turbo 6-cyl |\n| M4 | Coupe / Convertible | $80,100 / $98,400 | Turbo 6-cyl |\n| M5 | Sedan / Touring | $119,500 / $125,300 | V8 |\n| M8 | Coupe / Convertible / Gran Coupe | $138,800+ | V8 |\n| X4 M | SUV | $79,100 | Turbo 6-cyl |\n| X5 M | SUV | $131,000 | V8 |\n| X6 M | SUV | $136,100 | V8 |\n| XM | SUV PHEV | $159,600 | V8 PHEV |\n\n## Promotions & Offers\n\nCurrent promotions include lease offers on 2026 X3, X5, X5 PHEV, 330i, 530i, and X1 models. BMW Certified Pre-Owned APR offers as low as 1.99% for iX models, 2.99% for i4/i5/i7, and 4.99% for other CPO models. See [dealership.md](dealership.md) for contact information and current programs.\n\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.\nSee [dealership.md](dealership.md) for current offers and financing programs.",
    "datasets/service-center": "# BMW Service Center - BMW of Cincinnati North\n\nThe BMW of Cincinnati North Service Center provides certified maintenance and repair services at 105 West Kemper Road, Cincinnati, OH. The center is a **BMW M Certified** service facility.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes (BMW TwinPower Turbo oil), tire rotations, alignments, brake inspections, cabin air filters\n- **BMW Value Service** - Competitive pricing on select maintenance services for older BMW models\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis, BMW-specific diagnostics\n- **Major Repairs** - Transmission service, alternator replacement, suspension work, cooling system\n- **Original BMW Batteries** - Factory-spec batteries with BMW battery management system registration\n- **Recall Repairs** - OEM-specified recall and campaign work\n- **Scheduled Maintenance** - Following BMW's Condition Based Servicing (CBS) system\n- **M Performance Service** - Specialized service for M vehicles including differential service, brake fluid flushes, and performance inspections\n- **iPerformance Service** - High-voltage battery diagnostics, electric drivetrain service\n\n## Service Experience\n\n- **Text message updates** during service visits\n- **Realistic time estimates** communicated upfront\n- **Clean waiting area** with amenities\n- **Follow-up calls** after service to ensure satisfaction\n\n## BMW Value Service\n\nBMW Value Service provides competitively priced maintenance for select BMW models outside of the included maintenance period. Services include oil service, microfilter replacement, brake service, and vehicle check.\n\n## Service Specials\n\nThe dealership offers rotating service specials. See [dealership.md](dealership.md) for current offers.\n\n## Parts Department\n\nGenuine BMW Original Parts and accessories available:\n\n- **Original BMW Batteries** - Factory-spec batteries for all BMW models\n- **Genuine BMW Parts** - OEM replacement parts for all BMW models\n- **M Performance Parts** - Performance upgrades for M and M Sport vehicles\n- **BMW Accessories** - Genuine BMW accessories including floor liners, roof racks, and more\n\nSee [staff.md](staff.md) for service department roles.\nSee [dealership.md](dealership.md) for contact and hours.",
    "datasets/staff": "# Staff Directory - BMW of Cincinnati North\n\nBMW of Cincinnati North operates as part of the Jake Sweeney Company, a 4th generation family-owned auto group since 1917. The dealership is a **BMW M Certified Dealer** with factory-trained technicians and BMW product experts. Specific staff names were not available from the site or PromptGraph API data, but typical roles include:\n\n## Sales Department\n\n- **Sales Consultants** - BMW product experts specializing in new BMW sedans, SUVs, coupes, convertibles, electric iPerformance models, and M performance vehicles\n- **BMW Genius** - Product specialists providing in-depth technology demonstrations and vehicle walkarounds\n- **Internet Sales Team** - Handling online inquiries, remote purchasing, and out-of-town sales\n- **Client Advisor** - Dedicated point of contact throughout the purchasing process\n\n## Sales Management\n\n- **Sales Manager** - Oversees sales operations and customer experience\n- **Finance Manager** - Specializing in BMW Financial Services products, lease structuring, loan approval, and protection packages\n\n## Service Department\n\n- **BMW Certified Technicians** - Factory-trained for BMW maintenance and repair, including M and iPerformance vehicles\n- **Service Advisors** - Customer-facing service consultants managing appointments, estimates, and communication\n- **M Certified Technicians** - Specialized training for M performance vehicle service\n\n## Parts Department\n\n- **Parts Specialists** - Genuine BMW parts and accessories expertise\n- **Parts Counter Staff** - Customer-facing parts sales\n\n## Management\n\n- **General Manager** - Overall dealership operations\n- **Service Manager** - Service department oversight\n- **Parts Manager** - Parts department operations\n- **Marketing Manager** - Dealership marketing and digital presence\n\nSee [testimonials.md](/references/testimonials.md) for customer reviews that may reference staff members.\nSee [dealership.md](dealership.md) for contact information.",
    "datasets/used-vehicles": "# Pre-Owned and BMW Certified Pre-Owned Vehicles - BMW of Cincinnati North\n\nBMW of Cincinnati North maintains a substantial pre-owned vehicle inventory with 664+ vehicles (PromptGraph API) with regular turnover and daily fresh stock.\n\n## Inventory Scope\n\n- **Total vehicles:** 664+ (PromptGraph API)\n- **Daily fresh inventory** with regular turnover\n- **Multi-make selection** spanning BMW, Mercedes-Benz, Audi, Porsche, Land Rover, Lexus, Infiniti, Ford, and more\n- **Price range:** Broad range from affordable to premium luxury\n\n## BMW Certified Pre-Owned Program\n\nThe BMW Certified Pre-Owned program offers exceptional value with comprehensive coverage:\n\n- **Rigorous Multi-Point Inspection** - 1,000+ point inspection by BMW-certified technicians\n- **Extended Warranty** - Remaining new vehicle warranty plus 1-year/ unlimited-mileage extended warranty\n- **24/7 Roadside Assistance** - Included with every CPO vehicle\n- **BMW Financial Services APR Offers**:\n  - 1.99% APR up to 72 months on 2022-2024 Certified iX models\n  - 2.99% APR up to 72 months on 2022-2024 Certified i4, i5, i7 models\n  - 4.99% APR up to 36 months on 2021-2024 Certified models\n- **BMW Certified Loyalty Credit** - $500 for current or former BMW customers\n- **Military and First Responder Credit** - $500 purchase credit for eligible customers\n- **College Grad Offer** - $1,000 towards lease or finance of any CPO 2021-2024 model\n- **No Payments for 3 Months** - Available on all 2021-2024 CPO models\n\n## Quality Assurance\n\n- **BMW Multi-Point Inspection** on all pre-owned vehicles\n- **BMW Certified Pre-Owned (CPO)** - Extended warranty and roadside assistance\n- **Free Carfax Report** - Available for every vehicle\n- **Free Experian AutoCheck Report** - Available on every vehicle\n- **BMW Financial Services** - Flexible financing and lease options\n\n## Trade-In\n\n- Trade-in appraisal available\n- Competitive trade-in values\n- On-the-spot trade evaluation at the dealership\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
