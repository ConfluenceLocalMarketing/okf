ompact crossover\n- **IONIQ 5 N** - High-performance all-electric crossover\n- **IONIQ 6** - All-electric streamlined sedan\n- **IONIQ 9** - All-electric 3-row flagship SUV\n\n## Services\n\n- **Finance Department** - Loan and lease options, online credit application, trade-in appraisal, pre-qualification\n- **Service Center** - Hyundai-certified technicians, routine maintenance, diagnostics, major repairs, genuine Hyundai parts\n- **Parts Department** - Genuine Hyundai OEM components, accessories, tires\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, certified pre-owned)\n- Online service scheduling\n- Online credit application and pre-approval\n- Car payment calculator\n- Deal Reveal technology - instant transparency on pricing and discounts\n- Trade-in valuation tool\n- Remote purchasing and delivery options\n\n## Staff\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- **PromptGraph:** 4.4 / 5.0 (848 reviews)\n- **SureCritic:** 4.6 / 5.0 (1,209 reviews)\n- **DealerRater:** 4.6 / 5.0 (976 reviews)\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Hyundai Complimentary Maintenance** - 3 years / 36,000 miles on new vehicles\n- **Deal Reveal** - Instant online pricing transparency\n- **Hyundai Certified Pre-Owned** - 173-point inspection, factory warranty\n- **Economy Vehicle Program** - Affordable pre-owned options for budget-conscious buyers\n- **Hyundai College Grad Program** - Special financing for recent graduates\n- **First Responders Program** - Special offers for first responders\n- **Hyundai Military Program** - Pricing program for military personnel\n- **Mobility Program** - Adaptive vehicle solutions\n\n## Affiliations\n\n- Part of the **Haselwood Auto Group**\n- Part of the **West Hills Autoplex** - Bremerton's multi-brand auto complex\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform",
    "datasets/faq": "# Frequently Asked Questions - Haselwood Hyundai\n\n## Inventory\n\n**Q: What new Hyundai models are available at Haselwood Hyundai?**\nA: The full Hyundai lineup including Venue, Elantra (gas, hybrid, N), Kona (gas, electric), Tucson (gas, hybrid, plug-in hybrid), Santa Fe (gas, hybrid), Sonata (gas, hybrid), Palisade (gas, hybrid), Santa Cruz, IONIQ 5, IONIQ 5 N, IONIQ 6, and IONIQ 9.\n\n**Q: What brands are available in the used vehicle inventory?**\nA: The pre-owned inventory spans multiple makes including Hyundai, Volkswagen, Chevrolet, GMC, Ford, Toyota, Honda, Kia, and more.\n\n**Q: Does Haselwood Hyundai offer certified pre-owned vehicles?**\nA: Yes, Hyundai Certified Pre-Owned vehicles are available with a 173-point inspection, remainder of 5yr/60k mi new vehicle warranty, and 10yr/100k mi CPO powertrain warranty.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs. The finance team works with a network of lenders to accommodate various credit situations.\n\n**Q: Does the dealership work with all credit profiles?**\nA: Yes, the finance team works with multiple lenders to find the best terms for various credit situations.\n\n**Q: What special financing programs are offered?**\nA: Hyundai College Grad Program, First Responders Program, Hyundai Military Program, and Mobility Program.\n\n## Service\n\n**Q: Does the dealership offer complimentary maintenance?**\nA: Yes, new Hyundai vehicles include Hyundai Complimentary Maintenance for 3 years or 36,000 miles.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website.\n\n**Q: Will the service department communicate updates?**\nA: Yes, the service team provides text message updates on service progress and any recommended additional services.\n\n**Q: Can I wait at the dealership during service?**\nA: Yes, the waiting area features Wi-Fi, coffee, snacks, and charging stations.\n\n## Dealership\n\n**Q: Where is Haselwood Hyundai located?**\nA: 5008 Auto Center Blvd, Bremerton, WA 98312, serving Silverdale, Port Orchard, Poulsbo, Gig Harbor, Bainbridge Island, Kingston, and Port Townsend.\n\n**Q: What is the Haselwood Auto Group?**\nA: Haselwood Hyundai is part of the Haselwood Auto Group, which includes multiple dealership brands at the West Hills Autoplex.\n\n**Q: Does the dealership offer Deal Reveal pricing?**\nA: Yes, Deal Reveal technology provides instant online pricing transparency with real-time discounts.\n\n**Q: Is there an Economy Vehicle Program?**\nA: Yes, the dealership offers safety-checked, affordable pre-owned options for first-time buyers and budget-conscious customers.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/new-vehicles": "# New Hyundai Models - Haselwood Hyundai\n\nHaselwood Hyundai carries a full lineup of new Hyundai vehicles. Below is a summary of available models and trims.\n\n## SUVs & Crossovers\n\n### Hyundai Venue\nSubcompact SUV, Hyundai's most affordable model. Fuel-efficient and city-friendly with a starting MSRP around $20,550.\n\n### Hyundai Kona\nSubcompact crossover SUV available in multiple trims. Available as a conventional gasoline model or the all-electric **Kona Electric** (starting around $32,975).\n\n### Hyundai Tucson\nCompact SUV, Hyundai's best-selling model. Available in gasoline, **Tucson Hybrid**, and **Tucson Plug-In Hybrid** variants. Features bold design, available AWD, and advanced safety technology. Starting MSRP around $29,450.\n\n### Hyundai Santa Fe\nMid-size SUV with modern, boxy design. Available in gasoline and **Santa Fe Hybrid** variants. Seats up to 5 passengers. Starting MSRP around $35,050.\n\n### Hyundai Palisade\nFull-size 3-row SUV seating up to 8 passengers. Available in gasoline and **Palisade Hybrid** variants. Premium features and trims. Starting MSRP around $39,435.\n\n### Hyundai IONIQ 5\nAll-electric compact crossover with up to 303 miles estimated range. Available in RWD and e-AWD configurations. Features 800V ultra-fast charging capability. Starting MSRP around $35,000.\n\n### Hyundai IONIQ 5 N\nHigh-performance all-electric crossover. Up to 601 hp with N Grin Boost. Track-capable with Drift Optimizer and N e-shift.\n\n### Hyundai IONIQ 9\nAll-electric 3-row flagship SUV. Premium electric SUV with spacious interior and advanced technology. Starting MSRP around $58,955.\n\n### Hyundai Santa Cruz\nCompact pickup truck (Sport Adventure Vehicle) combining SUV comfort with truck utility. Available in multiple trims. Starting MSRP around $29,750.\n\n## Cars\n\n### Hyundai Elantra\nCompact sedan, stylish and fuel-efficient. Available in gasoline, **Elantra Hybrid**, and high-performance **Elantra N** variants. Starting MSRP around $22,625.\n\n### Hyundai Sonata\nMid-size sedan with sleek design. Available in gasoline and **Sonata Hybrid** variants. Advanced safety and convenience features. Starting MSRP around $27,450.\n\n## Electric & Hybrid Vehicles\n\n| Model | Type | Range (est.) | Notes |\n|---|---|---|---|\n| **IONIQ 5** | Full EV | ~220-303 miles | 800V fast charging, available e-AWD |\n| **IONIQ 5 N** | High-Performance EV | ~221 miles | 601 hp, track-capable |\n| **IONIQ 6** | Full EV Sedan | ~240-361 miles | Aerodynamic design, efficient |\n| **IONIQ 9** | Full EV 3-Row SUV | ~TBD | Flagship electric SUV |\n| **Kona Electric** | Full EV | ~200+ miles | Affordable EV entry |\n| **Elantra Hybrid** | Hybrid Sedan | ~54 mpg combined | Fuel-efficient commuting |\n| **Sonata Hybrid** | Hybrid Sedan | ~52 mpg combined | Mid-size hybrid sedan |\n| **Tucson Hybrid** | Hybrid SUV | ~37 mpg combined | Popular hybrid SUV |\n| **Tucson Plug-In Hybrid** | Plug-In Hybrid | ~33 miles EV | Extended EV driving |\n| **Santa Fe Hybrid** | Hybrid SUV | ~34 mpg combined | Efficient mid-size SUV |\n\n## Hyundai Safety & Technology\n\nMost new Hyundai models include:\n- **Hyundai SmartSense** - Advanced driver assistance suite\n- **Forward Collision-Avoidance Assist**\n- **Blind-Spot Collision-Avoidance Assist**\n- **Lane Keeping Assist**\n- **Safe Exit Assist**\n- **Rear Cross-Traffic Collision-Avoidance Assist**\n- **Smart Cruise Control**\n- **Bluelink Connected Services** - Remote start, lock/unlock, vehicle monitoring\n\n## Complimentary Maintenance\n\nAll new Hyundai vehicles purchased or leased from Haselwood Hyundai include **Hyundai Complimentary Maintenance** for 3 years or 36,000 miles, covering oil changes, tire rotations, and multi-point inspections.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - Haselwood Hyundai\n\nThe Haselwood Hyundai Service Center provides certified maintenance and repair services at 5008 Auto Center Blvd, Bremerton, WA.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes, tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis\n- **Major Repairs** - Transmission service, engine repair, suspension work\n- **Hyundai Complimentary Maintenance** - Factory-scheduled maintenance at no cost for 3 years / 36,000 miles\n- **Recall Repairs** - OEM-specified recall and campaign work\n- **Tire Replacement and Alignment** - Full tire services\n- **Scheduled Maintenance** - Following Hyundai's recommended maintenance schedule\n- **EV Diagnostics and Service** - Specialized electric vehicle maintenance\n\n## Service Team\n\n- **Susanmarie** - Assistant Service Manager; thorough, communicative\n- **Ryan** - Service Advisor; outstanding customer service, transparent text communication\n- **Alysa Morgan** - Service Advisor; on-time, keeps customers informed\n- **Nicole** - Service Advisor; expert updates, professional\n- **Sam** - Service Agent; advocates for customers\n\n## Service Experience\n\n- **Online scheduling** available through the dealership website\n- **Complimentary multi-point inspections** with every service visit\n- **Genuine Hyundai OEM parts** - Perfect fit and long-lasting performance\n- **State-of-the-art equipment** and diagnostic tools\n- **Text message updates** - Proactive communication during service\n- **Comfortable waiting area** with Wi-Fi, coffee, snacks, and charging stations\n- **Factory-trained Hyundai technicians** - Experts on maintaining to factory standards\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 7:30 AM - 7:00 PM |\n| Tuesday | 7:30 AM - 7:00 PM |\n| Wednesday | 7:30 AM - 7:00 PM |\n| Thursday | 7:30 AM - 7:00 PM |\n| Friday | 7:30 AM - 7:00 PM |\n| Saturday | 8:00 AM - 4:00 PM |\n| Sunday | Closed |\n\n## Parts Department\n\nGenuine Hyundai OEM parts and accessories available including:\n- Hyundai Genuine replacement parts\n- Tires and wheels\n- Accessories for Hyundai vehicles\n- Order parts online or stop by\n\n## Complimentary Maintenance Program\n\nNew Hyundai vehicles purchased or leased from Haselwood Hyundai include complimentary scheduled maintenance for up to 3 years or 36,000 miles, covering:\n- Hyundai-approved oil and oil filter changes\n- Tire rotations at factory-recommended intervals\n- Multi-point vehicle inspections\n- Maintenance by certified Hyundai technicians\n\n## Service Specials\n\nThe dealership offers rotating service specials and coupons. See the service specials page for current promotions.\n\nSee [staff.md](staff.md) for full service department directory.\nSee [dealership.md](dealership.md) for contact information.",

    "datasets/used-vehicles": "# Pre-Owned and Certified Pre-Owned Vehicles - Haselwood Hyundai\n\nHaselwood Hyundai maintains a substantial pre-owned vehicle inventory in the Bremerton area with a wide selection spanning multiple makes and models.\n\n## Inventory Scope\n\n- **Total vehicles:** Extensive inventory across new and pre-owned (140+ new, hundreds pre-owned)\n- **Multi-make selection** spanning Hyundai, Volkswagen, Chevrolet, GMC, Ford, Toyota, Honda, Kia, and more\n- **Price range:** Broad range including the Economy Vehicle Program for budget-conscious buyers\n- **Vehicle types:** Sedans, SUVs, trucks, vans, and coupes\n- **Daily fresh inventory** with regular turnover\n\n## Quality Assurance\n\n- **173-Point Inspection** - Hyundai Certified Pre-Owned rigorous inspection\n- **Hyundai Certified Pre-Owned (CPO)** - Factory-backed inspections, remainder of 5yr/60k mi new vehicle warranty, 10yr/100k mi CPO powertrain warranty\n- **Vehicle Service Contracts** - Available for most vehicles\n- **Carfax History Reports** - Available on request\n\n## Certified Pre-Owned Program\n\nHyundai Certified Pre-Owned vehicles undergo rigorous 173-point inspection and include:\n- Remainder of 5-Year / 60,000-Mile New Vehicle Limited Warranty\n- 10-Year / 100,000-Mile CPO Powertrain Warranty\n- 24/7 roadside assistance\n- Comprehensive vehicle history report\n- Multi-point inspection by certified Hyundai technicians\n\n## Economy Vehicle Program\n\nSpecial program offering safety-checked, affordable pre-owned options for first-time buyers and budget-conscious customers seeking high-value second vehicles.\n\n## Online Buying Tools\n\n- Online inventory browsing and filtering\n- Value Your Trade tool (KBB Instant Cash Offer)\n- Car payment calculator\n- Online credit application and pre-approval\n- Deal Reveal - instant pricing transparency\n- Remote vehicle purchasing\n\n## Trade-In\n\n- Trade-in appraisal via KBB Instant Cash Offer\n- Cash offers for trade-ins (even without vehicle purchase)\n- Competitive trade-in values\n- Vehicle Upgrade Program\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
