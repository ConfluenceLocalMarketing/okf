    "datasets/dealership": "# Haselwood Chevrolet\n\nHaselwood Chevrolet is a full-service Chevrolet, Buick, and GMC dealership located at **501 West Hills Blvd, Bremerton, WA 98312**, serving the greater Puget Sound region including Port Orchard, Silverdale, Gig Harbor, Bainbridge Island, Poulsbo, and Tacoma for over 50 years. It is the original dealership of the West Hills Auto Plex.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Sales | (360) 919-1063 |\n| Service | (360) 919-1151 |\n| Parts | (360) 919-1115 |\n\nEmail: gsjones.haselwood@gmail.com\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 8:00 PM |\n| Wednesday | 9:00 AM - 8:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 8:00 PM |\n| Saturday | 9:00 AM - 8:00 PM |\n| Sunday | 10:00 AM - 7:00 PM |\n\n## Location\n\n- **Address:** 501 West Hills Blvd, Bremerton, WA 98312\n- **Geo:** 47.5578434, -122.6768733\n\n## New Vehicles\n\nChevrolet, Buick, and GMC models available include:\n- **Silverado 1500** - Full-size pickup, best-selling Chevrolet\n- **Silverado 2500HD / 3500HD** - Heavy-duty pickup trucks\n- **Silverado EV** - All-electric full-size pickup\n- **Equinox** - Compact SUV, popular family choice\n- **Equinox EV** - All-electric compact SUV\n- **Trax** - Subcompact SUV, value-oriented\n- **Trailblazer** - Subcompact SUV, sporty styling\n- **Blazer** - Mid-size SUV\n- **Blazer EV** - All-electric mid-size SUV\n- **Traverse** - Mid-size 3-row SUV\n- **Tahoe** - Full-size SUV\n- **Suburban** - Full-size extended SUV\n- **Colorado** - Mid-size pickup truck\n- **Bolt EV / Bolt EUV** - All-electric subcompact\n- **Corvette Stingray / E-Ray / ZO6** - Sports car\n- **Camaro** - Muscle car\n- **Malibu** - Mid-size sedan\n- **Express Cargo** - Full-size cargo van\n- **GMC Sierra 1500** - Full-size pickup\n- **Buick Enclave / Envision / Encore** - Luxury SUVs\n\n## Services\n\n- **Finance Department** - Loan and lease options, online credit application, trade-in appraisal, Capital One pre-qualification\n- **Service Center** - Chevrolet-certified technicians, routine maintenance, diagnostics, major repairs, genuine OEM parts\n- **Parts Department** - Genuine GM components, accessories, tires, online ordering\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, CarBravo certified)\n- Online service scheduling\n- Online credit application and pre-approval\n- Car payment calculator\n- Mobile service (service van comes to you)\n- Trade-in valuation tool (KBB Instant Cash Offer)\n\n## Staff\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- Aggregate rating: 4.4 / 5.0 (2,071 reviews) across major platforms\n- Google Business Profile: 4.4 stars (2,000+ reviews)\n- DealerRater: 4.7 stars (766+ reviews)\n- Multiple dealer awards including state and consumer awards\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Haselwood Auto Group** - Part of the Haselwood family of dealerships\n- **West Hills Advantage** - Lifetime Powertrain Warranty on new and qualifying pre-owned vehicles\n- **CarBravo** - Chevrolet-certified pre-owned vehicle program\n- **Economy Vehicle Program** - Low-cost, reliable transportation for budget-conscious buyers\n- **Military Appreciation** - Special incentives and support for service members\n- **Mobile Service** - Service van comes to your home or office\n- **EV Charging Station** - On-site charging for electric vehicles\n- **Free courtesy transportation vehicles** available during service\n\n## Affiliations\n\n- Part of the **Haselwood Auto Group**\n- Located in the **West Hills Auto Plex**\n- Proudly serving the **Kitsap Peninsula** for over 50 years\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform",
    "datasets/faq": "# Frequently Asked Questions - Haselwood Chevrolet\n\n## Inventory\n\n**Q: What new Chevrolet models are available at Haselwood Chevrolet?**\nA: The full Chevrolet lineup including Silverado 1500, Silverado 2500HD/3500HD, Silverado EV, Colorado, Equinox, Equinox EV, Trax, Trailblazer, Blazer, Blazer EV, Traverse, Tahoe, Suburban, Corvette Stingray, Corvette E-Ray, Corvette ZO6, Camaro, Malibu, Bolt EV, and Express Cargo.\n\n**Q: Does Haselwood also sell Buick and GMC vehicles?**\nA: Yes, as a Chevrolet Buick GMC dealership, Haselwood offers new Buick models (Enclave, Envision, Encore GX) and GMC models (Sierra 1500 and more).\n\n**Q: What brands are available in the used vehicle inventory?**\nA: The pre-owned inventory spans multiple makes including Chevrolet, Buick, GMC, Ford, Toyota, Honda, Hyundai, Kia, Volkswagen, Jeep, Ram, BMW, and Mercedes-Benz.\n\n**Q: Does Haselwood Chevrolet offer CarBravo certified pre-owned vehicles?**\nA: Yes, CarBravo is Chevrolet's certified pre-owned program available with factory-backed inspections and warranties.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs. The dealership works with multiple lenders to find the best terms.\n\n**Q: Does the dealership offer a Lifetime Powertrain Warranty?**\nA: Yes, the West Hills Advantage includes a Lifetime Powertrain Warranty on new and qualifying pre-owned vehicles.\n\n**Q: Can I get pre-approved online?**\nA: Yes, online credit application and pre-approval are available through the dealership website.\n\n## Service\n\n**Q: Does the service center offer mobile service?**\nA: Yes, the mobile service van can come to your home or office for convenient maintenance and repairs.\n\n**Q: Does Haselwood have an EV charging station?**\nA: Yes, there is an EV charging station on site for customer use.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website, or you can call the service department.\n\n**Q: Are courtesy vehicles available during service?**\nA: Yes, courtesy transportation vehicles are available during service appointments.\n\n## Dealership\n\n**Q: Where is Haselwood Chevrolet located?**\nA: 501 West Hills Blvd, Bremerton, WA 98312, located in the West Hills Auto Plex just off Highway 3.\n\n**Q: What is the Haselwood Auto Group?**\nA: Haselwood Chevrolet is part of the Haselwood Auto Group, a family of dealerships serving the Puget Sound region for over 50 years.\n\n**Q: What is the West Hills Advantage?**\nA: The West Hills Advantage is a Lifetime Powertrain Warranty offered on new and qualifying pre-owned vehicles, making Haselwood the safest choice for car buyers.\n\n**Q: Does the dealership offer military discounts?**\nA: Yes, Haselwood offers military appreciation programs with specialized incentives for service members.\n\n**Q: Are there economy vehicles available?**\nA: Yes, the Economy Vehicle Program provides low-cost, reliable, safety-inspected transportation for budget-conscious buyers.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/new-vehicles": "# New Chevrolet, Buick & GMC Models - Haselwood Chevrolet\n\nHaselwood Chevrolet carries a full lineup of new Chevrolet, Buick, and GMC vehicles. Below is a summary of available models.\n\n## SUVs & Crossovers\n\n### Chevrolet Trax\nSubcompact SUV, Chevrolet's most affordable SUV. Redesigned for 2026 with bold styling, more space, and smart tech. Turbocharged engine with automatic transmission. Seats 5 passengers.\n\n### Chevrolet Trailblazer\nSubcompact SUV with sporty RS trim available. Compact footprint with available AWD. Perfect for city driving with SUV versatility.\n\n### Chevrolet Equinox\nCompact SUV, popular family choice. Available in multiple trims including LT, RS, and Premier. Efficient turbocharged engine. Available in FWD and AWD.\n\n### Chevrolet Equinox EV\nAll-electric compact SUV. Modern design with impressive range. Available in multiple configurations with FWD or AWD. Advanced Ultium platform.\n\n### Chevrolet Blazer\nMid-size SUV with bold styling. Available in LT, RS, and Premier trims. Multiple engine options including available V6. Sporty handling.\n\n### Chevrolet Blazer EV\nAll-electric mid-size SUV built on the Ultium platform. Modern design with advanced technology. Available in multiple trims.\n\n### Chevrolet Traverse\nMid-size 3-row SUV seating up to 8 passengers. Available in LS, LT, RS, Z71, and High Country trims. Powerful V6 engine with 9-speed automatic. Available in FWD and AWD.\n\n### Chevrolet Tahoe\nFull-size SUV seating up to 9 passengers. Available in LS, LT, RST, Z71, Premier, and High Country trims. Multiple engine options including V8. Maximum towing capacity.\n\n### Chevrolet Suburban\nFull-size extended SUV, the longest-running nameplate in automotive history. Seating up to 9 passengers. Available in same trims as Tahoe with additional cargo space.\n\n### Buick Enclave\nPremium mid-size 3-row SUV. Luxury interior with quiet tuning. Available in preferred trim levels.\n\n### Buick Envision\nCompact luxury SUV. Premium styling and refined ride. Available with AWD.\n\n### Buick Encore GX\nSubcompact luxury SUV. Efficient and city-friendly with upscale interior.\n\n## Trucks\n\n### Chevrolet Colorado\nMid-size pickup truck available in WT, LT, Z71, ZR2, and Trail Boss trims. Turbocharged 2.7L 4-cylinder engine (up to 310 hp) with 8-speed automatic. Available in 2WD and 4WD. Maximum towing capacity.\n\n### Chevrolet Silverado 1500\nFull-size pickup, Chevrolet's best-selling vehicle. Available in WT, Custom, LT, RST, LTZ, ZR2, and High Country trims. Multiple engine options including turbo 4-cylinder, V8, and Diesel. Available in 2WD and 4WD. Maximum towing capacity up to 13,300 lbs.\n\n### Chevrolet Silverado 2500HD / 3500HD\nHeavy-duty pickup trucks for maximum capability. Available in WT, LT, LTZ, and High Country trims. Powerful 6.6L V8 gas or Duramax diesel engine. Maximum towing capacity over 20,000 lbs (3500HD).\n\n### Chevrolet Silverado EV\nAll-electric full-size pickup. Available in WT and RST trims. Ultium platform with up to 400 miles estimated range. Multi-Flex Midgate for extended cargo. Up to 10,000 lbs towing capacity.\n\n### Chevrolet Express Cargo\nFull-size cargo van for commercial use. Available in 2500 and 3500 configurations. Multiple roof and wheelbase options.\n\n### GMC Sierra 1500\nFull-size pickup, premium counterpart to Silverado. Available in Pro, SLE, Elevation, SLT, AT4, and Denali trims.\n\n## Cars & Performance\n\n### Chevrolet Malibu\nMid-size sedan, comfortable and fuel-efficient. Available in LS, RS, and Premier trims. Standard 1.5L turbocharged engine with CVT.\n\n### Chevrolet Camaro\nIconic muscle car available in LT, LT1, and SS trims. Powerful V6 or V8 engines. Available as coupe or convertible.\n\n### Chevrolet Corvette Stingray\nMid-engine sports car, America's supercar. 6.2L V8 engine with 490 hp. Available as coupe or convertible with Z51 performance package.\n\n### Chevrolet Corvette E-Ray\nHybrid all-wheel-drive Corvette. Combined 655 hp. Electric front axle for AWD traction and quick acceleration.\n\n### Chevrolet Corvette ZO6\nHigh-performance Corvette with naturally aspirated 5.5L V8 engine producing 670 hp. Track-focused design and aerodynamics.\n\n## Electric Vehicles\n\n### Chevrolet Bolt EV / Bolt EUV\nAll-electric subcompact hatchback/SUV. Affordable EV option with impressive range. Available in 2027 model year at Haselwood.\n\n### Chevrolet Equinox EV\nAll-electric compact SUV with Ultium platform.\n\n### Chevrolet Blazer EV\nAll-electric mid-size SUV with Ultium platform.\n\n### Chevrolet Silverado EV\nAll-electric full-size pickup with Ultium platform.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Contact the dealership for current offers.\n\n## West Hills Advantage\n\nAll new vehicles qualify for the **Lifetime Powertrain Warranty** through the West Hills Advantage program.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - Haselwood Chevrolet\n\nThe Haselwood Chevrolet Service Center provides certified maintenance and repair services at 501 West Hills Blvd, Bremerton, WA.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes, tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis\n- **Major Repairs** - Transmission service, engine repair, suspension work, AC repair\n- **Mobile Service** - Service van comes to your home or office\n- **Recall Repairs** - OEM-specified recall and campaign work\n- **Tire Replacement and Alignment** - Full tire services including rotation and balancing\n- **Battery Service** - Testing and replacement\n- **Brake Service** - Inspection, repair, and replacement\n- **Scheduled Maintenance** - Following Chevrolet's recommended maintenance schedule\n- **EV Charging Station** - On-site charging available for electric vehicles\n\n## Service Team\n\n- **Tim** - Service Team; praised for great service\n- **Chris** - Service Advisor; praised for friendly, knowledgeable service and discounts\n\n## Service Experience\n\n- **Online scheduling** available through the dealership website\n- **Mobile Service** - Let us come to you! Service van with two technicians\n- **Certified Technicians** - Factory-trained using genuine GM parts\n- **Courtesy Transportation Vehicles** - Available during service appointments\n- **Service and Parts Financing** - Buy now, pay later options available\n- **My GM Rewards** - Earn rewards on service and parts\n\n## Service Specials\n\nThe dealership offers rotating service coupons and specials. See the service specials page for current promotions.\n\n## Parts Department\n\nGenuine GM OEM parts and accessories available including:\n- GM Genuine replacement parts\n- AC Delco components\n- Tires and wheels\n- Accessories for Chevrolet, Buick, and GMC vehicles\n- Order parts online through the Parts Order Form\n     "datasets/staff": "# Staff Directory - Haselwood Chevrolet\n\nStaff directory compiled from the dealership website and customer reviews.\n\n## Management\n\n- **Chuck Haselwood** - CFO; part of the Haselwood family operation\n- **Josh Kolbas** - General Manager; frequently responds to customer reviews\n- **Michael Columbus** - Sales Manager\n- **Tiffany Fulweiler** - Management (referenced in reviews)\n\n## Finance Department\n\n- **Bob Villa** - Finance Manager; praised for quick and professional service\n\n## Sales Consultants\n\n- **Adam Parson** - Sales Consultant; praised for listening to customer needs and finding the right vehicle\n- **Patrick Merrill** - Sales Consultant; frequently mentioned in positive reviews\n- **Mason** - Sales Consultant; praised for helpfulness with test drives and answering finance questions\n- **Jason** - Sales Consultant; praised for locking in trade and price before long commutes\n- **Jeremiah Sprague** - Sales Consultant\n- **Reggie Ross** - Sales Consultant (referenced in reviews)\n\n## Service Department\n\n- **Tim** - Service Team; praised for great service on Silverado EV warranty work\n- **Chris** - Service Advisor; praised for friendly, knowledgeable check-in and discounts\n- **Patrick Merrill** - Service (referenced in reviews)\n- **Chloe Mange** - Service (referenced in reviews)\n- **Drew Bowen** - Customer; praised service department in testimonial\n\n## Parts Department\n\n- Parts team available for genuine GM parts, accessories, and tires\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews referencing specific staff members.",
    "datasets/used-vehicles": "# Pre-Owned and CarBravo Certified Vehicles - Haselwood Chevrolet\n\nHaselwood Chevrolet maintains a substantial pre-owned vehicle inventory in Bremerton with a wide selection spanning multiple makes and models.\n\n## Inventory Scope\n\n- **Total vehicles:** Extensive inventory across new and pre-owned (hundreds in stock)\n- **Multi-make selection** spanning Chevrolet, Buick, GMC, Ford, Toyota, Honda, Hyundai, Kia, Volkswagen, Jeep, Ram, BMW, Mercedes-Benz, and more\n- **Price range:** Broad range from under $10,000 to premium vehicles, including an Economy Vehicle Program\n- **Vehicle types:** Sedans, SUVs, trucks, vans, coupes, and sports cars\n- **Daily fresh inventory** with regular turnover\n- **Carfax One Owner vehicles** available\n\n## Quality Assurance\n\n- **Vehicle Inspection** - All pre-owned vehicles inspected by certified technicians\n- **CarBravo Certified** - Chevrolet's certified pre-owned program with factory-backed inspections and warranties\n- **Service Contracts** - Available for most vehicles\n- **Carfax History Reports** - Available on request\n- **Economy Vehicle Program** - Safety-inspected, affordable cars for first-time buyers or budget-conscious families\n\n## CarBravo Program\n\nCarBravo is Chevrolet's certified pre-owned program offering:\n- Factory-backed warranty coverage\n- 24/7 roadside assistance\n- Multi-point inspection by certified technicians\n- Competitive pricing with transparent value\n- Convenient online shopping at carbravo.haselwood.com\n\n## Online Buying Tools\n\n- Online inventory browsing and filtering\n- KBB Instant Cash Offer trade-in tool\n- Car payment calculator\n- Online credit application and pre-approval\n- Mobile service available\n- Vehicle hold policy\n\n## Trade-In\n\n- KBB Instant Cash Offer - get a firm offer online\n- High used vehicle sales volume means the dealership actively needs trade-ins\n- Cash offers for trade-ins (even without vehicle purchase)\n- Competitive trade-in values\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",

    "references/prompts": "# PromptGraph Prompt Library - Haselwood Chevrolet\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/haselwood-chevrolet/prompts` exposes 7 structured Q&A prompt/response pairs. Below is a categorized summary.\n\n## Prompt Categories\n\n### Dealership & Reputation (2 prompts)\n- Drive Confident: Your Chevrolet & GMC Experts - Reputable dealership offering wide selection of new vehicles, quality pre-owned options, and customer-first buying experience\n- Explore Top Chevrolet & GMC Vehicles All in One Place - Comprehensive dealership supporting customers from purchase through long-term ownership\n\n### Vehicle Shopping & Financing (1 prompt)\n- Smart Deals, Great Financing & Your Next Chevy or GMC - Competitive financing options, value deals, lease specials, trade-in support, online tools\n\n### Performance & Capability (1 prompt)\n- Your Premier Destination for Chevrolet & GMC Performance and Utility - Ultimate destination for rugged trucks (Silverado, Sierra) and high-performance vehicles (Corvette)\n\n### Warranty (1 prompt)\n- Unbeatable Peace of Mind with the Lifetime Powertrain Warranty - West Hills Advantage with Lifetime Powertrain Warranty on new and qualifying pre-owned vehicles\n\n### Special Programs (2 prompts)\n- Dedicated Support for Our Bremerton - Military appreciation and specialized incentives for service members\n- Quality Pre-Owned Transportation for Every Budget - Economy Vehicle Program for budget-conscious buyers\n\n## Featured Prompts\n\n| # | Prompt Slug | Focus |\n|---|---|---|\n| 1 | `drive-confident-your-chevrolet-&-gmc-experts` | Dealership positioning |\n| 2 | `explore-top-chevrolet-&-gmc-vehicles-all-in-one-place` | Comprehensive automotive destination |\n| 3 | `smart-deals-great-financing-&-your-next-chevy-or-gmc` | Financing and value |\n| 4 | `your-premier-destination-for-chevrolet-&-gmc-performance-and-utility` | Trucks and performance vehicles |\n| 5 | `unbeatable-peace-of-mind-with-the-lifetim     "references/testimonials": "# Customer Testimonials - Haselwood Chevrolet\n\nHaselwood Chevrolet has collected customer testimonials through the PromptGraph platform. Reviews reflect a 4.4-star aggregate rating with strong themes of professional sales service, respect, and transparency.\n\n## Aggregate Ratings\n\n- **Google Business Profile:** 4.4 / 5.0 (2,071 reviews)\n- **DealerRater:** 4.7 / 5.0 (766+ reviews)\n- **Cars.com:** 1,181+ reviews\n- **PromptGraph Reviews:** Mixed, predominantly positive\n\n## Most-Praised Staff (by frequency)\n\n- **Adam Parson** - Excellent salesperson, listened to customer needs, found perfect vehicle\n- **Patrick Merrill** - Knowledgeable, helpful across sales and service\n- **Josh Kolbas** - General Manager, responsive to customer feedback\n- **Bob Villa** - Finance, quick and professional\n- **Mason** - Sales, helpful with test drives and finance questions\n- **Jason** - Sales, locked in trade and price before long commute\n- **Chris** - Service, friendly and knowledgeable check-in, got discounts\n- **Tim** - Service team, great work on Silverado EV warranty\n\n## Notable Excerpts\n\n> \"Jason and the sales manager were really nice to work with. We live 4 hours away and were able to get the trade price and price of the new vehicle locked in before making the long commute. The whole process was quick and easy.\" - Mdamon134 (DealerRater, 2025)\n\n> \"Chris was excellent. He met me at my car to check in, he was very friendly and knowledgeable. Chris even got me a discount. Somebody give this guy a raise.\" - ridewakeof05 (DealerRater, 2025)\n\n> \"The Haselwood team is amazing... took great care of me above and beyond. Excellent customer service. They answered all my questions and helped find the right car and payment that worked for me. Also, shout out to the service department for getting me back on the road.\" - butterfly981978 (Capital One, 2026)\n\n> \"Had warranty service on my Silverado EV at Haselwood Chevy when the battery preheater failed. Tim and the service team were great.\" - Drew Bowen (Capital One, 2026)\n\n> \"The mobile service van and two technicians showed up to my residence on schedule on time and prepared with everything they needed to do the work. I thoroughly appreciated this having a very busy schedule.\" - Brian Lee Thomas (Capital One, 2026)\n\n> \"I had a great experience, and was able to find a car I love. Adam listened to what I wanted closely and was able to find the car I wanted.\" - davisheather.63 (DealerRater, 2022)\n\n## Sales Themes\n\n- **Professional service** - Sales staff praised for knowledge, responsiveness, and smooth processes\n- **Respectful treatment** - Multiple reviewers mention being treated with respect and kindness\n- **Willingness to travel** - Customers drive significant distances for the dealership\n- **Smooth process** - Quick and easy transactions without pressure\n\n## Service Themes\n\n- **Mobile service** - Highly praised for convenience and professionalism\n- **Fast turnaround** - Service completed quickly with good communication\n- **Professional advisors** - Service advisors keep customers informed throughout the process\n\nSee [staff.md](/datasets/staff.md) for the full staff directory.",

rd Collision Alert\n- Front Pedestrian Braking\n- Following Distance Indicator\n- IntelliBeam Auto High Beams\n- Rear Park Assist\n- Teen Driver technology\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for detailed model descriptions.\nSee [dealership.md](/datasets/dealership.md) for current offers and promotions."

(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
