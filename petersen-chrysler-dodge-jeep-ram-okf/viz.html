    "datasets/company": "# Petersen Chrysler Dodge Jeep Ram\n\nPetersen Chrysler Dodge Jeep Ram is a full-service automotive dealership located in Nampa, Idaho, serving the Treasure Valley area including Boise, Meridian, Caldwell, and surrounding communities. The dealership offers new and pre-owned Chrysler, Dodge, Jeep, and RAM vehicles, along with factory-trained service, genuine Mopar parts, and financing options.\n\n## Location\n\n- **Address**: 5801 E Gate Blvd, Nampa, ID 83687\n- **Service Area**: Treasure Valley, ID (Boise, Meridian, Caldwell, Nampa)\n\n## Contact\n\n- **Sales**: (208) 606-4957\n- **Service**: (208) 960-6548\n- **Parts**: (208) 606-3464\n- **Text**: (208) 962-6129\n\n## Inventory\n\n### New Vehicles\n- Chrysler: Pacifica\n- Dodge: Durango, Hornet\n- Jeep: Grand Cherokee, Wrangler, Wagoneer\n- RAM: 1500, 2500, 3500, ProMaster\n\n### Pre-Owned Vehicles\n- Wide selection of makes, models, and price points\n- Thoroughly inspected for quality and reliability\n\n### Commercial Vehicles\n- Work-ready trucks and vans for business needs\n\n## Services\n\n- Factory-trained Mopar service technicians\n- Genuine Mopar parts and accessories\n- Express Lane for quick basic repairs\n- Comprehensive auto maintenance and repair\n\n## Financing\n- Online credit application with pre-approval\n- Loan and lease options\n- Trade-in appraisals\n- First-time buyer programs\n- Specialized plans for businesses and commercial vehicles\n\n## History\n- Over 90 years of experience serving the Treasure Valley area\n- Trusted Chrysler, Dodge, Jeep, and RAM dealer in Idaho",
    "datasets/faq": "# Petersen Chrysler Dodge Jeep Ram FAQ\n\n## Vehicles\n\n**Q: What new CDJR models do you carry?**\nA: Chrysler Pacifica, Dodge Durango and Hornet, Jeep Grand Cherokee, Wrangler, Wagoneer, and RAM 1500/2500/3500. See [new-vehicles.md](new-vehicles.md).\n\n**Q: Do you offer test drives?**\nA: Yes, test drives available for all new and pre-owned vehicles at our Nampa location.\n\n**Q: What pre-owned vehicles are available?**\nA: Wide selection of makes, models, and price points \u2014 all thoroughly inspected. See [used-vehicles.md](used-vehicles.md).\n\n**Q: Do you have commercial vehicles?**\nA: Yes, work-ready trucks and vans for business needs.\n\n## Financing\n\n**Q: Can I get financing with bad credit?**\nA: Yes, first-time buyer programs and all-credit options available. See [financing.md](financing.md).\n\n**Q: Do you offer online pre-approval?**\nA: Yes, complete our online credit application for pre-approval.\n\n**Q: Can I finance a commercial vehicle?**\nA: Yes, specialized plans for businesses and commercial vehicle financing.\n\n**Q: Do you offer leases?**\nA: Yes, lease options available on new CDJR vehicles.\n\n## Service\n\n**Q: What services does your center provide?**\nA: Factory-trained Mopar service, Express Lane for quick repairs, genuine Mopar parts. See [service-center.md](service-center.md).\n\n**Q: What is Express Lane service?**\nA: Quick basic maintenance services without an appointment \u2014 oil changes, tire rotations, and inspections.\n\n**Q: Do you service non-CDJR vehicles?**\nA: Yes, our technicians service all makes and models.\n\n**Q: Do you offer genuine Mopar parts?**\nA: Yes, genuine Mopar parts and accessories are available.\n\n## General\n\n**Q: Where is Petersen CDJR located?**\nA: 5801 E Gate Blvd, Nampa, ID 83687. See [company.md](company.md).\n\n**Q: What areas do you serve?**\nA: The Treasure Valley area including Boise, Meridian, Caldwell, and Nampa.\n\n**Q: How long has Petersen been in business?**\nA: Over 90 years serving the Treasure Valley.\n\n**Q: What are your hours?**\nA: Call (208) 606-4957 for current sales and service hours.",
    "datasets/financing": "# Petersen Chrysler Dodge Jeep Ram Finance Center\n\nPetersen CDJR provides comprehensive financing solutions including commercial vehicle plans, first-time buyer programs, and lease options.\n\n## Financing Options\n\n### New Vehicle Financing\n- Competitive rates on new CDJR models\n- Flexible terms\n- Seasonal specials and rebates\n\n### Used Vehicle Financing\n- Financing on pre-owned inventory\n- Wide range of loan programs\n- Certified pre-owned financing\n\n### All-Credit Programs\n- **Excellent Credit** \u2014 Premier rates\n- **Good Credit** \u2014 Standard financing\n- **Fair Credit** \u2014 Flexible terms\n- **Bad Credit / No Credit** \u2014 First-time buyer programs and credit-building options\n\n### Commercial Financing\n- Business vehicle loans and leases\n- Fleet purchase options\n- Work truck and van financing\n- Commercial account terms\n\n## Buying vs Leasing\n\n| Aspect | Buying | Leasing |\n|--------|--------|---------|\n| Monthly Payment | Higher | Lower |\n| Ownership | Full ownership | Return or buyout |\n| Mileage Limits | Unlimited | Restricted |\n| Customization | Allowed | Limited |\n| Trade-In Equity | Yes | At lease end only |\n\n## Online Tools\n\n- Online credit application with pre-approval\n- Trade-in appraisal tool\n- Payment calculator\n\n## Trade-In Program\n\n- Appraise your vehicle online or in person\n- All makes and models accepted\n- Trade equity applied toward purchase\n\nSee [company.md](company.md) for location and contact information.",
    "datasets/new-vehicles": "# New CDJR Vehicles at Petersen Chrysler Dodge Jeep Ram\n\nPetersen CDJR offers the complete Chrysler, Dodge, Jeep, and RAM lineup with over 90 years of service to the Treasure Valley.\n\n## Jeep\n\n| Model | Type | Highlights |\n|-------|------|------------|\n| Grand Cherokee | Mid-Size SUV | Legendary capability, luxury interior |\n| Wrangler | Off-Road SUV | Iconic 4x4, multiple configurations |\n| Wagoneer | Full-Size SUV | Premium luxury, 3-row seating |\n\n## RAM\n\n| Model | Type | Highlights |\n|-------|------|------------|\n| 1500 | Light-Duty Truck | Best-in-class towing and payload |\n| 2500 | Heavy-Duty Truck | Diesel engine option |\n| 3500 | Heavy-Duty Truck | Maximum towing capability |\n| ProMaster | Commercial Van | Cargo and passenger configurations |\n\n## Dodge\n\n| Model | Type | Highlights |\n|-------|------|------------|\n| Durango | Three-Row SUV | Available HEMI V8, up to 7 passengers |\n| Hornet | Compact SUV | Hybrid performance option |\n\n## Chrysler\n\n| Model | Type | Highlights |\n|-------|------|------------|\n| Pacifica | Minivan | Stow 'n Go seating, family-friendly |\n\n## Commercial Vehicles\n\n- Work-ready trucks and vans\n- Fleet ordering capability\n- Upfitted vehicles for trades\n\n## Warranty\n\nEvery new CDJR vehicle includes standard factory warranty coverage with roadside assistance.\n\nSee [company.md](company.md) for location and contact.",
    "datasets/service-center": "# Petersen Chrysler Dodge Jeep Ram Service Center\n\nThe service center at Petersen CDJR is staffed by factory-trained Mopar technicians and features an Express Lane for quick, no-appointment maintenance.\n\n## Services Offered\n\n- **Oil Changes** \u2014 Conventional and synthetic\n- **Express Lane** \u2014 Quick oil change, tire rotation, and inspection (no appointment needed)\n- **Tire Services** \u2014 Rotation, balance, replacement, alignment\n- **Brake Service** \u2014 Inspection, pad replacement, rotor service\n- **Engine Diagnostics** \u2014 Factory diagnostic equipment\n- **Transmission Service** \u2014 Fluid change, filter, repair\n- **Heating & Air Conditioning** \u2014 Inspection, recharge, repair\n- **Battery & Electrical** \u2014 Testing, replacement, charging system\n- **Scheduled Maintenance** \u2014 Factory-recommended service intervals\n- **4x4 Service** \u2014 Transfer case, differential, driveline\n\n## Mopar Parts\n\n- Genuine Mopar OEM parts\n- Mopar accessories and performance parts\n- Maintenance parts (filters, belts, wipers)\n- Quick availability through parts department\n\n## Commercial Vehicle Service\n\n- Heavy-duty truck maintenance\n- ProMaster van service\n- Fleet maintenance programs\n\n## Contact\n\n- **Service Phone:** (208) 960-6548\n- **Parts Phone:** (208) 606-3464\n- **Address:** 5801 E Gate Blvd, Nampa, ID 83687\n- **Text:** (208) 962-6129\n\nSee [company.md](company.md) for full dealership profile.",
    "datasets/staff": "# Staff at Petersen Chrysler Dodge Jeep Ram\n\n## Sales Team\n\n- **Mike Petersen** \u2014 Dealer Principal, third-generation dealership family\n- **Doug Hansen** \u2014 General Sales Manager, 22 years with Petersen\n- **Tyler Jensen** \u2014 Sales Consultant, Jeep and 4x4 specialist\n- **Kyle Anderson** \u2014 Sales Consultant, RAM truck expert\n- **Samantha Davis** \u2014 Sales Consultant, commercial and fleet accounts\n- **Brett Walker** \u2014 Internet Sales Manager\n- **Jessica Taylor** \u2014 Sales Consultant, first-time buyer specialist\n\n## Finance Department\n\n- **Gary Stevens** \u2014 Finance Director\n- **Megan Clark** \u2014 Finance Manager, lease and commercial specialist\n- **Ryan Baker** \u2014 Finance Consultant\n\n## Service Center\n\n- **Tom Harrison** \u2014 Service Manager\n- **Lindsay Moore** \u2014 Service Advisor\n- **Dustin Price** \u2014 Lead Technician, Mopar Master Certified\n- **Cody Fisher** \u2014 Technician, diesel and heavy-duty specialist\n- **Nathan Scott** \u2014 Express Lane Technician\n\n## Parts Department\n\n- **Steve Larsen** \u2014 Parts Manager\n- **Jake Olson** \u2014 Parts Specialist\n\n## Management\n\n- **Mike Petersen** \u2014 Dealer Principal\n- **Doug Hansen** \u2014 General Manager\n\nSee [company.md](company.md) for dealership location and contact information.",
    "datasets/used-vehicles": "# Pre-Owned Vehicles at Petersen Chrysler Dodge Jeep Ram\n\nPetersen CDJR offers a wide selection of pre-owned vehicles including cars, trucks, SUVs, and commercial work-ready vehicles.\n\n## Pre-Owned Inventory\n\n- Chrysler, Dodge, Jeep, and RAM used vehicles\n- Multi-make selection beyond CDJR brands\n- Range of model years and price points\n- Thorough inspection for quality and reliability\n\n## Certified Pre-Owned\n\nCDJR certified pre-owned vehicles available with:\n- Multi-point inspection and reconditioning\n- Remaining factory warranty\n- Roadside assistance\n- Special CPO financing rates\n\n## Commercial Pre-Owned\n\n- Work-ready trucks and vans\n- Inspected and serviced for business use\n- Commercial financing available\n\n## Quality Assurance\n\n- Comprehensive inspection process\n- Professional reconditioning\n- Vehicle history reports\n\n## Trade-In Program\n\n- Online trade-in appraisal\n- Competitive offers on all makes and models\n- Trade equity applied to any purchase\n\n## Financing\n\nAll-credit financing, first-time buyer programs, and commercial financing available. See [financing.md](financing.md).\n\n## Express Lane Service\n\nQuick basic maintenance for all vehicles including pre-owned. See [service-center.md](service-center.md).\n\nSee [company.md](company.md) for location and contact.",

  "palette": {
    "Car Dealership": "#8b5cf6",
    "Playbook": "#8b5cf6",
    "Entity": "#8b5cf6",
    "Reference": "#10b981",
    "llms.txt": "#10b981"
  }
};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
