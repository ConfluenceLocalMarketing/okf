    "datasets/dealership": "# Friendly Lincoln Las Vegas\n\nFriendly Lincoln is a Lincoln luxury vehicle dealership located at 5445 Drexel Rd, Las Vegas, NV 89130, serving the Las Vegas metropolitan area including Henderson and North Las Vegas. The dealership provides new and pre-owned Lincoln sales, factory-trained service, genuine OEM parts, Lincoln Pickup & Delivery, and Lincoln Mobile Service.\n\n## Contact Information\n\n- **Sales**: (702) 790-8429\n- **Service**: (702) 799-9734\n- **Website**: https://www.teamlincolnlasvegas.com/\n\n## Location\n\n5445 Drexel Rd, Las Vegas, NV 89130\n\n## Service Area\n\nLas Vegas, Henderson, North Las Vegas, and surrounding Southern Nevada communities.\n\n## Hours of Operation\n\n| Department | Hours |\n|---|---|\n| Sales Mon-Sat | 8:00 AM - 8:00 PM |\n| Sales Sun | Closed |\n\n## Lincoln Models\n\n- **Corsair** \u2014 Compact luxury SUV\n- **Nautilus** \u2014 Mid-size luxury SUV\n- **Aviator** \u2014 Mid-size three-row luxury SUV (available plug-in hybrid)\n- **Navigator** \u2014 Full-size luxury SUV\n\n## Special Programs\n\n- **Lincoln Black Label** \u2014 Premium ownership experience with curated service, complimentary maintenance, and vehicle exchange privileges.\n- **Lincoln Electrified** \u2014 Hybrid and plug-in hybrid electric vehicle options across the lineup.\n\n## Unique Services\n\n- **Lincoln Pickup & Delivery** \u2014 Complimentary vehicle pick-up and drop-off for service appointments.\n- **Lincoln Mobile Service** \u2014 Factory-trained technicians dispatched to your home or office for select maintenance.\n- **Online Service Scheduling** \u2014 Schedule appointments through the dealership website.\n- **Lincoln Certified Pre-Owned** \u2014 Factory-backed pre-owned vehicle program with 200-point inspection, extended warranty, and roadside assistance.\n\n## Online Tools\n\n- New vehicle inventory search\n- Pre-owned inventory search\n- Value Your Trade tool\n- Online credit application and financing\n- Service scheduling\n\n## Financing\n\nPersonalized luxury leasing, competitive APRs, online finance application, and trade-in support available.\n\nSee [vehicles.md](vehicles.md) for Lincoln model and inventory details.\nSee [service-center.md](service-center.md) for service offerings.",
    "datasets/faq": "# Frequently Asked Questions\n\n## Vehicles & Inventory\n\n**Q: What Lincoln models are available at Friendly Lincoln Las Vegas?**\nA: The dealership carries the full Lincoln SUV lineup including Corsair, Nautilus, Aviator, Navigator, and Navigator L.\n\n**Q: Is the Aviator available as a plug-in hybrid?**\nA: Yes. The Aviator Grand Touring is a plug-in hybrid with an estimated 21 miles of all-electric range.\n\n**Q: Do you have pre-owned vehicles from other manufacturers?**\nA: Yes. The pre-owned inventory includes luxury vehicles from multiple brands.\n\n**Q: What is the Lincoln Certified Pre-Owned program?**\nA: It includes a 200-point inspection, comprehensive warranty, 24/7 roadside assistance, and complimentary Lincoln Pickup & Delivery.\n\n**Q: What is the Lincoln Black Label program?**\nA: Black Label is a premium ownership program with curated trim themes, complimentary maintenance, vehicle exchange privileges, and 24/7 concierge service.\n\n## Financing\n\n**Q: Can I apply for financing online?**\nA: Yes. Complete the online credit application from the dealership website.\n\n**Q: Do you offer both buying and leasing options?**\nA: Yes. The finance center provides both purchase financing and luxury lease programs.\n\n**Q: Can I value my trade-in online?**\nA: Yes. Use the Value Your Trade tool on the dealership website for instant online valuation.\n\n**Q: What credit situations do you work with?**\nA: The finance team works with multiple lending partners to accommodate various credit profiles.\n\n## Service\n\n**Q: Do you use genuine OEM parts?**\nA: Yes. The service department uses only genuine OEM Lincoln parts for all repairs.\n\n**Q: What is Lincoln Pickup & Delivery?**\nA: Complimentary vehicle pick-up and drop-off for service appointments within the service area.\n\n**Q: What is Lincoln Mobile Service?**\nA: Factory-trained technicians dispatched to your home or office for select maintenance services.\n\n**Q: Can I schedule service online?**\nA: Yes. Use the online service scheduling tool on the dealership website.\n\n## Dealership\n\n**Q: What are your sales hours?**\nA: Monday through Saturday 8:00 AM to 8:00 PM. Sunday closed.\n\n**Q: What are your service hours?**\nA: Monday through Friday 7:00 AM to 6:00 PM, Saturday 8:00 AM to 5:00 PM. Sunday closed.\n\n**Q: Where is the dealership located?**\nA: 5445 Drexel Rd, Las Vegas, NV 89130.\n\n**Q: How do I contact the sales department?**\nA: Sales can be reached at (702) 790-8429.\n\n**Q: How do I contact the service department?**\nA: Service can be reached at (702) 799-9734.\n\nSee [dealership.md](dealership.md) for full business profile.\nSee [service-center.md](service-center.md) for service department information.",
    "datasets/financing": "# Financing & Leasing\n\nFriendly Lincoln Las Vegas offers purchase financing and luxury leasing programs for new and pre-owned Lincoln vehicles.\n\n## Financing Options\n\n- **Online Application**: Start the financing process from home via the online credit application\n- **Multiple Lending Partners**: The finance team works with multiple lenders to find competitive APRs\n- **Flexible Terms**: Loan solutions designed for different ownership goals and budgets\n- **Protection Products**: Extended warranties and protection plans available\n\n## Luxury Leasing\n\nLincoln lease programs offer lower monthly payments with the flexibility to drive a new Lincoln every few years. Lincoln Red Carpet Lease provides:\n- Competitive lease rates on all Lincoln models\n- Flexibility at lease end (purchase, return, or trade)\n- Gap protection available\n\n## Buying vs. Leasing\n\n| Factor | Buying | Leasing |\n|---|---|---|\n| Monthly Payment | Higher | Lower |\n| Ownership | Own the vehicle at end of term | Return vehicle at end of term |\n| Mileage | Unlimited | Limited by contract |\n| Customization | Full freedom | Limited during lease term |\n\n## Trade-In\n\nGet an online valuation through the Value Your Trade tool on the dealership website, or bring your vehicle in for an in-person appraisal.\n\n## Payment Calculator\n\nEstimate monthly payments using the online payment calculator before visiting the dealership.\n\n## Finance Hours\n\nMonday\u2013Saturday 8:00 AM to 8:00 PM. Sunday closed.\n\n## Contact\n\n**Finance/Sales**: (702) 790-8429\n\nSee [dealership.md](dealership.md) for full business profile.\nSee [new-vehicles.md](new-vehicles.md) or [used-vehicles.md](used-vehicles.md) for current inventory.",
    "datasets/new-vehicles": "# New Lincoln Vehicles\n\nFriendly Lincoln Las Vegas carries the complete Lincoln luxury SUV lineup, from the compact Corsair to the full-size Navigator.\n\n## Lincoln Model Lineup\n\n| Model | Class | Passengers | Drivetrain | Starting MSRP | Key Features |\n|---|---|---|---|---|---|\n| Corsair | Compact luxury SUV | 5 | FWD/AWD | $40K+ | 2.0L 250hp turbo, SYNC 4, Lincoln Co-Pilot360 |\n| Nautilus | Mid-size luxury SUV | 5 | FWD/AWD | $50K+ | 2.0L turbo, available BlueCruise hands-free driving |\n| Aviator | Mid-size three-row luxury SUV | 6-7 | RWD/AWD | $55K+ | Available plug-in hybrid (Grand Touring), 3.0L twin-turbo, Lincoln Co-Pilot360 2.0 |\n| Navigator | Full-size luxury SUV | 7-8 | 4WD | $90K+ | 3.5L twin-turbo V6, 10-speed auto, Perfect Position front seats |\n| Navigator L | Extended-length full-size SUV | 8 | 4WD | $100K+ | Maximum cargo space, extended wheelbase, all Navigator luxury features |\n\n## Lincoln Electrified\n\nLincoln's electrified lineup includes the Aviator Grand Touring plug-in hybrid, offering:\n\n- Combined 494 hp from 3.0L twin-turbo V6 and electric motor\n- Estimated 21 miles all-electric range\n- Selectable drive modes including Pure EV, Preserve EV, and Normal\n- Lincoln Co-Pilot360 2.0 with enhanced driver-assist features\n\n## Lincoln Black Label\n\nThe Lincoln Black Label program elevates ownership with:\n\n- Curated color and trim themes\n- Complimentary scheduled maintenance\n- Complimentary Lincoln Pickup & Delivery\n- Vehicle exchange privileges\n- 24/7 concierge service\n\n## New Vehicle Specials\n\nCheck the dealership website for current manufacturer incentives, lease specials, and seasonal offers on new Lincoln models.\n\n## Current Inventory\n\nBrowse the complete new inventory online at [Team Lincoln Las Vegas](https://www.teamlincolnlasvegas.com/).\n\nSee [dealership.md](dealership.md) for full dealership profile.\nSee [model-comparison.md](/tables/model-comparison.md) for detailed specifications.\nSee [financing.md](financing.md) for purchase and lease options.",
    "datasets/service-center": "# Friendly Lincoln Service Center\n\nFriendly Lincoln's service center is staffed by Lincoln factory-trained technicians offering routine maintenance, complex diagnostics, and repairs for all Lincoln models.\n\n## Service Offerings\n\n- Routine maintenance (oil changes, tire rotations, fluid checks)\n- Complex diagnostics and engine/transmission repair\n- Genuine OEM Lincoln parts\n- Lincoln Pickup & Delivery \u2014 complimentary vehicle pick-up and drop-off\n- Lincoln Mobile Service \u2014 factory-trained technicians dispatched to your home or office\n- Lincoln Certified Pre-Owned warranty repairs\n- Online service scheduling\n\n## Lincoln Mobile Service\n\nSelect maintenance services performed at your home or office by factory-trained technicians, eliminating the need to visit the dealership.\n\n## Service Contact\n\n- **Service Phone**: (702) 799-9734\n\nSee [dealership.md](dealership.md) for dealership profile and hours.",

    "datasets/used-vehicles": "# Pre-Owned Vehicles\n\nFriendly Lincoln Las Vegas maintains a curated selection of pre-owned luxury vehicles spanning multiple makes and models.\n\n## Pre-Owned Inventory Categories\n\n| Category | Description |\n|---|---|\n| All Pre-Owned | Full pre-owned inventory across all makes and models |\n| Lincoln Certified Pre-Owned | Factory-certified vehicles with comprehensive warranty |\n| Pre-Owned Luxury | Premium vehicles from Lincoln and other luxury brands |\n| Pre-Owned Specials | Featured pre-owned vehicles at competitive pricing |\n\n## Lincoln Certified Pre-Owned Program\n\nEvery Lincoln Certified Pre-Owned vehicle includes:\n\n- 200-point vehicle inspection\n- Comprehensive limited warranty\n- 24/7 roadside assistance\n- Complimentary Lincoln Pickup & Delivery for covered repairs\n- Vehicle history report\n- Rental car coverage for covered repairs\n\n## Pre-Owned Luxury Inventory\n\nQuality pre-owned vehicles receive a multi-point inspection and are competitively priced. Inventory spans Lincoln, Ford, and other luxury makes.\n\n## Trade-In Program\n\nThe dealership offers trade-in valuation through:\n- Online Value Your Trade tool\n- In-person appraisal at the dealership\n\n## Pre-Owned Specials\n\nView current pre-owned specials on the dealership website for featured vehicles with special pricing.\n\nSee [dealership.md](dealership.md) for full business profile.\nSee [financing.md](financing.md) for financing options on pre-owned vehicles.",

    "references/ai-discovery-page": "# AI Discovery Hub\n\nFriendly Lincoln Las Vegas provides structured endpoints optimized for LLM and AI crawler consumption.\n\n## API Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Complete business profile with address, contact, hours (JSON-LD) |\n| `/vehicles` | Full vehicle inventory with specs, pricing, availability (JSON-LD) |\n| `/offers` | Current special offers and incentives |\n| `/prompts` | Structured Q&A prompts for consistent AI responses |\n| `/llms.txt` | AI discovery and consumption directives |\n| `/.well-known/ai-manifest.json` | Machine-readable AI resource directory |\n\n## Schema Types\n\n- AutoDealer (LocalBusiness)\n- Car (vehicle inventory)\n- ItemList\n- Offer\n- Review / AggregateRating\n- CreativeWork (prompts/FAQs)\n\n## Discovery Endpoints\n\n| Resource | URL |\n|---|---|\n| AI Manifest | `https://www.teamlincolnlasvegas.com/.well-known/ai-manifest.json` |\n| llms.txt | `https://www.teamlincolnlasvegas.com/llms.txt` |\n| robots.txt | `https://www.teamlincolnlasvegas.com/robots.txt` |\n\nSee [llms-txt.md](llms-txt.md) for the AI consumption directive and [prompts.md](prompts.md) for the prompt library.",
    "references/llms-txt": "# llms.txt\n\nThe llms.txt file provides AI systems with structured discovery and consumption directives for Friendly Lincoln Las Vegas.\n\n## Format\n\n- **Format**: LLMForge v1.0 compatible\n- **Schema**: JSON-LD (Schema.org)\n- **Primary Discovery**: `/.well-known/ai-manifest.json`\n- **Last Updated**: 2026-07-03\n- **CORS**: Enabled for all origins\n\n## Discovery Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Business profile (address, contact, hours, location) |\n| `/vehicles` | Complete inventory with specs and pricing |\n| `/offers` | Current special offers and incentives |\n| `/prompts` | Structured Q&A prompts |\n| `/llms.txt` | AI discovery and consumption directives |\n| `/.well-known/ai-manifest.json` | AI resource directory |\n\n## Schema Types\n\n- LocalBusiness / AutoDealer\n- Car (vehicle inventory)\n- ItemList\n- Offer\n- Review / AggregateRating\n- CreativeWork (prompts/FAQs)\n\n## Business Context\n\nFriendly Lincoln Las Vegas (listed as Team Lincoln Las Vegas in client records) specializes in Lincoln luxury vehicle sales and factory-trained service. Located at 5445 Drexel Rd, Las Vegas, NV 89130. Licensed AutoDealer with full inventory and service capabilities.\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for the full AI Discovery Hub overview and [prompts.md](prompts.md) for the prompt library.",
    "references/prompts": "# Prompt Library\n\nStructured prompts for AI systems covering Lincoln vehicle features, financing, service, and general dealership questions.\n\n## Prompt Categories\n\n- Lincoln model features and options\n- Financing and leasing\n- Service and maintenance scheduling\n- Trade-in and valuation\n- Lincoln Electrified / Aviator Grand Touring PHEV\n- Lincoln Black Label program\n- Lincoln Certified Pre-Owned\n- Dealership operations and hours\n\n## Example Prompts\n\n| Topic | Question |\n|---|---|\n| Comfort Upgrades | \"I want to purchase a luxury SUV with a heated steering wheel and heated and ventilated seats.\" |\n| Navigation | \"Which Lincoln models offer BlueCruise hands-free highway driving?\" |\n| Electrified | \"What is the all-electric range of the Aviator Grand Touring plug-in hybrid?\" |\n| Black Label | \"Tell me about the Lincoln Black Label ownership experience.\" |\n| Service | \"How do I schedule a service appointment and do you offer mobile service?\" |\n| Financing | \"What lease options are available for the Lincoln Nautilus?\" |\n\n## API Access\n\nEndpoints are available through the dealership website at `https://www.teamlincolnlasvegas.com/`.\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for API access details and [faq.md](/datasets/faq.md) for common customer questions.",
    "references/website": "# Team Lincoln Las Vegas Website\n\nThe Friendly Lincoln dealership operates its online presence at https://www.teamlincolnlasvegas.com/. The website provides full dealership capabilities including inventory browsing, service scheduling, credit applications, and trade-in valuation.\n\n## Site Features\n\n- New Lincoln vehicle inventory with photos, specs, and pricing\n- Pre-owned inventory search\n- Lincoln Certified Pre-Owned listings\n- Service center appointment scheduling\n- Online credit application\n- Value Your Trade tool\n- Special offers and incentives\n- Lincoln model research and comparison\n\nSee [dealership.md](/datasets/dealership.md) for full dealership profile.",
    "tables/model-comparison": "# Lincoln Model Comparison\n\n| Model | Class | Passengers | Drivetrain | Starting MSRP | Key Features |\n|---|---|---|---|---|---|\n| Corsair | Compact SUV | 5 | FWD/AWD | $40K+ | 2.0L 250hp turbo, SYNC 4, Lincoln Co-Pilot360 |\n| Nautilus | Mid-size SUV | 5 | FWD/AWD | $50K+ | 2.0L turbo, available BlueCruise, 48mo/50k mi warranty |\n| Aviator | Mid-size 3-Row SUV | 6-7 | RWD/AWD | $55K+ | Available plug-in hybrid, 3.0L twin-turbo, Lincoln Co-Pilot360 2.0 |\n| Navigator | Full-size SUV | 7-8 | 4WD | $90K+ | 3.5L twin-turbo V6, 10-speed auto, Perfect Position front seats |\n\nSee [vehicles.md](/datasets/vehicles.md) for inventory details."

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
