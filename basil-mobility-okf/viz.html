    "datasets/dealership": "# Basil Mobility\n\nBasil Mobility is an authorized **BraunAbility** dealer located in Depew, NY, serving the Western New York area with wheelchair accessible vehicles, adaptive driving equipment, and full-service maintenance. Part of the Basil Family Dealerships. Website powered by **Dealer Inspire**.\n\n## Contact\n\n| Detail | Info |\n|---|---|\n| Address | 5107 Transit Rd Suite 1, Depew, NY 14043 |\n| Main & Sales | (716) 206-5266 |\n| Service | (716) 683-6800 |\n\nEmail: basilcares@basilresale.com\n\n## Hours\n\n| Day | Sales | Service & Parts |\n|---|---|---|\n| Mon | 9:00 AM \u2013 7:00 PM | 8:00 AM \u2013 5:00 PM |\n| Tue\u2013Wed | 9:00 AM \u2013 6:00 PM | 8:00 AM \u2013 5:00 PM |\n| Thu | 9:00 AM \u2013 7:00 PM | 8:00 AM \u2013 5:00 PM |\n| Fri | 9:00 AM \u2013 6:00 PM | 8:00 AM \u2013 5:00 PM |\n| Sat | 9:00 AM \u2013 5:00 PM | 8:00 AM \u2013 5:00 PM |\n| Sun | Closed | Closed |\n\n## Services\n\n- **Mobility Vehicle Sales** \u2014 New BraunAbility wheelchair accessible vans and conversions\n- **Pre-Owned Inventory** \u2014 Used vehicles and mobility-equipped cars (1,158+ vehicles in inventory), priced under $20k available\n- **Service Center** \u2014 Certified technicians trained to service BraunAbility vehicles; routine maintenance, diagnostics, repairs for both vehicle systems and accessibility equipment (ramps, lifts, power doors, securement systems, adaptive driving equipment)\n- **Parts Center** \u2014 Genuine replacement parts and components for mobility solutions\n- **Financing** \u2014 Through BraunAbility Financial Services; APR as low as 2.99% for up to 72 months (well-qualified buyers); also lease options; up to $3,000 dealer cash available\n- **Wheelchair Van Rentals** \u2014 Short and long-term accessible van rentals available\n\n## BraunAbility Partnership\n\n| Detail | Info |\n|---|---|\n| Status | Authorized BraunAbility Dealer |\n| Conversions | E2 (Chrysler Pacifica/Voyager), XT (Toyota), XI (Chrysler Pacifica/Voyager) |\n| Base Vehicles | Chrysler Pacifica / Voyager, Toyota Sienna |\n| Financing Partner | BraunAbility Financial Services |\n| Protection | BraunAbility Protection Plus (service contracts, UltraGard, PrePaid Maintenance) |\n\nBraunAbility is the leading mobility conversion manufacturer, preferred 15:1 by mobility service technicians over other brands. Newer conversions also available on Chevrolet Traverse (coming 2026).\n\n## Online Tools\n\n- Inventory browsing and filtering (1,158+ vehicles)\n- Online finance application (BraunAbility Financial Services)\n- Trade-in value estimator\n- Online service scheduling\n- Parts ordering\n\n## Social\n\n- Facebook: https://www.facebook.com/people/Basil-Mobility/61577505262817/\n\nSee [staff.md](staff.md) for staff directory.\nSee [service-center.md](service-center.md) for service department details.",
    "datasets/faq": "# Frequently Asked Questions \u2014 Basil Mobility\n\n## Vehicles & Conversions\n\n**How often should a wheelchair accessible van be serviced?**\n\nMost mobility vehicles benefit from routine maintenance every 6 to 12 months. Regular inspections help ensure the vehicle and accessibility equipment continue to operate safely.\n\n**Do wheelchair accessible vans require special maintenance?**\n\nYes. In addition to standard automotive maintenance, accessible vans require inspections of lifts, ramps, power doors, and other accessibility systems.\n\n**What BraunAbility conversions are available?**\n\nBasil Mobility offers the BraunAbility E2 (Chrysler Pacifica/Voyager, power fold-out ramp), XT (Toyota Sienna, power fold-out ramp), and XI (Chrysler Pacifica/Voyager, in-floor ramp). A new Chevrolet Traverse conversion is coming in 2026.\n\n**What is the difference between side-entry and rear-entry vans?**\n\nSide-entry vans have the ramp at the sliding door, ideal for standard wheelchairs. Rear-entry vans load through the back, better for tilter/transporter chairs. Basil Mobility carries both types.\n\n**Can I buy a lowered-floor vehicle?**\n\nYes \u2014 lowered-floor vehicles provide better interior clearance for wheelchair access and are available on both Chrysler and Toyota platforms.\n\n**Do you carry hybrid accessible vans?**\n\nYes \u2014 the BraunAbility XT conversion on the Toyota Sienna is a hybrid, offering fuel efficiency with full accessibility.\n\n**Are wheelchair van rentals available?**\n\nYes \u2014 Basil Mobility offers short and long-term accessible van rentals.\n\n## Adaptive Equipment\n\n**Can you install hand controls?**\n\nYes \u2014 Basil Mobility offers custom fitting and installation of adaptive hand controls for driving.\n\n**What other adaptive equipment is available?**\n\nSteering aids, transfer seats (BraunAbility Turny), wheelchair lifts, power ramp systems, securement tie-downs, and custom interior modifications.\n\n## Service & Repairs\n\n**Can you repair wheelchair lifts that are not working properly?**\n\nYes. Technicians can diagnose lift issues including electrical faults, mechanical problems, or hydraulic system failures.\n\n**What causes a wheelchair ramp to stop working?**\n\nRamp problems can be caused by electrical issues, motor failures, worn components, or alignment problems that require professional inspection.\n\n**Can you service power door systems?**\n\nYes \u2014 the service center handles power sliding door and rear door diagnostics and repair.\n\n**What routine maintenance services do mobility vans need?**\n\nRoutine services include oil changes, filter replacements (engine/cabin), fluid checks, tire inspections, brake service, and general vehicle diagnostics.\n\n**Can non-mobility vehicles be serviced?**\n\nYes \u2014 the service center also handles standard auto repair for non-mobility vehicles.\n\n**Do you perform safety inspections for paratransit vehicles?**\n\nYes \u2014 comprehensive commercial vehicle safety inspections for paratransit shuttle vans are available.\n\n## Financing\n\n**What financing options are available?**\n\nBasil Mobility offers APR as low as 2.99% for up to 72 months through BraunAbility Financial Services. Up to $3,000 dealer cash may be available. Lease options are also offered.\n\n**Can I get financing with low income or bad credit?**\n\nYes \u2014 Basil Mobility offers low-income auto loan approvals and works with buyers with various credit situations.\n\n**Can I value my trade-in online?**\n\nYes \u2014 an online trade-in appraisal tool is available on the Basil Mobility website.\n\n**Are there grants available for mobility vehicles?**\n\nYes \u2014 BraunAbility Financial Services and Basil Mobility can assist with grant applications, state and local funding programs, and disability advocacy organization resources.\n\n## Dealership\n\n**What area does Basil Mobility serve?**\n\nBasil Mobility serves Depew, Buffalo, Cheektowaga, Williamsville, Amherst, and the greater Western New York area.\n\n**Does Basil Mobility offer rentals?**\n\nYes \u2014 short and long-term accessible van rentals are available.\n\n**Is there a courtesy shuttle during service?**\n\nYes \u2014 a two-way courtesy shuttle is available during service appointments.\n\nSee [dealership.md](dealership.md) for full business profile, hours, and contact information.\nSee [new-vehicles.md](new-vehicles.md) for details on new BraunAbility conversions.\nSee [mobility-vehicles.md](mobility-vehicles.md) for the full vehicle lineup.\nSee [service-center.md](service-center.md) for service department details.",
    "datasets/mobility-vehicles": "# Wheelchair Accessible Vehicles & Mobility Equipment\n\n## New BraunAbility Conversions\n\nBasil Mobility offers new BraunAbility wheelchair accessible vehicles built on popular platforms.\n\n| Conversion | Base Vehicle | Description | Approximate Price |\n|---|---|---|---|\n| BraunAbility E2 | Chrysler Pacifica / Voyager | Power fold-out ramp, side-entry | ~$55,980 |\n| BraunAbility XT | Toyota Sienna | Power fold-out ramp, side-entry | ~$88,150 |\n| BraunAbility XI | Chrysler Pacifica / Voyager | In-floor ramp, side-entry | Contact dealer |\n| BraunAbility Next-Gen | Chevrolet Traverse | Power in-floor SUV conversion | Coming 2026 |\n\n### Features\n\n- Power ramps and lifts (fold-out and in-floor)\n- Power doors (sliding and rear)\n- Wheelchair securement systems (tie-downs)\n- Adaptive driving equipment (hand controls, steering aids, transfer seats)\n- Lowered floors for easy access\n- Remote entry options\n\n## Pre-Owned Mobility Vehicles\n\nOver 1,158 vehicles in inventory including wheelchair accessible vans, mobility-equipped cars, SUVs, trucks, and classic cars. Options available under $20,000.\n\n### Inventory Categories\n\n- All Vehicles (browse full inventory)\n- Priced Under 20k\n\n## Adaptive Driving Equipment\n\n- Hand controls (customization and installation)\n- Steering devices (assistive steering aids)\n- Transfer seats (BraunAbility Turny seat line)\n- Wheelchair lifts (power lift systems)\n- Driving aids\n- Power ramp calibration and adjustments\n\n## Side-Entry vs Rear-Entry Vans\n\n| Feature | Side-Entry | Rear-Entry |\n|---|---|---|\n| Ramp Location | Side sliding door | Rear hatch/doors |\n| Typical Conversion | E2, XT, XI | Available on select models |\n| Best For | Standard wheelchair access | Tilter/transporter chairs |\n| Parking | Requires side clearance | Requires rear clearance |\n\n## Financing\n\n| Option | Detail |\n|---|---|\n| Special Financing | APR as low as 2.99% for up to 72 months (well-qualified, through BraunAbility Financial Services) |\n| Promotional Cash | Up to $3,000 dealer cash in lieu of promotional financing rates |\n| Lease | Available through BraunAbility (e.g., Chrysler Voyager CompanionVan from $549/month) |\n| Vehicle Protection | BraunAbility Protection Plus \u2014 service contracts, UltraGard, PrePaid Maintenance |\n| Max Note Amount | $70,000 |\n\n## Service & Support\n\nBasil Mobility's certified technicians are trained to service all BraunAbility conversions and adaptive equipment:\n\n- Routine maintenance (oil changes, inspections)\n- Ramp and lift diagnostics and repair\n- Power door service\n- Securement system checks\n- Adaptive driving equipment maintenance\n- Genuine BraunAbility replacement parts\n- Hydraulic lift repair\n- Electronic mobility control system diagnostics\n- Cabin air filter replacement\n- Brake repairs\n- Powertrain repairs\n- Paratransit vehicle safety inspections\n\n## Grants & Funding\n\nBraunAbility Financial Services and Basil Mobility can assist customers in exploring:\n\n- Wheelchair van grant applications\n- State and local funding programs\n- Disability advocacy organization assistance\n- BraunAbility Financial Services dedicated team (1-800-488-0359)\n- Low-income auto loan approvals\n- Veteran mobility van programs\n- Non-profit transport consulting\n\n## Rentals\n\n- Short and long-term accessible van rentals available\n- Rear-entry and side-entry rental options\n\nSee [new-vehicles.md](new-vehicles.md) for new BraunAbility conversions.\nSee [dealership.md](dealership.md) for contact and hours.\nSee [model-comparison.md](/tables/model-comparison.md) for conversion comparison.",
    "datasets/new-vehicles": "# New BraunAbility Conversions at Basil Mobility\n\n## Available Conversions\n\n| Conversion | Base Vehicle | Description | Approximate Price |\n|---|---|---|---|\n| BraunAbility E2 | Chrysler Pacifica / Voyager | Power fold-out ramp, side-entry | ~$55,980 |\n| BraunAbility XT | Toyota Sienna | Power fold-out ramp, side-entry | ~$88,150 |\n| BraunAbility XI | Chrysler Pacifica / Voyager | In-floor ramp, side-entry | Contact dealer |\n\n### Additional Platforms (Coming 2026)\n\n| Conversion | Base Vehicle | Description |\n|---|---|---|\n| BraunAbility Next-Gen | Chevrolet Traverse | Power in-floor conversion, side-entry SUV \u2014 coming 2026 |\n\n## Features\n\n- Power ramps and lifts (fold-out and in-floor options)\n- Power doors (sliding and rear)\n- Wheelchair securement systems (tie-downs)\n- Adaptive driving equipment (hand controls, steering aids)\n- Lowered floors for easy access\n- Remote entry options\n- Transfer seats (BraunAbility Turny seat line)\n\n## Current Inventory\n\nBasil Mobility carries a full selection of new BraunAbility conversions. Featured vehicles from PromptGraph API:\n\n- **2026 Chrysler Pacifica** \u2014 BraunAbility conversion, starting at $55,980\n- **2026 Toyota Sienna** \u2014 BraunAbility XT conversion, starting at $88,150\n\nTotal inventory exceeds 1,158 vehicles including pre-owned and specialty vehicles.\n\n## Financing\n\n- APR as low as **2.99%** for up to 72 months through BraunAbility Financial Services\n- Up to **$3,000 dealer cash** available in lieu of promotional financing\n- Lease options available (e.g., Chrysler Voyager CompanionVan from $549/month)\n- BraunAbility Protection Plus service contracts\n- Maximum note amount: $70,000\n\n## Warranty & Protection\n\n- BraunAbility Protection Plus \u2014 service contracts, UltraGard, PrePaid Maintenance\n- Limited warranty on new conversions and base vehicles\n- Comprehensive vehicle care plans available\n\n## Grants & Funding Assistance\n\nBrau     "datasets/service-center": "# Basil Mobility Service Center\n\nBasil Mobility's service center features BraunAbility-certified technicians trained to service all conversion types, adaptive equipment, and vehicle systems.\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Mon\u2013Fri | 8:00 AM \u2013 5:00 PM |\n| Sat | 8:00 AM \u2013 5:00 PM |\n| Sun | Closed |\n\n**Phone:** (716) 683-6800\n\n## Services Offered\n\n### Routine Maintenance\n- Oil changes and filter replacements\n- Tire rotation and balancing\n- Fluid checks and replacements\n- Cabin air filter replacement\n- Brake inspections and repairs\n\n### Mobility Equipment Service\n- Ramp diagnostics and repair (power fold-out and in-floor)\n- Wheelchair lift repair (electrical, mechanical, hydraulic)\n- Power door system service\n- Securement system checks (tie-downs)\n- Adaptive driving equipment maintenance (hand controls, steering aids)\n- Electronic mobility control system diagnostics\n- Power ramp calibration\n\n### Vehicle Repair\n- Powertrain and drivetrain repairs for accessible vans\n- Standard auto repair for all makes and models\n- Diagnostics and computer scanning\n- Paratransit vehicle safety inspections\n- Wheelchair lift safety inspections\n\n## Parts Center\n\n- Genuine BraunAbility replacement parts\n- OEM and aftermarket components\n- Accessibility replacement parts (ramps, lifts, doors)\n- Quick ordering for specialty components\n\n## Service Perks\n\n- Two-way courtesy shuttle during service\n- Online scheduling\n- Vehicle repair status updates\n- Certified BraunAbility technicians\n- Standard auto repair combined with mobility expertise\n\n## Also Available\n\n- Upfitting standard factory minivans with accessibility equipment\n- Installing power lift systems into customer vehicles\n- Custom interior modifications for wheelchair accommodation\n\nSee [dealership.md](dealership.md) for full business profile and contact information.\nSee [mobility-vehicles.md](mobility-vehicles.md) for     "datasets/staff": "# Basil Mobility Staff Directory\n\n## Leadership\n\nBasil Mobility is part of the Basil Family Dealerships, led by the Basil family with over 65 years of service in Western New York. Specific staff listings available at the dealership.\n\n## Sales Team\n\nSales specialists trained in mobility solutions and BraunAbility conversions. Contact (716) 206-5266.\n\n## Service Technicians\n\nCertified technicians trained by BraunAbility to service all conversion types:\n- E2, XT, XI power conversions\n- Adaptive driving equipment\n- Wheelchair lifts and ramps\n- Power door systems\n- Securement systems\n\nSee [dealership.md](dealership.md) for full business profile and contact information.\nSee [service-center.md](service-center.md) for service department details.",
    "datasets/testimonials": "# Customer Testimonials \u2014 Basil Mobility\n\nCustomer testimonials are available from the PromptGraph API at `https://api.promptgraph.ai/api/v1/basil-mobility/testimonials`, returning reviews in JSON-LD format with aggregate rating data.\n\n## DealerRite/GarageDealer Reviews\n\nFor current customer reviews and ratings, visit the dealership's online reputation profiles linked from the Basil Mobility website. Verified customer reviews from real wheelchair van owners are featured on the site.\n\n## Service Satisfaction\n\nThe Braley family describes the Basil Family Dealerships as \"the best car buying experience we have ever had. They are very caring and helpful.\" This family-oriented approach extends to Basil Mobility's focus on mobility solutions and customer service.\n\n## Submission Process\n\nCustomers can share their own experiences via the dealership's review submission channels. Basil Mobility values feedback from the community it serves in Western New York.\n\nSee [dealership.md](dealership.md) for full business profile and contact information.",
    "datasets/used-vehicles": "# Pre-Owned Mobility Vehicles at Basil Mobility\n\n## Pre-Owned Inventory\n\nBasil Mobility carries over **1,158 vehicles** spanning all makes and models, including wheelchair accessible vans, mobility-equipped cars, SUVs, trucks, and classic cars.\n\n### Inventory Categories\n\n- All Vehicles \u2014 browse full pre-owned inventory online\n- Priced Under 20k \u2014 budget-friendly mobility options\n\n### Inventory Mix (from PromptGraph API)\n\nThe inventory spans a wide range including:\n\n- **SUVs** \u2014 Chevrolet Equinox, Ford Explorer, Chevrolet Traverse, Chevy Suburban\n- **Trucks** \u2014 Ford F-350 SD, Chevrolet Silverado 1500, GMC Sierra 2500HD\n- **Classic Cars** \u2014 1967 Chevrolet Chevelle, 1963 Buick LeSabre, 1970 Pontiac GTO, 2002 Ford Thunderbird\n- **Sedans & Crossovers** \u2014 Chevrolet Trax, Ford Escape, Chevrolet Equinox\n- **Commercial** \u2014 Isuzu 4500, GMC Savana 3500\n\nDominant brands: Chevrolet, Ford, GMC, Buick, Pontiac.\n\n## Quality Assurance\n\nEach pre-owned vehicle undergoes inspection to ensure safety and reliability of both the vehicle systems and accessibility equipment. Multi-point safety inspections conducted before sale.\n\n## Financing\n\n- Special financing rates available through BraunAbility Financial Services\n- APR as low as 2.99% for up to 72 months\n- Trade-in appraisal available\n- Online credit application\n- Low-income auto loan approvals available\n\n## Sell / Trade\n\n- Electronic trade-in appraisals \u2014 quick digital estimate from home\n- Fair market trade-in evaluation for used accessible vans\n\nSee [dealership.md](dealership.md) for full business profile and contact information.\nSee [mobility-vehicles.md](mobility-vehicles.md) for complete vehicle details.",

    "tables/model-comparison": "# BraunAbility Conversion Model Comparison\n\n## Conversion Models Overview\n\n| Feature | BraunAbility E2 | BraunAbility XT | BraunAbility XI |\n|---|---|---|---|\n| **Base Vehicle** | Chrysler Pacifica / Voyager | Toyota Sienna (Hybrid) | Chrysler Pacifica / Voyager |\n| **Ramp Type** | Power fold-out side ramp | Power fold-out side ramp | In-floor side ramp |\n| **Entry Style** | Side-entry | Side-entry | Side-entry |\n| **Fuel Type** | Gasoline / Gas Hybrid | Hybrid (standard) | Gasoline / Gas Hybrid |\n| **Floor Design** | Standard lowered floor | Standard lowered floor | In-floor ramp (no ramp stored in cabin) |\n| **Wheelchair Capacity** | Standard | Standard | Standard |\n| **Passenger Seating** | Up to 4 + wheelchair position | Up to 4 + wheelchair position | Up to 4 + wheelchair position |\n| **Drive** | FWD / AWD options | FWD | FWD / AWD options |\n| **Price Range** | $50,000\u2013$60,000 | $80,000\u2013$90,000 | Varies |\n\n## Sample Pricing\n\n| Vehicle | VIN | Price |\n|---|---|---|\n| 2026 Chrysler Pacifica BraunAbility | 2C4RC1FGXRR191633 | $55,980 |\n| 2026 Toyota Sienna BraunAbility XT | 5TDYRKEC2SS281922 | $88,150 |\n\n## Upcoming Models\n\n| Model | Expected |\n|---|---|\n| Chevrolet Traverse Conversion | 2026 |\n\n## Shopping Considerations\n\n- **Side-entry vs. rear-entry:** Side-entry vans load at sliding door (best for standard wheelchairs). Rear-entry loads through back doors (best for tilter/transporter chairs).\n- **Lowered-floor:** More headroom and easier transfers.\n- **Hybrid option:** XT on Toyota Sienna for fuel efficiency.\n- **In-floor ramp (XI):** Ramp stows under the vehicle floor, leaving more cabin space.\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for full new vehicle inventory.\nSee [mobility-vehicles.md](/datasets/mobility-vehicles.md) for the full vehicle listing."

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/-/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/-/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
