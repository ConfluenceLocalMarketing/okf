  "bodies": {
    "datasets/dealership": "# Nick Mayer GMC Lewisburg\n\nNick Mayer GMC Lewisburg is a full-service GMC dealership located at **861 N Ellington, Lewisburg, TN 37091**, serving the communities of **Lewisburg, Columbia, Franklin, and Fayetteville, Tennessee**.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Sales | 931-246-6369 |\n| Service | 931-246-6354 |\n| Parts | 931-903-2374 |\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday \u2013 Friday | 9:00 AM \u2013 7:00 PM |\n| Saturday | 9:00 AM \u2013 6:00 PM |\n| Sunday | Closed |\n\n## GMC Models\n\nThe dealership carries the full GMC lineup, including the **Sierra 1500, Sierra HD (2500/3500), Yukon, Yukon XL, Acadia, Terrain, Canyon, and Hummer EV**.\n\n## Services\n\n- New vehicle sales and test drives\n- Pre-owned / CarBravo certified used vehicles\n- GMC factory-trained service center\n- Genuine OEM parts department\n- Online financing application\n- Vehicle trade-in appraisal\n- Special offers and lease deals\n\n## Online Financing\n\nCustomers can apply for financing directly through the dealership website with a secure online credit application.\n\n## Location\n\nSituated on N Ellington Parkway (US-31A) in Lewisburg, the dealership is easily accessible from I-65 via US-412.\n\nSee [new-vehicles.md](new-vehicles.md) for detailed model information.\nSee [service-center.md](service-center.md) for service department details.\nSee [faq.md](faq.md) for frequently asked questions.",
    "datasets/faq": "# Frequently Asked Questions \u2014 Nick Mayer GMC Lewisburg\n\n## General\n\n**What are the dealership hours?**\nMonday\u2013Friday 9:00 AM \u2013 7:00 PM, Saturday 9:00 AM \u2013 6:00 PM, Sunday Closed.\n\n**What areas do you serve?**\nLewisburg, Columbia, Franklin, Fayetteville, and surrounding Middle Tennessee communities.\n\n## GMC Inventory\n\n**What GMC models are available?**\nSierra 1500, Sierra HD (2500/3500), Yukon, Yukon XL, Acadia, Terrain, Canyon, and Hummer EV.\n\n**Can I test drive a vehicle?**\nYes. Contact the sales department at 931-246-6369 to schedule a test drive.\n\n## Pre-Owned and CarBravo\n\n**What is CarBravo?**\nCarBravo is GM's certified pre-owned vehicle program with a 172-point inspection, warranty coverage, and roadside assistance.\n\n**Do you take trade-ins?**\nYes. Online trade-in appraisal is available on the dealership website.\n\n## Financing\n\n**How do I apply for financing?**\nA secure online credit application is available on the dealership website.\n\n**Do you offer leases?**\nYes. Lease deals and special offers are available on select GMC models.\n\n## Service\n\n**Do I need an appointment for service?**\nAppointments are recommended but walk-ins are welcome. Call 931-246-6354.\n\n**Do you use genuine OEM parts?**\nYes. The parts department stocks genuine GM and ACDelco parts. Call 931-903-2374.\n\nSee [dealership.md](dealership.md) for full contact information.\nSee [new-vehicles.md](new-vehicles.md) for model details.\nSee [service-center.md](service-center.md) for service information.",
    "datasets/new-vehicles": "# New GMC Vehicles at Nick Mayer GMC Lewisburg\n\nNick Mayer GMC Lewisburg offers the complete GMC model lineup, from light-duty pickups and heavy-duty work trucks to luxury SUVs and the all-electric Hummer EV.\n\n## GMC Model Lineup\n\n### Sierra 1500\nFull-size light-duty pickup truck. Available in multiple trims (Pro, SLE, Elevation, SLT, AT4, Denali). Offers a choice of engines including the turbo-diesel Duramax 3.0L. Towing capacity up to 13,000 lbs. Bed and cab configurations include Regular Cab, Double Cab, and Crew Cab.\n\n### Sierra HD (2500 / 3500)\nHeavy-duty pickup truck engineered for maximum capability. Towing capacity up to 36,000 lbs when properly equipped. Available with the 6.6L V8 gas or 6.6L Duramax turbo-diesel engine. Trims include WT, SLE, SLT, AT4, and Denali.\n\n### Yukon\nFull-size SUV seating 7-9 passengers. Available with 5.3L V8, 6.2L V8, or 3.0L Duramax diesel. Trims range from SLE to Denali Ultimate. Features luxury interior, advanced trailering technology, and available 4WD.\n\n### Yukon XL\nExtended-length version of the Yukon offering maximum cargo capacity behind the third row. Same engine and trim lineup as the standard Yukon. Seating for up to 9 passengers with generous storage.\n\n### Acadia\nMid-size SUV seating up to 7 passengers. Available with a 2.5L 4-cylinder or 3.6L V6. Front-wheel drive standard, all-wheel drive available. Trims include AT4 and Denali.\n\n### Terrain\nCompact SUV seating 5 passengers. Standard FWD, available AWD. Powered by a 1.5L turbo 4-cylinder. Known for efficient daily driving and a well-equipped interior.\n\n### Canyon\nMid-size pickup truck seating 5 passengers. Available in Elevation, AT4, and Denali trims. RWD standard, 4WD available. Known for off-road capability and refined on-road manners.\n\n### Hummer EV\nAll-electric supertruck. Up to 1,000 hp from three-motor e4WD drive system. Features include CrabWalk diagonal driving, Extract Mode air suspension, and Ultium battery platform. Available as SUV or SUT (pickup) body styles.\n\nSee [dealership.md](dealership.md) for full dealership profile.\nSee [model-comparison.md](/tables/model-comparison.md) for detailed model specifications.",
    "datasets/service-center": "# Service Center at Nick Mayer GMC Lewisburg\n\nThe Nick Mayer GMC Lewisburg service center provides factory-trained maintenance and repair for GMC vehicles.\n\n## Service Department\n\nContact: **931-246-6354**\n\nFactory-trained technicians perform oil changes, tire rotations, brake service, engine diagnostics, transmission service, air conditioning service, and scheduled maintenance per the GM maintenance schedule.\n\n## Parts Department\n\nContact: **931-903-2374**\n\nThe parts department stocks genuine OEM GMC parts, accessories, and fluids. Parts can be ordered online for pickup.\n\n## Services Offered\n\n- Oil changes and fluid flushes\n- Tire rotation and balancing\n- Brake inspection and replacement\n- Engine and transmission diagnostics\n- Air conditioning service\n- Battery testing and replacement\n- Scheduled maintenance (GM maintenance schedule)\n- Warranty repairs\n- GM accessories installation\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday \u2013 Friday | 9:00 AM \u2013 7:00 PM |\n| Saturday | 9:00 AM \u2013 6:00 PM |\n| Sunday | Closed |\n\nSee [dealership.md](dealership.md) for full dealership profile.\nSee [faq.md](faq.md) for service-related questions.",
    "datasets/staff": "# Staff at Nick Mayer GMC Lewisburg\n\nNick Mayer GMC Lewisburg employs a team of sales consultants, service advisors, finance managers, and parts specialists dedicated to serving the Lewisburg, Columbia, Franklin, and Fayetteville communities.\n\n## Sales Team\n\nThe sales team assists customers with new GMC purchases, pre-owned vehicle selection, test drives, and online financing applications.\n\n## Service Advisors\n\nService advisors coordinate maintenance and repair appointments through the GMC factory-trained service center.\n\n## Finance Department\n\nFinance managers guide customers through financing, leasing, warranty, and protection product options.\n\nFor service-related inquiries, see [service-center.md](service-center.md).\nFor general dealership information, see [dealership.md](dealership.md).",
    "datasets/used-vehicles": "# Pre-Owned Vehicles at Nick Mayer GMC Lewisburg\n\nNick Mayer GMC Lewisburg carries a diverse selection of pre-owned vehicles spanning multiple makes and models.\n\n## CarBravo Certified Used Vehicles\n\nThe dealership participates in **CarBravo**, GM's certified pre-owned vehicle program. CarBravo offers:\n\n- Rigorous 172-point inspection\n- Vehicle history report\n- Limited warranty coverage\n- 24/7 roadside assistance\n- Flexible return policy\n- GM-backed financing options\n\n## Trade-In Appraisal\n\nCustomers can value their current vehicle online through the dealership website and receive a trade-in offer.\n\n## Inventory\n\nThe pre-owned lot typically includes late-model GMC trucks and SUVs, along with competitive makes from Ford, RAM, Toyota, Honda, and Chevrolet. Inventory is updated daily online.\n\nSee [dealership.md](dealership.md) for full dealership profile.\nSee [faq.md](faq.md) for frequently asked questions about pre-owned vehicles.",
    "references/ai-discovery-page": "# AI Discovery Page \u2014 Nick Mayer GMC Lewisburg\n\nNick Mayer GMC Lewisburg operates on the **DealerOn** dealership platform.\n\n## Platform Details\n\n- **Platform:** DealerOn\n- **PromptGraph API:** Not available\n\nThe dealership website follows standard DealerOn conventions for content management, inventory display, and SEO optimization.\n\n## AI / LLM Accessibility\n\nNo structured AI discovery endpoints (such as a PromptGraph API) were identified. The site relies on standard HTML, sitemaps, and metadata for search engine and AI crawler consumption.\n\n## Key Pages\n\n- Homepage: https://www.nickmayergmcoflewisburg.com/\n- New Inventory: https://www.nickmayergmcoflewisburg.com/new-inventory/\n- Used Inventory: https://www.nickmayergmcoflewisburg.com/used-inventory/\n- Service: https://www.nickmayergmcoflewisburg.com/service/\n- Parts: https://www.nickmayergmcoflewisburg.com/parts/\n- Financing: https://www.nickmayergmcoflewisburg.com/finance/\n\nSee [llms-txt.md](llms-txt.md) for the LLM discovery reference.",

    "references/testimonials": "# Testimonials and Reputation for Nick Mayer GMC Lewisburg\n\nCustomer reviews and ratings for Nick Mayer GMC Lewisburg are available through multiple third-party platforms.\n\n## Overview\n\nThe dealership maintains an active presence on major review platforms. Prospective buyers and service customers are encouraged to consult Google Reviews, DealerRater, and Cars.com for current ratings and written testimonials.\n\n## Typical Praise Topics\n\n- Friendly and knowledgeable sales staff\n- Clean and welcoming showroom\n- Responsive service department\n- Fair pricing on new and pre-owned vehicles\n\nSee [dealership.md](/datasets/dealership.md) for full dealership profile.",

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
