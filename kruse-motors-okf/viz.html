  "bodies": {
    "datasets/dealership": "# Kruse Motors Auto Group\n\nKruse Motors is a multi-brand automotive dealership located in Marshall, MN, serving as a certified dealer for Ford, Lincoln, Buick, and GMC. The dealership provides new and used vehicle sales, factory-authorized service, genuine OEM parts, and automotive financing. Kruse Motors has been voted the best place to buy a new or used vehicle year-after-year and also voted best for service including the quick lube and car wash center. The dealership serves drivers throughout Marshall, Worthington, Redwood Falls, Brookings, Granite Falls, and surrounding Southwest Minnesota communities.\n\n## Contact\n\n| Detail | Information |\n|---|---|\n| Address | 1651-61 East College Drive, Marshall, MN 56258 |\n| Sales Phone | (507) 205-4475 |\n| GM Service Phone | (507) 401-2907 |\n| Ford Service Phone | (507) 537-0313 |\n| Main Phone | (507) 337-7500 |\n| Email | kendallbillman@gmail.com |\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday \u2013 Thursday | 8:00 AM \u2013 7:00 PM |\n| Friday | 8:00 AM \u2013 6:00 PM |\n| Saturday | 8:00 AM \u2013 4:00 PM |\n| Sunday | Closed |\n\n## Brands\n\n- **Ford** \u2014 Trucks, SUVs, crossovers, commercial vehicles, and electric vehicles\n- **Lincoln** \u2014 Premium luxury vehicles focused on comfort and sophisticated design\n- **Buick** \u2014 SUVs and crossovers crafted for quiet comfort and upscale styling\n- **GMC** \u2014 Trucks and SUVs built for capability, towing strength, and refined utility\n\n## Social\n\n- Facebook: https://www.facebook.com/KruseMotorsAutoGroup\n- Instagram: https://www.instagram.com/krusemotors/\n- YouTube: https://www.youtube.com/channel/UC6BL5rszXaDtLAkHtFn_66g\n- X (Twitter): https://x.com/krusemotors\n\n## Ratings\n\n- **Google Rating:** 4.6 / 5.0 (1,259+ reviews)\n- **CarFax:** Top-Rated Dealer Award recipient\n\n## Special Programs\n\n- **Free Oil for Life** \u2014 Free oil changes for the life of the vehicle when purchased at Kruse Motors\n- **Kruse Your Way** \u2014 Custom-order program for Ford, Lincoln, Buick, or GMC vehicles with chosen color, features, and accessories\n- **KBB Instant Cash Offer** \u2014 Fair-market trade-in valuation through Kelley Blue Book\n- **Ford Drives U** \u2014 Student savings program for new or used vehicles\n- **We Buy Cars** \u2014 Direct vehicle purchase program with no obligation to buy\n\n## Service Centers\n\nThe dealership operates two service centers:\n- **Kruse Motors Ford Lincoln** \u2014 Ford and Lincoln service\n- **Kruse Motors Buick GMC** \u2014 Buick and GMC service\n\nSee [service-center.md](service-center.md) for full service department details.\nSee [new-vehicles.md](new-vehicles.md) for new vehicle brands and models.\nSee [used-vehicles.md](used-vehicles.md) for pre-owned inventory details.\nSee [financing.md](financing.md) for financing and lease options.\nSee [ai-discovery-page.md](/references/ai-discovery-page.md) for machine-readable structured data.",
    "datasets/faq": "# Frequently Asked Questions \u2014 Kruse Motors\n\n## General\n\n**What makes Kruse Motors different from other dealerships?**\nKruse Motors is a family-owned dealership serving Marshall and Southwest Minnesota since 1974, offering Ford, Lincoln, Buick, and GMC vehicles under one roof. The dealership focuses on transparent pricing, no-pressure sales, and long-term customer relationships.\n\n**Where is Kruse Motors located?**\n1651-61 East College Drive, Marshall, MN 56258.\n\n**What are the showroom hours?**\nMonday\u2013Thursday 8:00 AM\u20137:00 PM, Friday 8:00 AM\u20136:00 PM, Saturday 8:00 AM\u20134:00 PM.\n\n**What brands does Kruse Motors sell?**\nNew: Ford, Lincoln, Buick, and GMC. Used: All makes and models.\n\n## Inventory\n\n**How can I browse inventory?**\nVisit the inventory page online or use the vehicle search tool on the website. Inventory can be filtered by new, used, certified pre-owned, brand, body style, and price range.\n\n**Can I custom-order a vehicle?**\nYes, through the Kruse Your Way program. You can custom-order a Ford, Lincoln, Buick, or GMC vehicle with your chosen color, features, and accessories.\n\n**Do you offer certified pre-owned vehicles?**\nYes, Kruse Motors offers a selection of certified pre-owned vehicles that meet manufacturer quality standards and include comprehensive warranties.\n\n## Financing\n\n**Can I get pre-qualified without affecting my credit score?**\nYes. The pre-qualification process uses a soft credit check that does not require your Social Security Number or date of birth and has no impact on your credit score.\n\n**Do you work with buyers who have challenged credit?**\nYes. The finance team works with a wide network of lenders and handles various credit situations.\n\n**Is there a student discount program?**\nYes, the Ford Drives U program offers savings for students on new or used vehicles.\n\n## Service\n\n**What type of service does Kruse Motors offer?**\nRoutine maintenance (oil changes, tire rotations), advanced diagnostics, brake service, transmission repairs, electrical system support, and more. Service is available for Ford, Lincoln, Buick, and GMC vehicles at dedicated service centers.\n\n**Do I need to buy my vehicle at Kruse to have it serviced there?**\nNo. The service department works on any vehicle, and customers who did not purchase at Kruse have reported excellent service experiences.\n\n**Does Kruse offer free oil changes?**\nYes, Kruse Motors offers a Free Oil for Life program on vehicles purchased at the dealership.\n\n## Trade-In & Selling\n\n**How do I get a trade-in value?**\nUse the Kelley Blue Book Trade-In Advisor Tool online for an instant, accurate estimate, or visit the dealership in person.\n\n**Can I sell my car to Kruse without buying one?**\nYes. The We Buy Cars program allows you to sell your vehicle directly with no obligation to purchase.\n\n**Does Kruse match KBB values?**\nKruse partners with Kelley Blue Book to provide transparent, fair-market offers through the KBB Instant Cash Offer program.\n\nSee [dealership.md](dealership.md) for the full business profile.\nSee [financing.md](financing.md) for detailed financing information.\nSee [service-center.md](service-center.md) for service department details.",
    "datasets/financing": "# Financing & Leasing \u2014 Kruse Motors\n\nThe finance department at Kruse Motors works with a network of lenders to help customers secure competitive rates for vehicle purchases. Financing options are available for new and used vehicles across all brands.\n\n## Financing Tools\n\n| Tool | Description | Link |\n|---|---|---|\n| Get Pre-Qualified | Soft credit check \u2014 no SSN or DOB needed, no credit score impact | /get-pre-qualified |\n| Online Credit Application | Secure credit application to save time at the dealership | /get-pre-approved |\n| Budget Calculator | Estimate monthly payment based on down payment and credit score | Browse by Budget tool |\n\n## Lease & Finance Specials by Brand\n\n| Brand | Offers |\n|---|---|\n| Ford | New Ford lease and finance deals available on popular models |\n| Lincoln | New Lincoln lease and finance specials on luxury vehicles |\n| GMC | New GMC lease and finance specials on trucks and SUVs |\n| Buick | New Buick lease and finance specials on crossovers |\n\n## Special Programs\n\n| Program | Description |\n|---|---|\n| Ford Drives U | Student savings program for new or used vehicle purchases |\n| Buy Now, Pay Later | Service and parts financing through Sunbit |\n| Flexible Loan & Lease Programs | Options designed for different ownership preferences and budget goals |\n\n## Leasing\n\nLease options are available on new Ford, Lincoln, Buick, and GMC vehicles. The finance team presents lease options that may offer lower monthly payments compared to traditional financing.\n\n## Credit Situations\n\nThe finance department handles various credit situations from excellent credit to challenged credit, working with a wide network of lenders to find appropriate terms.\n\n## Used Vehicle Incentives\n\nSpecial offers and incentives are available for used car, truck, and SUV purchases in addition to new vehicle programs.\n\nSee [dealership.md](dealership.md) for the full business profile.\nSee [new-vehicles.md](new-vehicles.md) for current new vehicle pricing and models.\nSee [used-vehicles.md](used-vehicles.md) for pre-owned inventory deals.",
    "datasets/new-vehicles": "# New Vehicle Inventory \u2014 Kruse Motors\n\nKruse Motors offers a multi-brand new vehicle lineup featuring Ford, Lincoln, Buick, and GMC vehicles. Customers can browse inventory on the lot or custom-order through the Kruse Your Way program.\n\n## Ford\n\n| Model | Type | Key Features |\n|---|---|---|\n| F-150 | Full-size pickup | Best-selling truck, multiple trims, hybrid/PowerBoost options |\n| F-250 Super Duty | Heavy-duty pickup | Towing capability, work-ready trims, advanced trailering tech |\n| F-350 Super Duty | Heavy-duty pickup | Maximum towing/hauling, commercial-grade capability |\n| Ranger | Midsize pickup | Off-road capability, compact maneuverability, FX4 option |\n| Mustang | Sports car | Iconic pony car, EcoBoost/GT/Dark Horse trims |\n| Explorer | Midsize SUV | Three-row seating, ST performance trim, RWD platform |\n| Escape | Compact SUV | Hybrid option, spacious interior, available AWD |\n| Edge | Midsize crossover | Two-row SUV, ST-Line styling, available AWD |\n| Bronco | Off-road SUV | Removable top/doors, 4x4 capability, Sasquatch package |\n| Transit | Full-size van | Commercial/passenger configurations, multiple roof heights |\n\n## Lincoln\n\n| Model | Type | Key Features |\n|---|---|---|\n| Nautilus | Midsize luxury SUV | Premium interior, Lincoln BlueCruise, 48-inch panoramic display |\n| Aviator | Midsize luxury SUV | Three-row seating, Plug-in Hybrid option, luxurious cabin |\n| Corsair | Compact luxury SUV | Entry-level luxury, efficient Powertrain, available AWD |\n\n## Buick\n\n| Model | Type | Key Features |\n|---|---|---|\n| Enclave | Full-size luxury SUV | Three-row seating, quiet cabin, premium interior |\n| Envision | Compact luxury SUV | European-designed, sporty handling, available AWD |\n| Encore GX | Subcompact luxury SUV | Efficient engine options, upscale interior, hands-free power liftgate |\n| Envista | Compact SUV coupe | Sleek fastback design, accessible price point, standard LED lighting |\n\n## GMC\n\n| Model | Type | Key Features |\n|---|---|---|\n| Sierra 1500 | Full-size pickup | Professional-grade, Denali luxury trim, MultiPro Tailgate |\n| Canyon | Midsize pickup | AT4 off-road trim, premium interior, diesel option |\n| Acadia | Midsize SUV | Three-row seating, Denali trim, available AWD |\n| Terrain | Compact SUV | Robust styling, AT4 trim, efficient engine |\n| Yukon | Full-size SUV | Three-row seating, Denali Ultimate, available Duramax diesel |\n\nSee [dealership.md](dealership.md) for the full business profile.\nSee [financing.md](financing.md) for current lease and finance offers.\nSee [brand-comparison.md](/tables/brand-comparison.md) for side-by-side brand comparison.",
    "datasets/service-center": "# Service Center \u2014 Kruse Motors\n\nKruse Motors operates two factory-authorized service centers staffed by trained technicians equipped to handle routine maintenance, advanced repairs, and vehicle diagnostics.\n\n## Service Locations\n\n| Center | Brands Serviced | Phone |\n|---|---|---|\n| Kruse Motors Ford Lincoln | Ford, Lincoln | (507) 537-0313 |\n| Kruse Motors Buick GMC | Buick, GMC | (507) 401-2907 |\n\n## Services Offered\n\n| Service | Description |\n|---|---|\n| Oil Changes | Regular oil changes with genuine OEM filters and approved oils |\n| Tire Rotation & Balancing | Extend tire life and maintain even wear |\n| Brake Service | Inspection, pad replacement, rotor resurfacing, and brake system repair |\n| Engine Diagnostics | Computerized diagnostics for check engine lights and drivability issues |\n| Transmission Service | Fluid changes, repairs, and complete rebuilds |\n| Electrical System | Battery testing, alternator repair, and electrical diagnostics |\n| Air Conditioning | AC recharge, compressor repair, and climate control service |\n| Fluid Checks | All vehicle fluid inspections and replacements |\n| Belts & Hoses | Inspection and replacement of serpentine belts, timing belts, and coolant hoses |\n| Filter Replacement | Cabin air filters, engine air filters, and fuel filters |\n| Winter Maintenance | Battery checks, antifreeze levels, tire condition, and heater performance |\n\n## Parts & Accessories\n\n- **Genuine OEM Parts** \u2014 Factory-designed components engineered for Buick, GMC, Ford, and Lincoln vehicles\n- **Accessories** \u2014 Customization accessories available through online catalog with 360-degree vehicle view\n- **Service & Parts Financing** \u2014 Buy Now, Pay Later options through Sunbit\n\n## Specials\n\nService coupons and specials are available for oil changes, tire rotations, brake service, and other common maintenance items. View current offers at the dealership's service offers page.\n\n     "datasets/used-vehicles": "# Used Vehicle Inventory \u2014 Kruse Motors\n\nKruse Motors maintains a large inventory of pre-owned and certified pre-owned vehicles across multiple brands and body styles. Each vehicle is inspected and reconditioned before sale.\n\n## Pre-Owned Inventory\n\n| Category | Description |\n|---|---|\n| Used Cars & Sedans | Multi-make selection including sedans, hatchbacks, and coupes |\n| Used Trucks | Full-size and midsize pickups including Ford F-150, GMC Sierra, Ram 1500 |\n| Used SUVs | Compact, midsize, and full-size SUVs including Ford Explorer, GMC Acadia, Buick Enclave |\n| Affordable Vehicles | Inventory available under $15,000 and under $25,000 |\n\n## Certified Pre-Owned\n\nFactory-certified pre-owned vehicles that meet manufacturer quality standards, backed by comprehensive warranties. CPO vehicles are carefully inspected and include extended warranty coverage.\n\n## Trade-In & Sell Programs\n\n| Program | Description |\n|---|---|\n| KBB Instant Cash Offer | Get a fair-market offer from Kelley Blue Book with no obligation |\n| Value Your Trade | Online trade-in estimate to apply toward next purchase |\n| We Buy Cars | Direct vehicle purchase program with no car-buying obligation |\n\n## Vehicle Protection\n\nKruse Motors offers vehicle protection plans including gap protection, powertrain plus coverage, complete choice protection, vehicle service contracts, and pre-owned vehicle coverage.\n\n## Quality Process\n\nEach used vehicle is meticulously inspected and reconditioned to high standards. The dealership is selective when choosing inventory and stands behind the condition of every pre-owned vehicle sold.\n\nSee [dealership.md](dealership.md) for the full business profile.\nSee [financing.md](financing.md) for used vehicle financing options and incentives.\nSee [testimonials.md](/references/testimonials.md) for customer experiences with used vehicle purchases.",
    "references/ai-discovery-page": "# AI Discovery Page \u2014 Kruse Motors\n\nThe AI Discovery Page is a structured, machine-readable knowledge surface for AI agents, powered by PromptGraph. It exposes semantic endpoints, business metadata, and LLM-friendly data for Kruse Motors.\n\n## PromptGraph API Sitemap\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/kruse-motors/sitemap.xml` exposes these machine-readable endpoints:\n\n| URL | Priority | Update Frequency |\n|---|---|---|\n| `/business` | 1.0 | Weekly |\n| `/prompts` | 0.9 | Weekly |\n| `/vehicles` | 0.9 | Daily |\n| `/.well-known/ai-manifest.json` | 0.6 | Monthly |\n| `/sitemap-inventory.xml` | 0.8 | Daily |\n| `/robots.txt` | 0.5 | Monthly |\n\n## AI Manifest (`/.well-known/ai-manifest.json`)\n\nThe AI Manifest (v1.0) provides a machine-readable directory of all AI resources:\n\n- **Name:** Kruse Motors\n- **Description:** Kruse Motors is proud to serve our customers around the Marshall area and worldwide as your certified dealer for Ford, Lincoln, Buick, and GMC.\n- **Last updated:** 2026-06-25T17:27:12.157Z\n- **Schema types:** LocalBusiness, AutoDealer, Car, ItemList\n- **Contact:** kendallbillman@gmail.com\n\n### Registered Endpoints\n\n| Endpoint | Resource |\n|---|---|\n| `/llms.txt` | LLMs.txt directive |\n| `/business` | Business profile (JSON-LD) |\n| `/vehicles` | Vehicle inventory (JSON-LD) |\n| `/prompts` | Q&A / FAQ content |\n| `/testimonials` | Customer reviews |\n| `/sitemap.xml` | Full sitemap |\n| `/robots.txt` | Robots rules |\n| `/config.json` | System configuration |\n\n### Additional PromptGraph Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/gbp-context` | Flattened Google Business Profile data for LLM ingestion |\n| `/site-content` | Clean, plain-text mirror of the entire site |\n| `/llms.txt` | LLMForge v1.0 directive file |\n| `/offers` | Current specials and incentives |\n\n## Business Profile (Schema.org AutoDealer)\n\nFrom `https://api.promptgraph.ai/api/v1     "references/prompts": "# PromptGraph Prompts \u2014 Kruse Motors\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/kruse-motors/prompts` provides 28+ structured Q&A prompts for AI agents.\n\n## Brand & Dealership\n\n| Prompt | Topic | Description |\n|---|---|---|\n| Trusted Auto Partner in Marshall, MN | Brand identity | Friendly, family-owned dealership focused on seamless car-buying |\n| Proud Dealer for Top Brands in the Marshall Area | Brand reputation | Premier local destination for Ford, Lincoln, Buick, GMC |\n| Your Premier Destination for Ford, Lincoln, Buick, and GMC | Multi-brand | Ultimate automotive hub in Southwest Minnesota |\n| A Local Landmark Built on Relationships | Community | Small-town heart, community roots, ALS research support |\n| What's it actually like dealing with Kruse Motors | Customer experience | Honest reviews, Free Oil for Life program |\n\n## Sales & Inventory\n\n| Prompt | Topic | Description |\n|---|---|---|\n| Your Complete Vehicle Solution: Sales, Service, Trade-In | Full service | One-stop destination for all automotive needs |\n| Custom-Built Excellence with Kruse Your Way | Custom ordering | Custom-order vehicles to exact specifications |\n| Quality You Can Trust in Every Used Vehicle | Used inventory | Meticulous inspection process for used cars |\n| Kruse Motors Inventory Specials Guide | Specials | Current inventory specials and deals |\n| Kruse Motors Truck Deals in Marshall | Truck inventory | Truck deals including Ford F-150, Chevy Silverado, Ram 1500 |\n\n## Financing & Trade-In\n\n| Prompt | Topic | Description |\n|---|---|---|\n| Stress-Free Selling with KBB Instant Trade-In Values | Trade-in | KBB partnership for transparent, fair-market offers |\n| Flexible Financing for Every Credit Journey | Financing | Pre-qualification without credit score impact |\n| Ford Drives U Program | Student program | Student savings on new or used vehicles |\n\n## Service\n\n| Prompt | Topic | Description |\n|---|---|--     "references/testimonials": "# Customer Testimonials \u2014 Kruse Motors\n\nKruse Motors maintains a 4.6-star rating from over 1,250 Google reviews. The testimonials below are drawn from the API and prominently feature positive experiences with sales staff, service advisors, and finance professionals.\n\n## Overview\n\n| Metric | Value |\n|---|---|\n| Average Rating | 4.6 / 5.0 |\n| Total Reviews | 1,259+ |\n| Common Praise | No-pressure sales, knowledgeable staff, fair pricing, Free Oil for Life program |\n\n## Most-Frequently Praised Staff\n\n| Staff Member | Count | Common Praise |\n|---|---|---|\n| Kayla Janachovsky | ~15 mentions | Knowledgeable, patient, thorough, excellent communication |\n| Carter Iverson | ~10 mentions | Exceptional service, persistent, accommodating |\n| Krystal | ~8 mentions | Energetic, helpful, sweet, fantastic |\n| Shane Nokleby | ~6 mentions | Friendly, professional, great to work with |\n| Max Louwagie | ~5 mentions | Helpful, went above and beyond |\n| TJ Hickman | ~4 mentions | Helpful, knowledgeable, no pressure |\n| Pete | ~4 mentions | Knowledgeable, personable, guided the process |\n\n## Notable Excerpts\n\n> \"Shannon was very thorough & kind!!! Thank you for the positive experience :)\" \u2014 Tammy Pitzl (5 stars)\n\n> \"Recently purchased a truck from Kruse and Paige was my sales rep. She made the process very easy and was great to work with.\" \u2014 Derick Walker (5 stars)\n\n> \"Kruse Motors met our expectations from start to finish. What was represented on-line and with the initial phone inquiry was exactly what we found and were looking for when visiting the dealership.\" \u2014 Dan Swanda (5 stars)\n\n> \"They made us feel like family and made the whole buying process very easy.\" \u2014 Ken Klosterman (5 stars)\n\n> \"I had an outstanding experience purchasing my 2025 Ford Raptor through Kruse Ford. From the very beginning, the entire team was professional, responsive, and genuinely great to work with.\" \u2014 Matt M (5 stars)\n\n> \"Probably one of the more relaxed and easy car purchases I've gone through. Great service. Family-owned business that feels like they want to take care of you.\" \u2014 Brett Jacobson (5 stars)\n\n> \"Kruse Motors is the tops in my book. Everyone treats you with respect and they listen to your needs and take you through the whole process of buying a car.\" \u2014 Steven Maas (5 stars)\n\nSee [staff.md](/datasets/staff.md) for the staff directory.\nSee [dealership.md](/datasets/dealership.md) for the full business profile.",

      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
