    "datasets/dealership": "# Ron Marhofer Nissan\n\nRon Marhofer Nissan is a full-service Nissan dealership located at **247 Howe Ave, Cuyahoga Falls, OH 44221-4903**, serving the greater Akron area including Stow, Hudson, Kent, Tallmadge, New Franklin, and Northeast Ohio.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Main | (330) 940-4001 |\n| Sales | (234) 245-6026 |\n| Service | 330-940-4422 |\n| Parts | 330-940-4014 |\n\nEmail: marhoferc@gmail.com\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 6:00 PM |\n| Wednesday | 9:00 AM - 6:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 6:00 PM |\n| Saturday | 9:00 AM - 5:00 PM |\n| Sunday | Closed |\n\n## Location\n\n- **Address:** 247 Howe Ave, Cuyahoga Falls, OH 44221-4903\n- **Geo:** 41.1198309, -81.4855967\n\n## New Vehicles\n\nNissan models available include:\n- **Rogue** - Compact SUV, best-selling Nissan, multiple trims including Rock Creek and Platinum\n- **Rogue Plug-In Hybrid** - Hybrid electric compact SUV\n- **Altima** - Mid-size sedan, available with AWD\n- **Sentra** - Compact sedan, value-oriented\n- **Pathfinder** - Mid-size 3-row SUV, available in S, SV, SL, and Platinum trims\n- **Armada** - Full-size SUV, powerful V8 engine\n- **Frontier** - Mid-size pickup truck, available in S, SV, and PRO-4X trims\n- **Murano** - Mid-size crossover SUV\n- **Kicks** - Subcompact crossover SUV\n- **Maxima** - Full-size sedan\n- **Titan / Titan XD** - Full-size pickup truck and heavy-duty variant\n- **Versa** - Subcompact sedan\n- **Ariya** - All-electric crossover SUV\n- **LEAF** - All-electric hatchback\n\n## Services\n\n- **Finance Department** - Loan and lease options, online credit application, trade-in appraisal, Capital One pre-qualification\n- **Service Center** - Nissan-certified technicians, routine maintenance, diagnostics, major repairs, genuine Nissan parts\n- **Parts Department** - Genuine Nissan components, accessories, tires\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, certified pre-owned)\n- Online service scheduling\n- Online credit application and pre-approval\n- Car payment calculator\n- Home delivery (free up to 150 miles)\n- Trade-in valuation tool\n\n## Staff\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- Aggregate rating: 4.7 / 5.0 (2,283 reviews) across major platforms\n- Google Business Profile: 4.7 stars (2,200+ reviews)\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Marhofer Auto Family** - Part of the Marhofer group of dealerships\n- **Free Home Delivery** - Up to 150 miles\n- **Low-Stress Car Buying** - Transparent, no-pressure sales process\n- **120+ Point Inspection** - On all pre-owned vehicles\n- **30+ Lenders** - Financing options for various credit profiles\n\n## Affiliations\n\n- Part of the **Marhofer Auto Family**\n- **Marhofer Collision** - Collision repair center\n- **Marhofer Rentals** - Nissan rental services\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform",
    "datasets/faq": "# Frequently Asked Questions - Ron Marhofer Nissan\n\n## Inventory\n\n**Q: What new Nissan models are available at Ron Marhofer Nissan?**\nA: The full Nissan lineup including Rogue, Rogue Plug-In Hybrid, Altima, Sentra, Pathfinder, Armada, Frontier, Murano, Kicks, Maxima, Titan, Titan XD, Versa, Ariya, and LEAF.\n\n**Q: What brands are available in the used vehicle inventory?**\nA: The pre-owned inventory spans multiple makes including Nissan, Chevrolet, Ford, Toyota, Honda, Hyundai, Kia, Volkswagen, GMC, Jeep, Ram, BMW, Mercedes-Benz, Land Rover, and Mitsubishi.\n\n**Q: Does Ron Marhofer Nissan offer certified pre-owned vehicles?**\nA: Yes, Nissan Certified Pre-Owned vehicles are available with factory-backed inspections, warranties, and 24/7 roadside assistance.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs. The dealership works with over 30 lenders to find the best terms.\n\n**Q: Does the dealership work with all credit profiles?**\nA: Yes, the finance team works with over 30 lenders to accommodate various credit situations and budgets.\n\n## Service\n\n**Q: Can the service center work on non-Nissan vehicles?**\nA: Yes, the service center can perform maintenance and repairs on various makes and models.\n\n**Q: Does the dealership offer Nissan Express Service?**\nA: Yes, Nissan Express Service provides quick in-and-out maintenance without an appointment.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website.\n\n**Q: Do you offer home delivery for serviced vehicles?**\nA: Yes, free home delivery up to 150 miles is available for completed vehicle service.\n\n## Dealership\n\n**Q: Where is Ron Marhofer Nissan located?**\nA: 247 Howe Ave, Cuyahoga Falls, OH 44221, serving Akron, Stow, Hudson, Kent, Tallmadge, and New Franklin.\n\n**Q: What is the Marhofer Auto Family?**\nA: Ron Marhofer Nissan is part of the Marhofer Auto Family, which also includes Marhofer Collision and Marhofer Rentals.\n\n**Q: Does the dealership offer home delivery?**\nA: Yes, free home delivery up to 150 miles is available for vehicle purchases.\n\n**Q: Is there a vehicle hold policy?**\nA: Yes, the dealership allows customers to hold vehicles before arriving.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/financing": "# Ron Marhofer Nissan - Finance Center\n\n## Finance Center\n\nThe Finance Center at Ron Marhofer Nissan offers flexible financing and leasing solutions for new and pre-owned vehicles. The finance team works with over 30 lenders including Nissan Motor Acceptance Corporation (NMAC) and Capital One to secure competitive rates for customers across all credit profiles.\n\n## Financing Options\n\n- **New Vehicle Loans** - Competitive APR financing on all new Nissan models through NMAC\n- **Used Vehicle Loans** - Rate financing on pre-owned inventory with flexible terms\n- **Capital One Pre-Qualification** - Quick pre-qualification without impacting credit score\n- **Special Finance Programs** - First-time buyer assistance, college graduate, and military programs\n- **Online Credit Application** - Secure pre-approval from home\n- **Credit-Challenged Programs** - Options for less-than-perfect credit through multiple lenders\n\n## Leasing\n\nNissan lease programs offer lower monthly payments and the ability to drive a new Nissan every few years. Lease options include NMAC lease-end options and mileage flexibility.\n\n## Buying vs Leasing\n\n| Factor | Buying | Leasing |\n|---|---|---|\n| Monthly Payment | Higher | Lower |\n| Ownership | You own the vehicle | Return at lease end |\n| Mileage Limits | None | Annual mileage cap applies |\n| Warranty Coverage | After factory warranty | Typically covered by warranty |\n| End of Term | No further obligations | Option to buy or return |\n| Equity Building | Yes | No |\n\n## Trade-In\n\nGet a value for your trade-in through the online appraisal tool or in-person evaluation. The dealership accepts all makes and models regardless of condition.\n\n## Payment Calculators\n\nOnline payment calculator tools allow customers to estimate monthly payments based on vehicle price, down payment, trade-in value, APR, and loan term.\n\n## Contact\n\n**Finance Department**: (234) 245-6026\n**Online Application**: https://www.ronmarhofernissan.com/finance/\n\nSee [dealership.md](dealership.md) for full business profile and hours.",
    "datasets/new-vehicles": "# New Nissan Models - Ron Marhofer Nissan\n\nRon Marhofer Nissan carries a full lineup of new Nissan vehicles. Below is a summary of available models and trims.\n\n## SUVs & Crossovers\n\n### Nissan Rogue\nCompact SUV, Nissan's best-selling model. Available trims include S, SV, Rock Creek, Midnight Edition, Platinum, and Dark Armor. Features the 1.5L VC-Turbo engine (201 hp) with Xtronic CVT. Available in FWD and AWD. Seats 5 passengers. Class-leading cargo space with 74.1 cu ft maximum.\n\n### Nissan Rogue Plug-In Hybrid\nHybrid electric compact SUV combining efficiency with versatility.\n\n### Nissan Pathfinder\nMid-size 3-row SUV seating up to 8 passengers. Available in S, SV, SL, and Platinum trims. Powered by a 3.5L V6 engine with 9-speed automatic transmission. Available in FWD and 4WD. Towing capacity up to 6,000 lbs.\n\n### Nissan Armada\nFull-size SUV with powerful 5.6L V8 engine. Seating up to 8 passengers. Premium trims and features. Maximum towing capacity.\n\n### Nissan Murano\nMid-size 2-row crossover SUV with distinctive styling. Available in multiple trims with a 3.5L V6 engine and Xtronic CVT.\n\n### Nissan Kicks\nSubcompact crossover SUV, value-oriented and fuel-efficient. Affordable entry point into the Nissan SUV lineup.\n\n### Nissan Ariya\nAll-electric crossover SUV available in multiple configurations. Up to 304 miles estimated range. Available in FWD and e-4ORCE AWD. Up to 389 hp in performance variants.\n\n## Cars\n\n### Nissan Altima\nMid-size sedan available with FWD or AWD. Features the 2.5L 4-cylinder engine with Xtronic CVT. Available trims include S, SV, SR, SL, and Platinum. Nissan Safety Shield 360 standard.\n\n### Nissan Sentra\nCompact sedan, stylish and fuel-efficient. Available in S, SV, and SR trims. Standard 2.0L 4-cylinder engine with Xtronic CVT.\n\n### Nissan Maxima\nFull-size sedan with sporty design. Available in multiple trims. Powerful V6 engine.\n\n### Nissan Versa\nSubcompact sedan, Nissan's most affordable model. Fuel-efficient and city-friendly.\n\n## Trucks\n\n### Nissan Frontier\nMid-size pickup truck available in S, SV, and PRO-4X trims. Powered by a 3.8L V6 engine (310 hp) with 9-speed automatic transmission. Available in 2WD and 4WD. Maximum towing capacity of 7,150 lbs.\n\n### Nissan Titan / Titan XD\nFull-size pickup truck with powerful 5.6L V8 engine. Available in multiple configurations including the heavy-duty Titan XD. Designed for maximum capability.\n\n## Electric Vehicles\n\n### Nissan Ariya\nAll-electric crossover SUV with up to 304 miles range. Advanced e-4ORCE AWD system available.\n\n### Nissan LEAF\nAll-electric hatchback, one of the best-selling EVs globally. Affordable electric mobility.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Contact the dealership for current offers.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - Ron Marhofer Nissan\n\nThe Ron Marhofer Nissan Service Center provides certified maintenance and repair services at 247 Howe Avenue, Cuyahoga Falls, OH.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes, tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis\n- **Major Repairs** - Transmission service, engine repair, suspension work\n- **Nissan Express Service** - Convenient maintenance without an appointment\n- **Recall Repairs** - OEM-specified recall and campaign work\n- **Tire Replacement and Alignment** - Full tire services\n- **Scheduled Maintenance** - Following Nissan's recommended maintenance schedule\n\n## Service Team\n\n- **Chase Swain** - Service Manager; former US Marine, with Marhofer since 2019\n- **Darius Roberts** - Service Advisor\n- **Jarred Taylor** - Service Advisor; 5 years automotive industry experience\n- **Maddi Brown** - Internal Service Advisor\n\n## Service Experience\n\n- **Online scheduling** available through the dealership website\n- **Nissan Express Service** - Quick in-and-out for routine maintenance\n- **Certified Nissan Technicians** - Factory-trained using genuine Nissan parts\n- **Free Home Delivery** - Available for completed service vehicles (up to 150 miles)\n\n## Service Specials\n\nThe dealership offers rotating service specials and coupons. See the service specials page for current promotions.\n\n## Parts Department\n\nGenuine Nissan OEM parts and accessories available including:\n- Nissan Genuine replacement parts\n- Tires and wheels\n- Accessories for Nissan vehicles\n- Order parts online or stop by\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 6:00 PM |\n| Wednesday | 9:00 AM - 6:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 6:00 PM |\n| Saturday | 9:00 AM - 5:00 PM |\n| Sunday | Closed |\n\nSee [staff.m indness\n- **Transparent pricing** - Up-front about costs and terms\n- **Willingness to travel** - Customers drive significant distances for the dealership\n\n## Service Themes\n\n- **Fast turnaround** - Service completed quickly with good communication\n- **Professional advisors** - Service advisors keep customers informed throughout the process\n\nSee [staff.md](/datasets/staff.md) for the full staff directory.",

    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
