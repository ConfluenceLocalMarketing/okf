main {

.type-chip {

  font-weight: 600;
  color: #fff;
  background: #94a3b8;

  letter-spacing: 0.5px;
}
dl.frontmatter {

dl.frontmatter dt { color: #64748b; font-weight: 500; }
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }
.tag {

    "datasets/faq": "# Volvo Parts Webstore \u2014 FAQ\n\n## Ordering\n\n### How do I find the right part for my Volvo?\nYou can search by year, model, and category, or enter your Vehicle Identification Number for exact-fit parts. Detailed parts diagrams are available for visual navigation.\n\n### Do I need a VIN to order parts?\nA VIN is recommended for engine, transmission, brake, and electrical components to ensure correct fitment, but not all categories require it.\n\n### What payment methods are accepted?\nStandard online payment methods including credit cards are accepted through the SimplePart e-commerce platform.\n\n## Shipping\n\n### Do you ship nationwide?\nYes, Volvo Parts Webstore ships nationwide across the United States.\n\n### How long does shipping take?\nShipping times vary by destination and part availability. Most orders ship within 1\u20132 business days from Oak Park, IL.\n\n### What are the shipping costs?\nShipping costs are calculated at checkout based on the order weight, dimensions, and destination.\n\n## Returns\n\n### What is the return policy?\nParts must be returned in new, unused condition in original packaging. Return requests must be initiated within 30 days of delivery.\n\n### Are there any non-returnable items?\nElectrical components, special-order parts, and clearance items may be final sale. Contact customer service for specific items.\n\n### Who pays return shipping?\nReturn shipping costs are the responsibility of the customer unless the wrong part was shipped due to an error on our end.\n\n## Fitment\n\n### How can I verify a part fits my Volvo?\nUse the VIN lookup tool on the website, consult the parts diagrams, or contact customer support with your VIN and the part number in question.\n\n### Are all parts genuine OEM Volvo?\nYes, every part sold is a genuine OEM Volvo part guaranteed to meet factory specifications.\n\n## Support\n\n### How do I contact customer support?\nCall (708) 786-6574 or email sales@volvopartswebstore.com. Customer support is available during business hours.\n\n### Does the webstore offer discounts?\nYes, pricing is below MSRP and seasonal promotions and coupon codes are available.",
    "datasets/service-center": "# Parts and Service Support\n\nVolvo Parts Webstore is the online OEM parts retail arm of The Autobarn Volvo Cars Oak Park, offering genuine Volvo parts and accessories with nationwide shipping.\n\n## Parts Categories\n\n- Engine and engine components\n- Brake system (pads, rotors, calipers)\n- Transmission and drivetrain\n- Suspension and steering\n- Electrical system and lighting\n- Body and interior panels\n- HVAC system components\n- Exterior and interior accessories\n- Performance parts\n- Mileage-specific maintenance kits\n\n## Features\n\n- Detailed parts diagrams with visual navigation\n- VIN-based exact-fit part lookup\n- Genuine OEM Volvo parts guaranteed\n- Discount pricing below MSRP\n- Seasonal promotions and coupon codes\n\n## Platform\n\nPowered by SimplePart e-commerce technology.\n\n## Contact\n\n- **Phone:** (708) 786-6574\n- **Email:** sales@volvopartswebstore.com\n- **Location:** 1140 Garfield Street, Oak Park, IL 60304\n\nSee [company.md](company.md) for the full business profile.",
    "datasets/staff": "# Staff\n\n## Management\n\n- **Steve Patterson** \u2014 Parts Manager\n- **Laura Bennett** \u2014 Operations Manager\n\n## Customer Service\n\n- **Emily Nguyen** \u2014 Customer Service Representative\n- **Rachel Adams** \u2014 Customer Service Representative\n\n## Fulfillment\n\n- **Marcus Williams** \u2014 Fulfillment Lead\n- **Jake Morrison** \u2014 Shipping Coordinator\n\nSee [company.md](company.md) for the full business profile.",
    "datasets/used-vehicles": "# OEM Volvo Parts and Accessories\n\nVolvo Parts Webstore offers a comprehensive catalog of genuine OEM Volvo parts, accessories, and maintenance kits.\n\n## Parts by System\n\n| Category | Available Parts |\n|----------|-----------------|\n| Engine | Components, gaskets, belts, timing kits |\n| Brake System | Pads, rotors, calipers, hardware kits |\n| Transmission | Filters, fluids, seals, clutches |\n| Suspension | Struts, shocks, control arms, bushings |\n| Electrical | Lighting, sensors, switches, batteries |\n| Body and Interior | Panels, trim, mirrors, carpet, upholstery |\n| HVAC | Compressors, condensers, blower motors |\n\n## Accessories by Category\n\n- **Exterior:** Roof racks, splash guards, side steps, spoilers\n- **Interior:** Floor mats, cargo organizers, sunshades, dash kits\n- **Performance:** Exhaust systems, tuning components, intake kits\n- **Lifestyle:** Apparel, collectibles, branded merchandise\n\n## Maintenance Kits\n\n- Mileage-specific scheduled maintenance kits\n- Oil change kits with filter and drain plug\n- Tune-up kits including spark plugs and filters\n\n## Ordering\n\n- VIN-based part lookup for exact fitment\n- Parts diagrams for visual identification\n- Discount pricing below MSRP\n- Nationwide shipping\n\nSee [company.md](company.md) for the full business profile. See [faq.md](faq.md) for ordering and shipping details.",

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
