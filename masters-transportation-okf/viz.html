<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>masters-transportation - OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }
main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty { text-align: center; margin-top: 40px; }
.detail-header { margin-bottom: 12px; }
.detail-header h1 { font-size: 18px; margin: 4px 0 2px; font-weight: 600; }
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt { color: #64748b; font-weight: 500; }
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }
.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}
hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }
#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 { font-size: 16px; margin: 18px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #e2e8f0; }
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: ui-monospace, "SF Mono", Consolas, monospace; }
#detail-body pre { background: #0f172a; color: #e2e8f0; padding: 10px 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td { border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px; }
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }
#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }
</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>
<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>
<script>
window.BUNDLE_NAME = "masters-transportation";
window.BUNDLE = {
  "nodes": [

        "resource": "https://api.promptgraph.ai/api/v1/masters-transportation/llms.txt",

      }

    {
      "data": {
        "id": "references/prompts",
        "label": "Master's Transportation - PromptGraph Prompts",
        "type": "PromptGraph Prompts",
        "description": "AI-ready prompt library generated by PromptGraph for Master's Transportation (71 prompts).",
        "resource": "https://api.promptgraph.ai/api/v1/masters-transportation/prompts",
        "tags": [],

    }
  ],
  "edges": [],
  "bodies": {
    "datasets/company": "# Master's Transportation\n\nMaster's Transportation, headquartered in Kansas City, Missouri, is one of the area's largest commercial bus dealers and van rental agencies. With over 30 years of experience, the company provides new and used shuttle buses, sprinter vans, school buses, and wheelchair accessible vehicles for sale, rent, and lease nationwide.\n\n## Products\n\n- **Shuttle Buses** \u2014 New and used models for hospitality, corporate, church, and public transport\n- **School Buses** \u2014 Mini buses, full-size options, multi-function activity buses\n- **Passenger Vans** \u2014 Ford Transit, E-Series, and other commercial vans\n- **Wheelchair Accessible Vehicles** \u2014 ADA-compliant with ramps, lifts, securement systems\n- **Electric Vehicles** \u2014 Eco-friendly and ZEVX integrated options\n\n## Services\n\n- **Rentals** \u2014 Short-term and long-term bus and van rentals nationwide\n- **Repair and Maintenance** \u2014 Certified technicians, genuine parts, refurbishing\n- **Financing** \u2014 Flexible options for businesses, schools, and organizations\n- **Nationwide Delivery** \u2014 Vehicles delivered across the United States\n\n## Locations\n\nThe company operates across 12+ national service locations with a new $72M headquarters campus (320,000 sq ft) near Highway 150 in South Kansas City.\n\n### Regional Locations\n\n| Location | Address | Type |\n|----------|---------|------|\n| **Kansas City, MO (HQ)** | 14655 Prospect Ave, Kansas City, MO 64146 | Headquarters / Service Hub |\n| **Ozark, MO** | 171 Shady Oak Dr, Ozark, MO 65721 | Service Location |\n| **Aurora, CO** | 25200 E 68th Ave, Aurora, CO 80019 | Service Location |\n| **Kearney, NE** | 3710 Central Ave, Kearney, NE 68847 | Service Location |\n| **Cave Springs, AR** | 164 Grading Ln, Ste 403, Cave Springs, AR 72718 | Service Location |\n| **Lincoln, NE** | Service area (15-passenger van rentals) | Rental Location |\n\n### Headquarters Expansion (2025\u20132026)\n\nThe new Kansas City headquarters campus includes:\n- 32,000 sq ft service building (Phase 1, operational)\n- 252,000 sq ft production facility\n- 36,000 sq ft office building\n- ~1 million sq ft paved parking for buses\n- Body shop, paint booth, and detailing areas\n- Centralized parts fulfillment reducing delivery times by up to 70%\n\nThe company was recognized as #66 on the Inc. Regionals: Midwest list (2026) and plans to add 355 jobs. Buses are being supplied to 2026 FIFA World Cup host cities including Dallas, Los Angeles, Atlanta, Miami, and Kansas City.\n\n## Contact\n\n- **Phone:** (866) 411-0986\n- **Website:** https://www.masterstransportation.com/",
    "references/ai-discovery-page": "# Master's Transportation \u2014 AI Discovery\n\nMaster's Transportation is indexed on PromptGraph, providing structured JSON-LD data for LLM consumption. Data includes business profile, vehicle inventory, 71 AI prompts, customer reviews, and GBP context.\n\nBase URL: `http://api.promptgraph.ai/api/v1/masters-transportation`",
    "references/llms-txt": "# Master's Transportation \u2014 LLMs.txt\n\n> Master's Transportation in Kansas City serves as one of the area's largest commercial bus dealers and van rental agencies. We offer shuttles buses, sprinter vans, and school buses for sale or rent.\n\n## API Endpoints\n\n- [Business Information](http://api.promptgraph.ai/api/v1/masters-transportation/business) \u2014 Complete business profile in JSON-LD format\n- [Vehicle Inventory](http://api.promptgraph.ai/api/v1/masters-transportation/vehicles) \u2014 Complete inventory with specifications, pricing, and availability\n- [Prompts & FAQs](http://api.promptgraph.ai/api/v1/masters-transportation/prompts) \u2014 71 structured prompts\n- [Customer Testimonials](http://api.promptgraph.ai/api/v1/masters-transportation/testimonials) \u2014 Customer reviews and ratings\n- [GBP Context](http://api.promptgraph.ai/api/v1/masters-transportation/gbp-context) \u2014 Flattened GBP data for LLM ingestion\n- [Full Site JSON Mirror](http://api.promptgraph.ai/api/v1/masters-transportation/site-content) \u2014 Plain-text mirror of the entire site\n- [AI Manifest](http://api.promptgraph.ai/api/v1/masters-transportation/.well-known/ai-manifest.json) \u2014 Machine-readable directory of all AI resources\n\n## Featured Prompts\n\n- [Commercial Bus and Van Dealer Nationwide](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/commercial-bus-and-van-dealer-nationwide) \u2014 Nationwide provider overview\n- [Shuttle Bus Sales and Rentals](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/shuttle-bus-sales-and-rentals-nationwide) \u2014 Shuttle bus focus\n- [School Bus Sales](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/school-bus-sales-and-activity-buses) \u2014 School and activity buses\n- [Wheelchair Accessible Vehicles](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/wheelchair-accessible-bus-and-van-sales) \u2014 ADA-compliant vehicles\n- [Commercial Vehicle Rentals](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/commercial-vehicle-rentals-nationwide) \u2014 Rental options\n- [Bus Repair Service](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/bus-repair-service-and-maintenance-nationwide) \u2014 Maintenance and refurbishing",
    "references/prompts": "# Master's Transportation \u2014 PromptGraph Prompts\n\nPromptGraph generates 71 structured AI prompts for Master's Transportation, covering commercial bus and van sales, rentals, service, and financing nationwide.\n\n## Product Prompts\n\n- [Commercial Bus and Van Dealer Nationwide](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/commercial-bus-and-van-dealer-nationwide)\n- [Shuttle Bus Sales and Rentals](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/shuttle-bus-sales-and-rentals-nationwide)\n- [School Bus Sales](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/school-bus-sales-and-activity-buses)\n- [Used Commercial Buses and Vans](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/used-commercial-buses-and-vans-for-sale)\n- [Wheelchair Accessible Vehicles](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/wheelchair-accessible-bus-and-van-sales)\n- [Commercial Vehicle Rentals](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/commercial-vehicle-rentals-nationwide)\n- [Bus Repair Service](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/bus-repair-service-and-maintenance-nationwide)\n- [Ford Transit and E-Series](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/ford-transit-and-e-series-commercial-vans)\n- [Electric and Green Vehicles](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/electric-and-green-commercial-vehicles)\n- [Public Sector Solutions](http://api.promptgraph.ai/api/v1/masters-transportation/prompts/public-sector-and-government-bus-solutions)"
  },
  "types": [
    "AI Discovery Page",
    "Organization",
    "PromptGraph LLMs.txt",
    "PromptGraph Prompts"
  ],
  "palette": {
    "Organization": "#8b5cf6",

};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
