    "datasets/dealership": "# Heartland Toyota\n\nHeartland Toyota is a full-service Toyota dealership located at **901 West Hills Blvd, Bremerton, WA 98312**, serving the greater Kitsap County area including Silverdale, Port Orchard, Poulsbo, Bainbridge Island, Gig Harbor, and Tacoma. It is part of the **Haselwood Auto Group**.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Sales | (360) 728-3042 |\n| Service | (360) 728-3043 |\n| Parts | (360) 728-3044 |\n| Rent a Toyota | (360) 473-1529 |\n| Main | (360) 616-3271 |\n\nEmail: gsjones.haselwood@gmail.com\n\n## Hours\n\n| Day | Sales Hours | Service Hours | Parts Hours |\n|---|---|---|---|\n| Monday | 9:00 AM - 8:00 PM | 7:30 AM - 7:00 PM | 7:30 AM - 7:00 PM |\n| Tuesday | 9:00 AM - 8:00 PM | 7:30 AM - 7:00 PM | 7:30 AM - 7:00 PM |\n| Wednesday | 9:00 AM - 8:00 PM | 7:30 AM - 7:00 PM | 7:30 AM - 7:00 PM |\n| Thursday | 9:00 AM - 8:00 PM | 7:30 AM - 7:00 PM | 7:30 AM - 7:00 PM |\n| Friday | 9:00 AM - 8:00 PM | 7:30 AM - 7:00 PM | 7:30 AM - 7:00 PM |\n| Saturday | 9:00 AM - 8:00 PM | 8:00 AM - 4:00 PM | 8:00 AM - 4:00 PM |\n| Sunday | 10:00 AM - 7:00 PM | Closed | Closed |\n\n## Location\n\n- **Address:** 901 West Hills Blvd, Bremerton, WA 98312\n- **Geo:** 47.5554926, -122.6768954\n- Located in the West Hills Auto Center\n\n## New Vehicles\n\nToyota models available include:\n- **Camry** - Best-selling mid-size sedan, available as hybrid\n- **Corolla / Corolla Hybrid** - Compact sedan, value-oriented\n- **RAV4 / RAV4 Hybrid / RAV4 Plug-In Hybrid** - Compact SUV, best-selling Toyota\n- **Tacoma / Tacoma i-FORCE MAX** - Mid-size pickup truck\n- **Tundra / Tundra i-FORCE MAX** - Full-size pickup truck\n- **Highlander / Highlander Hybrid** - Mid-size 3-row SUV\n- **Grand Highlander / Grand Highlander Hybrid** - Large 3-row SUV\n- **4Runner / 4Runner i-FORCE MAX** - Mid-size off-road SUV\n- **Sienna** - Hybrid minivan\n- **Prius / Prius Plug-In Hybrid** - Hybrid hatchback\n- **Corolla Cross / Corolla Cross Hybrid** - Subcompact crossover\n- **bZ4X** - All-electric SUV\n- **Crown Signia** - Premium crossover wagon\n- **Sequoia** - Full-size hybrid SUV\n- **Land Cruiser** - Off-road luxury SUV\n- **GR Supra** - Sports coupe\n- **C-HR** - Subcompact crossover\n\n## Services\n\n- **Finance Department** - Loan and lease options, online credit application, trade-in appraisal, SmartPath online purchasing\n- **Service Center** - Toyota-certified technicians, routine maintenance, diagnostics, major repairs, Toyota Express Maintenance, genuine Toyota parts\n- **Parts Department** - Genuine Toyota OEM components, accessories, tires, online ordering\n- **Rent a Toyota** - On-site Toyota rental agency with latest models at competitive rates\n\n## Online Tools\n\n- SmartPath online purchasing with real-market pricing\n- Inventory browsing and filtering (new, used, certified pre-owned)\n- Online service scheduling\n- Online credit application and pre-approval\n- Car payment calculator\n- Click-N-Drive home delivery\n- Trade-in valuation tool (KBB Instant Cash Offer)\n\n## Staff\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- **Aggregate rating:** 4.6 / 5.0 (3,001+ reviews) across major platforms\n- **CARFAX:** 4.6 / 5.0 (1,977 verified reviews)\n- **Kelley Blue Book:** 4.9 stars\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Haselwood Auto Group** - Part of the Haselwood family of dealerships\n- **Money Back Guarantee** - Customer satisfaction guarantee\n- **SmartPath** - Online purchasing with transparent pricing\n- **Click-N-Drive** - Home delivery available\n- **Economy Vehicle Program** - Budget-friendly pre-owned options\n- **ToyotaCare** - Complimentary maintenance for new Toyotas\n- **Military Rebate** - Special pricing for military personnel\n- **College Grad Rebate** - Special pricing for recent graduates\n- **Vehicle Upgrade Program** - Early trade-in program\n\n## Affiliations\n\n- Part of the **Haselwood Auto Group**\n- **West Hills Autoplex** - Multi-brand auto complex\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform\n- **SmartPath** by Toyota",
    "datasets/faq": "# Frequently Asked Questions - Heartland Toyota\n\n## Inventory\n\n**Q: What new Toyota models are available at Heartland Toyota?**\nA: The full Toyota lineup including Camry, Corolla, RAV4, RAV4 Hybrid, RAV4 Plug-In Hybrid, Tacoma, Tundra, Highlander, Grand Highlander, 4Runner, Sienna, Prius, bZ4X, Corolla Cross, Crown Signia, Sequoia, Land Cruiser, GR Supra, and C-HR.\n\n**Q: What brands are available in the used vehicle inventory?**\nA: The pre-owned inventory spans Toyota, Chevrolet, Ford, Jeep, Ram, Subaru, Tesla, Volkswagen, Volvo, Hyundai, Kia, Lexus, Lincoln, Mazda, Porsche, and many more.\n\n**Q: Does Heartland Toyota offer certified pre-owned vehicles?**\nA: Yes, Toyota Certified Pre-Owned vehicles are available with factory-backed 160-point inspections, warranties, and 24/7 roadside assistance.\n\n**Q: Do you have vehicles under $12,000?**\nA: Yes, Heartland Toyota offers a Bargain Inventory of vehicles under $12,000 and an Economy Vehicle Program with safety-checked, value-priced options.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs. The dealership offers SmartPath online purchasing with transparent pricing.\n\n**Q: Does the dealership work with all credit profiles?**\nA: Yes, the finance team works with multiple lending partners to accommodate various credit situations and budgets.\n\n**Q: Can I apply for financing online?**\nA: Yes, online credit application and pre-approval are available through the dealership website.\n\n## Service\n\n**Q: Can the service center work on non-Toyota vehicles?**\nA: Yes, the service center can perform maintenance and repairs on various makes and models.\n\n**Q: Does the dealership offer Toyota Express Maintenance?**\nA: Yes, Toyota Express Maintenance provides quick in-and-out service (oil changes, tire rotations) without an appointment.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website.\n\n**Q: Does the service center use genuine Toyota parts?**\nA: Yes, the service center uses genuine Toyota OEM parts for all repairs and maintenance.\n\n## Dealership\n\n**Q: Where is Heartland Toyota located?**\nA: 901 West Hills Blvd, Bremerton, WA 98312, in the West Hills Auto Center, serving Silverdale, Port Orchard, Poulsbo, Bainbridge Island, and Kitsap County.\n\n**Q: What is the Haselwood Auto Group?**\nA: Heartland Toyota is part of the Haselwood Auto Group, which also includes multiple dealerships in the West Hills Auto Center complex.\n\n**Q: Does the dealership offer home delivery?**\nA: Yes, Click-N-Drive home delivery is available for vehicle purchases through the SmartPath online platform.\n\n**Q: What is the Money Back Guarantee?**\nA: Heartland Toyota offers a Money Back Guarantee for customer satisfaction on vehicle purchases.\n\n**Q: Is there a vehicle hold policy?**\nA: Yes, the dealership allows customers to hold vehicles before arriving.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/financing": "# Financing & Leasing\n\nThe Heartland Toyota Finance Center offers purchase financing and lease programs for new and pre-owned vehicles.\n\n## Financing Options\n\n- **Online Application**: Start the financing process from home\n- **Multiple Lending Partners**: The finance team works with multiple lenders to find competitive rates\n- **Flexible Terms**: Loan and lease solutions for different ownership goals and budgets\n- **College Grad Rebate**: Special pricing for recent graduates\n- **Military Rebate**: Special pricing for military personnel\n- **SmartPath**: Online purchasing with real-market pricing and transparent financing\n\n## Leasing\n\nLeasing is available for customers who prefer lower monthly payments and the option to drive a new vehicle every few years.\n\n## Buying vs. Leasing\n\n| Factor | Buying | Leasing |\n|---|---|---|\n| Monthly Payment | Higher | Lower |\n| Ownership | Own the vehicle at end of term | Return vehicle at end of term |\n| Mileage | Unlimited | Limited by contract |\n| Sales Tax | Paid upfront or rolled into loan | Included in monthly payment |\n\n## Trade-In\n\nOnline valuation tool via KBB Instant Cash Offer and in-person appraisal available at the dealership.\n\n## Payment Calculators\n\nEstimate monthly payments using the online car payment calculator on the dealership website.\n\n## Contact\n\nContact the finance department at (360) 728-3042 or through the dealership's sales line.\n\nSee [dealership.md](dealership.md) for full business profile and [new-vehicles.md](new-vehicles.md) or [used-vehicles.md](used-vehicles.md) for inventory.",
    "datasets/new-vehicles": "# New Toyota Models - Heartland Toyota\n\nHeartland Toyota carries a full lineup of new Toyota vehicles. Below is a summary of available models and trims.\n\n## SUVs & Crossovers\n\n### Toyota RAV4\nCompact SUV, Toyota's best-selling model in the US. Available in gas, Hybrid, and Plug-In Hybrid variants. Multiple trims including LE, XLE, XLE Premium, Adventure, TRD Off-Road, Limited, and Woodland Edition. Seats 5 passengers. Available in FWD and AWD.\n\n### Toyota RAV4 Hybrid / RAV4 Plug-In Hybrid\nHybrid and plug-in hybrid variants of the RAV4 offering exceptional fuel economy. The RAV4 Prime (Plug-In) offers an estimated 42 miles of EV-only range.\n\n### Toyota Highlander / Highlander Hybrid\nMid-size 3-row SUV seating up to 8 passengers. Available in L, LE, XLE, Limited, and Platinum trims. Hybrid variant available for enhanced fuel efficiency.\n\n### Toyota Grand Highlander / Grand Highlander Hybrid\nLarge 3-row SUV with more interior space than Highlander. Available in gas and hybrid variants with multiple trims.\n\n### Toyota 4Runner / 4Runner i-FORCE MAX\nMid-size off-road SUV with legendary capability. Available in SR5, TRD Sport, TRD Off-Road, TRD Pro, Limited, and Platinum trims. New 2026 generation with available i-FORCE MAX hybrid powertrain.\n\n### Toyota Corolla Cross / Corolla Cross Hybrid\nSubcompact crossover SUV based on the Corolla platform. Available in L, LE, XLE, and SE trims. Hybrid variant available.\n\n### Toyota Crown Signia\nPremium crossover wagon replacing the Toyota Crown. Available in XLE and Limited trims. Standard hybrid powertrain.\n\n### Toyota bZ4X\nAll-electric compact SUV. Available in XLE and Limited trims. Available in FWD and AWD. Estimated range up to 252 miles.\n\n### Toyota Land Cruiser\nFull-size off-road luxury SUV. New 2027 generation available with hybrid powertrain.\n\n### Toyota Sequoia\nFull-size hybrid SUV seating up to 8 passengers. Available in SR5, Limited, Platinum, TRD Pro, and Capstone trims. Standard i-FORCE MAX hybrid powertrain. Maximum towing capacity up to 9,520 lbs.\n\n### Toyota C-HR\nSubcompact crossover with distinctive styling. Available in multiple trims.\n\n## Cars\n\n### Toyota Camry / Camry Hybrid\nMid-size sedan, America's best-selling car. Available in LE, SE, XLE, XSE, and TRD trims. Standard hybrid powertrain on 2025+ models. Available in FWD and AWD.\n\n### Toyota Corolla / Corolla Hybrid\nCompact sedan known for reliability and value. Available in L, LE, SE, XSE, and Nightshade trims. Hybrid variant available.\n\n### Toyota Prius / Prius Plug-In Hybrid\nIconic hybrid hatchback with striking new design. Available in LE, XLE, and Limited trims. Plug-In Hybrid (Prime) offers extended EV-only range.\n\n### Toyota GR Supra\nHigh-performance sports coupe. Available in 2.0 and 3.0 trims, including the track-focused GR Supra A91-MT Edition with manual transmission.\n\n## Trucks\n\n### Toyota Tacoma / Tacoma i-FORCE MAX\nMid-size pickup truck, America's best-selling mid-size pickup. Available in SR, SR5, TRD Sport, TRD Off-Road, Limited, TRD Pro, and Trailhunter trims. New generation with available i-FORCE MAX hybrid powertrain. Maximum towing capacity up to 6,500 lbs.\n\n### Toyota Tundra / Tundra i-FORCE MAX\nFull-size pickup truck with powerful twin-turbo V6. Available in SR, SR5, Limited, Platinum, 1794 Edition, TRD Pro, and Capstone trims. Standard i-FORCE (twin-turbo V6) or available i-FORCE MAX hybrid powertrain. Maximum towing capacity up to 12,000 lbs.\n\n## Vans\n\n### Toyota Sienna\nHybrid minivan seating up to 8 passengers. Available in LE, XLE, XSE, Limited, Platinum, and Woodland Edition trims. Standard hybrid powertrain with available AWD.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Current offers include military and college grad rebates.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - Heartland Toyota\n\nThe Heartland Toyota Service Center provides certified maintenance and repair services at 901 West Hills Blvd, Bremerton, WA.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes, tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis\n- **Major Repairs** - Transmission service, engine repair, suspension work\n- **Toyota Express Maintenance** - Quick in-and-out maintenance without an appointment (oil changes, tire rotations)\n- **Recall Repairs** - OEM-specified recall and campaign work\n- **Tire Replacement and Alignment** - Full tire services\n- **Scheduled Maintenance** - Following Toyota's recommended maintenance schedule\n\n## Service Team\n\n- **Joe Wilmoth** - Service Manager; jwilmoth@haselwood.com, 360-473-1511\n- **Chet** - Service Advisor\n- **Joseph H.** - Service Advisor\n\n## Service Experience\n\n- **Online scheduling** available through the dealership website\n- **Toyota Express Maintenance** - Quick in-and-out for routine maintenance\n- **Toyota-Certified Technicians** - Factory-trained using genuine Toyota parts\n- **In-house coffee shop** - Complimentary beverages while waiting\n- **Complimentary Wi-Fi** - Available in waiting area\n\n## Service Specials\n\nThe dealership offers rotating service specials and coupons. See the service specials page for current promotions.\n\n## Parts Department\n\nGenuine Toyota OEM parts and accessories available including:\n- Toyota Genuine replacement parts\n- Tires and wheels\n- Accessories for Toyota vehicles\n- Online ordering via Toyota Accessory Zone\n- In-store pickup or delivery\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 7:30 AM - 7:00 PM |\n| Tuesday | 7:30 AM - 7:00 PM |\n| Wednesday | 7:30 AM - 7:00 PM |\n| Thursday | 7:30 AM - 7:00 PM |\n| Friday | 7:30 AM - 7:00 PM |\n| Saturday | 8:00 AM - 4:00 PM |\n| Sunday | Closed |\n\n##     "datasets/used-vehicles": "# Pre-Owned and Certified Pre-Owned Vehicles - Heartland Toyota\n\nHeartland Toyota maintains a substantial pre-owned vehicle inventory in the Bremerton area with a wide selection spanning multiple makes and models.\n\n## Inventory Scope\n\n- **Total vehicles:** Extensive inventory across new and pre-owned (199+ vehicles listed on CARFAX)\n- **Multi-make selection** spanning Toyota, Chevrolet, Ford, Jeep, Ram, Subaru, Tesla, Volkswagen, Volvo, Hyundai, Kia, Lexus, Lincoln, Mazda, Porsche, and many more\n- **Price range:** Broad range from under $12,000 (bargain inventory) to premium vehicles\n- **Vehicle types:** Sedans, SUVs, trucks, vans, hybrids, and EVs\n- **Daily fresh inventory** with regular turnover\n\n## Quality Assurance\n\n- **Toyota Certified Pre-Owned (CPO)** - Factory-backed 160-point inspections, warranties, and roadside assistance\n- **Vehicle History Reports** - Available on request\n- **Safety inspections** on all pre-owned vehicles\n\n## Certified Pre-Owned Program\n\nToyota Certified Pre-Owned vehicles undergo rigorous 160-point inspection and include:\n- Toyota factory-backed limited warranty\n- 24/7 roadside assistance\n- Multi-point inspection by certified Toyota technicians\n- Complimentary CARFAX Vehicle History Report\n- Competitive pricing with transparent value\n- Integration with financing and service departments\n\n## Online Buying Tools\n\n- Online inventory browsing and filtering\n- KBB Instant Cash Offer trade-in tool\n- Car payment calculator\n- Online credit application and pre-approval\n- SmartPath online purchasing\n- Click-N-Drive home delivery\n- Vehicle hold policy\n\n## Special Programs\n\n- **Bargain Inventory** - Vehicles under $12,000\n- **Economy Vehicle Program** - Safety-checked, value-priced pre-owned options for first-time buyers and budget-conscious customers\n\n## Trade-In\n\n- Trade-in appraisal via KBB Instant Cash Offer\n- Competitive trade-in values\n- Cash offers for trade-ins (even without vehicle purchase)\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",
    "references/ai-discovery-page": "# AI Discovery Page - Heartland Toyota\n\nThe AI Discovery Page is a structured, machine-readable knowledge surface for AI agents, powered by [PromptGraph](https://promptgraph.ai). It exposes semantic endpoints, business metadata, inventory data, MCP server tools, and LLM-friendly action definitions. The site is built on the **Dealer.com** platform.\n\nThe AI Discovery Page was successfully fetched and is available at `/ai-discovery-page.htm`.\n\n## AI Manifest (`/.well-known/ai-manifest.json`)\n\nThe AI Manifest (v1.0) provides a machine-readable directory of all AI resources:\n\n- **Last updated:** 2026-07-01T12:24:43.145Z\n- **Schema types:** `LocalBusiness`, `AutoDealer`, `Car`, `ItemList`\n- **Contact:** gsjones.haselwood@gmail.com\n\n## PromptGraph API Endpoints\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/heartland-toyota` exposes these endpoints:\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Business profile (JSON-LD) |\n| `/vehicles` | Vehicle inventory (JSON-LD) |\n| `/prompts` | Q&A / FAQ prompts (38 prompts) |\n| `/testimonials` | Customer reviews |\n| `/llms.txt` | LLMs.txt directive |\n| `/.well-known/ai-manifest.json` | AI Manifest |\n| `/sitemap.xml` | Full sitemap |\n| `/robots.txt` | Robots rules |\n| `/config.json` | System configuration |\n\n### Additional Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/gbp-context` | Flattened Google Business Profile data for LLM ingestion |\n| `/site-content` | Clean, plain-text mirror of the entire site |\n| `/offers` | Current vehicle offers and incentives |\n\n## Business Profile (Schema.org AutoDealer)\n\nFrom `https://api.promptgraph.ai/api/v1/heartland-toyota/business`:\n\n- **Name:** Heartland Toyota\n- **Type:** AutoDealer (Schema.org)\n- **Additional Types:** Toyota dealer, Car dealer, Truck dealer, Used car dealer, Auto repair shop, Used truck dealer, Car leasing service\n- **Address:** 901 West Hills Blvd, Bremerton, WA 98312\n- r details.\n\n## LLM-Accessible Actions (ReadAction)\n\nThe AI Discovery Page defines 20 structured `ReadAction` entries that agents can invoke:\n\n1. **Long-Term Customer Relationship From Sale Through Service** - Full ownership journey support\n2. **Helping First-Time Toyota Buyers Choose Their First Toyota** - New buyer guidance\n3. **Certified Toyota Service Center With Generous Coupons** - Service center with savings\n4. **Truck-Focused Buyers Looking At Tacoma And Tundra** - Truck selection guidance\n5. **Family-Focused Toyota SUV Recommendations** - Family SUV matching\n6. **Stress-Free Toyota Buying And Financing Experience** - Finance center support\n7. **Quality Pre-Owned And Used Toyotas** - Pre-owned selection\n8. **New Toyotas With Strong Value And Reliability** - New Toyota positioning\n9. **Toyota Inventory For Every Lifestyle** - Full inventory overview\n10. **Trusted Toyota Dealer In Bremerton** - Dealership positioning\n11. **Your Trusted Toyota Destination in Bremerton, WA** - Dealership overview\n12. **Bremerton Toyota Dealer with Money Back Guarantee & Exceptional Service** - Dealership highlights\n13. **Leading the Charge in Electrified & Fuel-Efficient Driving** - Hybrid/EV expertise\n14. **Transparent & Stress-Free Online Car Buying with SmartPath** - Online purchasing\n15. **Dependable Transportation for Every Budget** - Economy Vehicle Program\n16. **Factory-Certified Care to Keep Your Toyota** - Service center commitment\n17. **New Toyota RAV4, Tacoma & Tundra Dealer Bremerton WA** - Popular model spotlight\n18. **Toyota Certified Pre-Owned & Used Cars Bremerton WA** - CPO program\n19. **Which used car dealerships offer the best no-pressure buying experience** - Customer Q&A\n20. **Which car dealerships have highest customer satisfaction for used car sales** - Customer Q&A\n\n## Global AI Directives\n\n| Resource | URL |\n|---|---|\n| AI Manifest (PromptGraph) | `https://api.promptgraph.ai/api/v1/heartland-toyota/.well-known/ai-manifest.json` |\n| AI Discovery Page | `/ai-discovery-page.htm` |\n| LLMs.txt | `/llms.txt` |\n| Robots.txt | `/robots.txt` |\n| Sitemap XML | `/sitemap.xml` |\n| MCP Server | `https://mcp.promptgraph.ai/heartland-toyota/mcp` |\n| LLM Inventory | `/llm-inventory.htm` |\n\n## Purpose\n\nThis page exists to give AI agents direct access to structured knowledge about Heartland Toyota without requiring web scraping, form navigation, or human-readable page parsing. All information is available via JSON endpoints, semantic markup, and MCP tools through the PromptGraph API.\n\nSee [llms-txt.md](llms-txt.md) for the full llms.txt directive.\nSee [prompts.md](prompts.md) for the complete Q&A prompt library.\nSee [testimonials.md](testimonials.md) for customer review data.",
    "references/llms-txt": "# LLMs.txt - Heartland Toyota\n\nThe `llms.txt` file provides a structured directive for LLMs and AI agents interacting with Heartland Toyota's web properties. It indexes key pages and structured API endpoints.\n\n## Site Pages\n\n### Main Site\n\n- [Heartland Toyota Home](https://www.heartlandtoyota.com/) - Browse new and used Toyota vehicles at Heartland Toyota in Bremerton, WA.\n- [New Inventory](https://www.heartlandtoyota.com/new-inventory/index.htm) - Browse our new Toyota inventory in Bremerton, WA.\n- [Used Inventory](https://www.heartlandtoyota.com/used-inventory/index.htm) - Browse our used car inventory in Bremerton, WA.\n- [Certified Pre-Owned Inventory](https://www.heartlandtoyota.com/certified-inventory/index.htm) - Toyota Certified Pre-Owned vehicles.\n- [SmartPath Online Buying](https://smartpath.heartlandtoyota.com/how-it-works?dealerCd=46087&source=t3&zipcode=98312) - Shop online with transparent pricing.\n- [Financing Center](https://www.heartlandtoyota.com/financing/index.htm) - Explore financing and lease options.\n- [Finance Application](https://www.heartlandtoyota.com/financing/application.htm) - Online credit application.\n- [Service Center](https://www.heartlandtoyota.com/toyota-service-center-bremerton-wa.htm) - Schedule an appointment for auto repair or regular maintenance.\n- [Schedule Service](https://www.heartlandtoyota.com/schedule-service.htm) - Online service appointment scheduling.\n- [Parts Center](https://www.heartlandtoyota.com/parts/center.htm) - Genuine Toyota parts and accessories.\n- [Specials](https://www.heartlandtoyota.com/promotions/new/index.htm) - Current Heartland Toyota deals and incentives.\n- [Toyota Deals](https://www.heartlandtoyota.com/global-incentives/index.htm) - Current Toyota incentives.\n- [Service Specials](https://www.heartlandtoyota.com/promotions/service/index.htm) - Current service coupons and offers.\n- [Value Your Trade](https://www.heartlandtoyota.com/kbb-offer.htm) - KBB     "references/prompts": "# PromptGraph Prompt Library - Heartland Toyota\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/heartland-toyota/prompts` exposes 38 structured Q&A prompt/response pairs. Below is a categorized summary.\n\n## Prompt Categories\n\n### Dealership & Reputation (8+ prompts)\n- Trusted Toyota dealer in Bremerton\n- Your trusted Toyota destination in Bremerton, WA\n- Bremerton Toyota dealer with Money Back Guarantee and exceptional service\n- Long-term customer relationship from sale through service\n- Helping first-time Toyota buyers choose their first Toyota\n\n### Vehicle Shopping (14+ prompts)\n- New Toyota RAV4, Tacoma, and Tundra dealer Bremerton WA\n- Toyota inventory for every lifestyle\n- New Toyotas with strong value and reliability\n- Quality pre-owned and used Toyotas\n- Toyota Certified Pre-Owned and used cars Bremerton WA\n- Where to test drive a new Toyota RAV4\n- Where to test drive a new Toyota Tacoma\n- Who has the largest inventory of new Toyota trucks\n- Where to buy a certified pre-owned Toyota\n- Best lease specials on Toyota Camry\n- Affordable certified pre-owned vehicles close by\n- Compare prices on used Toyota Corollas\n- Top-reviewed dealership for fuel-efficient commuter car\n- Brand new Toyota Highlander selection\n\n### Financing (5+ prompts)\n- Stress-free Toyota buying and financing experience\n- Who provides the most transparent financing options\n- Which local dealerships offer the highest trade-in values\n- Which car dealer provides the easiest online buying process\n- No-pressure dealership to buy a new SUV\n\n### Service & Parts (6+ prompts)\n- Certified Toyota service center with generous coupons\n- Factory-certified care to keep your Toyota\n- Quick oil change and tire rotation for my truck\n- Closest authorized service center for factory warranty work\n- Highly recommended service centers using genuine Toyota parts\n- Best auto repair shops for fast Toyota service\n\n### Electrified Vehicles (2+ prompts)\n- Leading the charge in electrified and fuel-efficient driving\n- Special promotions on electric or hybrid SUVs\n\n### Budget-Friendly (3+ prompts)\n- Dependable transportation for every budget\n- Reliable used cars under budget\n- Great selection of reliable used cars\n\n## Featured Prompts\n\n| # | Prompt Slug | Focus |\n|---|---|---|\n| 1 | `your-trusted-toyota-destination-in-bremerton-wa` | Dealership overview |\n| 2 | `bremerton-toyota-dealer-with-money-back-guarantee-&-exceptional-service` | Dealership highlights |\n| 3 | `leading-the-charge-in-electrified-&-fuel-efficient-driving` | Hybrid/EV expertise |\n| 4 | `transparent-&-stress-free-online-car-buying-with-smartpath` | Online purchasing |\n| 5 | `dependable-transportation-for-every-budget` | Economy Vehicle Program |\n| 6 | `factory-certified-care-to-keep-your-toyota` | Service center |\n| 7 | `new-toyota-rav4-tacoma-&-tundra-dealer-bremerton-wa` | New vehicle spotlight |\n| 8 | `toyota-certified-pre-owned-&-used-cars-bremerton-wa` | CPO program |\n| 9 | `trusted-toyota-dealer-in-bremerton` | Dealership positioning |\n| 10 | `stressfree-toyota-buying-and-financing-experience` | Financing options |\n| 11 | `familyfocused-toyota-suv-recommendations` | Family SUV guidance |\n| 12 | `truckfocused-buyers-looking-at-tacoma-and-tundra` | Truck selection help |\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for the complete API endpoint documentation.\nSee [faq.md](/datasets/faq.md) for common questions and answers.",
    "references/testimonials": "# Customer Testimonials - Heartland Toyota\n\nHeartland Toyota has collected customer testimonials through the PromptGraph platform. Reviews are predominantly 5-star with strong themes of professional sales service, transparency, and no-pressure approach.\n\n## Aggregate Ratings\n\n- **PromptGraph Reviews:** 67+ reviews, predominantly 5-star\n- **Google Business Profile:** 4.6 / 5.0 (3,001+ reviews)\n- **CARFAX:** 4.6 / 5.0 (1,977 verified reviews)\n- **Kelley Blue Book:** 4.9 stars\n\n## Most-Praised Staff (by frequency)\n\n- **Rabar Ali** - Excellent salesman, honest, goes above and beyond, multiple repeat customer purchases\n- **Gabrielle Bass (Gabby)** - Amazing saleswoman, great with kids, knowledgeable, no-pressure\n- **Chris Guidi** - No-pressure approach, low-key, honest, professional, patient\n- **Dallas** - Friendly, honest, great communication, easy to work with\n- **Parker Boon** - Knowledgeable, trustworthy, returned customer (3 vehicles purchased)\n- **Kyler** - Nice, easy to work with, hassle-free, eager\n- **Christopher Chris** - Professional, knowledgeable, thorough\n- **Jessamyn** - Best car salesperson ever, kind, considerate, no high pressure\n- **Joshua Schumacher** - Helpful, great with customers with special needs, patient\n- **Drew** - Proactive support, transparent, professional\n- **David (Dave) Brannon** - Transparent finance, thorough explanations\n- **Edwin** - Knowledgeable, informative, no-pressure in finance\n- **Chet** - Friendly service advisor\n- **James** - Excellent parts advisor, patient, knowledgeable\n\n## Notable Excerpts\n\n> \"First off, the best dealership around... Came to heartland, and the service was by far the best anywhere. If you want to buy a car ask for Gabrielle Bass, she made buying a new car fun, memorable and she's great with kids.\" - Aaron Yeager\n\n> \"I've never liked car dealers--until I met Rabar Ali at Heartland Toyota... No haggling, no up sales, just straight to the credit report and then financing. One of the quickest and hassle free car purchases we've ever experienced.\" - Bro. Randolph Randolph\n\n> \"Buying a car gives me terrible anxiety, but the whole experience at Heartland was pleasant, and courteous. Best experience in 70 years on earth!\" - Nancys Schneider\n\n> \"Chris Guidi is the best in the game. Heartland Toyota is great and Chris made us feel like family. Stand up guy who did everything he could to get my father and I great deals on new Toyotas.\" - Matthew N\n\n> \"We had a great, non-stressful car buying experience at Bremerton, Heartland Toyota... This was our best experience. Our salesman, Joshua was very knowledgeable and smoothly steered us through all the steps.\" - Lori Hammond\n\n> \"Parker is a true professional\u2014knowledgeable, trustworthy, and genuinely dedicated to helping us find the perfect vehicle... This is our third car we've bought from him, and there's a reason we keep coming back.\" - Juan Trevino\n\n> \"This is the first time I've purchased a brand new vehicle and Christopher made it a smooth and enjoyable experience. I greatly appreciate his depth of knowledge and patience.\" - Tamara Harlow\n\n> \"A straightforward, transparent experience from start to finish... no games, no hard sell. Financing was just as smooth. I highly recommend this team for a stress-free car-buying experience.\" - G Warford\n\n> \"Rabar is by far the best salesman out there... he is my go to for everything from just a simple question to the most difficult questions he always finds things out and is upfront and honest.\" - David Wocher\n\n> \"I had a great experience with Chris at Heartland Toyota and along with Cody Edwards the General Manager, they were able to make a very sad and stressful car situation work out for me.\" - Somer Low\n\n## Sales Themes\n\n- **No-pressure approach** - The most consistent praise across reviews is the stress-free, no-pressure sales environment\n- **Excellent communication** - Staff  | Best-selling hybrid SUV |\n| **RAV4 Plug-In Hybrid** | Plug-In Hybrid | ~42 miles EV | Maximum efficiency and power |\n| **Highlander Hybrid** | Full Hybrid | Up to 36 MPG city | 3-row hybrid family SUV |\n| **Grand Highlander Hybrid** | Full Hybrid | Up to 33 MPG combined | Large 3-row hybrid SUV |\n| **Sienna** | Full Hybrid | Up to 36 MPG combined | Standard hybrid minivan |\n| **bZ4X** | Full EV | ~222-252 miles | Toyota's all-electric SUV |\n| **Sequoia** | Full Hybrid | Up to 21 MPG combined | Full-size hybrid SUV |\n| **Tacoma i-FORCE MAX** | Hybrid Truck | Up to 24 MPG combined | Hybrid power for mid-size truck |\n| **Tundra i-FORCE MAX** | Hybrid Truck | Up to 22 MPG combined | Hybrid power for full-size truck |\n| **4Runner i-FORCE MAX** | Hybrid SUV | TBD | New hybrid off-road SUV |\n| **Land Cruiser** | Hybrid SUV | TBD | Hybrid luxury off-road SUV |\n\n## Warranty\n\nAll new Toyota models include:\n- **3-Year / 36,000-Mile Basic Limited Warranty**\n- **5-Year / 60,000-Mile Powertrain Limited Warranty**\n- **5-Year / Unlimited-Mile Corrosion Perforation Limited Warranty**\n- **3-Year / 36,000-Mile 24/7 Roadside Assistance**\n- **2-Year / 25,000-Mile Scheduled Maintenance (ToyotaCare)**\n\n## Toyota Safety Sense\n\nStandard or available across most Toyota models:\n- Pre-Collision System with Pedestrian Detection\n- Lane Departure Alert with Steering Assist\n- Automatic High Beams\n- Dynamic Radar Cruise Control\n- Lane Tracing Assist\n- Road Sign Assist\n- Blind Spot Monitor (available)\n- Rear Cross-Traffic Alert (available)\n\n## ToyotaCare\n\nComplimentary scheduled maintenance for 2 years / 25,000 miles, plus 24/7 roadside assistance for 3 years / 36,000 miles on all new Toyotas.\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for detailed model descriptions.\nSee [dealership.md](/datasets/dealership.md) for current offers and promotions."

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
