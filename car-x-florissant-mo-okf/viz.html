utine Maintenance\n\nEssential for your vehicle's health, Car-X offers full-service oil changes covering conventional, synthetic blend, and full synthetic options. Plus, take advantage of monthly specials to save.\n\n- Oil changes (conventional, synthetic blend, full synthetic)\n- Fluid checks and flushes\n- Filter replacement (air, cabin, fuel)\n- Tire rotations\n- Battery checks\n- Factory-scheduled services\n- Multi-point vehicle inspection\n\n## AC & Heating\n\nBecause nobody likes being sweaty in summer or frozen in winter! Car-X ensures your climate control is on point.\n\n- AC performance check\n- Refrigerant recharge\n- AC compressor replacement\n- Heating system diagnosis\n\n## Lights, Wipers & Accessories\n\nSee and be seen with Car-X's lighting, wiper, and accessory services.\n\n- Headlight restoration\n- Wiper blade replacement\n- Bulb replacement\n- Accessory installation\n\n## Pre-Owned Vehicle Inspections\n\nBefore sealing the deal on a used car, Car-X offers thorough pre-owned vehicle inspections covering the engine, suspension, and all critical systems.\n\n## Fleet Services\n\nCar-X Tire & Auto Fleet Services keeps your business wheels turning with comprehensive commercial vehicle maintenance. Whether you manage delivery vans, construction trucks, or company cars, Car-X minimizes downtime and protects your bottom line.\n\n- **Rapid Repairs:** Certified technicians get vehicles serviced and back to work quickly\n- **Customized Maintenance Plans:** Routines designed for your specific business needs\n- **Complete Vehicle Care:** Brakes, tires, engine diagnostics, A/C, and more from one trusted partner\n- **No-Surprise Billing:** Straightforward estimates before any work begins\n- **Tech-Powered Inspections:** Digital vehicle check-ups with photos and easy-to-understand reports\n- **Missouri State Safety Inspections:** Free inspections to keep your fleet compliant\n\n## Financing\n\nCar-X Tire & Auto makes necessary auto repairs and maintenance affordab ta access\n2. Understand the business profile and service offerings\n3. Access AI-optimized descriptions for each service category\n4. Link to specific service landing pages for detailed information",

ce.\n\n## Tires & Wheels (12 prompts)\n\nTopics include tire mounting, balancing, alignment, TPMS, and wheel repair.\n\n## Maintenance & Fluids (14 prompts)\n\nTopics include oil changes, fluid exchanges, filters, and scheduled maintenance services.\n\n## Exhaust Systems (8 prompts)\n\nTopics include catalytic converters, mufflers, exhaust pipes, and emission systems.\n\n## Other Services (6 prompts)\n\nTopics including pre-owned vehicle inspections, fleet services, and general auto care advice.\n\n## Usage\n\nThese prompts are designed for AI systems to provide accurate, location-specific responses about Car-X services. The PromptGraph API is accessible for integration into chatbots, virtual assistants, and AI-powered customer service platforms.\n\n## AI Discovery Integration\n\nThe Car-X corporate umbrella has an AI Discovery Page at `https://www.carxstl.com/ai-discovery-page` which exposes 16 structured ReadAction entries for specific service landing pages. See [ai-discovery.md](ai-discovery.md) for full details.\n\n### Related ReadAction Topics\n\nThe AI Discovery ReadActions align with the PromptGraph prompt library categories:\n\n| ReadAction | Related Prompt Category |\n|------------|----------------------|\n| Trusted Auto Repair Near Me | Engine & Performance, Brakes & Suspension |\n| Tire Shop Near Me | Tires & Wheels |\n| Brake Repair Services | Brakes & Suspension |\n| Auto Financing Options | Other Services |\n| Fleet Services for Businesses | Other Services |\n| Oil Change and Maintenance | Maintenance & Fluids |\n| Engine Diagnostics and Repair | Engine & Performance, Electrical & Electronics |",

(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
