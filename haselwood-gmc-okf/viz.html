    "datasets/dealership": "# Haselwood GMC\n\nHaselwood GMC is a full-service GMC dealership located at **501 W Hills Blvd #2, Bremerton, WA 98312**, serving drivers throughout Kitsap County and nearby communities including Port Orchard, Silverdale, Poulsbo, and Bainbridge Island.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Sales | (360) 919-2226 |\n| Service | (360) 919-1064 |\n| Parts | (360) 919-2220 |\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 8:00 PM |\n| Wednesday | 9:00 AM - 8:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 8:00 PM |\n| Saturday | 10:00 AM - 7:00 PM |\n| Sunday | 10:00 AM - 7:00 PM |\n\n## Location\n\n- **Address:** 501 W Hills Blvd #2, Bremerton, WA 98312\n\n## New Vehicles\n\nGMC models available include:\n- **Acadia** - Mid-size 3-row SUV, available in multiple trims\n- **Terrain** - Compact SUV, value-oriented and fuel-efficient\n- **Yukon** - Full-size SUV, powerful V8 engine, seating up to 8\n- **Yukon XL** - Extended-length full-size SUV, maximum cargo and passenger space\n- **Canyon** - Mid-size pickup truck, available in AT4 and Denali trims\n- **Sierra 1500** - Full-size light-duty pickup truck, multiple trims including Denali and AT4\n- **Sierra 2500 HD** - Heavy-duty pickup truck, maximum towing capability\n- **Sierra 3500 HD** - Heavy-duty pickup truck, maximum payload capacity\n- **HUMMER EV SUV** - All-electric supertruck SUV, available in 3X and Edition 1\n- **HUMMER EV Pickup** - All-electric supertruck pickup\n- **Sierra EV** - All-electric full-size pickup truck, available in Denali trim\n\n## Services\n\n- **Finance Department** - Loan and lease options, online credit application, trade-in appraisal, GMC Protection plans\n- **Service Center** - GMC-certified technicians, routine maintenance, diagnostics, major repairs, genuine GMC parts, mobile service\n- **Parts Department** - Genuine GMC components, OEM accessories, tires\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, certified pre-owned, CarBravo)\n- Online service scheduling\n- Online credit application and pre-approval\n- Mobile service scheduling\n- Trade-in valuation tool\n- GMC Protection plans\n- My GMC Rewards program\n\n## Staff\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- PromptGraph AI platform data available\n- Google Business Profile connected via OAuth\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Haselwood Auto Group** - Part of the Haselwood family of dealerships\n- **CarBravo** - GM's certified used vehicle program with nationwide inventory\n- **Mobile Service** - Let service come to you\n- **GMC Protection** - Extended service contracts and protection plans\n- **My GMC Rewards** - Earn rewards on eligible service and parts purchases\n- **Super Cruise** - Available on select GMC models\n- **GM Energy** - Home charging solutions for electric vehicles\n- **Lifetime Powertrain Limited Warranty** - Available on select vehicles\n\n## Amenities\n\n- Online scheduling\n- Quiet customer lounge\n- Weekly service specials\n- Free car wash with service\n\n## Affiliations\n\n- Part of the **Haselwood Auto Group**\n- Location at **West Hills Auto Plex**\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform",
    "datasets/faq": "# Frequently Asked Questions - Haselwood GMC\n\n## Inventory\n\n**Q: What new GMC models are available at Haselwood GMC?**\nA: The full GMC lineup including Acadia, Terrain, Yukon, Yukon XL, Canyon, Sierra 1500, Sierra 2500 HD, Sierra 3500 HD, HUMMER EV SUV, HUMMER EV Pickup, and Sierra EV.\n\n**Q: Does Haselwood GMC have a good selection of Certified Pre-Owned GMC trucks and SUVs?**\nA: Yes, Haselwood GMC keeps a great stock of pre-owned and CPO vehicles. Every pre-owned model is offered at a competitive price and thoroughly inspected for quality.\n\n**Q: Does Haselwood GMC have commercial GMC fleet vehicles?**\nA: Yes, Haselwood GMC serves businesses in the Bremerton area by providing commercial GMC fleet vehicles including the Savana Cargo Van.\n\n## Financing\n\n**Q: What financing options are available at Haselwood GMC?**\nA: Traditional loans, leases, and special financing programs. The finance team works with various lenders to find the best terms.\n\n**Q: Does Haselwood GMC work with buyers with bad credit?**\nA: Yes, the finance specialists work with various lenders to help find the right plan regardless of credit situation.\n\n**Q: What are the current lease deals for GMC vehicles?**\nA: Haselwood GMC offers rotating monthly specials, such as low APRs and bonus cash on models like the Sierra 1500 and Terrain.\n\n## Service\n\n**Q: Can I schedule an oil change and tire rotation at Haselwood GMC?**\nA: Absolutely. You can schedule by calling (360) 919-1064 or booking online through their website.\n\n**Q: Does Haselwood GMC have mobile service?**\nA: Yes, Haselwood GMC offers mobile service where technicians come to your home or work for select maintenance.\n\n**Q: Does Haselwood GMC have an express lane for quick oil changes?**\nA: Contact the service department for express service availability.\n\n**Q: Is Haselwood GMC a certified GM warranty repair center?**\nA: Yes, Haselwood GMC specializes in GM certified warranty repairs with factory-trained technicians.\n\n## Dealership\n\n**Q: Where is Haselwood GMC located?**\nA: 501 W Hills Blvd #2, Bremerton, WA 98312, serving Kitsap County communities.\n\n**Q: What are the sales and service hours?**\nA: Sales is open Monday-Saturday from 9:00 AM to 8:00 PM, and Sunday from 10:00 AM to 7:00 PM.\n\n**Q: Does Haselwood GMC buy used cars for cash?**\nA: Yes, Haselwood GMC will appraise and make an offer on your vehicle even if you aren't trading it in for a new one.\n\n**Q: How can I get the best trade-in value for my used truck?**\nA: Bring your vehicle to Haselwood GMC for a physical appraisal. They offer competitive trade-in values and periodically run trade assistance specials.\n\n**Q: What is the Haselwood Auto Group?**\nA: Haselwood GMC is part of the Haselwood Auto Group, a family of dealerships in the Bremerton area.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/financing": "# Financing & Leasing\n\nThe Haselwood GMC Finance Center offers purchase financing and lease programs for new and pre-owned vehicles.\n\n## Financing Options\n\n- **Online Application**: Start the financing process from home\n- **Multiple Lending Partners**: The finance team works with multiple lenders to find competitive rates\n- **Flexible Terms**: Loan and lease solutions for different ownership goals and budgets\n- **GMC Protection Plans**: Extended service contracts available through financing\n\n## Leasing\n\nLeasing is available for customers who prefer lower monthly payments and the option to drive a new vehicle every few years.\n\n## Buying vs. Leasing\n\n| Factor | Buying | Leasing |\n|---|---|---|\n| Monthly Payment | Higher | Lower |\n| Ownership | Own the vehicle at end of term | Return vehicle at end of term |\n| Mileage | Unlimited | Limited by contract |\n| Sales Tax | Paid upfront or rolled into loan | Included in monthly payment |\n\n## Trade-In\n\nOnline valuation tool and in-person appraisal available at the dealership.\n\n## Payment Calculators\n\nEstimate monthly payments using the online payment calculator on the dealership website.\n\n## Contact\n\nContact the finance department at (360) 919-2226 or through the dealership's sales line.\n\nSee [dealership.md](dealership.md) for full business profile and [new-vehicles.md](new-vehicles.md) or [used-vehicles.md](used-vehicles.md) for inventory.",
    "datasets/new-vehicles": "# New GMC Models - Haselwood GMC\n\nHaselwood GMC carries a full lineup of new GMC vehicles. Below is a summary of available models and trims.\n\n## SUVs\n\n### GMC Acadia\nMid-size 3-row SUV seating up to 8 passengers. Available in multiple trims. Powered by a turbocharged engine with 9-speed automatic transmission. Available in FWD and AWD. Modern design with spacious interior and advanced safety features.\n\n### GMC Terrain\nCompact SUV, value-oriented and fuel-efficient. Available in multiple trims including AT4 and Denali. Compact size with impressive cargo versatility and available AWD.\n\n### GMC Yukon\nFull-size SUV with powerful V8 engine options. Seating up to 8 passengers. Available in SLE, SLT, AT4, and Denali trims. Maximum towing capacity. Premium interior materials and advanced technology.\n\n### GMC Yukon XL\nExtended-length full-size SUV offering maximum cargo space behind the third row. Seating up to 8 passengers with generous legroom throughout. Available in Denali and AT4 trims with V8 power.\n\n### GMC HUMMER EV SUV\nAll-electric supertruck SUV. Available in 3X and Edition 1 configurations. Up to 830 hp in 3X trim with CrabWalk and Extract Mode. Approx 300+ miles estimated range. UltraVision underbody cameras.\n\n## Trucks\n\n### GMC Canyon\nMid-size pickup truck available in Elevation, AT4, and Denali trims. Powered by a turbocharged engine. Available in 2WD and 4WD. Off-road capability with AT4 trim featuring Terrain Mode and off-road suspension.\n\n### GMC Sierra 1500\nFull-size light-duty pickup truck. Available in Pro, SLE, Elevation, SLT, AT4, and Denali trims. Multiple engine options including turbocharged 4-cylinder, V8, and Duramax diesel. Available in 2WD and 4WD. MultiPro Tailgate available on select trims.\n\n### GMC Sierra 2500 HD\nHeavy-duty pickup truck with maximum towing capability. Available in Pro, SLE, SLT, AT4, and Denali trims. Powerful gas and diesel engine options. Designed for serious work and towing.\n\n### GMC Sierra 3500 HD\nHeavy-duty pickup truck with maximum payload capacity. Available in Pro, SLE, SLT, AT4, and Denali trims. Dual rear wheel configuration available. Class-leading towing and payload specs.\n\n### GMC HUMMER EV Pickup\nAll-electric supertruck pickup. Available in 2X and 3X trims. Up to 830 hp with Watts to Freedom mode. CrabWalk diagonal driving capability. Approx 300+ miles estimated range. Available with adaptive air suspension.\n\n### GMC Sierra EV\nAll-electric full-size pickup truck. Available in Denali trim. Up to 440 miles estimated range. MultiPro Tailgate and MidGate for flexible cargo configurations. Available with Super Cruise hands-free driving.\n\n## Commercial Vehicles\n\n- **GMC Savana** - Full-size cargo van, ideal for commercial fleet use\n- **GMC Canyon Chassis Cab** - Commercial mid-size truck platform\n\n## Electric & Hybrid Options\n\n- **GMC HUMMER EV SUV** - Full EV, up to 830 hp, CrabWalk capability\n- **GMC HUMMER EV Pickup** - Full EV, Watts to Freedom mode\n- **GMC Sierra EV** - Full EV, up to 440 miles estimated range\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Contact the dealership for current offers.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - Haselwood GMC\n\nThe Haselwood GMC Service Center provides certified maintenance and repair services at 501 W Hills Blvd, Bremerton, WA.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes, tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis\n- **Major Repairs** - Transmission service, engine repair, suspension work\n- **Mobile Service** - Let the service team come to you for select maintenance\n- **Recall Repairs** - OEM-specified recall and campaign work\n- **Tire Replacement and Alignment** - Full tire services\n- **Battery Services** - Battery testing, replacement, and maintenance\n- **Scheduled Maintenance** - Following GMC's recommended maintenance schedule\n\n## Service Team\n\n- **Bill Baker** - Service Manager\n- Factory-trained GMC certified technicians\n- Dedicated service advisors\n\n## Service Experience\n\n- **Online scheduling** available through the dealership website\n- **Mobile Service** - Schedule for on-site maintenance at home or work\n- **Certified GMC Technicians** - Factory-trained using genuine GMC parts\n- **Quiet Customer Lounge** - Comfortable waiting area\n- **Free Car Wash** - With every service visit\n- **Weekly Service Specials** - Rotating promotions and coupons\n\n## Service Specials\n\nThe dealership offers rotating service specials and coupons. See the service specials page for current promotions.\n\n## Parts Department\n\nGenuine GMC OEM parts and accessories available including:\n- GMC Genuine replacement parts\n- OEM accessories (floor liners, cargo mats, lift kits)\n- Tires and wheels\n- Order parts online or stop by\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 8:00 PM |\n| Wednesday | 9:00 AM - 8:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 8:00 PM |\n| Saturday | 10:00 AM - 7:00 PM |\n| Sunday | 10:00 AM -     "datasets/staff": "# Staff Directory - Haselwood GMC\n\nStaff directory compiled from the dealership website.\n\n## Management\n\n- **Josh Kolbas** - General Manager\n- **Ashkan Morshedi** - General Sales Manager\n- **Mike Lidstrom** - Used Car Manager\n\n## Finance Department\n\n- **Brandon Mayfield** - Finance Director\n\n## Sales Department\n\n- **New Car Manager** - New Car Manager\n\n## Service Department\n\n- **Bill Baker** - Service Manager\n\n## Parts Department\n\n- **Amanda Campbell** - Parts Manager\n\n## Quality Assurance\n\n- **Chloe Mange** - Quality Assurance Manager\n\n## Staff Phone Numbers\n\n| Staff Member | Position | Phone |\n|---|---|---|\n| Josh Kolbas | General Manager | (360) 473-1402 |\n| Ashkan Morshedi | General Sales Manager | (360) 616-5000 |\n| Mike Lidstrom | Used Car Manager | (360) 616-5000 |\n| Brandon Mayfield | Finance Director | (360) 616-5000 |\n| Bill Baker | Service Manager | (360) 473-1512 |\n| Amanda Campbell | Parts Manager | (360) 473-1562 |\n| Chloe Mange | Quality Assurance Manager | (360) 473-1642 |\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews referencing specific staff members.",
    "datasets/used-vehicles": "# Pre-Owned and Certified Pre-Owned Vehicles - Haselwood GMC\n\nHaselwood GMC maintains a substantial pre-owned vehicle inventory in the Bremerton area with a wide selection spanning multiple makes and models.\n\n## Inventory Scope\n\n- **Total vehicles:** Extensive inventory across new and pre-owned\n- **Multi-make selection** spanning GMC, Chevrolet, Buick, Cadillac, Ford, Toyota, Honda, Hyundai, Kia, Jeep, Ram, Audi, Subaru, Nissan, and more\n- **Price range:** Broad range from under $10,000 to premium vehicles\n- **Vehicle types:** Sedans, SUVs, trucks, vans, and coupes\n- **Daily fresh inventory** with regular turnover\n- **CarBravo** - GM's certified used vehicle marketplace with nationwide inventory search\n\n## Quality Assurance\n\n- **Thorough Inspection** - All pre-owned vehicles inspected by certified technicians\n- **GM Certified Pre-Owned** - Factory-backed inspections and warranties\n- **Vehicle Service Contracts** - Available through GMC Protection\n- **Carfax History Reports** - Available on request\n\n## Certified Pre-Owned Program\n\nGM Certified Pre-Owned vehicles undergo rigorous inspection and include:\n- GM factory-backed warranty\n- 24/7 roadside assistance\n- Multi-point inspection by certified technicians\n- Competitive pricing with transparent value\n- Integration with financing and service departments\n\n## Online Buying Tools\n\n- Online inventory browsing and filtering\n- Value Your Trade tool\n- Online credit application and pre-approval\n- Vehicle hold policy\n- CarBravo nationwide inventory search\n\n## Trade-In\n\n- Trade-in appraisal available\n- Cash offers for trade-ins (even without vehicle purchase)\n- Competitive trade-in values\n- KBB Instant Cash Offer available\n\n## CarBravo\n\nCarBravo is GM's certified used vehicle program that offers:\n- Nationwide inventory of GM and non-GM vehicles\n- Multi-point inspection\n- 90-day/4,000-mile limited warranty\n- Flexible return policy\n- Online buying and at-home delivery options\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",

    "references/prompts": "# PromptGraph Prompt Library - Haselwood GMC\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/haselwood-gmc/prompts` exposes 40 structured Q&A prompt/response pairs. Below is a categorized summary.\n\n## Prompt Categories\n\n### Dealership & Reputation (5+ prompts)\n- Top-rated GMC dealer in Kitsap County\n- Find a reliable GMC dealership in Bremerton\n- Dealership hours and location inquiries\n- Service center ratings\n\n### Vehicle Shopping (15+ prompts)\n- New GMC models and availability\n- GMC Sierra 1500 inventory for towing\n- GMC Acadia family SUV inquiries\n- GMC Yukon XL passenger space for large families\n- GMC Canyon off-road capability\n- GMC Yukon test drive scheduling\n- GMC heavy-duty trucks (Sierra 2500 HD, 3500 HD)\n- HUMMER EV availability (SUV and Pickup)\n- Used GMC Terrain under $25,000\n- GMC Certified Pre-Owned program\n- Truck inventory comparisons\n\n### Financing (5+ prompts)\n- Auto financing options including bad credit\n- GMC lease deals in Bremerton\n- Trade-in value comparisons\n- Commercial fleet GMC vehicle inquiries\n\n### Service & Parts (10+ prompts)\n- Oil change and tire rotation scheduling\n- GMC parts department contact\n- OEM GMC accessories (floor liners, cargo mats, lift kits)\n- GM certified warranty repairs\n- Express oil change inquiries\n- GMC Canyon maintenance scheduling\n\n### Buying Experience (5+ prompts)\n- Selling a car to Haselwood for cash\n- Best trade-in value for used trucks\n- Vehicle upgrade program\n\n## Featured Prompts\n\n| # | Prompt Slug | Focus |\n|---|---|---|\n| 1 | `haselwood-gmc-parts-department` | Parts department contact |\n| 2 | `sell-car-to-haselwood` | Cash offers for used cars |\n| 3 | `gmc-yukon-xl-passenger-space` | Yukon XL family seating |\n| 4 | `gmc-certified-pre-owned` | CPO program |\n| 5 | `commercial-fleet-gmc-vehicles` | Fleet vehicles |\n| 6 | `top-rated-gmc-dealer-wa` | Dealership reputation |\n| 7 | `gmc-lease-deals-bremerton` | Lease specials |\n| 8 | `hummer-ev-availability` | HUMMER EV inquiries |\n| 9 | `gmc-acadia-family-suv` | Acadia 3-row SUV |\n| 10 | `oem-gmc-accessories` | OEM accessories |\n| 11 | `gmc-canyon-off-road` | Canyon capability |\n| 12 | `gmc-heavy-duty-trucks` | Sierra HD trucks |\n| 13 | `gmc-trade-in-value` | Trade-in appraisal |\n| 14 | `test-drive-gmc-yukon` | Yukon test drive |\n| 15 | `haselwood-gmc-financing` | Financing options |\n| 16 | `haselwood-gmc-hours` | Dealership hours |\n| 17 | `haselwood-gmc-service-center` | Service scheduling |\n| 18 | `gmc-sierra-1500-inventory` | Sierra 1500 availability |\n| 19 | `find-local-gmc-dealer` | Dealership location |\n| 20 | `used-gmc-terrain-bremerton` | Used Terrain search |\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for the complete API endpoint documentation.\nSee [faq.md](/datasets/faq.md) for common questions and answers.",
    "references/testimonials": "# Customer Testimonials - Haselwood GMC\n\n## Aggregate Ratings\n\n- **PromptGraph API:** Testimonials data available via PromptGraph endpoint\n- **Google Business Profile:** Connected via OAuth, GBP data synced as of 2026-05-26\n\n## PromptGraph Testimonials Collection\n\nThe PromptGraph testimonials endpoint returned an empty collection at the time of fetching. Customer reviews are available through the Google Business Profile context endpoint.\n\n## Google Business Profile Context\n\nThe dealership is connected to Google Business Profile via OAuth with synced fields including name, description, category, address, phone, website, and hours.\n\n## Review Themes (from site content)\n\n- **Top-rated service** - Haselwood GMC is recognized as a highly-rated dealership in Kitsap County\n- **Seamless car buying** - Customers praise seamless buying experiences\n- **Superb service department** - The service department is noted for exceptional customer care\n\nSee [staff.md](/datasets/staff.md) for the full staff directory.",
    "tables/model-comparison": "# GMC Model Lineup Comparison - Haselwood GMC\n\n## Model Overview\n\n| Model | Body Type | Passengers | Drivetrain | Starting MSRP Tier | Key Trims |\n|---|---|---|---|---|---|\n| **Terrain** | Compact SUV | 5 | FWD / AWD | Value | Elevation, AT4, Denali |\n| **Acadia** | Mid-size 3-Row SUV | 7-8 | FWD / AWD | Mid-range | Elevation, AT4, Denali |\n| **Yukon** | Full-size SUV | 7-8 | RWD / 4WD | Premium | SLE, SLT, AT4, Denali |\n| **Yukon XL** | Extended Full-size SUV | 7-8 | RWD / 4WD | Premium | SLE, SLT, AT4, Denali |\n| **Canyon** | Mid-size Pickup | 5 | RWD / 4WD | Mid-range | Elevation, AT4, Denali |\n| **Sierra 1500** | Full-size Pickup | 5-6 | RWD / 4WD | Mid-range | Pro, SLE, Elevation, SLT, AT4, Denali |\n| **Sierra 2500 HD** | Heavy-Duty Pickup | 5-6 | RWD / 4WD | Premium | Pro, SLE, SLT, AT4, Denali |\n| **Sierra 3500 HD** | Heavy-Duty Pickup | 5-6 | RWD / 4WD | Premium | Pro, SLE, SLT, AT4, Denali |\n| **HUMMER EV SUV** | Full-size EV SUV | 5 | e-4WD | Premium | 3X, Edition 1 |\n| **HUMMER EV Pickup** | Full-size EV Pickup | 5 | e-4WD | Premium | 2X, 3X, Edition 1 |\n| **Sierra EV** | Full-size EV Pickup | 5 | e-4WD | Premium | Denali |\n\n## Key Feature Comparison\n\n| Feature | Terrain | Acadia | Yukon | Canyon | Sierra 1500 | Sierra 2500 HD | Sierra 3500 HD |\n|---|---|---|---|---|---|---|---|\n| Engine | 1.5L Turbo | 2.5L Turbo | 5.3L/6.2L V8 | 2.7L Turbo | 2.7L Turbo/5.3L V8/6.2L V8/3.0L Diesel | 6.6L V8 Gas/6.6L V8 Diesel | 6.6L V8 Gas/6.6L V8 Diesel |\n| Horsepower | ~175 hp | ~328 hp | ~355-420 hp | ~310 hp | ~310-420 hp | ~401-470 hp | ~401-470 hp |\n| AWD/4WD Available | Yes | Yes | Yes | Yes | Yes | Yes | Yes |\n| 3rd Row | No | Yes | Yes | No | No | No | No |\n| Towing (max) | 1,500 lbs | 5,000 lbs | 8,400 lbs | 7,700 lbs | 13,300 lbs | 22,500 lbs | 36,000 lbs |\n| MultiPro Tailgate | No | No | No | No | Available | Available | Available |\n| Super Cruise Available | No | Yes | Yes | No | Yes | Yes | Yes |\n\n## Electric Models\n\n| Model | Type | Horsepower | Drive | Key Features |\n|---|---|---|---|---|\n| **HUMMER EV SUV** | Full EV | Up to 830 hp | e-4WD | CrabWalk, Extract Mode, UltraVision cameras, ~300 mi range |\n| **HUMMER EV Pickup** | Full EV | Up to 830 hp | e-4WD | Watts to Freedom, CrabWalk, adaptive air suspension |\n| **Sierra EV Denali** | Full EV | Up to 754 hp | e-4WD | MultiPro Tailgate, MidGate, up to 440 mi range, Super Cruise |\n\n## Warranty\n\nAll new GMC models include:\n- **3-Year / 36,000-Mile Bumper-to-Bumper Limited Warranty**\n- **5-Year / 60,000-Mile Powertrain Limited Warranty**\n- **5-Year / Unlimited-Mile Corrosion Perforation Limited Warranty**\n- **3-Year / 36,000-Mile Roadside Assistance**\n- **2-Year / 24,000-Mile Scheduled Maintenance**\n\n## GMC Safety Features\n\nAvailable across most GMC models:\n- Automatic Emergency Braking\n- Forward Collision Alert\n- Lane Keep Assist with Lane Departure Warning\n- Following Distance Indicator\n- IntelliBeam headlamps\n- Rear Cross Traffic Alert\n- Blind Zone Steering Assist\n- HD Surround Vision\n- Trailer Side Blind Zone Alert\n\n## GMC Technology\n\n- **Super Cruise** - Hands-free driving on compatible highways (available on Acadia, Yukon, Sierra 1500, Sierra EV)\n- **MultiPro Tailgate** - Six-function tailgate (Sierra models)\n- **ProGrade Trailering System** - Advanced trailering technology\n- **Google Built-In** - Google Assistant, Google Maps, Google Play\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for detailed model descriptions.\nSee [dealership.md](/datasets/dealership.md) for current offers and promotions."

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
