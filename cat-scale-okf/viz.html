<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>cat-scale - OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }
main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty { text-align: center; margin-top: 40px; }
.detail-header { margin-bottom: 12px; }
.detail-header h1 { font-size: 18px; margin: 4px 0 2px; font-weight: 600; }
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt { color: #64748b; font-weight: 500; }
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }
.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}
hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }
#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 { font-size: 16px; margin: 18px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #e2e8f0; }
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: ui-monospace, "SF Mono", Consolas, monospace; }
#detail-body pre { background: #0f172a; color: #e2e8f0; padding: 10px 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td { border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px; }
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }
#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }
</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>
<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>
<script>
window.BUNDLE_NAME = "cat-scale";
window.BUNDLE = {
  "nodes": [
    {
      "data": {
        "id": "datasets/cat-scale-company",
        "label": "CAT Scale Company",
        "type": "Organization",
        "description": "World's leading truck scale network providing guaranteed accurate certified weights at over 2,275 locations across the United States and Canada, founded in 1977 and headquartered in Walcott, Iowa.",
        "resource": "https://www.catscale.com/",
        "tags": [],
        "color": "#8b5cf6",
        "size": 29
      }
    },
    {
      "data": {
        "id": "references/cat-scale-website",
        "label": "CAT Scale Company Official Website",
        "type": "Website",
        "description": "Official CAT Scale Company website featuring scale locator, Weigh My Truck app information, company history, and industry news for professional truck drivers.",
        "resource": "https://www.catscale.com/",
        "tags": [],
        "color": "#10b981",
        "size": 29
      }
    },
    {
      "data": {
        "id": "references/weigh-my-truck",
        "label": "Weigh My Truck App",
        "type": "Mobile Application",
        "description": "Official mobile application from CAT Scale Company allowing drivers to weigh their truck, pay via smartphone, and receive emailed PDF scale tickets without leaving the cab.",
        "resource": "https://weighmytruck.com/",
        "tags": [],
        "color": "#10b981",
        "size": 26
      }
    },
    {
      "data": {
        "id": "tables/products-services",
        "label": "CAT Scale Products and Services",
        "type": "Comparison Matrix",
        "description": "Comparison of CAT Scale products and services including weighing service, mobile apps, and fleet solutions.",
        "resource": "",
        "tags": [],
        "color": "#3b82f6",
        "size": 29
      }
    }
  ],
  "edges": [],
  "bodies": {
    "datasets/cat-scale-company": "# CAT Scale Company\n\nCAT Scale Company is the world's leading truck scale network, providing guaranteed accurate certified weights at over 2,275 locations across the United States and Canada. Founded in 1977 by truckstop entrepreneur Bill Moon, the company is headquartered in Walcott, Iowa, and operates as part of the Iowa 80 Group.\n\n## History\n\nBill Moon installed the first CAT Scale in 1977 in South Holland, Illinois, revolutionizing the trucking industry with the first fully automated, full-length platform scale. By 1988 there were 28 CAT Scales in operation; the company began rapid expansion thereafter. The 1,500th scale opened in 2014 at a Love's Country Store in Springville, Utah. The network has since grown to over 2,275 locations.\n\n## Products\n\n- **CAT Scale Weighing Service** \u2014 Certified, accurate weighing of trucks and trailers at automated locations nationwide.\n- **Weigh My Truck App** \u2014 Mobile application allowing drivers to weigh and pay from their smartphone, with emailed PDF scale tickets.\n- **CAT Scale Locator App** \u2014 Mobile app to find nearby CAT Scale locations, plan routes, and save favorites.\n\n## Guarantee\n\nCAT Scale offers an unconditional guarantee: if a driver weighs legal on a CAT Scale and receives an overweight fine, CAT Scale will either pay the fine or appear in court with the driver as an expert witness to get the fine dismissed.\n\n## Features\n\n- Totally automated full-length platform scales\n- 24/7 availability at all locations\n- Certified accurate weights\n- Network in 47 US states and 8 Canadian provinces\n\n## Parent Company\n\nCAT Scale Company is part of the Iowa 80 Group, the same family that owns Iowa 80 Truckstop, the world's largest truck stop.\n\n## Leadership\n\n- **Delia Moon Meier** \u2014 Senior Vice President\n\n## Contact\n\n- **Address:** 515 Sterling Dr, Walcott, IA 52773\n- **Phone:** (877) 228-7225 / 1-877-CAT-SCALE\n- **Website:** https://www.catscale.com/\n- **Weigh My Truck:** https://weighmytruck.com/",
    "references/cat-scale-website": "# CAT Scale Company Official Website\n\nThe official CAT Scale Company website at [catscale.com](https://www.catscale.com/) serves as the primary online resource for professional truck drivers and fleet operators. It provides access to the CAT Scale locator, Weigh My Truck app, company information, and industry news.\n\n## Features\n\n- **Scale Locator** \u2014 Find the nearest CAT Scale location by address, city, state, or ZIP code; search along a route; browse locations near truck stops.\n- **Weigh My Truck** \u2014 Information and download links for the mobile weighing and payment app.\n- **News** \u2014 Company announcements, partnership news, and industry updates.\n- **About** \u2014 Company history, mission, the unconditional guarantee, and leadership information.\n- **Resources** \u2014 Downloadable longitude/latitude coordinates for GPS devices.\n- **CAT Scale Manager Login** \u2014 Portal for scale site managers.\n\n## Social Media\n\n- [Facebook](http://facebook.com/catscaleco)\n- [Instagram](https://www.instagram.com/cat.scale/)\n- [X / Twitter](https://twitter.com/catscaleco)\n- [YouTube](https://www.youtube.com/@CATScaleCompany)\n- [LinkedIn](https://www.linkedin.com/company/cat-scale-company)\n\n## Related Websites\n\n- [Weigh My Truck](https://weighmytruck.com/) \u2014 Mobile app dedicated site\n- [Iowa 80 Group](https://www.iowa80group.com/) \u2014 Parent company",
    "references/weigh-my-truck": "# Weigh My Truck App\n\nThe Weigh My Truck app is a mobile application developed by CAT Scale Company that allows professional truck drivers to weigh their truck and pay for the transaction entirely from their smartphone without leaving the cab.\n\n## Features\n\n- **In-Cab Weighing** \u2014 Weigh the truck and view results on the mobile device without exiting the vehicle.\n- **Mobile Payment** \u2014 Pay for scale transactions through the app using stored payment methods.\n- **ACH Payment Option** \u2014 Bank transfer payment support added in 2016.\n- **Digital Scale Tickets** \u2014 Emails a locked PDF copy of the scale ticket to specified email addresses.\n- **Account Management** \u2014 Store trucking company name, truck number, trailer number, email preferences, and historical weight transactions.\n- **Fleet Accounts** \u2014 Fleet operators can manage drivers and receive back-end data files.\n\n## Integration\n\nThe Weigh My Truck app and CAT Scale Locator app are available in the Platform Science fleet solutions catalog, allowing fleets to deploy them on commercial vehicle mobile devices alongside other tools.\n\n## Availability\n\nAvailable on iOS and Android devices through their respective app stores.",
    "tables/products-services": "# CAT Scale Products and Services\n\n| Product | Type | Platform | Key Features | Target User |\n|---|---|---|---|---|\n| CAT Scale Weighing Service | Physical Service | 2,275+ locations | Automated full-length platform scales, certified accurate weights, 24/7 availability, unconditional guarantee | Professional truck drivers |\n| Weigh My Truck App | Mobile Application | iOS, Android | In-cab weighing, mobile payment, ACH payments, emailed PDF tickets, account management | Drivers, Fleet operators |\n| CAT Scale Locator App | Mobile Application | iOS, Android | Find nearest scale, route planning, save favorites, GPS coordinates | Professional truck drivers |\n| Fleet Solutions | Enterprise Service | Platform Science integration | Driver management, back-end data files, fleet accounts | Fleet operators |"
  },
  "types": [
    "Comparison Matrix",
    "Mobile Application",
    "Organization",
    "Website"
  ],
  "palette": {
    "Organization": "#8b5cf6",
    "Website": "#10b981",
    "Mobile Application": "#10b981",
    "Comparison Matrix": "#3b82f6"
  }
};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
