    "datasets/dealership": "# Nick Mayer Buick GMC of Dickson\n\n## Location & Contact\n\n- **Address**: 2211 Highway 46 South, Dickson, TN 37055\n- **Sales**: 615-639-0282\n- **Service**: 615-560-1626\n- **Parts**: 615-560-1979\n- **Website**: https://www.nickmayerbuickgmcofdickson.com/\n- **Platform**: DealerOn\n\n## Hours\n\n| Day | Sales & Service Hours |\n|---|---|\n| Monday - Friday | 8:00 AM - 7:00 PM |\n| Saturday | 8:00 AM - 6:00 PM |\n| Sunday | Closed |\n\n## Brands\n\n### Buick Models\n- Enclave - 3-row full-size luxury SUV\n- Envision - Compact luxury SUV\n- Encore GX - Subcompact luxury SUV\n- Envista - Stylish crossover coupe\n\n### GMC Models\n- Sierra 1500 - Full-size light-duty pickup\n- Sierra 2500/3500 - Heavy-duty pickup trucks\n- Yukon / Yukon XL - Full-size luxury SUVs\n- Acadia - Mid-size crossover SUV\n- Terrain - Compact SUV\n- Canyon - Mid-size pickup\n- Hummer EV - All-electric supertruck\n\n## Services\n\n- New vehicle sales and leasing\n- Pre-owned and certified used vehicles (CarBravo)\n- Factory-trained service technicians\n- Genuine OEM parts and accessories\n- Online financing pre-approval\n- Trade-in valuation\n- Vehicle specials and incentives\n\n## CarBravo Certified Used\n\nThe dealership participates in the CarBravo program, offering certified pre-owned Chevrolet, Buick, GMC, and other makes with comprehensive warranty coverage and vehicle history verification.\n\n## Financing\n\nOnline credit applications and financing options are available through the dealership. See [faq.md](faq.md) for financing details or visit the finance department at the dealership.",
    "datasets/faq": "# Frequently Asked Questions\n\n## Inventory & Sales\n\n**Q: What brands does the dealership carry?**\nA: Nick Mayer Buick GMC of Dickson sells new Buick and GMC vehicles plus a wide selection of pre-owned makes and models.\n\n**Q: What is CarBravo?**\nA: CarBravo is GM's certified pre-owned program offering inspected and warranted used vehicles. See [used-vehicles.md](used-vehicles.md) for more details.\n\n**Q: Can I browse inventory online?**\nA: Yes, the dealership website features full searchable inventory with photos, specifications, and vehicle history.\n\n## Financing\n\n**Q: Can I apply for financing online?**\nA: Yes, online credit applications are available on the dealership website.\n\n**Q: What financing options are available?**\nA: Financing, leasing, and special manufacturer APR offers are available. The finance department works with multiple lenders.\n\n## Service\n\n**Q: Do I need an appointment for service?**\nA: Appointments are recommended but walk-in service is available. See [service-center.md](service-center.md) for full details.\n\n**Q: What brands can you service?**\nA: The service center primarily services Buick and GMC vehicles but can work on most makes and models.\n\n## Dealership\n\n**Q: Where is the dealership located?**\nA: 2211 Highway 46 South, Dickson, TN 37055.\n\n**Q: What are the hours of operation?**\nA: Monday-Friday 8:00 AM - 7:00 PM, Saturday 8:00 AM - 6:00 PM, closed Sunday.\n\n**Q: How do I contact the dealership?**\nA: Sales: 615-639-0282, Service: 615-560-1626, Parts: 615-560-1979.",
    "datasets/new-vehicles": "# New Buick and GMC Inventory\n\nNick Mayer Buick GMC of Dickson carries a full lineup of new Buick and GMC vehicles. See [dealership.md](dealership.md) for contact and location information.\n\n## Buick Models\n\n| Model | Category | Highlights |\n|---|---|---|\n| **Enclave** | 3-Row Full-Size Luxury SUV | Seats 7-8, premium interior, available AWD, advanced safety suite |\n| **Envision** | Compact Luxury SUV | 2.0L turbo engine, tech-forward cockpit, available AWD, sleek design |\n| **Encore GX** | Subcompact Luxury SUV | Turbo engine options, premium interior appointments, available AWD |\n| **Envista** | Subcompact Crossover Coupe | Stylish coupe-like design, affordable entry point, FWD standard |\n\n## GMC Models\n\n| Model | Category | Highlights |\n|---|---|---|\n| **Sierra 1500** | Full-Size Light-Duty Pickup | Up to 13,000 lbs towing, available Duramax diesel, MultiPro tailgate |\n| **Sierra 2500/3500** | Heavy-Duty Pickup | Up to 36,000 lbs max towing, powerful gas and diesel powertrains |\n| **Yukon / Yukon XL** | Full-Size SUV | Seats 7-9, available Denali luxury trim, ProGrade trailering system |\n| **Acadia** | Mid-Size Crossover SUV | Seats 7, family-friendly features, available AWD |\n| **Terrain** | Compact SUV | Efficient powertrains, versatile cargo space, available AWD |\n| **Canyon** | Mid-Size Pickup | Off-road capable AT4 trim, rugged design, available diesel |\n| **Hummer EV** | All-Electric SuperTruck | 1,000 hp, 3-motor e4WD, CrabWalk mode, Ultium battery platform |\n\n## Incentives & Specials\n\nCurrent manufacturer incentives, lease offers, and financing specials are available on select models. Contact the sales department at 615-639-0282 for current offers.\n\nSee [model-comparison.md](/tables/model-comparison.md) for detailed specifications.",
    "datasets/service-center": "# Service Center\n\nThe service center at Nick Mayer Buick GMC of Dickson is equipped to handle all maintenance and repair needs for Buick, GMC, and other makes.\n\n## Services Offered\n\n- Routine maintenance (oil changes, tire rotations, fluid checks)\n- Brake service and repair\n- Engine diagnostics and repair\n- Transmission service\n- Air conditioning service\n- Tire sales and installation\n- Wheel alignment\n- Battery testing and replacement\n- Factory-scheduled maintenance\n- Warranty repairs\n- Recall service\n\n## Factory-Trained Technicians\n\nAll service work is performed by certified technicians who receive ongoing training on the latest Buick and GMC vehicle technologies and diagnostic equipment.\n\n## Genuine OEM Parts\n\nThe service center uses genuine OEM parts to ensure proper fit, function, and durability. The attached parts department stocks a full inventory of Buick and GMC components.\n\n## Service Hours\n\nSame as dealership hours:\n\n| Day | Hours |\n|---|---|\n| Monday - Friday | 8:00 AM - 7:00 PM |\n| Saturday | 8:00 AM - 6:00 PM |\n| Sunday | Closed |\n\nSchedule service by calling 615-560-1626. See [staff.md](staff.md) for department contacts.",
    "datasets/staff": "# Dealership Staff\n\nSpecific staff names are not available at this time. The dealership operates through the following departments:\n\n## Sales Department\nAvailable during business hours to assist with new Buick and GMC sales, pre-owned vehicles, test drives, and vehicle delivery.\n\n## Finance Department\nHandles financing, leasing, extended warranties, and aftermarket products. Online credit applications are available on the dealership website.\n\n## Service Department\nStaffed by factory-trained technicians performing maintenance, diagnostics, and repairs. See [service-center.md](service-center.md) for full details.\n\n## Parts Department\nStocks genuine OEM Buick and GMC parts, accessories, and maintenance items.\n\n## Management\nGeneral management oversees all dealership operations including sales, service, parts, and customer relations.\n\nContact the dealership at 615-639-0282 to reach any department.",
    "datasets/used-vehicles": "# Used and Pre-Owned Vehicles\n\n## Pre-Owned Inventory\n\nNick Mayer Buick GMC of Dickson carries a wide selection of pre-owned vehicles across all makes and models. Every pre-owned vehicle undergoes a multi-point inspection before listing.\n\n## CarBravo Certified Used\n\nThe dealership is part of the CarBravo certified pre-owned program, which provides:\n\n- Comprehensive 172-point inspection\n- Vehicle history report\n- Warranty coverage\n- 24/7 roadside assistance\n- Flexible return policy\n\n## Trade-In\n\nThe dealership offers online trade-in valuation. Customers can receive an instant cash offer or apply trade value toward a new or pre-owned purchase.\n\n## Online Tools\n\n- Browse inventory online with photos and CarFax history\n- Filter by make, model, price range, and features\n- Schedule test drives online\n- Secure credit application\n- Value your trade from home\n\nSee [faq.md](faq.md) for commonly asked questions about the buying process.",
    "references/ai-discovery-page": "# AI Discovery Page\n\nThis page provides structured information about Nick Mayer Buick GMC of Dickson for AI crawlers and LLM indexing.\n\n## Business Information\n\n- **Name**: Nick Mayer Buick GMC of Dickson\n- **Address**: 2211 Highway 46 South, Dickson, TN 37055\n- **Phone**: 615-639-0282 (Sales), 615-560-1626 (Service), 615-560-1979 (Parts)\n- **Hours**: Mon-Fri 8-7, Sat 8-6, Sun Closed\n- **Platform**: DealerOn\n\n## Inventory Categories\n\n- New Buick vehicles (Enclave, Envision, Encore GX, Envista)\n- New GMC vehicles (Sierra 1500/2500/3500, Yukon/Yukon XL, Acadia, Terrain, Canyon, Hummer EV)\n- Pre-owned multi-make inventory\n- CarBravo certified pre-owned\n\n## Available Actions\n\n- Browse new Buick inventory\n- Browse new GMC inventory\n- Browse pre-owned inventory\n- Apply for financing online\n- Value a trade-in\n- Schedule service\n- View current specials and incentives\n\nSee [llms-txt.md](llms-txt.md) for machine-readable dealership data.",

    "Reference Document": "#10b981",
    "Comparison Table": "#3b82f6"
  }
};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
