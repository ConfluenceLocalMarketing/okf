    "datasets/autoplex": "# West Hills Auto Plex\n\nThe West Hills Auto Plex is a multi-franchise automotive group located in Bremerton, WA, operating five brand-specific dealerships under the Haselwood Auto Group umbrella. The auto plex campus spans West Hills Boulevard and Oyster Bay Avenue South in Bremerton, serving the Kitsap Peninsula including Silverdale, Port Orchard, Poulsbo, Bainbridge Island, and the greater Seattle area.\n\n## History\n\n- **1940s** \u2014 Charles \"Chuck\" Haselwood hitchhiked from Ellensburg, WA to Bremerton after WWII service under General Patton, worked at Speed Service gas station downtown\n- **1950s** \u2014 Chuck opened his own gas station and began selling used cars on the side with a pioneering 30-Day Warranty\n- **1960s** \u2014 Opened first dedicated used car dealership on 6th Street in downtown Bremerton\n- **1970s-1980s** \u2014 Expanded into new-car franchises including Buick, GMC, and Toyota; became one of the first 25 Buick dealerships nationally\n- **1990s** \u2014 Rick Wiler (Chuck's stepson) joined and became President/Owner; built standalone Toyota facility and Chrysler Jeep Dodge facility; over 200 staff by 1994\n- **2015** \u2014 Purchased the Parr Dealership Group, adding Hyundai, Volkswagen, Ford, and Mazda brands\n- **Present** \u2014 Five franchise-branded dealerships covering Honda, Ford, Kia, Mazda, and Chrysler/Jeep/Dodge/RAM under the West Hills name; additional Haselwood-branded Chevrolet, GMC, Hyundai, Volkswagen, and Toyota stores in the group\n\n## Member Dealerships\n\n| Dealership | Address | Phone | Franchises |\n|---|---|---|---|\n| West Hills Honda | 520 W Hills Blvd, Bremerton, WA 98312 | (360) 616-3274 | Honda |\n| West Hills Chrysler Jeep Dodge RAM | 900 W Hills Blvd, Bremerton, WA 98312-6300 | (360) 616-3275 | Chrysler, Jeep, Dodge, RAM |\n| West Hills Ford | 1100 Oyster Bay Ave S, Bremerton, WA 98312 | (360) 616-3277 | Ford |\n| West Hills Kia | 515 West Hills Blvd NW, Bremerton, WA 98312 | (360) 616-3273 | Kia |\n| West Hills Mazda | 1000 Oyster Bay Ave S NW, Bremerton, WA 98312 | (360) 362-4172 | Mazda |\n\n## Group Sales Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 8:00 PM |\n| Wednesday | 9:00 AM - 8:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 8:00 PM |\n| Saturday | 9:00 AM - 8:00 PM |\n| Sunday | 10:00 AM - 7:00 PM |\n\n## Leadership\n\n- **Rick Wiler** \u2014 Owner/President, Haselwood Auto Group\n- **David Gandel** \u2014 General Manager, West Hills Honda\n- **Clayton Crittenden** \u2014 General Manager, West Hills Ford\n\nSee individual dealership files for full staff directories.\n\n## Amenities\n\n- Click-N-Drive online purchasing with home delivery\n- Video walkarounds and virtual test drives\n- Maintenance pick-up and delivery\n- On-site rental car agency\n- State-of-the-art facilities with customer amenities\n- Free CarFax reports on all pre-owned vehicles\n- West Hills Extended Service Plus plans\n- Third-party market evaluation on pricing\n\n## Community Involvement\n\nThe West Hills Auto Plex supports local Kitsap County organizations including:\n- Kitsap Humane Society (DFAC partnership)\n- Local military appreciation programs (proximity to Naval Base Kitsap)\n- Various Bremerton-area charities and sponsorships\n\n## Affiliations\n\n- **Haselwood Auto Group** \u2014 Parent organization; also operates Haselwood Chevrolet GMC, Haselwood Hyundai, Haselwood Volkswagen of Bremerton, Heartland Toyota\n- **Dealer.com** \u2014 Website platform for all member dealerships\n- **PromptGraph** \u2014 AI platform powering AI Discovery Pages and structured data endpoints\n- **KBB** \u2014 Kelley Blue Book trade-in valuation partner\n\nSee [west-hills-honda.md](west-hills-honda.md), [west-hills-chrysler-jeep-dodge-ram.md](west-hills-chrysler-jeep-dodge-ram.md), [west-hills-ford.md](west-hills-ford.md), [west-hills-kia.md](west-hills-kia.md), and [west-hills-mazda.md](west-hills-mazda.md) for individual dealership profiles.",
    "datasets/faq": "# Frequently Asked Questions - West Hills Auto Plex\n\n## Group\n\n**Q: What is the West Hills Auto Plex?**\nA: A multi-franchise automotive group in Bremerton, WA operating five brand-specific dealerships under the Haselwood Auto Group: West Hills Honda, West Hills Chrysler Jeep Dodge RAM, West Hills Ford, West Hills Kia, and West Hills Mazda.\n\n**Q: Where is the West Hills Auto Plex located?**\nA: Dealerships are located along West Hills Boulevard and Oyster Bay Avenue South in Bremerton, WA 98312, just off Route 3.\n\n**Q: Who owns the West Hills Auto Plex?**\nA: The group is owned and operated by Rick Wiler and the Haselwood Auto Group, continuing the legacy founded by Chuck Haselwood.\n\n**Q: What is the Haselwood Auto Group?**\nA: The parent organization that operates the West Hills-branded dealerships plus Haselwood Chevrolet GMC, Haselwood Hyundai, Haselwood Volkswagen of Bremerton, and Heartland Toyota.\n\n## Inventory\n\n**Q: What new vehicle brands are available?**\nA: Honda, Ford, Kia, Mazda, Chrysler, Jeep, Dodge, and RAM across five branded dealerships.\n\n**Q: Do you sell used vehicles?**\nA: Yes, all member dealerships carry pre-owned and certified pre-owned inventory spanning multiple makes and models.\n\n**Q: What is the West Hills Pre-Owned warranty?**\nA: A 3-Month or 3,000-Mile Customer Confidence Warranty on West Hills pre-owned vehicles.\n\n**Q: Do you offer certified pre-owned vehicles?**\nA: Yes, each franchise offers manufacturer-certified pre-owned programs with factory-backed inspections and warranties.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs through a network of nationally recognized lenders.\n\n**Q: Does the group work with all credit profiles?**\nA: Yes, the finance teams work with multiple lenders to accommodate various credit situations and budgets.\n\n**Q: Can I apply for financing online?**\nA: Yes, online credit applications are available for all member dealerships.\n\n**Q: How do I value my trade-in?**\nA: KBB (Kelley Blue Book) trade-in valuation is available online through all member dealership websites.\n\n## Service\n\n**Q: Can I service a vehicle at any West Hills dealership?**\nA: Service centers are brand-specific. Take your Honda to West Hills Honda, your Ford to West Hills Ford, etc. Most service centers can also work on other makes.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through each dealership's website.\n\n**Q: Do you offer home delivery for service?**\nA: Yes, maintenance pick-up and delivery is available in the local area.\n\n**Q: Do you have service coupons?**\nA: Yes, each dealership offers service specials and coupons on their websites.\n\n## Dealership Amenities\n\n**Q: Do you offer online purchasing?**\nA: Yes, Click-N-Drive online purchasing with home delivery is available across the group.\n\n**Q: Is there a rental car available during service?**\nA: Yes, some locations offer on-site rental car agencies and loaner vehicles.\n\n**Q: Do you serve military customers?**\nA: Yes, the group has dedicated military appreciation programs given its proximity to Naval Base Kitsap.\n\nSee [autoplex.md](autoplex.md) for the group overview and individual dealership profiles.",

    "references/ai-discovery-page": "# AI Discovery Pages - West Hills Autoplex\n\nThe West Hills Auto Plex group and its member dealerships each maintain AI Discovery Pages powered by [PromptGraph](https://promptgraph.ai). These structured, machine-readable knowledge surfaces expose semantic endpoints, business metadata, inventory data, and LLM-friendly action definitions. All member dealership sites are built on the **Dealer.com** platform.\n\n## Group-Level AI Resources\n\n### AI Manifest (`/.well-known/ai-manifest.json`)\n\nAvailable via PromptGraph at `https://api.promptgraph.ai/api/v1/west-hills-autoplex/.well-known/ai-manifest.json`\n\n- **Schema types:** `AutoDealer`, `LocalBusiness`\n- **Contact:** gsjones.haselwood@gmail.com\n\n### PromptGraph API Base Endpoints\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/west-hills-autoplex` exposes:\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Group business profile (JSON-LD) |\n| `/vehicles` | Vehicle inventory (JSON-LD) |\n| `/prompts` | Q&A / FAQ prompts |\n| `/testimonials` | Customer reviews |\n| `/llms.txt` | LLMs.txt directive |\n| `/.well-known/ai-manifest.json` | AI Manifest |\n| `/sitemap.xml` | Full sitemap |\n| `/robots.txt` | Robots rules |\n| `/config.json` | System configuration |\n| `/gbp-context` | Flattened Google Business Profile data |\n| `/site-content` | Clean, plain-text mirror of the entire site |\n\n## Member Dealership AI Resources\n\nEach branded dealership has its own PromptGraph API and AI Discovery Page:\n\n| Dealership | AI Discovery Page | PromptGraph API Base |\n|---|---|---|\n| West Hills Honda | `/ai-discovery-page.htm` | `api.promptgraph.ai/api/v1/west-hills-honda` |\n| West Hills Ford | `/ai-discovery-page.htm` | `api.promptgraph.ai/api/v1/west-hills-ford` |\n| West Hills Kia | `/ai-discovery-page.htm` | `api.promptgraph.ai/api/v1/west-hills-kia` |\n| West Hills Mazda | `/ai-discovery-page.htm` | `api.promptgraph.ai/api/v1/west-hills-mazda` |\n| West Hills Chrysler Jeep Dodge RAM | `/ai-discovery-page.htm` | `api.promptgraph.ai/api/v1/west-hills-chrysler-jeep-dodge-ram` |\n\n### Honda-Specific Features\n\nThe West Hills Honda AI Discovery Page additionally exposes an **MCP (Model Context Protocol) Server** at `https://mcp.promptgraph.ai/west-hills-honda/mcp` for real-time vehicle inventory queries via tools including `browse_inventory`, `browse_by_bodytype`, `browse_by_price`, `browse_by_year`, and `search_vehicles`.\n\nAn LLM-optimized inventory page is available at `/llm-inventory.htm`.\n\n## Group Business Profile (Schema.org AutoDealer)\n\nFrom `https://api.promptgraph.ai/api/v1/west-hills-autoplex/business`:\n\n- **Name:** West Hills Autoplex\n- **Type:** AutoDealer (Schema.org)\n- **Additional Types:** Used car dealer, Car dealer, Truck dealer, Car leasing service\n- **Address:** 950 West Hills Boulevard, Bremerton, WA 98312\n- **Geo:** 47.5549135, -122.6756315\n- **Telephone:** (360) 616-3036\n- **Email:** gsjones.haselwood@gmail.com\n- **URL:** `https://www.westhillsautoplex.com/`\n- **Aggregate Rating:** 4.1 / 5.0 (628 reviews)\n- **Date Modified:** 2026-02-03T15:08:10.089Z\n- **Same As:** Facebook, Instagram, Google Maps\n\n### Member Business Profiles\n\n| Dealership | Rating | Reviews | Phone |\n|---|---|---|---|\n| West Hills Honda | 4.6 / 5.0 | 2,019 | (360) 616-3274 |\n| West Hills Ford | 4.6 / 5.0 | 3,135 | (360) 616-3277 |\n| West Hills Chrysler Jeep Dodge RAM | 4.5 / 5.0 | 2,660 | (360) 616-3275 |\n| West Hills Kia | 4.6 / 5.0 | 1,277 | (360) 616-3273 |\n| West Hills Mazda | 4.7 / 5.0 | 892 | (360) 362-4172 |\n\n## LLM-Accessible Actions (ReadAction)\n\nThe AI Discovery Pages define structured `ReadAction` entries. West Hills Honda, for example, defines actions including:\n1. **Your Trusted Honda Destination in Bremerton, WA**\n2. **Quality Cars & Exceptional Service at West Hills Honda**\n3. **Drive With Confidence: West Hills Honda Community Focus**\n4. **Award-Winning Honda Excellence with a Lifetime Advantage**\n5. **Dedicated Service for Our Bremerton Military Heroes**\n6. **The Gold Standard for Honda Certified Pre-Owned Vehicles**\n7. **Local Service with Global Inventory Power**\n8. **Factory-Certified Honda Service You Can Rely On**\n9. **Professionalism and Integrity: The Haselwood Difference**\n\nSee [llms-txt.md](llms-txt.md) for the full llms.txt directive.\nSee [prompts.md](prompts.md) for the complete Q&A prompt library.",

nd lease payments.\n- [Sell/Trade](https://www.westhillsautoplex.com/kbb-offer.htm) - KBB trade-in valuation.\n\n### AI & LLM Resources\n\n- [AI Discovery Page](https://www.westhillsautoplex.com/ai-discovery-page.htm) - Machine-readable knowledge base for AI agents\n\n## Member Dealership Sites\n\n### West Hills Honda\n\n- [West Hills Honda Home](https://www.westhillshonda.com/) - New and pre-owned Honda vehicles in Bremerton, WA.\n- [New Honda Inventory](https://www.westhillshonda.com/new-inventory/index.htm) - Browse new Honda models including CR-V, Civic, Accord, Pilot.\n- [Used Honda Inventory](https://www.westhillshonda.com/used-inventory/index.htm) - Browse pre-owned vehicles.\n- [Honda Service Center](https://www.westhillshonda.com/honda-service-center-bremerton-wa.htm) - Schedule service or maintenance.\n- [AI Discovery Page](https://www.westhillshonda.com/ai-discovery-page.htm) - Machine-readable knowledge base with MCP server.\n- [Facebook](https://www.facebook.com/whillshonda/)\n- [Instagram](https://www.instagram.com/westhillshonda/)\n\n### West Hills Ford\n\n- [West Hills Ford Home](https://www.westhillsford.com/) - New and pre-owned Ford vehicles in Bremerton, WA.\n- [New Ford Inventory](https://www.westhillsford.com/new-inventory/index.htm) - Browse new Ford models.\n- [Used Ford Inventory](https://www.westhillsford.com/used-inventory/index.htm) - Browse pre-owned vehicles.\n- [Ford Service Center](https://www.westhillsford.com/service/center.htm) - Schedule service or maintenance.\n- [AI Discovery Page](https://www.westhillsford.com/ai-discovery-page.htm) - Machine-readable knowledge base.\n- [Facebook](https://www.facebook.com/westhillsford)\n- [Instagram](https://www.instagram.com/westhillsford/)\n\n### West Hills Chrysler Jeep Dodge RAM\n\n- [West Hills CDJR Home](https://www.westhillscjd.com/) - New and pre-owned Chrysler, Jeep, Dodge, RAM vehicles.\n- [New CDJR Inventory](https://www.westhillscjd.com/new-inventory/index.htm) - Browse new Chrysle business) - Complete group business profile with address, contact, hours, and location\n- [Group Vehicle Inventory](http://api.promptgraph.ai/api/v1/west-hills-autoplex/vehicles) - Complete inventory with specifications and pricing\n- [Group Prompts & FAQs](http://api.promptgraph.ai/api/v1/west-hills-autoplex/prompts) - Structured prompts for consistent AI responses\n- [Group Testimonials](http://api.promptgraph.ai/api/v1/west-hills-autoplex/testimonials) - Customer reviews and ratings\n- [Group GBP Context](http://api.promptgraph.ai/api/v1/west-hills-autoplex/gbp-context) - Flattened Google Business Profile data\n- [Group Site Content](http://api.promptgraph.ai/api/v1/west-hills-autoplex/site-content) - Plain-text mirror of entire site\n- [Group AI Manifest](http://api.promptgraph.ai/api/v1/west-hills-autoplex/.well-known/ai-manifest.json) - Machine-readable AI resource directory\n- [Group Sitemap](http://api.promptgraph.ai/api/v1/west-hills-autoplex/sitemap.xml) - XML sitemap\n- [Group Config](http://api.promptgraph.ai/api/v1/west-hills-autoplex/config.json) - System configuration\n\n### Member Dealership APIs\n\n- [West Hills Honda Business](http://api.promptgraph.ai/api/v1/west-hills-honda/business) - Honda dealership business profile\n- [West Hills Honda Inventory](http://api.promptgraph.ai/api/v1/west-hills-honda/vehicles) - Honda vehicle inventory\n- [West Hills Ford Business](http://api.promptgraph.ai/api/v1/west-hills-ford/business) - Ford dealership business profile\n- [West Hills Ford Inventory](http://api.promptgraph.ai/api/v1/west-hills-ford/vehicles) - Ford vehicle inventory\n- [West Hills Kia Business](http://api.promptgraph.ai/api/v1/west-hills-kia/business) - Kia dealership business profile\n- [West Hills Kia Inventory](http://api.promptgraph.ai/api/v1/west-hills-kia/vehicles) - Kia vehicle inventory\n- [West Hills Mazda Business](http://api.promptgraph.ai/api/v1/west-hills-mazda/business) - Mazda dealership business profile\n- [West Hills Mazda Inventory](http://api.promptgraph.ai/api/v1/west-hills-mazda/vehicles) - Mazda vehicle inventory\n- [West Hills Chrysler Jeep Dodge RAM Business](http://api.promptgraph.ai/api/v1/west-hills-chrysler-jeep-dodge-ram/business) - CDJR dealership business profile\n- [West Hills Chrysler Jeep Dodge RAM Inventory](http://api.promptgraph.ai/api/v1/west-hills-chrysler-jeep-dodge-ram/vehicles) - CDJR vehicle inventory\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for detailed endpoint documentation.",
    "references/prompts": "# PromptGraph Prompt Library - West Hills Autoplex\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/west-hills-autoplex/prompts` exposes structured Q&A prompt/response pairs. Below is a categorized summary covering the group and its five member dealerships.\n\n## Prompt Categories\n\n### Group & History (10+ prompts)\n- West Hills Auto Plex overview and member dealerships\n- Haselwood Auto Group history and Chuck Haselwood legacy\n- Community involvement and awards\n- Locations and directions on the Kitsap Peninsula\n- West Hills Pre-Owned warranty program\n\n### Honda Dealership (10+ prompts)\n- New Honda models at West Hills Honda (Civic, Accord, CR-V, Pilot, HR-V, Odyssey, Ridgeline, Prologue)\n- Honda Certified Pre-Owned program\n- West Hills Honda service center and Express Service\n- Honda financing and West Hills Advantage Lifetime Powertrain Warranty\n- Military appreciation program near Naval Base Kitsap\n\n### Ford Dealership (10+ prompts)\n- New Ford models at West Hills Ford (Bronco, F-150, Explorer, Mustang, Escape, Expedition)\n- Ford Certified Pre-Owned vehicles\n- Ford service center and OEM parts\n- Ford financing and lease specials\n- Click-N-Drive online purchasing with home delivery\n\n### Chrysler Jeep Dodge RAM Dealership (10+ prompts)\n- New Chrysler, Jeep, Dodge, and RAM models\n- Jeep Wrangler 4xe and electrified options\n- RAM truck lineup including heavy-duty and commercial\n- Mopar-certified service and performance parts\n- CDJR financing and special offers\n\n### Kia Dealership (10+ prompts)\n- New Kia models at West Hills Kia (Sportage, Sorento, Telluride, EV6, EV9, K5, Carnival)\n- Kia 10-Year/100,000-Mile Warranty program\n- Kia EV lineup including EV6, EV9, and Niro EV\n- Kia service center and genuine parts\n- Kia financing and lease options\n\n### Mazda Dealership (10+ prompts)\n- New Mazda models at West Hills Mazda (CX-5, CX-30, CX-50, CX-90, Mazda3, MX-5 Miata)\n- Mazda CX-90 Plug-In Hybrid     "tables/dealership-comparison": "# West Hills Autoplex Dealership Comparison\n\n## Overview\n\n| Dealership | Franchise(s) | Address | Sales Phone | Service Phone | Parts Phone |\n|---|---|---|---|---|---|\n| West Hills Honda | Honda | 520 W Hills Blvd, Bremerton, WA 98312 | (360) 728-3071 | (360) 728-3072 | (360) 728-3075 |\n| West Hills Chrysler Jeep Dodge RAM | Chrysler, Jeep, Dodge, RAM | 900 W Hills Blvd, Bremerton, WA 98312-6300 | (360) 728-3077 | (360) 728-3988 | (360) 842-2349 |\n| West Hills Ford | Ford | 1100 Oyster Bay Ave S, Bremerton, WA 98312 | (360) 842-2413 | (360) 842-2420 | (360) 842-2475 |\n| West Hills Kia | Kia | 515 West Hills Blvd NW, Bremerton, WA 98312 | (360) 728-3062 | (360) 728-3063 | (360) 728-3070 |\n| West Hills Mazda | Mazda | 1000 Oyster Bay Ave S NW, Bremerton, WA 98312 | (360) 842-2486 | (360) 842-2490 | (360) 842-2520 |\n\n## Sales Hours\n\nAll dealerships follow the same sales hours:\n\n| Day | Hours |\n|---|---|\n| Monday - Saturday | 9:00 AM - 8:00 PM |\n| Sunday | 10:00 AM - 7:00 PM |\n\n## Service Hours\n\n| Dealership | Mon-Fri | Saturday | Sunday |\n|---|---|---|---|\n| West Hills Honda | 7:30 AM - 7:00 PM | 8:00 AM - 4:00 PM | Closed |\n| West Hills Chrysler Jeep Dodge RAM | 7:30 AM - 7:00 PM | 8:00 AM - 4:00 PM | Closed |\n| West Hills Ford | 7:30 AM - 7:00 PM | 8:00 AM - 4:00 PM | Closed |\n| West Hills Kia | 7:30 AM - 7:00 PM | 8:00 AM - 4:00 PM | Closed |\n| West Hills Mazda | 7:30 AM - 7:00 PM | 8:00 AM - 4:00 PM | Closed |\n\n## Ratings\n\n| Dealership | Rating | Reviews |\n|---|---|---|\n| West Hills Mazda | 4.7 / 5.0 | 892 |\n| West Hills Honda | 4.6 / 5.0 | 2,019 |\n| West Hills Ford | 4.6 / 5.0 | 3,135 |\n| West Hills Kia | 4.6 / 5.0 | 1,277 |\n| West Hills Chrysler Jeep Dodge RAM | 4.5 / 5.0 | 2,660 |\n\n## Model Categories\n\n| Category | Honda | Ford | Kia | Mazda | Chrysler/Jeep/Dodge/RAM |\n|---|---|---|---|---|---|\n| **Sedans** | Civic, Accord | \u2014 | K4, K5 | Mazda3 | Chrysler 300, Dodge Charger |\n| **Compact SUV** | CR-V, HR-V | Bronco Sport, Escape | Sportage, Seltos | CX-30, CX-5, CX-50 | Jeep Cherokee, Compass, Hornet |\n| **Mid-size SUV** | Passport, Pilot | Edge, Explorer | Sorento | CX-70, CX-90 | Dodge Durango, Jeep Grand Cherokee |\n| **Full-size SUV** | \u2014 | Expedition, Expedition Max | Telluride | \u2014 | Jeep Wagoneer, Grand Wagoneer |\n| **Off-road SUV** | \u2014 | Bronco | \u2014 | \u2014 | Jeep Wrangler, Gladiator |\n| **Pickup Trucks** | Ridgeline | F-150, Maverick, Super Duty | \u2014 | \u2014 | RAM 1500, 2500, 3500 |\n| **Minivans/Vans** | Odyssey | Transit, Transit Connect | Carnival | \u2014 | Chrysler Pacifica, Voyager, RAM ProMaster |\n| **Sports Cars** | \u2014 | Mustang | \u2014 | MX-5 Miata | Dodge Charger (high-performance) |\n| **Electric** | Prologue | Mustang Mach-E, E-Transit | EV6, EV9, Niro EV | MX-30 | Jeep Wagoneer S, RAM ProMaster EV |\n| **Hybrid/PHEV** | Civic Hybrid, Accord Hybrid, CR-V Hybrid | F-150 PowerBoost | Niro PHEV, Sportage PHEV, Sorento PHEV | CX-50 Hybrid, CX-70 PHEV, CX-90 PHEV | Jeep Wrangler 4xe, Grand Cherokee 4xe, Pacifica Hybrid |\n\n## Group Affiliation\n\nAll five dealerships are owned and operated by the **Haselwood Auto Group** and are part of the **West Hills Auto Plex** campus in Bremerton, WA.\n\nSee [autoplex.md](/datasets/autoplex.md) for the full group profile.\nSee individual dealership files for detailed profiles:\n- [west-hills-honda.md](/datasets/west-hills-honda.md)\n- [west-hills-chrysler-jeep-dodge-ram.md](/datasets/west-hills-chrysler-jeep-dodge-ram.md)\n- [west-hills-ford.md](/datasets/west-hills-ford.md)\n- [west-hills-kia.md](/datasets/west-hills-kia.md)\n- [west-hills-mazda.md](/datasets/west-hills-mazda.md)"

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
