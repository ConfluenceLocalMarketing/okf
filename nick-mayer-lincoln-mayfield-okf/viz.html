  "bodies": {
    "datasets/dealership": "# Nick Mayer Lincoln Mayfield\n\nNick Mayer Lincoln Mayfield is a Lincoln dealership located at 6180 Mayfield Road, Mayfield Heights, OH 44124. The dealership serves the greater Cleveland area including Beachwood, Chagrin Falls, Mentor, and Middleburg Heights with new and pre-owned Lincoln vehicles, financing, service, and parts.\n\n## Contact Information\n\n- **Sales**: 440-442-8000\n- **Service**: 440-305-7710\n- **Parts**: 440-305-7710\n- **Website**: https://www.nickmayerlincolnmayfield.com/\n- **Platform**: DealerOn (FordDirect)\n\n## Location\n\n6180 Mayfield Road, Mayfield Heights, OH 44124\n\n## Service Area\n\nCleveland, Beachwood, Chagrin Falls, Mentor, Middleburg Heights, and surrounding Northeast Ohio communities.\n\n## Hours of Operation\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 6:00 PM |\n| Wednesday | 9:00 AM - 6:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 6:00 PM |\n| Saturday | 9:00 AM - 5:00 PM |\n| Sunday | Closed |\n\n## Lincoln Models\n\n- **Corsair** \u2014 Compact luxury SUV\n- **Nautilus** \u2014 Mid-size luxury SUV\n- **Aviator** \u2014 Mid-size three-row luxury SUV (available plug-in hybrid)\n- **Navigator** \u2014 Full-size luxury SUV\n\n## Unique Services\n\n- **Lincoln Valet** \u2014 Complimentary pick-up and drop-off service for vehicle maintenance\n- **Free Car Washes for Life** \u2014 Complimentary car washes for vehicles purchased at the dealership\n- **Online Service Scheduling** \u2014 Schedule appointments through the dealership website\n- **Lincoln Certified Pre-Owned** \u2014 Factory-backed pre-owned vehicle program\n\n## Online Tools\n\n- New vehicle inventory search\n- Pre-owned inventory search\n- Value Your Trade tool\n- Online credit application\n- Service scheduling\n- Parts ordering\n\nSee [new-vehicles.md](new-vehicles.md) for Lincoln model details.\nSee [service-center.md](service-center.md) for service offerings.",
    "datasets/faq": "# Frequently Asked Questions\n\n## Lincoln Models\n\n**Q: What Lincoln models are available at Nick Mayer Lincoln Mayfield?**\nA: The dealership offers the full Lincoln SUV lineup including Corsair, Nautilus, Aviator, and Navigator.\n\n**Q: What is Lincoln Black Label?**\nA: Lincoln Black Label is a premium ownership program that includes complimentary scheduled maintenance, dedicated concierge service, premium detailing, Lincoln Pickup & Delivery, and exclusive interior theme options.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Financing and leasing options are available through Lincoln Financial Services and other lending partners. Online credit application is available on the dealership website.\n\n## Service\n\n**Q: Do you offer pick-up and delivery for service?**\nA: Yes, Lincoln Valet provides complimentary pick-up and drop-off service for vehicle maintenance.\n\n**Q: Is there a complimentary car wash with service?**\nA: Yes, the dealership offers free car washes for life for vehicles purchased at Nick Mayer Lincoln Mayfield.\n\n## Dealership\n\n**Q: Where is the dealership located?**\nA: 6180 Mayfield Road, Mayfield Heights, OH 44124.\n\n**Q: What are the dealership hours?**\nA: Monday and Thursday 9-8, Tuesday, Wednesday, Friday 9-6, Saturday 9-5, closed Sunday.\n\nSee [dealership.md](dealership.md) for full dealership information.\nSee [new-vehicles.md](new-vehicles.md) for Lincoln model details.\nSee [service-center.md](service-center.md) for service offerings.",
    "datasets/financing": "# Financing & Leasing - Nick Mayer Lincoln Mayfield\n\nThe Finance Center at Nick Mayer Lincoln Mayfield helps customers secure competitive financing and leasing options for new Lincoln and pre-owned vehicles.\n\n## Financing Options\n\n- **Online Credit Application** \u2014 Secure online application with quick pre-approval decisions\n- **Multiple Lending Partners** \u2014 Network of banks, credit unions, and financial institutions for competitive rates\n- **Flexible Terms** \u2014 Customized payment plans from 24 to 84 months\n- **New Vehicle Financing** \u2014 Special rates and incentives on current Lincoln models\n- **Used Vehicle Financing** \u2014 Competitive rates on Lincoln Certified Pre-Owned and pre-owned inventory\n- **Special Financing Programs** \u2014 Options for first-time buyers, recent graduates, and buyers with less-than-perfect credit\n\n## Leasing\n\nLincoln vehicles are especially popular for leasing, offering luxury features at accessible monthly payments. The dealership offers seasonal Lincoln Red Carpet Lease specials and pull-ahead programs for current Lincoln lessees.\n\n### Benefits of Leasing\n\n- Lower monthly payments compared to financing\n- Lower down payment requirements\n- Drive a new Lincoln every 2-3 years\n- Factory warranty coverage for the lease term\n- Lincoln complimentary scheduled maintenance during lease\n\n## Buying vs Leasing\n\n| Factor | Buying (Financing) | Leasing |\n|---|---|---|\n| Monthly Payment | Higher | Lower |\n| Down Payment | Variable | Typically lower |\n| Mileage Limits | Unlimited | Limited (typically 10,000-15,000 mi/year) |\n| Ownership | You own the vehicle | Return at lease end |\n| Maintenance Costs | Out of warranty | Covered under factory warranty |\n| Customization | Allowed | Restricted |\n| End of Term | Vehicle is yours | Option to purchase or return |\n\n## Trade-In Appraisal\n\nThe dealership offers online and in-person trade-in valuation services. Customers can use the Value Your Trade tool on the website to receive an instant preliminary offer, then bring the vehicle in for a final appraisal.\n\n## Payment Calculators\n\nOnline payment calculators allow customers to estimate monthly payments based on vehicle price, down payment, trade-in value, APR, and loan term.\n\n## Contact\n\nThe Finance Department can be reached at **440-442-8000** during business hours.\n\nSee [dealership.md](dealership.md) for full business profile and hours.",
    "datasets/new-vehicles": "# Lincoln New Vehicle Lineup\n\nNick Mayer Lincoln Mayfield offers the full Lincoln lineup of luxury SUVs, each available in multiple trims and optionally through the Lincoln Black Label program for premium ownership experiences.\n\n## SUV Models\n\n### Corsair\n\nThe Lincoln Corsair is a compact luxury SUV offering a refined ride, available all-wheel drive, and Lincoln's signature Quiet Flight design philosophy. It seats up to five passengers and features a 2.0L 250-horsepower engine with available plug-in hybrid powertrain.\n\n- Body style: Compact SUV\n- Passengers: 5\n- Drivetrain: FWD / AWD\n- Starting MSRP: $40,000+\n- Key feature: Available Lincoln Co-Pilot360 driver assist suite\n\n### Nautilus\n\nThe Lincoln Nautilus is a mid-size luxury SUV with available SYNC 4 technology, 8-speed SelectShift automatic transmission, and a 2.0L turbocharged engine. It seats five passengers with available all-wheel drive.\n\n- Body style: Mid-size SUV\n- Passengers: 5\n- Drivetrain: FWD / AWD\n- Starting MSRP: $50,000+\n- Key feature: SYNC 4 with available 24-inch panoramic display\n\n### Aviator\n\nThe Lincoln Aviator is a mid-size three-row luxury SUV offering seating for up to seven passengers. It features a 3.0L twin-turbocharged V6 engine and is available as a plug-in hybrid (Grand Touring model). Rear-wheel drive and all-wheel drive configurations are available.\n\n- Body style: Mid-size 3-Row SUV\n- Passengers: 6-7\n- Drivetrain: RWD / AWD\n- Starting MSRP: $55,000+\n- Key feature: Available plug-in hybrid powertrain\n\n### Navigator\n\nThe Lincoln Navigator is a full-size luxury SUV with seating for up to eight passengers. It features a 3.5L twin-turbocharged V6 engine paired with a 10-speed automatic transmission and standard 4WD. The hands-free liftgate and Lincoln's Perfect Position front seats are hallmark features.\n\n- Body style: Full-size SUV\n- Passengers: 7-8\n- Drivetrain: 4WD\n- Starting MSRP: $90,000+\n- Key feature: 3.5L twin-turbo V6 with 10-speed automatic transmission\n\n## Lincoln Black Label\n\nLincoln Black Label is an exclusive ownership program that includes:\n\n- Complimentary scheduled maintenance\n- Access to a dedicated Black Label concierge\n- Premium vehicle detailing with every service visit\n- Complimentary Lincoln Pickup & Delivery\n- Unique interior themes and materials\n\nSee [model-comparison.md](/tables/model-comparison.md) for detailed specification comparison.\nSee [dealership.md](dealership.md) for full dealership information.",
    "datasets/service-center": "# Lincoln Service Center\n\nThe service center at Nick Mayer Lincoln Mayfield provides factory-authorized maintenance and repairs using genuine Lincoln parts and certified technicians.\n\n## Lincoln Priority Service\n\n- Online scheduling for convenience\n- Certified Lincoln technicians with ongoing factory training\n- Genuine Lincoln parts and accessories\n- Multi-point vehicle inspection with every service visit\n\n## Complimentary Services\n\n- **Lincoln Valet** \u2014 Complimentary pick-up and drop-off service within the service area\n- **Free Car Washes for Life** \u2014 Complimentary car washes for vehicles purchased at the dealership\n- **Complimentary Loaner Vehicles** \u2014 Available for qualifying service appointments\n\n## Service Offerings\n\n- Routine maintenance (oil changes, tire rotations, fluid checks)\n- Brake service and repair\n- Engine diagnostics and repair\n- Transmission service\n- Tire sales and installation\n- Air conditioning service\n- Battery testing and replacement\n- Lincoln genuine parts and accessories installation\n\n## Parts Department\n\n- Genuine Lincoln OEM parts\n- Accessories and merchandise\n- Online parts ordering available\n\n## Service Hours\n\nSame as dealership hours: Monday through Saturday, closed Sunday.\n\nSee [dealership.md](dealership.md) for full contact and hours information.",
    "datasets/staff": "# Dealership Staff Directory\n\nNick Mayer Lincoln Mayfield employs a team of sales, service, and management professionals dedicated to providing Lincoln luxury service to customers in Mayfield Heights and the greater Cleveland area.\n\n## Departments\n\n- **Sales Team** \u2014 New and pre-owned vehicle specialists\n- **Finance Team** \u2014 Financing and leasing professionals\n- **Service Team** \u2014 Certified Lincoln technicians\n- **Parts Team** \u2014 Genuine Lincoln parts specialists\n- **Management** \u2014 Dealership leadership and operations\n\nSee [dealership.md](dealership.md) for dealership information.",
    "datasets/used-vehicles": "# Pre-Owned Vehicle Inventory\n\nNick Mayer Lincoln Mayfield offers a wide selection of pre-owned vehicles including Lincoln Certified Pre-Owned vehicles and multi-make used cars, trucks, and SUVs.\n\n## Inventory Features\n\n- Multi-make pre-owned inventory including Lincoln, Ford, and other brands\n- Searchable online inventory with photos and vehicle history reports\n- CarFax vehicle history reports available on most vehicles\n\n## Lincoln Certified Pre-Owned\n\nThe Lincoln Certified Pre-Owned program provides:\n\n- Comprehensive 172-point inspection by certified Lincoln technicians\n- Limited warranty coverage\n- 24/7 roadside assistance\n- Complimentary Lincoln Pickup & Delivery for covered repairs\n- Rental car reimbursement\n- Vehicle history report\n\n## Trade-In Program\n\n- Online Value Your Trade tool for instant estimates\n- Appraisal appointments available\n- Trade-in equity can be applied to new or pre-owned purchases\n\nSee [new-vehicles.md](new-vehicles.md) for the Lincoln new vehicle lineup.\nSee [dealership.md](dealership.md) for dealership contact information.",
    "references/ai-discovery-page": "# AI Discovery Page\n\n## Platform\n\nNick Mayer Lincoln Mayfield operates on the **DealerOn** digital platform, powered by **FordDirect** integration. This platform provides the dealership's website, inventory management, service scheduling, and online retailing tools.\n\n## AI Discovery\n\nNo structured AI discovery endpoints (such as PromptGraph API) were found during site analysis. The site relies on conventional web pages and server-side rendering for content delivery.\n\n## Site Architecture\n\n- Static and server-rendered pages\n- FordDirect inventory API integration for vehicle listings\n- DealerOn content management system for page editing\n- Standard HTML forms for lead capture and service scheduling\n\nSee [llms-txt.md](llms-txt.md) for site structure overview.",

    "references/prompts": "# AI Prompts\n\n## Dealership\n\n- \"Tell me about Nick Mayer Lincoln Mayfield\"\n- \"Where is Nick Mayer Lincoln Mayfield located?\"\n- \"What are the dealership hours?\"\n- \"What brands does the dealership carry?\"\n\n## Vehicle Shopping\n\n- \"What Lincoln models are available?\"\n- \"Compare Lincoln Corsair vs Nautilus\"\n- \"What is the Lincoln Aviator starting price?\"\n- \"Does the dealership have pre-owned inventory?\"\n- \"What is Lincoln Certified Pre-Owned?\"\n\n## Financing\n\n- \"What financing options are available?\"\n- \"How do I apply for credit online?\"\n- \"What is Lincoln Financial Services?\"\n- \"How does the trade-in process work?\"\n\n## Service\n\n- \"Does the dealership offer pick-up and delivery?\"\n- \"How do I schedule service online?\"\n- \"What is Lincoln Priority Service?\"\n- \"Do you offer free car washes?\"\n- \"What are the service hours?\"\n\n## Lincoln Ownership\n\n- \"What is Lincoln Black Label?\"\n- \"What warranty comes with a new Lincoln?\"\n- \"What is the Lincoln Co-Pilot360 system?\"\n- \"Tell me about Lincoln Pickup & Delivery\"\n\nSee [dealership.md](/datasets/dealership.md) for dealership information.\nSee [new-vehicles.md](/datasets/new-vehicles.md) for Lincoln model information.",
    "references/testimonials": "# Customer Testimonials\n\nNick Mayer Lincoln Mayfield maintains a reputation for luxury customer service and Lincoln brand expertise in the Mayfield Heights community.\n\n## Common Themes\n\n- Professional and knowledgeable sales staff\n- Lincoln valet pick-up and drop-off convenience\n- Quality of service department work\n- Clean and welcoming dealership environment\n\nSee [dealership.md](/datasets/dealership.md) for dealership information.",
    "tables/model-comparison": "# Lincoln Model Comparison\n\n| Model | Body Type | Passengers | Drivetrain | Starting MSRP | Key Features |\n|---|---|---|---|---|---|\n| Corsair | Compact SUV | 5 | FWD/AWD | $40K+ | 2.0L 250hp, 48mo/50k mi warranty |\n| Nautilus | Mid-size SUV | 5 | FWD/AWD | $50K+ | 2.0L turbo, 8-speed SelectShift, SYNC 4 |\n| Aviator | Mid-size 3-Row SUV | 6-7 | RWD/AWD | $55K+ | Available plug-in hybrid, 3.0L twin-turbo |\n| Navigator | Full-size SUV | 7-8 | 4WD | $90K+ | 3.5L twin-turbo V6, 10-speed auto, hands-free liftgate |\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for detailed model descriptions."

</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
