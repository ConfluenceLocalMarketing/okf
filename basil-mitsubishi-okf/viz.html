    "datasets/dealership": "# Basil Mitsubishi\n\nBasil Mitsubishi is a full-service Mitsubishi dealership located at **6868 Transit Road, Buffalo, NY 14221**, serving the greater Buffalo area including Williamsville, Amherst, Clarence, Lockport, Tonawanda, Depew, Cheektowaga, Kenmore, Lackawanna, and West Seneca.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Main | (716) 632-2440 |\n| Sales | (716) 451-3303 |\n| Service | (716) 666-4574 |\n| Parts | (716) 325-9715 |\n\nEmail: lindsey@basilmarketinggroup.com\n\n## Hours\n\n| Day | Sales | Service & Parts |\n|---|---|---|\n| Mon\u2013Tue | 9:00 AM \u2013 7:00 PM | 8:00 AM \u2013 5:00 PM |\n| Wed | 9:00 AM \u2013 6:00 PM | 8:00 AM \u2013 5:00 PM |\n| Thu | 9:00 AM \u2013 7:00 PM | 8:00 AM \u2013 5:00 PM |\n| Fri | 9:00 AM \u2013 6:00 PM | 8:00 AM \u2013 5:00 PM |\n| Sat | 9:00 AM \u2013 5:00 PM | 9:00 AM \u2013 2:00 PM |\n| Sun | Closed | Closed |\n\n## New Vehicles\n\n- **Mitsubishi Outlander** \u2014 7-passenger SUV, 1.5L Turbo Mild Hybrid, S-AWC, available 3-row seating\n- **Mitsubishi Outlander Plug-In Hybrid** \u2014 PHEV with increased all-electric range and 0% APR offers available\n- **Mitsubishi Eclipse Cross** \u2014 Compact crossover SUV, SEL and SEL Touring trims with standard hood badging\n- **Mitsubishi Outlander Sport** \u2014 Subcompact SUV, value-oriented\n- **Mitsubishi Mirage G4** \u2014 Subcompact sedan, fuel-efficient city driving\n\n## 2026 Summer Sales Event\n\nProminent offers include:\n- **0% APR for 72 months** on Mitsubishi Outlander Plug-In Hybrid (well-qualified buyers, through Santander Consumer USA)\n- **$2,500 more for your trade** based on Kelley Blue Book fair market value (in-stock inventory only, excludes vehicles with over 80,000 miles, ends 6/30/26)\n- **Big rebates and low lease options** available across the lineup\n\n## Basil Difference Perks\n\n- **Free 2-Way Shuttle** \u2014 Complimentary transportation during service visits\n- **6-Month / 6,000-Mile Powertrain Warranty** on used vehicles\n- **101-Point Inspection** on all used vehicles\n- **$200 Sales Referral Program** \u2014 Cash reward for referring a friend\n- **State-of-the-Art Parts & Service Facility**\n- **On the Spot Delivery**\n- **FREE Alignment Check** with every service visit\n- **Highest Trade-in Allowance** \u2014 Guaranteed extra cash on trade-ins\n\n## Services\n\n- **Finance Department** \u2014 Loan and lease options, online credit application, trade-in appraisal, multiple lender comparisons\n- **Service Center** \u2014 Mitsubishi-certified technicians, routine maintenance, diagnostics, major repairs, collision center, genuine Mitsubishi parts, services all makes and models\n- **Parts Department** \u2014 Factory-approved components, accessories (cargo organizers, roof racks, etc.), genuine OEM parts\n- **Collision Center** \u2014 Exterior repairs (dings, dents, scrapes, scuffs), undercarriage inspection for structural integrity\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, certified pre-owned) by type, year, make, model\n- Online service scheduling\n- Vehicle repair updates\n- Trade-in value estimator via Kelley Blue Book\n- Online credit application and pre-approval\n- Payment calculator\n- Vehicle finder service \u2014 dealership will locate specific models not on lot\n\n## Staff Leadership\n\n- **Joe Basil III** \u2014 Dealer Principal\n- **Will Basil** \u2014 Dealer Principal\n- **Robert Neuner** \u2014 General Manager\n- **Lauren Allison** \u2014 Sales Manager\n- **Robert Dikcis** \u2014 Inventory Manager\n- **Kire Gjorgievski** \u2014 Business Manager\n- **Ryan Twardowski** \u2014 Service Manager\n- **Eric Macchiaroli** \u2014 Parts Manager\n- **Alex Luciano** \u2014 Service Advisor\n\nSee [staff.md](staff.md) for full directory.\n\n## Social & Reviews\n\n- Facebook: https://www.facebook.com/basilmitsubishi/\n- Twitter: https://twitter.com/basilcars\n- Google Maps: https://www.google.com/maps/place/Basil+Mitsubishi/@42.9543222,-78.6973479,17z\n- Aggregate rating: 4.7 / 5.0 (2,108 reviews) across major platforms; 5.0 / 5.0 (245 PromptGraph-collected reviews)\n- Website powered by **Dealer Inspire**\n- Cookie compliance via **ComplyAuto**",
    "datasets/faq": "# Frequently Asked Questions \u2014 Basil Mitsubishi\n\n## Vehicles & Inventory\n\n**What Mitsubishi models are available?**\n\nBasil Mitsubishi carries the full Mitsubishi lineup: Outlander (7-passenger SUV), Outlander Plug-In Hybrid, Eclipse Cross (compact crossover), Outlander Sport (subcompact SUV), and Mirage G4 (subcompact sedan).\n\n**Do you offer lease specials?**\n\nYes \u2014 Basil Mitsubishi regularly features leasing and financing incentives on popular models like the Outlander and Eclipse Cross.\n\n**Can I schedule a test drive online?**\n\nAbsolutely. Test drives can be booked online through the Basil Mitsubishi website.\n\n**Does Basil Mitsubishi sell used cars?**\n\nYes \u2014 the dealership carries pre-owned vehicles across many makes and models, plus Mitsubishi Certified Pre-Owned vehicles with multi-point inspection and warranty coverage.\n\n## Trade-In & Financing\n\n**Do you take trade-ins?**\n\nYes \u2014 Basil Mitsubishi accepts trade-ins and provides competitive appraisals. An online trade-in estimator is available.\n\n**What current promotions are available?**\n\nAs of mid-2026, offers include 0% APR for 72 months on the Outlander Plug-In Hybrid, $2,500 more for your trade based on Kelley Blue Book fair market value (select inventory, ends 6/30/26), big rebates up to $8,000 off MSRP on select models, and low lease options from $349/month.\n\n**Can I buy a Mitsubishi warranty?**\n\nYes \u2014 every new Mitsubishi comes with a 10-year/100,000-mile powertrain warranty. Used vehicles include a 6-month/6,000-mile powertrain warranty. CPO vehicles include extended warranty protection with no deductible.\n\n**Are there loyalty or conquest rebates?**\n\nYes \u2014 Mitsubishi offers owner loyalty rebates for returning customers and conquest rebates for customers switching from competitive brands.\n\n## Trade-In & Financing\n\n**Do you offer pre-approval online?**\n\nYes \u2014 you can fill out a secure auto credit application online to get pre-approved before visiting the dealership.\n\n**Can I trade in a vehicle that's not paid off?**\n\nYes \u2014 the finance team can help structure the deal to include your existing loan balance.\n\n**Do you work with buyers who have bad credit?**\n\nYes \u2014 the finance department works with multiple lenders and has helped many credit-challenged buyers get approved. Sales representatives Andre Wilson and Matt Harrison are frequently cited by customers for helping with credit issues.\n\n## Service & Parts\n\n**Can I order Mitsubishi parts here?**\n\nYes \u2014 the parts department stocks genuine OEM Mitsubishi parts and can quickly order anything not in inventory. Parts can be ordered online for in-store pickup.\n\n**Do you handle major engine or transmission repairs?**\n\nYes \u2014 the service center is equipped to perform both routine maintenance and advanced repairs, including timing chain replacement, transmission work, and engine diagnostics.\n\n**Do you provide shuttle or loaner vehicles during service?**\n\nYes, depending on availability \u2014 a free 2-way shuttle service is available within the local area. Contact the service team for details.\n\n**What perks come with service?**\n\nFree alignment check with every visit, free 2-way shuttle service, online scheduling, vehicle repair updates, and service specials.\n\n**Can you service non-Mitsubishi vehicles?**\n\nYes \u2014 the service department works on all makes and models, not just Mitsubishis.\n\n**How often should I get an oil change?**\n\nMitsubishi recommends following the maintenance schedule in your owner's manual, typically every 5,000\u20137,500 miles for full synthetic oil.\n\n**Do you perform state inspections?**\n\nYes \u2014 the service center handles state inspections, tire rotations, battery replacements, fluid replacements, brake repairs, and air filter replacements.\n\n## Dealership\n\n**What area does Basil Mitsubishi serve?**\n\nBasil Mitsubishi serves Buffalo, Williamsville, Amherst, Clarence, Lockport, Tonawanda, Depew, Cheektowaga, Kenmore, Lackawanna, and West Seneca. Out-of-town buyers regularly travel 1\u20135+ hours to purchase from the dealership.\n\n**What are the dealership hours?**\n\nSales: Mon\u2013Tue 9\u20137, Wed 9\u20136, Thu 9\u20137, Fri 9\u20136, Sat 9\u20135, Sun closed.\nService & Parts: Mon\u2013Fri 8\u20135, Sat 9\u20132, Sun closed.\n\n**Is Basil Mitsubishi part of a larger group?**\n\nYes \u2014 Basil Mitsubishi is part of the **Basil Family Dealerships**, which has served Western New York for over 65 years with multiple locations across the region.\n\n**Who are the dealer principals?**\n\nThe dealership is led by **Joe Basil III** and **Will Basil** as Dealer Principals, with **Robert Neuner** as General Manager.\n\n**What is the \"Basil Difference\"?**\n\nThe Basil Difference refers to the dealership's commitment to customer-first service, transparent pricing, highest trade-in allowances, free service perks (shuttle, alignment checks), and treating every customer like family.\n\n## Related\n\nSee [dealership.md](dealership.md) for full business profile and contact information.\nSee [new-vehicles.md](new-vehicles.md) for the Mitsubishi model lineup.\nSee [used-vehicles.md](used-vehicles.md) for pre-owned and CPO inventory.\nSee [staff.md](staff.md) for full staff directory.\nSee [testimonials.md](/references/testimonials.md) for customer reviews.",

    "datasets/service-center": "# Basil Mitsubishi Service Center\n\nBasil Mitsubishi's service center is a state-of-the-art facility featuring factory-trained technicians, genuine Mitsubishi parts, and the latest diagnostic equipment. The department services all makes and models \u2014 not just Mitsubishi vehicles.\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Mon\u2013Fri | 8:00 AM \u2013 5:00 PM |\n| Sat | 9:00 AM \u2013 2:00 PM |\n| Sun | Closed |\n\n**Phone:** (716) 666-4574\n\n## Services Offered\n\n### Routine Maintenance\n- Oil changes (full synthetic)\n- Tire rotation and balancing\n- Battery replacement\n- Fluid replacements and top-offs\n- Engine air filter replacement\n- Wiper blade installation\n- State inspections\n\n### Diagnostics & Repairs\n- Check engine light diagnostics\n- Brake assembly repairs (genuine pads)\n- A/C and climate control repair\n- Suspension adjustments\n- Timing chain replacement\n- Transmission service\n- Major engine repairs\n\n### Seasonal Services\n- Winter tire installation\n- Cooling system service\n\n## Collision Center\n\nThe on-site collision center handles exterior body repairs:\n\n- Dings, dents, scrapes, and scuffs\n- Undercarriage inspection for structural integrity\n- Post-accident restoration\n\n## Parts Department\n\n- Genuine OEM Mitsubishi parts\n- Factory-approved components and accessories\n- Online ordering available\n- Cargo organizers, roof racks, and more\n\n**Parts Phone:** (716) 325-9715\n**Parts Hours:** Mon\u2013Fri 8\u20135, Sat 9\u20132, Sun closed\n\n## Service Perks\n\n- **Free 2-Way Shuttle** \u2014 complimentary local transport during service\n- **FREE Alignment Check** with every service visit\n- Online scheduling for convenience\n- Vehicle repair status updates\n- Loaner vehicles available (subject to availability)\n- Services all makes and models\n\n## Service Specials\n\nMonthly promotions and offers on vehicle service are available on the [service specials page](https://www.basilmitsubishi.com/service/service-specials/).\n\nSee [dealership.md](dealership.md) for full business profile.\nSee [staff.md](staff.md) for service team personnel.",

    "datasets/used-vehicles": "# Pre-Owned & Certified Vehicles\n\n## Pre-Owned Inventory\n\nWide-ranging inventory covering sedans, SUVs, crossovers, trucks, vans, and specialty vehicles from many leading brands \u2014 not limited to Mitsubishi. As of June 2026, over 1,499 vehicles in the PromptGraph API inventory, spanning makes including Nissan, Chevrolet, Ford, GMC, Volkswagen, Toyota, Land Rover, and Dodge.\n\n### Price Tiers\n\n- **Under $15,000** \u2014 Budget-friendly options\n- **Under $20,000** \u2014 Broader selection\n- **All price ranges** \u2014 Full inventory available online (typical range: $23,000\u2013$71,000)\n- **Priced Under 20k** \u2014 Dedicated filtered view on website\n\n## Certified Pre-Owned (CPO)\n\nMitsubishi Certified Pre-Owned vehicles undergo a multi-point inspection and include warranty protection for added peace of mind.\n\n- 101-Point Inspection on every used vehicle\n- 6-Month / 6,000-Mile Powertrain Warranty included\n- No-deductible CPO repair coverage\n- [CPO Warranty Details](https://www.basilmitsubishi.com/certified-pre-owned-warranty/)\n- [Browse CPO Inventory](https://www.basilmitsubishi.com/used-vehicles/certified-pre-owned-vehicles/)\n\n## Sell / Trade\n\n- Online trade-in appraisal via Kelley Blue Book \u2014 instant digital estimate from home\n- Highest trade-in allowance guaranteed\n- \"Get a quick online estimate on what your current vehicle is worth\"\n- [Value Your Trade](https://www.basilmitsubishi.com/sell-trade/)\n\n## Used Vehicle Quality Assurance\n\nEvery pre-owned vehicle at Basil Mitsubishi goes through:\n- **101-Point Inspection** \u2014 rigorous safety checklist before sale\n- **6-Month / 6,000-Mile Powertrain Warranty** on most used vehicles\n- **Free CARFAX / history reports** available on digital inventory listings\n- **Multi-point inspection** by certified technicians\n\n## Financing for Pre-Owned\n\nFinance department works with multiple lenders to find competitive rates and flexible terms for used vehicle purchases. Online credit application available. Special financing options for first-time buyers and credit-challenged applicants.\n\n## 2026 Summer Sales Event (applies to select used)\n\n- **$2,500 more for your trade** based on Kelley Blue Book fair market value (minus reconditioning, in-stock inventory only, excludes vehicles with over 80,000 miles, ends 6/30/26)\n- **0% APR** available on select certified pre-owned models\n\n## Additional Perks on Used Purchases\n\n- Free 2-Way Shuttle during service\n- FREE Alignment Check with every service visit\n- $200 Sales Referral Program\n- On the Spot Delivery\n\nSee [dealership.md](dealership.md) for full business profile and contact information.\nSee [testimonials.md](/references/testimonials.md) for customer reviews and experiences.",

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
