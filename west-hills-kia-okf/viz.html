    "datasets/dealership": "# West Hills Kia\n\nWest Hills Kia is a full-service Kia dealership located at **515 West Hills Blvd, Bremerton, WA 98312**, serving the greater Kitsap County area including Silverdale, Port Orchard, Poulsbo, Gig Harbor, Tacoma, and surrounding Washington communities.\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Sales | (360) 728-3062 |\n| Service | (360) 728-3063 |\n| Parts | (360) 728-3070 |\n\nEmail: dgandel@westhillshonda.com\n\n## Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 8:00 PM |\n| Wednesday | 9:00 AM - 8:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 8:00 PM |\n| Saturday | 9:00 AM - 8:00 PM |\n| Sunday | 10:00 AM - 7:00 PM |\n\n## Location\n\n- **Address:** 515 West Hills Blvd, Bremerton, WA 98312\n- **Geo:** 47.5567436, -122.6790752\n\n## New Vehicles\n\nKia models available include:\n\n### Electric Vehicles\n- **EV9** - Three-row all-electric SUV, up to 304 miles range, ultra-fast charging\n- **EV6** - All-electric crossover, sporty styling, available dual-motor AWD\n- **Niro EV** - Compact all-electric crossover, ideal for daily commuting\n\n### Hybrid Vehicles\n- **Sportage Hybrid** - Compact SUV with excellent fuel efficiency\n- **Sorento Hybrid** - Three-row SUV with hybrid efficiency\n- **Niro Hybrid** - Compact crossover, outstanding MPG\n- **Carnival Hybrid** - Minivan versatility with hybrid efficiency\n- **Telluride Hybrid** - Three-row SUV with hybrid powertrain\n\n### Plug-In Hybrid Vehicles\n- **Sportage Plug-In Hybrid** - Compact SUV PHEV\n- **Sorento Plug-In Hybrid** - Three-row SUV PHEV\n- **Niro Plug-In Hybrid** - Compact crossover PHEV\n\n### SUVs & Crossovers\n- **Telluride** - Award-winning three-row SUV, upscale interior\n- **Sorento** - Flexible three-row SUV, multiple powertrain options\n- **Sportage** - Versatile compact SUV, available in gas/hybrid/PHEV\n- **Seltos** - Stylish subcompact SUV\n\n### Sedans\n- **K4** - All-new compact sedan replacing the Forte\n- **K5** - Mid-size sedan, stylish design\n\n### Vans\n- **Carnival** - Multi-purpose passenger van, available as hybrid\n\n## Services\n\n- **Finance Department** - Loan and lease options, online credit application, trade-in appraisal, pre-qualification\n- **Service Center** - Kia-certified technicians, routine maintenance, diagnostics, major repairs, genuine Kia parts\n- **Parts Department** - Genuine Kia components, accessories, tires\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, certified pre-owned)\n- Online service scheduling\n- Online credit application and pre-approval\n- Car payment calculator\n- Trade-in valuation tool\n- Vehicle Upgrade Program\n\n## Staff\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- Aggregate rating: 4.6 / 5.0 (1,277+ reviews) across major platforms\n- Google Business Profile: 4.6 stars (1,200+ reviews)\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Haselwood Auto Group** - Part of the Haselwood family of dealerships\n- **Haselwood Military Appreciation Program** - $500 discount and 90-day no-payment option for active military and veterans\n- **Vehicle Upgrade Program** - Upgrade to a newer vehicle\n- **Fair Pricing** - Transparent, MSRP-based pricing\n- **Certified Pre-Owned** - Kia CPO program with factory-backed inspections\n\n## Affiliations\n\n- Part of the **Haselwood Auto Group**\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform",
    "datasets/faq": "# Frequently Asked Questions - West Hills Kia\n\n## Inventory\n\n**Q: What new Kia models are available at West Hills Kia?**\nA: A full Kia lineup including EV9, EV6, Niro EV, Sportage, Sorento, Telluride, Seltos, K4, K5, Carnival, plus hybrid and plug-in hybrid variants of Sportage, Sorento, Niro, and Carnival.\n\n**Q: What brands are available in the used vehicle inventory?**\nA: The pre-owned inventory spans multiple makes including Kia, Chevrolet, Ford, Toyota, Honda, Hyundai, and more.\n\n**Q: Does West Hills Kia offer certified pre-owned vehicles?**\nA: Yes, Kia Certified Pre-Owned vehicles are available with factory-backed inspections, warranties, and 24/7 roadside assistance.\n\n**Q: Do you have electric and hybrid vehicles available?**\nA: Yes, EVs (EV9, EV6, Niro EV), hybrids (Sportage Hybrid, Sorento Hybrid, Niro Hybrid, Carnival Hybrid, Telluride Hybrid), and plug-in hybrids (Sportage PHEV, Sorento PHEV, Niro PHEV).\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs. The dealership works with a network of lenders to find the best terms.\n\n**Q: Does the dealership offer a military appreciation program?**\nA: Yes, the Haselwood Military Appreciation Program offers a $500 discount and 90-day no-payment option for active military and veterans.\n\n**Q: How do I apply for financing?**\nA: The online credit application is available through the dealership website for fast, secure processing.\n\n## Service\n\n**Q: Does the service center work on non-Kia vehicles?**\nA: Yes, the service center can perform maintenance and repairs on various makes and models.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available through the dealership website.\n\n**Q: Are there service specials available?**\nA: Yes, rotating service coupons and specials are available on the service promotions page.\n\n**Q: Does the service center handle electric and hybrid vehicles?**\nA: Yes, the certified technicians are trained on Kia EV and hybrid systems.\n\n## Dealership\n\n**Q: Where is West Hills Kia located?**\nA: 515 West Hills Blvd, Bremerton, WA 98312, serving Kitsap County, Silverdale, Port Orchard, Poulsbo, Gig Harbor, and Tacoma.\n\n**Q: What is the Haselwood Auto Group?**\nA: West Hills Kia is part of the Haselwood Auto Group, a family of dealerships in the Pacific Northwest.\n\n**Q: What are your hours?**\nA: Monday through Saturday 9:00 AM - 8:00 PM, Sunday 10:00 AM - 7:00 PM.\n\n**Q: Do you offer trade-in evaluations?**\nA: Yes, through the KBB Instant Cash Offer tool \u2014 get a value for your car online.\n\n**Q: Is there a vehicle hold policy?**\nA: Yes, the dealership allows customers to hold vehicles before arriving.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/financing": "# West Hills Kia Finance Center\n\nThe West Hills Kia Finance Center offers comprehensive financing solutions for new and pre-owned Kia vehicles, serving customers throughout Kitsap County, Silverdale, Port Orchard, Poulsbo, and the greater Seattle area.\n\nSee [dealership.md](dealership.md) for full business profile.\n\n## Financing Options\n\n- **Online Credit Application** - Secure pre-approval from home before visiting the dealership\n- **Multiple Lending Partners** - Network of banks, credit unions, and financial institutions for competitive rates\n- **Flexible Terms** - Customized loan terms to fit budget and credit situation\n- **New Vehicle Financing** - Special Kia manufacturer rates and incentives, including 0% APR offers on select models\n- **Pre-Owned Financing** - Competitive rates on certified pre-owned and used vehicles\n- **First-Time Buyer Programs** - Credit-building opportunities for those with limited history\n- **Vehicle Protection Plans** - Extended warranties, GAP coverage, and tire-and-wheel protection\n\n## Leasing\n\n- Low monthly payments with option to purchase at lease end\n- Flexible mileage allowances\n- Pull-ahead programs for current Kia lessees\n- Lease-end options: purchase, trade, or return\n\n## Buying vs Leasing\n\n| Factor | Buying | Leasing |\n|---|---|---|\n| Monthly Payment | Higher | Lower |\n| Ownership | You own the vehicle | Dealership owns; you return it |\n| Mileage Limits | Unlimited | Annual cap (typically 10,000-15,000 miles) |\n| Customization | Fully customizable | Limited modifications |\n| End of Term | Paid off; keep or trade | Return, purchase, or lease new |\n| Warranty | After factory warranty expires | Typically covered by factory warranty |\n\n## Trade-In\n\n- Instant online trade-in valuation powered by Kelley Blue Book\n- Competitive offers based on market value, condition, and mileage\n- Trade equity can be applied toward down payment\n- Vehicle Upgrade Program for current owners\n\n## Payment Calculators\n\n- New vehicle payment estimator\n- Used vehicle payment estimator\n- Lease payment calculator\n- Trade-in value tool\n- Affordability calculator based on income and expenses\n\n## Contact\n\n| Department | Phone |\n|---|---|\n| Finance Center | (360) 728-3062 |\n\nEmail: dgandel@westhillshonda.com\n\n## Location\n\n**West Hills Kia** - 515 West Hills Blvd, Bremerton, WA 98312\n\nOnline credit application available at [westhillskia.com/finance](https://www.westhillskia.com/finance/).",
    "datasets/new-vehicles": "# New Kia Models - West Hills Kia\n\nWest Hills Kia carries a full lineup of new Kia vehicles. Below is a summary of available models and trims.\n\n## Electric Vehicles\n\n### Kia EV9\nThree-row all-electric SUV, Kia's flagship EV. Up to 304 miles estimated range. Ultra-fast 800V DC charging (10-80% in ~24 minutes). Available in Light, Wind, Land, and GT-Line trims. Available in RWD and e-AWD. Seats up to 7 passengers. Towing capacity up to 5,000 lbs.\n\n### Kia EV6\nAll-electric crossover with sporty styling and performance. Up to 310 miles estimated range. 800V DC fast-charging capable. Available in RWD and dual-motor e-AWD. GT version delivers 576 hp.\n\n### Kia Niro EV\nCompact all-electric crossover. Practical range for daily commuting. Available in Wind and Wave trims. Ideal for Kitsap County drivers making the switch to electric.\n\n## Hybrid Vehicles\n\n### Kia Sportage Hybrid\nCompact SUV with excellent fuel efficiency. Available in LX, EX, and SX Prestige trims. Combined ~43 MPG estimated. Standard AWD.\n\n### Kia Sorento Hybrid\nThree-row SUV with hybrid efficiency. Seats up to 7 passengers. Available in S, EX, and SX Prestige trims. Excellent fuel economy for a three-row SUV.\n\n### Kia Niro Hybrid\nCompact crossover designed for outstanding MPG - up to 53 city / 54 highway. Available in LX, EX, and SX Touring trims.\n\n### Kia Carnival Hybrid\nMinivan versatility with hybrid efficiency. Seats up to 8 passengers. 33 MPG combined, 242 hp. Perfect for growing families in Kitsap County.\n\n### Kia Telluride Hybrid\nAward-winning three-row SUV now available with hybrid powertrain. Upscale interior and advanced technology.\n\n## Plug-In Hybrid Vehicles\n\n### Kia Sportage Plug-In Hybrid\nCompact SUV PHEV with ~34 miles all-electric range. Combined 470+ miles total range. Available in X-Line and X-Line Prestige trims.\n\n### Kia Sorento Plug-In Hybrid\nThree-row SUV PHEV with ~32 miles all-electric range. Seats up to 6 passengers.\n\n### Kia Niro Plug-In Hybrid\nCompact crossover PHEV with ~33 miles all-electric range. Outstanding total range.\n\n## SUVs & Crossovers\n\n### Kia Telluride\nAward-winning three-row SUV. Available in LX, S, EX, SX, and SX Prestige trims. Powered by 3.8L V6 engine (291 hp). Seats up to 8 passengers. Towing capacity up to 5,000 lbs.\n\n### Kia Sorento\nFlexible three-row SUV available with gas, hybrid, and plug-in hybrid powertrains. Available in LX, S, EX, SX, and SX Prestige trims. Seats up to 7 passengers.\n\n### Kia Sportage\nVersatile compact SUV available in gas, hybrid, and plug-in hybrid versions. Redesigned interior with dual 12.3-inch displays. Available AWD.\n\n### Kia Seltos\nStylish subcompact SUV. Available in LX, S, EX, and SX trims. Available AWD. Perfect entry-level SUV.\n\n## Sedans\n\n### Kia K4\nAll-new compact sedan replacing the Forte. Modern design with advanced technology. Available in LX, EX, and GT-Line trims.\n\n### Kia K5\nMid-size sedan with bold design. Available in LX, EX, GT-Line, and GT trims. GT version features 2.5L turbo engine (290 hp).\n\n## Vans\n\n### Kia Carnival\nMulti-purpose passenger van. Available in LX, EX, SX, and SX Prestige trims. Powered by 3.5L V6 engine. Seats up to 8 passengers. Sliding doors for easy access.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Kia offers national and regional incentives. Contact the dealership for current offers.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - West Hills Kia\n\nThe West Hills Kia Service Center provides certified maintenance and repair services at 515 West Hills Blvd, Bremerton, WA.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes, tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis\n- **Major Repairs** - Transmission service, engine repair, suspension work\n- **EV Maintenance** - Specialized electric vehicle service and battery health checks\n- **Hybrid Service** - Hybrid system diagnostics and maintenance\n- **Tire Replacement and Alignment** - Full tire services including balancing\n- **Brake Service** - Pad replacement, rotor replacement, fluid flush\n- **Battery Service** - Testing, replacement, and electrical system diagnostics\n- **A/C Service** - Air conditioning repair and maintenance\n- **Scheduled Maintenance** - Following Kia's recommended maintenance schedule\n\n## Service Team\n\n- **Jason Crosier** - Service Advisor; praised for outstanding communication and warranty advocacy\n- **Jason** - Service Advisor; praised for efficient service and clear explanations\n\n## Service Experience\n\n- **Online scheduling** available through the dealership website\n- **Service Coupons** - Rotating service specials and discounts\n- **Certified Kia Technicians** - Factory-trained using genuine Kia parts\n- **Full-Service Support** - From routine oil changes to major collision repairs\n\n## Service Specials\n\nThe dealership offers rotating service specials and coupons. See the service specials page for current promotions.\n\n## Parts Department\n\nGenuine Kia OEM parts and accessories available including:\n- Kia Genuine replacement parts\n- Tires and wheels\n- Accessories for Kia vehicles\n- Order parts online or stop by\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 9:00 AM - 8:00 PM |\n| Tuesday | 9:00 AM - 8:00 PM |\n| Wednesday | 9:00 AM - 8:00 PM |\n| Thursday | 9:00 AM - 8:00 PM |\n| Friday | 9:00 AM - 8:00 PM |\n| Saturday | 9:00 AM - 8:00 PM |\n| Sunday | 10:00 AM - 7:00 PM |\n\nSee [staff.md](staff.md) for full service department directory.\nSee [dealership.md](dealership.md) for contact information.",
    "datasets/staff": "# Staff Directory - West Hills Kia\n\nStaff directory compiled from the dealership website, customer reviews, and PromptGraph data.\n\n## Management\n\n- **Ken Hynek** - General Manager; long-tenured leader known for supportive management culture\n- **Colton Weeks** - Sales management; consistently praised across a decade of customer reviews\n\n## Sales Consultants\n\n- **Colton Weeks** - Sales professional; praised by customers for patience, listening skills, and finding the right vehicle within budget\n- **Gabe Kilroy** - Sales Consultant; known for going above and beyond to get customers a great deal\n- **Stephen** - Sales Consultant; praised for knowledge and bringing amazing prices without pressure\n- **Matt M. / Matthew Moreland** - Sales Consultant; long-term staff member praised since 2016 for listening skills\n- **Jamal** - Sales Consultant; praised for helping customers feel comfortable\n- **Jose** - Sales Consultant; part of the team making the buying process smooth\n- **Michael** - Sales Consultant; praised for making first-time car buying amazing\n\n## Finance Department\n\n- **Hailey** - Finance staff; praised for making the finance process smooth and clear\n- **Dan S.** - Finance staff; documented in historical reviews for transparent negotiation\n\n## Service Department\n\n- **Jason Crosier** - Service Advisor; praised for going above and beyond on warranty issues, explaining what needs immediate attention versus what can wait, outstanding communication\n- **Jason** - Service Advisor; praised for fixing issues and providing updates\n\n## Parts Department\n\nParts team available to assist with genuine Kia parts and accessories. Contact the parts department at (360) 728-3070.\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews referencing specific staff members.",
    "datasets/used-vehicles": "# Pre-Owned and Certified Pre-Owned Vehicles - West Hills Kia\n\nWest Hills Kia maintains a substantial pre-owned vehicle inventory in the Bremerton area with a wide selection spanning multiple makes and models.\n\n## Inventory Scope\n\n- **Total vehicles:** Extensive inventory across new and pre-owned (hundreds in stock)\n- **Multi-make selection** spanning Kia, Chevrolet, Ford, Toyota, Honda, Hyundai, and more\n- **Price range:** Broad range from under $10,000 to premium vehicles\n- **Vehicle types:** Sedans, SUVs, trucks, vans, coupes, and EVs\n- **Vehicles under $20,000** - Dedicated budget-friendly selection\n- **Daily fresh inventory** with regular turnover\n\n## Quality Assurance\n\n- **Multi-Point Inspection** - All pre-owned vehicles inspected by certified technicians\n- **Kia Certified Pre-Owned (CPO)** - Factory-backed inspections, warranties, and roadside assistance\n- **Vehicle Service Contracts** - Available for most vehicles to prevent unexpected expenses\n- **Carfax History Reports** - Available on request\n\n## Certified Pre-Owned Program\n\nKia Certified Pre-Owned vehicles undergo rigorous inspection and include:\n- Kia factory-backed limited warranty\n- 24/7 roadside assistance\n- Multi-point inspection by certified Kia technicians\n- Competitive pricing with transparent value\n- Integration with financing and service departments\n\n## Online Buying Tools\n\n- Online inventory browsing and filtering\n- Value Your Trade tool (KBB Instant Cash Offer)\n- Car payment calculator\n- Online credit application and pre-approval\n- Vehicle hold policy\n- Vehicle Upgrade Program\n\n## Trade-In\n\n- Trade-in appraisal available (KBB Instant Cash Offer)\n- Cash offers for trade-ins (even without vehicle purchase)\n- Competitive trade-in values\n- Sell your car online tool\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",
    "references/ai-discovery-page": "# AI Discovery Page - West Hills Kia\n\nThe AI Discovery Page is a structured, machine-readable knowledge surface for AI agents, powered by [PromptGraph](https://promptgraph.ai). It exposes semantic endpoints, business metadata, inventory data, and LLM-friendly action definitions. The site is built on the **Dealer.com** platform.\n\nThe AI Discovery Page was successfully fetched and is available at `/ai-discovery-page.htm`.\n\n## AI Manifest (`/.well-known/ai-manifest.json`)\n\nThe AI Manifest (v1.0) provides a machine-readable directory of all AI resources:\n\n- **Last updated:** 2026-07-01T12:31:13.424Z\n- **Schema types:** `LocalBusiness`, `AutoDealer`, `Car`, `ItemList`, `Review`, `AggregateRating`, `Offer`\n- **Contact:** dgandel@westhillshonda.com\n\nNote: The AI Manifest is accessible via PromptGraph API and may not be available at the standard `/.well-known/ai-manifest.json` path.\n\n## PromptGraph API Endpoints\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/west-hills-kia` exposes these endpoints:\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Business profile (JSON-LD) |\n| `/vehicles` | Vehicle inventory (JSON-LD) |\n| `/prompts` | Q&A / FAQ prompts (10 prompts) |\n| `/testimonials` | Customer reviews |\n| `/llms.txt` | LLMs.txt directive |\n| `/.well-known/ai-manifest.json` | AI Manifest |\n| `/sitemap.xml` | Full sitemap |\n| `/config.json` | System configuration |\n\n### Additional Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/gbp-context` | Flattened Google Business Profile data for LLM ingestion |\n| `/site-content` | Clean, plain-text mirror of the entire site |\n| `/offers` | Current offers and incentives |\n\n## MCP Server\n\nWest Hills Kia provides a Model Context Protocol (MCP) server for AI agent inventory queries:\n\n- **MCP Endpoint:** `https://mcp.promptgraph.ai/west-hills-kia/mcp`\n- **HTTP Inventory Route:** `/llm-inventory.htm`\n\n## Business Profile (Schema.org AutoD  Financing** - Bremerton's go-to for new Kia hybrids and SUVs\n4. **Certified Care at West Hills Kia Bremerton** - Trusted Kia hub with certified auto mechanics\n5. **Drive New Kia Style from West Hills Bremerton** - Exciting Bremerton dealer showcasing new Kia stars\n6. **West Hills Kia: Fair Prices, Full-Service Reliability** - Reliable full-service dealership\n7. **Bremerton Kia Hybrids & Service Excellence** - Powerhouse for hybrid Kias\n8. **Your West Hills Kia: New Rides to Expert Repairs** - Ultimate Kia destination\n9. **Do people like working with West Hills Kia?** - Employee and customer feedback synthesis\n10. **What's it actually like dealing with West Hills Kia?** - On-the-ground customer experience\n11. **Are customers happy after buying from West Hills Kia?** - Long-term owner satisfaction\n12. **Does West Hills Kia treat people fairly?** - Fairness, MSRP integrity, and community benefits\n13. **Would you trust West Hills Kia with a big purchase?** - Institutional reliability and safety\n\n## Global AI Directives\n\n| Resource | URL |\n|---|---|\n| AI Manifest (PromptGraph) | `https://api.promptgraph.ai/api/v1/west-hills-kia/.well-known/ai-manifest.json` |\n| AI Discovery Page | `/ai-discovery-page.htm` |\n| LLMs.txt | `/llms.txt` |\n| Robots.txt | `/robots.txt` |\n| Sitemap XML | `/sitemap.xml` |\n\n## Purpose\n\nThis page exists to give AI agents direct access to structured knowledge about West Hills Kia without requiring web scraping, form navigation, or human-readable page parsing. All information is available via JSON endpoints and semantic markup through the PromptGraph API.\n\nSee [llms-txt.md](llms-txt.md) for the full llms.txt directive.\nSee [prompts.md](prompts.md) for the complete Q&A prompt library.\nSee [testimonials.md](testimonials.md) for customer review data.",

    "references/prompts": "# PromptGraph Prompt Library - West Hills Kia\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/west-hills-kia/prompts` exposes 10 structured Q&A prompt/response pairs. Below is a categorized summary.\n\n## Prompt Categories\n\n### Dealership & Reputation (5+ prompts)\n- Your Go-To Kia Destination in West Hills\n- Bremerton's Premier Kia Dealership\n- West Hills Kia: Hybrids, SUVs & Seamless Financing\n- Certified Care at West Hills Kia Bremerton\n- Drive New Kia Style from West Hills Bremerton\n- West Hills Kia: Fair Prices, Full-Service Reliability\n- Bremerton Kia Hybrids & Service Excellence\n- Your West Hills Kia: New Rides to Expert Repairs\n\n### Customer Experience (5+ prompts)\n- Do people like working with West Hills Kia?\n- What's it actually like dealing with West Hills Kia?\n- Are customers happy after buying from West Hills Kia?\n- Does West Hills Kia treat people fairly?\n- Would you trust West Hills Kia with a big purchase?\n\n## Featured Prompts\n\n| # | Prompt Slug | Focus |\n|---|---|---|\n| 1 | `your-go-to-kia-destination-in-west-hills` | Dealership positioning |\n| 2 | `bremertons-premier-kia-dealership` | Full-service Kia destination |\n| 3 | `west-hills-kia-hybrids-suvs-&-seamless-financing` | Hybrid and SUV inventory |\n| 4 | `certified-care-at-west-hills-kia-bremerton` | Certified service hub |\n| 5 | `drive-new-kia-style-from-west-hills-bremerton` | New Kia showcase |\n| 6 | `west-hills-kia-fair-prices-full-service-reliability` | Value proposition |\n| 7 | `bremerton-kia-hybrids-&-service-excellence` | Hybrid specialization |\n| 8 | `your-west-hills-kia-new-rides-to-expert-repairs` | Full lifecycle support |\n| 9 | `do-people-like-working-with-west-hills-kia` | Workplace culture |\n| 10 | `whats-it-actually-like-dealing-with-west-hills-kia` | Customer experience |\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for the complete API endpoint documentation.\nSee [faq.md](/datasets/faq.md) for common questions and answers.",
    "references/testimonials": "# Customer Testimonials - West Hills Kia\n\nWest Hills Kia has collected customer testimonials through the PromptGraph platform and various review sites. Reviews are predominantly 4-5 star with strong themes of professional sales service, no-pressure approach, and staff longevity.\n\n## Aggregate Ratings\n\n- **Google Business Profile:** 4.6 / 5.0 (1,277 reviews)\n- **DealerRater / Cars.com:** Predominantly 4-5 star\n\n## Most-Praised Staff (by frequency)\n\n- **Colton Weeks** - Excellent salesperson, patient, great listener, consistently praised across a decade of reviews (2016-2026)\n- **Jason Crosier** - Service advisor who advocates for customers, excellent communication, explains what needs immediate attention\n- **Gabe Kilroy** - Knowledgeable, went above and beyond to get a great deal\n- **Stephen** - Salesperson who brought amazing prices, knowledgeable about vehicles\n- **Michael** - Made first-time car buying amazing, explained all vehicle details\n- **Hailey** - Finance staff who made the process smooth and clear\n\n## Notable Excerpts\n\n> \"I did not feel pressured at any time, which I really appreciated, as purchasing a car is one of the most stressful experiences to me. Many thanks to everyone at West Hills Kia!\" - williamschipp (Jan 2026)\n\n> \"Colton helped us and was so great when we had both our toddlers in tow! Honestly the entire staff took care of us. Everyone was kind and friendly.\" - Ashley H. (Feb 2025)\n\n> \"Gabe was amazing, he made sure we were taken care of and did everything in his power to get us a great deal.\" - Aviont488 (Jan 2025)\n\n> \"I walked into West Hills Kia to do some looking around... little did I know they had the exact 2026 Sorento I was looking for on the lot... he came back with an amazing price I'd be foolish to pass up.\" - CJ Buino (Dec 2025)\n\n> \"Michael made the experience of buying my first new car absolutely amazing... explained all the details of the car I was interested in. The process was so smooth... confidence in my decision!\" - Mackenzie Wilder (Jan 2026)\n\n> \"Jason, our service rep has been absolutely the best... has gone out of his way in tracking down information and pursuing warranty issues.\" - Verified 2023 Kia Sportage Owner (Dec 2025)\n\n> \"Jason was very helpful and took the time to explain what needed immediate attention and what could wait... friendly, kind, and competent.\" - Elizabeth (Nov 2025)\n\n> \"Purchasing my Sportage was an enjoyable experience. Matt M and Colton were so patient with me and good listeners... finding me exactly what I wanted within my budget.\" - A. Larson (Oct 2016)\n\n## Sales Themes\n\n- **No-pressure approach** - Customers consistently mention not feeling pressured\n- **Patient and understanding** - Staff praised for patience and listening skills\n- **Knowledgeable staff** - Sales consultants know their vehicles inside and out\n- **Transparent pricing** - Up-front about costs and fair pricing\n- **Staff longevity** - Key staff members (Colton Weeks) praised across a decade of reviews\n\n## Service Themes\n\n- **Excellent communication** - Service advisors keep customers informed throughout the process\n- **Warranty advocacy** - Staff go above and beyond on warranty issues\n- **Thorough explanations** - Advisors explain what needs immediate attention vs what can wait\n- **Efficient turnaround** - Service completed in a timely manner\n\nSee [staff.md](/datasets/staff.md) for the full staff directory.",

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
