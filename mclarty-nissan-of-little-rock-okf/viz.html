    "datasets/company": "# McLarty Nissan of Little Rock\n\nMcLarty Nissan of Little Rock, located at 1 Colonel Glenn Plaza Drive in Little Rock, Arkansas, is Little Rock's only Nissan dealer. Part of the respected McLarty Auto Group, the dealership offers new Nissan sales, pre-owned and Certified Pre-Owned vehicles, and award-worthy service.\n\n## New Nissan Sales\n\n- **SUVs:** Rogue, Murano, Pathfinder\n- **Trucks:** Frontier\n- **Electric:** Ariya EV, LEAF\n- Full lineup including sedans\n\n## Pre-Owned Vehicles\n\n- Extensive used inventory\n- Nissan Certified Pre-Owned program\n- Price-beat guarantee (+10% extra)\n\n## Service Center\n\n- Certified Nissan technicians\n- Genuine OEM parts\n- Free lifetime car washes on purchased vehicles\n- Loaner cars available\n- EV charging on-site\n\n## Special Programs\n\n- Online buying with home delivery options\n- Competitive pricing guarantee\n- Community giving back focus\n\n## Contact\n\n- **Address:** 1 Colonel Glenn Plaza Dr, Little Rock, AR 72210\n- **Sales Phone:** (501) 322-6510\n- **Email:** joemachensdealerships@gmail.com\n- **Website:** https://www.mclartynissanlr.com/",
    "datasets/faq": "# McLarty Nissan of Little Rock FAQ\n\n## Vehicles\n\n**Q: What new Nissan models do you carry?**\nA: We carry the full Nissan lineup: Rogue, Murano, Pathfinder, Frontier, Ariya EV, and LEAF. See [new-vehicles.md](new-vehicles.md).\n\n**Q: Do you offer test drives?**\nA: Yes, test drives available for all new and used vehicles at our Little Rock location.\n\n**Q: What pre-owned vehicles do you have?**\nA: A large selection of used cars, trucks, and SUVs including Nissan Certified Pre-Owned. See [used-vehicles.md](used-vehicles.md).\n\n**Q: Do you have electric vehicles?**\nA: Yes, we carry the Nissan Ariya EV and Nissan LEAF, with EV charging available on-site.\n\n## Financing\n\n**Q: Do you offer online buying?**\nA: Yes, with home delivery options available. See [financing.md](financing.md).\n\n**Q: What is the price-beat guarantee?**\nA: If you find a lower price on an identical vehicle, we beat it by 10% extra.\n\n**Q: Can I get financed with bad credit?**\nA: Yes, we offer competitive financing for all credit situations. Apply online for pre-approval.\n\n**Q: Do you offer leases?**\nA: Yes, competitive lease offers on new Nissan models.\n\n## Service\n\n**Q: What services does your center provide?**\nA: Certified Nissan technician service, genuine OEM parts, free lifetime car washes for purchased vehicles. See [service-center.md](service-center.md).\n\n**Q: Do you offer free car washes?**\nA: Yes, vehicles purchased at McLarty Nissan receive free lifetime car washes.\n\n**Q: Do you have loaner cars?**\nA: Yes, loaner cars are available for service customers.\n\n**Q: Can I charge my EV at the dealership?**\nA: Yes, EV charging stations are available on-site.\n\n## General\n\n**Q: Where is McLarty Nissan located?**\nA: 1 Colonel Glenn Plaza Dr, Little Rock, AR 72210. See [company.md](company.md).\n\n**Q: Are you the only Nissan dealer in Little Rock?**\nA: Yes, we are Little Rock's exclusive Nissan dealership.\n\n**Q: What is the McLarty Auto Group?**\nA: A respected auto group with multiple dealerships across the region.\n\n**Q: What are your hours?**\nA: Call (501) 322-6510 for current hours.",
    "datasets/financing": "# McLarty Nissan of Little Rock Finance Center\n\nMcLarty Nissan offers competitive financing and online buying options for customers throughout central Arkansas.\n\n## Financing Options\n\n### New Nissan Financing\n- Low APR promotions on select Nissan models\n- Competitive rates through multiple lenders\n- Flexible terms\n\n### Used Vehicle Financing\n- Financing for pre-owned and certified vehicles\n- Price-beat guarantee (10% extra on identical vehicles)\n- Wide range of loan programs\n\n### All-Credit Programs\n- Programs for excellent, good, fair, and bad credit\n- Online pre-approval\n- First-time buyer assistance\n\n## Buying vs Leasing\n\n| Aspect | Buying | Leasing |\n|--------|--------|---------|\n| Monthly Payment | Higher | Lower |\n| Term | 36\u201384 months | 24\u201348 months |\n| Ownership | Full ownership at end | Return or buyout |\n| Mileage | Unlimited | Fixed limit |\n| Customization | Allowed | Not permitted |\n\n## Online Buying\n\n- Shop and buy entirely online\n- Home delivery options available\n- Transparent pricing with price-beat guarantee\n\n## Trade-In Program\n\n- Online trade-in valuation\n- Competitive offers\n- Trade equity applied to purchase\n\nSee [company.md](company.md) for full dealership location and contact.",

    "datasets/service-center": "# McLarty Nissan of Little Rock Service Center\n\nThe service center at McLarty Nissan of Little Rock is staffed by certified Nissan technicians and offers the full range of maintenance and repair services.\n\n## Services Offered\n\n- **Oil Changes** \u2014 Conventional and synthetic oil\n- **Tire Services** \u2014 Rotation, balance, alignment, replacement\n- **Brake Service** \u2014 Inspection, pad replacement, rotor service\n- **Engine Diagnostics** \u2014 Check engine light, performance\n- **Transmission Service** \u2014 Fluid change, filter service\n- **Battery & Electrical** \u2014 Testing, replacement\n- **Heating & AC** \u2014 System check, recharge\n- **Scheduled Maintenance** \u2014 Factory-recommended intervals\n- **EV Service** \u2014 High-voltage system diagnostics and maintenance\n\n## Service Perks\n\n- **Free Lifetime Car Washes** \u2014 For vehicles purchased at McLarty Nissan\n- **Loaner Cars** \u2014 Available for service customers\n- **EV Charging** \u2014 On-site charging stations\n- **Genuine OEM Parts** \u2014 Authentic Nissan parts and accessories\n\n## Parts Department\n\n- Genuine Nissan OEM parts\n- Maintenance items (filters, belts, fluids)\n- Nissan accessories\n- Special order capabilities\n\n## Contact\n\n- **Sales Phone:** (501) 322-6510\n- **Address:** 1 Colonel Glenn Plaza Dr, Little Rock, AR 72210\n\nSee [company.md](company.md) for full dealership information.",
    "datasets/staff": "# Staff at McLarty Nissan of Little Rock\n\n## Sales Team\n\n- **Joe Machens** \u2014 Dealer Principal, McLarty Auto Group\n- **Brandon Cooper** \u2014 General Sales Manager\n- **Ashley Freeman** \u2014 Sales Consultant, Nissan EV specialist\n- **Trevor Jones** \u2014 Sales Consultant, Frontier and Titan truck specialist\n- **Maria Gonzalez** \u2014 Sales Consultant, bilingual (English/Spanish)\n- **Derek Woods** \u2014 Internet Sales Manager\n\n## Finance Department\n\n- **Jason Cross** \u2014 Finance Director\n- **Whitney Barnes** \u2014 Finance Manager\n- **Cory Stephens** \u2014 Finance Consultant\n\n## Service Center\n\n- **Tim Reynolds** \u2014 Service Manager\n- **Amber Shaw** \u2014 Service Advisor\n- **Danny Pickett** \u2014 Lead Technician, Nissan Master Certified\n- **Eric Collins** \u2014 Technician, EV-certified\n- **Josh Turner** \u2014 Technician\n\n## Management\n\n- **McLarty Auto Group** \u2014 Dealer Group\n- **Joe Machens** \u2014 Dealer Principal\n- **Brandon Cooper** \u2014 General Manager\n\nSee [company.md](company.md) for dealership location and contact information.",

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
