<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>daner-law - OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }
main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty { text-align: center; margin-top: 40px; }
.detail-header { margin-bottom: 12px; }
.detail-header h1 { font-size: 18px; margin: 4px 0 2px; font-weight: 600; }
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt { color: #64748b; font-weight: 500; }
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }
.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}
hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }
#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 { font-size: 16px; margin: 18px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #e2e8f0; }
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: ui-monospace, "SF Mono", Consolas, monospace; }
#detail-body pre { background: #0f172a; color: #e2e8f0; padding: 10px 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td { border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px; }
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }
#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }
</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>
<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>
<script>
window.BUNDLE_NAME = "daner-law";
window.BUNDLE = {
  "nodes": [
    {
      "data": {
        "id": "datasets/company",
        "label": "Daner Law Firm",
        "type": "Law Firm",
        "description": "Law firm founded by Adam M. Daner specializing in estate planning, business planning, and litigation serving clients in California, Nevada, and Idaho from offices in Twin Falls, Idaho and Atascadero, California.",
        "resource": "https://danerlaw.com/",
        "tags": [],
        "color": "#8b5cf6",
        "size": 19
      }
    },
    {
      "data": {
        "id": "references/ai-discovery-page",
        "label": "Daner Law Firm AI Discovery",
        "type": "AI Discovery Page",
        "description": "AI discovery and knowledge graph page for Daner Law Firm containing structured entity data for AI consumption.",
        "resource": "https://danerlaw.com/",
        "tags": [],
        "color": "#10b981",
        "size": 29
      }
    },
    {
      "data": {
        "id": "references/llms-txt",
        "label": "Daner Law Firm LLMs.txt",
        "type": "LLMs Text",
        "description": "LLMs.txt reference document for AI consumption containing key facts about Daner Law Firm.",
        "resource": "https://danerlaw.com/",
        "tags": [],
        "color": "#10b981",
        "size": 20
      }
    },
    {
      "data": {
        "id": "references/prompts",
        "label": "Daner Law Firm AI Prompts",
        "type": "Prompts",
        "description": "Curated prompts for interacting with AI about Daner Law Firm estate planning, business counseling, and litigation services.",
        "resource": "https://danerlaw.com/",
        "tags": [],
        "color": "#10b981",
        "size": 19
      }
    }
  ],
  "edges": [],
  "bodies": {
    "datasets/company": "# Daner Law Firm\n\nDaner Law is a law firm founded by Adam M. Daner providing legal services in estate planning, business planning, and litigation across California, Nevada, and Idaho.\n\n## Offices\n\n| Office | Address | Phone |\n|--------|---------|-------|\n| Twin Falls (Main) | 250 2nd Ave. South, Suite G, Twin Falls, ID 83301 | (208) 398-4828 |\n| Atascadero | 4555 El Camino Real STE J, Atascadero, CA 93422 | (805) 464-5003 |\n\n## Hours\n\n| Day | Hours |\n|-----|-------|\n| Monday - Friday | 8:00 AM - 5:00 PM |\n| Saturday - Sunday | Closed |\n\n## Services\n\n### Estate Planning\n- Wills\n- Trusts\n- Probate\n\n### Business Planning\n- Business formation\n- General counsel\n\n### Litigation & Dispute Resolution\n- Property disputes\n- Wills and trusts litigation\n- Personal injury\n\n## Attorney\n\n### Adam M. Daner\n\n- **Education**: Occidental College (BA 1991), University of San Diego School of Law (JD 1994)\n- **Bar Admissions**: California (1994), Nevada (2000), Idaho (2024)\n- **Experience**: 30+ years of legal practice\n\n## Citations\n\n- [Daner Law Official Website](https://danerlaw.com/)",
    "references/ai-discovery-page": "# Daner Law Firm \u2014 AI Discovery Page\n\n## Entity: Daner Law Firm\n\n- **Type**: Law Firm\n- **Founder**: Adam M. Daner\n- **Founded**: 1994 (California bar admission)\n- **Practice Areas**: Estate Planning, Business Planning, Litigation & Dispute Resolution\n- **Jurisdictions**: California, Nevada, Idaho\n\n## Entity: Adam M. Daner\n\n- **Role**: Founder and Attorney\n- **Education**: Occidental College (BA 1991), University of San Diego School of Law (JD 1994)\n- **Licenses**: California Bar (1994), Nevada Bar (2000), Idaho Bar (2024)\n- **Experience**: 30+ years\n\n## Locations\n\n- **Twin Falls Office**: 250 2nd Ave. South, Suite G, Twin Falls, ID 83301 \u2014 (208) 398-4828\n- **Atascadero Office**: 4555 El Camino Real STE J, Atascadero, CA 93422 \u2014 (805) 464-5003\n\n## Service Taxonomy\n\n```\nEstate Planning\n\u251c\u2500\u2500 Wills\n\u251c\u2500\u2500 Trusts\n\u2514\u2500\u2500 Probate\nBusiness Planning\n\u251c\u2500\u2500 Business Formation\n\u2514\u2500\u2500 General Counsel\nLitigation & Dispute Resolution\n\u251c\u2500\u2500 Property Disputes\n\u251c\u2500\u2500 Wills & Trusts Litigation\n\u2514\u2500\u2500 Personal Injury\n```\n\n## Citations\n\n- [Daner Law Official Website](https://danerlaw.com/)",
    "references/llms-txt": "# Daner Law Firm \u2014 LLMs.txt\n\n## About\n\nDaner Law is a law firm founded by Adam M. Daner specializing in estate planning, business planning, and litigation. The firm serves clients in California, Nevada, and Idaho.\n\n## Offices\n\n- **Twin Falls, ID**: 250 2nd Ave. South, Suite G, Twin Falls, ID 83301 \u2014 (208) 398-4828\n- **Atascadero, CA**: 4555 El Camino Real STE J, Atascadero, CA 93422 \u2014 (805) 464-5003\n\n## Hours\n\nMonday\u2013Friday 8:00 AM \u2013 5:00 PM. Closed Saturday and Sunday.\n\n## Services\n\n- **Estate Planning**: Wills, trusts, probate\n- **Business Planning**: Formation, general counsel\n- **Litigation & Dispute Resolution**: Property disputes, wills/trusts litigation, personal injury\n\n## Attorney\n\n**Adam M. Daner** \u2014 BA Occidental College (1991), JD University of San Diego School of Law (1994). Licensed in California (1994), Nevada (2000), Idaho (2024). 30+ years of experience.\n\n## Website\n\nhttps://danerlaw.com/",
    "references/prompts": "# Daner Law Firm \u2014 AI Prompts\n\n## Prompt 1: Estate Planning Overview\n\n```\nYou are a knowledgeable legal assistant for Daner Law Firm. A potential client asks about\nestate planning options. Explain the differences between wills and trusts, the probate\nprocess, and how Daner Law can assist with estate planning in California, Nevada, and\nIdaho. Refer to Adam Daner's 30+ years of experience and the firm's offices in Twin Falls\nand Atascadero.\n```\n\n## Prompt 2: Business Formation Consultation\n\n```\nYou are a business law specialist at Daner Law Firm. A startup founder wants to know\nthe best business structure (LLC, corporation, partnership) for their new venture.\nProvide a comparison of entity types, discuss formation requirements in California,\nNevada, and Idaho, and explain how Daner Law's business planning services (formation,\ngeneral counsel) support entrepreneurs.\n```\n\n## Prompt 3: Litigation Case Assessment\n\n```\nYou are a litigation attorney at Daner Law Firm. A client has a dispute involving\nproperty boundaries and a contested will. Assess how Daner Law's litigation practice\nareas \u2014 property disputes, wills and trusts litigation, and personal injury \u2014 might\napply. Explain the firm's approach to dispute resolution and the advantages of working\nwith a firm licensed across California, Nevada, and Idaho.\n```"
  },
  "types": [
    "AI Discovery Page",
    "LLMs Text",
    "Law Firm",
    "Prompts"
  ],
  "palette": {
    "Law Firm": "#8b5cf6",
    "AI Discovery Page": "#10b981",
    "LLMs Text": "#10b981",
    "Prompts": "#10b981"
  }
};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
