rts Department** - Genuine Mazda OEM parts and accessories\n\n## Online Tools\n\n- Inventory browsing and filtering (new, used, certified pre-owned)\n- Online service scheduling\n- Online finance application and pre-approval\n- Value Your Trade tool (KBB Instant Cash Offer)\n- Home delivery option for online purchases\n- Video walkarounds for remote buyers\n\n## Staff\n\nSales and service staff frequently praised by customers include: Hallie Abbott, Jason Vaughn, Roman (Romyl), Emilio Perez, Terry, Joe Collins, Tony, Royan, Mike B., Chris Car, Xavier, Jeff, David, Adam, Mike, Jordan, Danny, Rachel, Frank (finance), Mike Owens, Joe Collins, and others.\n\nSee [staff.md](staff.md) for full directory.\n\n## Reviews & Reputation\n\n- Aggregate rating: **4.8 / 5.0** (2,030 reviews)\n- PromptGraph-collected reviews: All 5-star with consistent praise for low-pressure sales, patient staff, and knowledgeable service\n\nSee [testimonials.md](/references/testimonials.md) for detailed customer reviews.\n\n## Special Programs\n\n- **Online Buying** - Complete purchase online with home delivery\n- **Trade-In Appraisal** - KBB Instant Cash Offer for trade-in valuation\n- **Costco Auto Program** - Partner pricing for Costco members\n- **Loaner Vehicles** - Available for longer service appointments\n- **Mazda Certified Pre-Owned** - Manufacturer-certified used vehicles\n\n## Social Media\n\n- [Facebook](https://www.facebook.com/mazdacincinnati)\n- [YouTube](https://www.youtube.com/@MazdaJakeSweeney)\n- [Instagram](https://www.instagram.com/jakesweeney.mazdaofficial/)\n- [DealerRater](https://www.dealerrater.com/dealer/Jake-Sweeney-Mazda-Tri-County-review-23636/)\n\n## Affiliations\n\n- Part of the Jake Sweeney Automotive group (including Jake Sweeney Chevrolet, Jake Sweeney Used Car Superstore)\n- Website powered by **Dealer.com**\n- Connected via **PromptGraph** AI platform",
    "datasets/faq": "# Frequently Asked Questions - Jake Sweeney Mazda Tri-County\n\n## Inventory\n\n**Q: What new Mazda models are available?**\nA: The full Mazda lineup including CX-30, CX-5, CX-50, CX-50 Hybrid, CX-70, CX-70 PHEV, CX-90, CX-90 PHEV, MX-5 Miata, MX-5 Miata RF, Mazda3 Hatchback, and Mazda3 Sedan.\n\n**Q: How large is the vehicle inventory?**\nA: The dealership carries over 423 vehicles including new Mazdas and pre-owned multi-make inventory.\n\n**Q: Does Jake Sweeney Mazda offer certified pre-owned vehicles?**\nA: Yes, Mazda Certified Pre-Owned (CPO) vehicles are available with 160-point inspection and extended warranty.\n\n**Q: Are Mazda CX-50 Hybrid and PHEV models available?**\nA: Yes, both the CX-50 Hybrid and CX-70/CX-90 Plug-In Hybrid models are in stock.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, online pre-approval, and the Costco Auto Program for members.\n\n**Q: Can I get pre-approved online?**\nA: Yes, the online finance application on the dealership website allows you to complete a pre-approval application.\n\n**Q: Can the dealership work with out-of-state buyers?**\nA: Yes, the dealership assists with out-of-state purchases including shipping coordination and remote paperwork.\n\n## Service\n\n**Q: Can the service center work on non-Mazda vehicles?**\nA: Yes, the service center works on all makes and models, not just Mazda vehicles.\n\n**Q: Do you offer loaner vehicles?**\nA: Yes, loaner vehicles are available for longer service appointments.\n\n**Q: How do I schedule service?**\nA: Online scheduling is available at jakesweeneymazda.com or by calling (513) 782-1154.\n\n**Q: Does the service center provide video inspections?**\nA: Yes, the team provides video walkthroughs detailing any issues found during service.\n\n## Dealership\n\n**Q: Where is the dealership located?**\nA: 135 Northland Blvd, Cincinnati, OH 45246-3112.\n\n**Q: What are the dealership hours?**\nA: Sales: Mon-Thu 9am-8pm, Fri-Sat 9am-6pm, Sun Open 12-5 Last Sunday of the Month.\n\n**Q: Is home delivery available?**\nA: Yes, the dealership offers vehicle delivery to your home as part of the online buying process.\n\n**Q: Does the dealership handle recalls?**\nA: Yes, Mazda recall repairs are handled through the service center.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/new-vehicles": "# New Mazda Models - Jake Sweeney Mazda Tri-County\n\nJake Sweeney Mazda Tri-County carries a full lineup of new Mazda vehicles. Mazda is known for refined styling, engaging performance (Jinba Ittai), and premium interiors. Below is a summary of available models.\n\n## SUVs & Crossovers\n\n### Mazda CX-30\nSubcompact SUV, starting MSRP $26,375. Available in 2.5 S, Select, Preferred, Premium, and Turbo trims. 2.5L 4-cylinder engine standard, turbocharged option available. All-wheel drive available. 20 in stock.\n\n### Mazda CX-5\nCompact SUV, starting MSRP $29,990. Multiple trims including 2.5 S, Select, Preferred, Premium, Premium Plus, and Carbon Edition. 2.5L 4-cylinder or 2.5L Turbo engine options. All-wheel drive. 89 in stock.\n\n### Mazda CX-50\nMid-size SUV, starting MSRP $29,900. Available in 2.5 S, Select, Preferred, Premium, Premium Plus, and Meridian Edition trims. All-wheel drive standard. 42 in stock.\n\n### Mazda CX-50 Hybrid\nHybrid mid-size SUV, starting MSRP $34,750. Toyota-sourced hybrid powertrain. Excellent fuel economy. All-wheel drive. 17 in stock.\n\n### Mazda CX-70\nMid-size SUV (two-row), starting MSRP $46,780. Available in 3.3 Turbo, Turbo S, and Turbo S Premium trims. Inline-6 cylinder engine. All-wheel drive. 7 in stock.\n\n### Mazda CX-70 Plug-In Hybrid\nPHEV mid-size SUV, starting MSRP $44,450. 2.5L 4-cylinder engine with electric motor. All-electric range for daily commuting. All-wheel drive. 5 in stock.\n\n### Mazda CX-90\nFull-size SUV (three-row), starting MSRP $39,300. Available in 3.3 Turbo, Turbo S, Turbo S Premium, and Turbo S Premium Plus trims. Inline-6 cylinder engine. All-wheel drive standard. 33 in stock.\n\n### Mazda CX-90 Plug-In Hybrid\nPHEV full-size SUV, starting MSRP $50,695. 2.5L 4-cylinder with electric motor. All-electric range for daily commuting. Three-row seating. All-wheel drive. 5 in stock.\n\n## Sports Cars & Convertibles\n\n### Mazda MX-5 Miata\nConvertible sports car, starting MSRP $30,430. Available in Sport, Club, and Grand Touring trims. 2.0L 4-cylinder engine. Rear-wheel drive. Lightest and most affordable Mazda. 4 in stock.\n\n### Mazda MX-5 Miata RF\nRetractable fastback convertible, starting MSRP $38,450. Power-retractable hard top. Club and Grand Touring trims. 2.0L 4-cylinder. Rear-wheel drive. 4 in stock.\n\n## Cars\n\n### Mazda3 Hatchback\nCompact hatchback, starting MSRP $25,650. Available in 2.5 S, Select, Preferred, Premium, Carbon Edition, and 2.5 Turbo trims. 2.5L 4-cylinder standard, turbocharged option. All-wheel drive available. 6 in stock.\n\n### Mazda3 Sedan\nCompact sedan, starting MSRP $24,650. Available in 2.5 S, Select, Preferred, Premium, Carbon Edition, and 2.5 Turbo trims. 2.5L 4-cylinder standard. All-wheel drive available. 15 in stock.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Contact the dealership for current offers.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",
    "datasets/service-center": "# Service Center - Jake Sweeney Mazda Tri-County\n\nThe Jake Sweeney Mazda Tri-County Service Center provides certified maintenance and repair services at 135 Northland Blvd, Cincinnati, OH.\n\n## Service Capabilities\n\n- **Routine Maintenance** - Oil changes (starting at $79.95), tire rotations, alignments, brake inspections\n- **Diagnostics** - Check engine light diagnosis, computerized system analysis, video inspection walkthroughs\n- **Major Repairs** - Transmission service, engine repairs, suspension work, electrical systems\n- **Recall Repairs** - Manufacturer-specified recall and campaign work\n- **Mazda Service Promise** - Online scheduling, video inspections, no-surprise repairs, loaner vehicles\n\n## Service Team\n\n- **Xavier** - Service technician; praised for taking test drives with customers, thorough diagnostics, video walkthroughs\n- **Jeff** - Service manager; professional, customer-focused\n- **David (Dave)** - Service advisor; attentive, professional, clear explanations, timely\n- **Adam** - Service staff; keeps customers informed\n- **Mike** - Service department; helps with warranty claims\n- **Remi** - Service; excellent communication and updates\n\n## Service Experience\n\nCustomer reviews highlight:\n- **Video feedback** - Service team sends detailed video walkthroughs of vehicle issues\n- **Text message updates** during service visits\n- **Online appointment scheduling**\n- **Loaner vehicles** available for longer service jobs\n- **Clean waiting area** with coffee\n- **Complimentary shuttle service**\n- **Follow-up calls** after service to ensure satisfaction\n- **Honest recommendations** - No unnecessary upselling\n\n## Service Specials\n\nThe dealership offers rotating service specials and seasonal discounts. See [dealership.md](dealership.md) for current offers.\n\n## Parts Department\n\nGenuine Mazda OEM parts and accessories available. Order online at parts.jakesweeneymazda.com.\n\nSee [staff.md](staff.md) for full service department directory.",

    "datasets/used-vehicles": "# Pre-Owned and Certified Pre-Owned Vehicles - Jake Sweeney Mazda Tri-County\n\nJake Sweeney Mazda Tri-County maintains a selection of pre-owned vehicles with over 423 vehicles in inventory (PromptGraph API).\n\n## Inventory Scope\n\n- **Total vehicles:** 423 (PromptGraph API)\n- **Multi-make selection** spanning Mazda, Honda, Toyota, Chevrolet, Ford, Jeep, Ram, GMC, BMW, Nissan, Subaru, Dodge, and more\n- **Price range:** Broad range from budget-friendly to premium vehicles\n- **Model years:** Range from select pre-owned to late-model vehicles\n\n## Quality Assurance\n\n- **Mazda Certified Pre-Owned (CPO)** - Vehicles undergo rigorous inspection and meet manufacturer quality standards\n- **Multi-point inspection** on all pre-owned vehicles\n- **Carfax Report** available\n- **Warranty options** on qualifying purchases\n\n## Certified Pre-Owned Program\n\nMazda Certified Pre-Owned vehicles include:\n- 160-point inspection\n- Extended warranty coverage\n- Roadside assistance\n- New-car financing rates available\n\n## Online Buying\n\nThe dealership offers online purchasing options:\n- Start with online finance application and trade-in appraisal\n- Payment adjustments can be made online\n- Vehicle delivery available to your home\n- Video walkarounds available for remote buyers\n\n## Trade-In\n\n- Trade-in appraisal available via KBB Instant Cash Offer\n- Competitive trade-in values\n- On-the-spot evaluation\n\nSee [dealership.md](dealership.md) for current financing and trade-in programs.",

    "references/testimonials": "# Customer Testimonials - Jake Sweeney Mazda Tri-County\n\nJake Sweeney Mazda Tri-County has collected 50+ customer testimonials through the PromptGraph platform. Reviews are all 5-star with strong themes of low-pressure sales, patient staff, and service transparency.\n\n## Aggregate Ratings\n\n- **Google Business Profile:** 4.8 / 5.0 (2,030 reviews)\n- **PromptGraph Reviews:** All 5-star\n\n## Most-Praised Staff (by frequency)\n\n- **Hallie Abbott (Hallie)** - Patient, knowledgeable, personal videos, smooth process; most frequently mentioned; great with out-of-state buyers\n- **Jason Vaughn (Jason)** - Friendly, knowledgeable, patient, compares models thoroughly, explains features; great with first-time buyers\n- **Roman (Romyl)** - Knowledgeable, family-friendly, excellent communication, out-of-state purchase support\n- **Emilio Perez (Emilio)** - Fast, efficient, personalized videos, accommodates payment methods\n- **Terry** - Extremely patient, honest, no pressure, answers all questions\n- **Joe Collins (Joe)** - Impressive product knowledge, reasonable offers, best negotiation experience\n- **Chris Car (Chris)** - Professional, treats customers like family, exceptional service\n- **Xavier** - Service technician; thorough diagnostics, video walkthroughs, personal attention\n- **David (Dave)** - Service advisor; professional, clear explanations, timely estimates\n- **Jeff** - Service manager; excellent customer service\n\n## Notable Excerpts\n\n> \"First time buying a car at a dealership, and it was the best experience! Everyone there was amazing and patient. I couldn't be happier with my salesperson Jason.\" - Jessica Lopez\n\n> \"Hallie made the process incredibly smooth and went above and beyond for me! She sent a personalized test drive video and some footage from underneath the truck as well.\" - Derek Sarlo\n\n> \"The service guys at Jake Sweeney Mazda are top notch! Very polite and friendly! Took the time to answer all my questions and made sure I was happy with the service.\" - Amy Jones\n\n> \"This dealership took better care of me than any other dealer I have ever been to. They will have my business and hopefully my circles business for the foreseeable future!\" - David Germanozashvili\n\n> \"Quite possibly the smoothest dealership experience I've ever had. Roman was a great, knowledgeable salesman. Did not feel pressured to buy any extras.\" - Brian Ginett\n\n> \"I had a great experience yesterday getting my Mazda serviced. They made it super easy to make an appointment. They pick up their phone calls!! (Unlike other Mazda dealerships in town)\" - Sarah T\n\n> \"After my vehicle was totalled, we began a hasty car search. Guided by our mechanic, we focused on the Mazda brand. After meeting with Joe Collins, our search drew to a close.\" - John Branch\n\n> \"I've been a regular customer at Jake Sweeney Mazda for years. The team is always so pleasant and attentive from calling for an appointment to the day of service.\" - Jerri Seal\n\n> \"This car buying experience was exceptional. Hallie helped me pick out the right car for me and we had a nice BookTok discussion. Royan helped with my financing.\" - Jennifer Stenger\n\n## Sales Themes\n\n- **No-pressure buying** - Multiple reviewers mention patient staff who didn't push\n- **Personalized videos** - Sales team sends custom walkaround videos for remote buyers\n- **Out-of-state purchases** - Dealership facilitates remote buying with shipping coordination\n- **Quick transactions** - Several reviews mention under 2 hours from arrival to drive-off\n- **Product knowledge** - Staff praised for detailed knowledge of Mazda models\n\n## Service Themes\n\n- **Video inspections** - Service team provides detailed video walkthroughs of issues found\n- **Honest recommendations** - Not upselling unnecessary repairs; only recommending what's needed\n- **Loaner availability** - Loaner vehicles provided for longer service jobs\n- **Communication** - Text updates, clear explanations, proactive outreach\n- **Clean facility** - Welcoming waiting area with amenities\n\nSee [staff.md](/datasets/staff.md) for the full staff directory.",
    "tables/model-comparison": "# Mazda Model Lineup Comparison\n\n## Model Overview\n\n| Model | Body Type | Passengers | Drivetrain | Starting MSRP | Stock Count |\n|---|---|---|---|---|---|\n| **Mazda3 Sedan** | Compact Sedan | 5 | FWD / AWD | $24,650 | 15 |\n| **Mazda3 Hatchback** | Compact Hatchback | 5 | FWD / AWD | $25,650 | 6 |\n| **CX-30** | Subcompact SUV | 5 | FWD / AWD | $26,375 | 20 |\n| **CX-5** | Compact SUV | 5 | FWD / AWD | $29,990 | 89 |\n| **CX-50** | Mid-size SUV | 5 | AWD | $29,900 | 42 |\n| **CX-50 Hybrid** | Mid-size Hybrid SUV | 5 | AWD | $34,750 | 17 |\n| **MX-5 Miata** | Convertible | 2 | RWD | $30,430 | 4 |\n| **MX-5 Miata RF** | Retractable Hardtop | 2 | RWD | $38,450 | 4 |\n| **CX-90** | Full-size SUV | 7\u20138 | AWD | $39,300 | 33 |\n| **CX-70 PHEV** | Mid-size PHEV SUV | 5 | AWD | $44,450 | 5 |\n| **CX-70** | Mid-size SUV | 5 | AWD | $46,780 | 7 |\n| **CX-90 PHEV** | Full-size PHEV SUV | 7\u20138 | AWD | $50,695 | 5 |\n\n## Key Feature Comparison\n\n| Feature | CX-30 | CX-5 | CX-50 | CX-70 | CX-90 | MX-5 Miata | Mazda3 |\n|---|---|---|---|---|---|---|---|\n| Engine | 2.5L I4 | 2.5L I4/Turbo | 2.5L I4 | 3.3L I6 Turbo | 3.3L I6 Turbo | 2.0L I4 | 2.5L I4/Turbo |\n| Horsepower | 191 hp | 187\u2013256 hp | 187 hp | 280\u2013340 hp | 280\u2013340 hp | 181 hp | 191\u2013250 hp |\n| AWD Available | Yes | Yes | Standard | Standard | Standard | No | Available |\n| 3rd Row | No | No | No | No | Yes | No | No |\n| Premium Interior | Available | Available | Standard | Standard | Standard | Available | Available |\n| Apple CarPlay/AA | Standard | Standard | Standard | Standard | Standard | Standard | Standard |\n| i-Activsense Safety | Standard | Standard | Standard | Standard | Standard | Standard | Standard |\n\n## Hybrid & PHEV Options\n\n| Model | Type | System | Notes |\n|---|---|---|---|\n| **CX-50 Hybrid** | Full Hybrid | 2.5L I4 + Toyota hybrid system | Excellent fuel economy |\n| **CX-70 PHEV** | Plug-In Hybrid | 2.5L I4 + electric motor | <script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
