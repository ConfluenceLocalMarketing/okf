    "datasets/faq": "# Frequently Asked Questions - Haselwood Volkswagen of Bremerton\n\n## Inventory\n\n**Q: What new Volkswagen models are available at Haselwood Volkswagen of Bremerton?**\nA: Full Volkswagen lineup including Atlas, Atlas Cross Sport, Tiguan, Taos, ID.4, Jetta, Jetta GLI, Golf GTI, Golf R, ID. Buzz, and Arteon.\n\n**Q: What brands are available in the used vehicle inventory?**\nA: Multi-make selection spanning Volkswagen, Chevrolet, Ford, Toyota, Honda, Hyundai, Kia, Nissan, GMC, Jeep, Ram, BMW, Mercedes-Benz, and more.\n\n**Q: Does Haselwood Volkswagen offer certified pre-owned vehicles?**\nA: Yes, Volkswagen Certified Pre-Owned vehicles are available with factory-backed inspections, extended warranties, and 24/7 roadside assistance.\n\n**Q: Do you have a bargain inventory?**\nA: Yes, the dealership offers a Bargain Inventory of quality vehicles under $12,000.\n\n## Financing\n\n**Q: What financing options are available?**\nA: Traditional loans, leases, and special financing programs. Online credit application and pre-approval available.\n\n**Q: Does the dealership work with first-time buyers?**\nA: Yes, the sales team helps first-time VW buyers understand models, trims, and ownership costs.\n\n**Q: Is there an online buying process?**\nA: Yes, Click-N-Drive allows complete online purchasing with home delivery and at-home test drives.\n\n**Q: What is the VW College Grad Program?**\nA: Special financing available for recent college graduates through Volkswagen.\n\n**Q: Does the dealership offer trade-in appraisals?**\nA: Yes, KBB Instant Cash Offer provides a firm online offer for your trade-in.\n\n## Service\n\n**Q: What services does the service center provide?**\nA: Routine maintenance (oil changes, tire rotations), diagnostics, major repairs (transmission, engine), brake services, battery services, tire services, and recall repairs.\n\n**Q: Does the service center use genuine VW parts?**\nA: Yes, the service center uses genuine Volkswagen OEM parts for all repairs.\n\n**Q: Does the service center have certified technicians?**\nA: Yes, factory-trained Volkswagen technicians staff the service center.\n\n**Q: Can I schedule service online?**\nA: Yes, online scheduling is available through the dealership website.\n\n**Q: Are there service specials available?**\nA: Yes, rotating service specials and coupons are available on the website.\n\n**Q: Can I get financing for service work?**\nA: Yes, the VW Service Financing program and Service Credit Card offer payment options for repairs.\n\n## Dealership\n\n**Q: Where is Haselwood Volkswagen of Bremerton located?**\nA: 5008 Auto Center Blvd, Bremerton, WA 98312, in the West Hills Auto Plex.\n\n**Q: What areas does the dealership serve?**\nA: Bremerton, Silverdale, Port Orchard, Poulsbo, Gig Harbor, Tacoma, and throughout Kitsap County.\n\n**Q: What is the Haselwood Auto Group?**\nA: Haselwood Volkswagen is part of the Haselwood Auto Group, a family of dealerships in the West Hills Auto Plex.\n\n**Q: Does the dealership offer the Lifetime Powertrain Warranty?**\nA: Yes, the West Hills Advantage includes a Lifetime Powertrain Warranty on eligible vehicles.\n\n**Q: Is there a military appreciation program?**\nA: Yes, the dealership offers special programs for active and veteran military personnel.\n\n**Q: Can I buy a car completely online?**\nA: Yes, Click-N-Drive allows online purchasing with home delivery and at-home test drives.\n\nSee [prompts.md](/references/prompts.md) for the complete prompt library with detailed Q&A pairs.",
    "datasets/new-vehicles": "# New Volkswagen Models - Haselwood Volkswagen of Bremerton\n\nHaselwood Volkswagen of Bremerton carries a full lineup of new Volkswagen vehicles. Below is a summary of available models and trims.\n\n## SUVs & Crossovers\n\n### Volkswagen Atlas\nMid-size 3-row SUV seating up to 7 passengers. Available trims include S, SE, SE with Technology, SEL, SEL R-Line, and Peak Edition. Powered by a 2.0L turbocharged 4-cylinder engine (269 hp) with 8-speed automatic transmission. Available in FWD and 4Motion AWD. Towing capacity up to 5,000 lbs. Standard VW Digital Cockpit and IQ.DRIVE safety suite.\n\n### Volkswagen Atlas Cross Sport\nMid-size 2-row crossover SUV with sporty fastback roofline. Available in S, SE, SE with Technology, SEL, and SEL R-Line trims. Shares the Atlas powertrain with 2.0L turbo engine and 8-speed automatic. Available in FWD and 4Motion AWD. Spacious cargo area with 40.3 cu ft behind rear seats.\n\n### Volkswagen Tiguan\nCompact 2-row SUV, Volkswagen's best-selling model in the US. Available in S, SE, SE R-Line, SEL, and SEL R-Line trims. Powered by a 2.0L turbocharged 4-cylinder engine (184 hp) with 8-speed automatic transmission. Available in FWD and 4Motion AWD. Seats 5 passengers with generous cargo space.\n\n### Volkswagen Taos\nSubcompact SUV, Volkswagen's most affordable SUV. Available in S, SE, and SEL trims. Powered by a 1.5L turbocharged 4-cylinder engine (158 hp) with 8-speed automatic (FWD) or 7-speed DSG (AWD). Available in FWD and 4Motion AWD. Excellent fuel economy and value-oriented pricing.\n\n### Volkswagen ID.4\nAll-electric compact SUV available in multiple configurations. Up to 304 miles estimated range. Available in RWD and 4Motion AWD. Up to 335 hp in AWD configurations. Features a 12.9-inch touchscreen display, wireless smartphone integration, and available 2-year Electrify America charging plan.\n\n## Cars\n\n### Volkswagen Jetta\nCompact sedan, refined and fuel-efficient. Available in S, Sport, SE, and SEL trims. Powered by a 1.5L turbocharged 4-cylinder engine (158 hp) with 6-speed manual or 8-speed automatic transmission. FWD. Exceptional highway fuel economy. IQ.DRIVE standard on most trims.\n\n### Volkswagen Jetta GLI\nPerformance-tuned compact sedan. Available in 40th Anniversary Edition and Autobahn trims. Powered by a 2.0L turbocharged 4-cylinder engine (228 hp) with 6-speed manual or 7-speed DSG dual-clutch automatic. VAQ limited-slip differential, sport-tuned suspension, and performance brakes.\n\n### Volkswagen Arteon\nFull-size fastback sedan with sleek design and premium features. Available in SE, SEL R-Line, and SEL Premium R-Line trims. Powered by a 2.0L turbocharged 4-cylinder engine (300 hp) with 7-speed DSG and 4Motion AWD. Premium interior with R-Line sport seats, panoramic sunroof, and Harman Kardon audio.\n\n## Hatchbacks\n\n### Volkswagen Golf GTI\nIconic sport compact hatchback, the original hot hatch. Available in S, SE, and Autobahn trims. Powered by a 2.0L turbocharged 4-cylinder engine (241 hp) with 6-speed manual or 7-speed DSG. Front-wheel drive with VAQ limited-slip differential. Sport suspension, plaid cloth seats, and signature GTI styling.\n\n### Volkswagen Golf R\nHigh-performance all-wheel-drive hatchback. Available in a single fully-loaded trim. Powered by a 2.0L turbocharged 4-cylinder engine (315 hp) with 6-speed manual or 7-speed DSG. 4Motion AWD with torque vectoring. Drift mode, performance exhaust, and premium interior.\n\n## Electric Vehicles\n\n### Volkswagen ID.4\nAll-electric compact SUV with up to 304 miles range. Multiple trims including Standard, Pro, Pro S, and Pro S Plus. RWD standard, available 4Motion AWD. DC fast charging capability up to 175 kW. Includes 2-year Electrify America charging plan.\n\n### Volkswagen ID. Buzz\nAll-electric retro-styled van, inspired by the classic Microbus. Available in rear-wheel drive with a large 91 kWh battery. Seating for up to 7 passengers in a versatile interior. 12.9-inch touchscreen display, available powered sliding doors, and iconic design paying homage to the original Bus.\n\n## Promotions & Offers\n\nPromotions vary by model and include low APR financing, lease specials, and rebates. Contact the dealership for current offers.\n\nSee [dealership.md](dealership.md) for contact information and current programs.\nSee [model-comparison.md](/tables/model-comparison.md) for side-by-side model specifications.",

o our questions. She kept track of those questions and got the answers once we were back from our test drive.\" - William Cook\n\n> \"Cole was such a great person, I don't even want to say salesperson because he did not seem like the stereotypical car salesperson - which is a great thing!\" - Gabrielle G\n\n> \"I've purchased 2 Volkswagens from this dealership and I continue to stay faithful mostly due to the service I receive. I used to live closer but now I drive an hour and a half to get my car serviced.\" - Nicole Selene\n\n> \"Joshua was incredibly helpful and friendly, he didn't pressure me into buying anything I didn't want and kept everything within my price range. Considering car shopping can be rather stressful they made it quite enjoyable.\" - Gavin Doiron\n\n> \"I recently bought a car here and I had a wonderful experience. James was my sales person and I can't sing his praises enough. It was my first time buying a car from a dealership and James was incredibly patient with me.\" - Amanda Price\n\n> \"Out of all the cars my husband and I have purchased in the past, this dealership gave us the best experience. Everyone was very knowledgeable and patient with us.\" - Jaime Hansen\n\n> \"I could not be happier with the entire Sales team I worked with here. I went in everyone listened to my requests, no attempt to stray from my preferences or upsell me on anything.\" - Jacinda Boso\n\n> \"This has been the best car buying experience I've ever had. The staff was very knowledgeable and quick to assist in any way they could and always had a smile on their faces.\" - Devin Reliford\n\n> \"We just left with our brand new Jetta and could not be happier. Our rep and the finance guy were amazing. It was the smoothest, quickest car buying experience we have ever had.\" - Nickole Duker\n\n> \"The service I received was excellent. Patrick took the time to help me plan for future service. My tech, Katelyn was fantastic! She sent me pictures of a worn air filter and came out and in person explained the reasoning.\" - Smck33\n\n> \"I was getting my first car and they helped me find the right car that matched my spending range.\" - TCONQUESSO 22\n\n## Sales Themes\n\n- **No-pressure approach** - Multiple reviewers mention no pushy sales tactics\n- **Professional service** - Staff knowledgeable, responsive, and thorough\n- **Patient guidance** - Sales team takes time to explain features, options, and technology\n- **Transparent pricing** - Honest about costs and terms\n- **Willingness to travel** - Customers drive from Everett, Seattle, and beyond\n\n## Service Themes\n\n- **Exceptional follow-through** - Service team goes above and beyond\n- **Fast turnaround** - Efficient service completion\n- **Clear communication** - Technicians explain issues with photos and transparent recommendations\n- **Long-term loyalty** - Customers drive significant distances for service\n\nSee [staff.md](/datasets/staff.md) for the full staff directory.",
    "tables/model-comparison": "# Volkswagen Model Lineup Comparison - Haselwood Volkswagen of Bremerton\n\n## Model Overview\n\n| Model | Body Type | Passengers | Drivetrain | Starting MSRP Tier | Key Trims |\n|---|---|---|---|---|---|\n| **Jetta** | Compact Sedan | 5 | FWD | Value | S, Sport, SE, SEL |\n| **Jetta GLI** | Compact Performance Sedan | 5 | FWD | Mid-range | 40th Anniversary, Autobahn |\n| **Arteon** | Full-size Fastback Sedan | 5 | AWD | Premium | SE, SEL R-Line, SEL Premium R-Line |\n| **Golf GTI** | Sport Compact Hatchback | 5 | FWD | Mid-range | S, SE, Autobahn |\n| **Golf R** | Performance Hatchback | 5 | AWD | Premium | Single full-loaded trim |\n| **Taos** | Subcompact SUV | 5 | FWD / AWD | Value | S, SE, SEL |\n| **Tiguan** | Compact SUV | 5 | FWD / AWD | Mid-range | S, SE, SE R-Line, SEL, SEL R-Line |\n| **ID.4** | Compact Electric SUV | 5 | RWD / AWD | Mid-range | Standard, Pro, Pro S, Pro S Plus |\n| **Atlas Cross Sport** | Mid-size 2-Row SUV | 5 | FWD / AWD | Mid-range | S, SE, SE w/ Tech, SEL, SEL R-Line |\n| **Atlas** | Mid-size 3-Row SUV | 7 | FWD / AWD | Mid-range | S, SE, SE w/ Tech, SEL, SEL R-Line, Peak Edition |\n| **ID. Buzz** | Electric Van | 7 | RWD | Premium | Single well-equipped trim |\n\n## Key Feature Comparison\n\n| Feature | Jetta | Jetta GLI | GTI | Golf R | Taos | Tiguan | ID.4 | Atlas Cross Sport | Atlas | ID. Buzz |\n|---|---|---|---|---|---|---|---|---|---|---|\n| Engine | 1.5L T-4 | 2.0L T-4 | 2.0L T-4 | 2.0L T-4 | 1.5L T-4 | 2.0L T-4 | Electric | 2.0L T-4 | 2.0L T-4 | Electric |\n| Horsepower | 158 hp | 228 hp | 241 hp | 315 hp | 158 hp | 184 hp | 201-335 hp | 269 hp | 269 hp | ~282 hp |\n| AWD Available | No | No | No | Yes | Yes | Yes | Yes | Yes | Yes | No |\n| 3rd Row | No | No | No | No | No | No | No | No | Yes | No |\n| Towing (max) | N/A | N/A | N/A | N/A | N/A | 1,500 lbs | 2,500 lbs | 5,000 lbs | 5,000 lbs | N/A |\n| Digital Cockpit | Available | Available | Available | Available | Available | Standard | Standard | Available | Available | Standard |\n| IQ.DRIVE Safety | Standard | Standard | Standard | Standard | Available | Available | Standard | Available | Available | Standard |\n| Wireless Smartphone | Yes | Yes | Yes | Yes | Yes | Yes | Yes | Yes | Yes | Yes |\n\n## Electric & Hybrid Options\n\n| Model | Type | Range (est.) | Notes |\n|---|---|---|---|\n| **ID.4** | Full EV | ~209-304 miles | Available RWD and 4Motion AWD, up to 175 kW DC fast charging |\n| **ID. Buzz** | Full EV | ~230+ miles | Retro-styled electric van, 91 kWh battery, 7-passenger seating |\n\n## Performance Highlights\n\n- **Golf GTI** - 241 hp, 2.0L turbo, 6-speed manual or 7-speed DSG, VAQ limited-slip differential, 0-60 mph in ~5.1 seconds\n- **Golf R** - 315 hp, 2.0L turbo, 6-speed manual or 7-speed DSG, 4Motion AWD with torque vectoring, drift mode\n- **Jetta GLI** - 228 hp, 2.0L turbo, 6-speed manual or 7-speed DSG, VAQ limited-slip differential, sport suspension\n- **Arteon** - 300 hp, 2.0L turbo, 7-speed DSG, 4Motion AWD, premium features\n\n## Warranty\n\nAll new Volkswagen models include:\n- **4-Year / 50,000-Mile New Vehicle Limited Warranty**\n- **5-Year / 60,000-Mile Powertrain Limited Warranty**\n- **7-Year / 100,000-Mile Anti-Corrosion Perforation Limited Warranty**\n- **3-Year / 36,000-Mile Roadside Assistance**\n- **2-Year / 24,000-Mile Scheduled Carefree Maintenance**\n\nPlus:\n- **Lifetime Powertrain Warranty** (West Hills Advantage - dealership-specific)\n- **Volkswagen Safe & Secure** - Connected safety and security services\n\n## IQ.DRIVE Safety Suite\n\nAvailable or standard across most Volkswagen models:\n- Adaptive Cruise Control (ACC)\n- Travel Assist (semi-automated driving)\n- Lane Keeping System (Lane Assist)\n- Emergency Assist\n- Front Assist with Autonomous Emergency Braking\n- Pedestrian Monitoring\n- Blind Spot Monitor\n- Rear Traffic Alert\n- Park Distance Control\n\n## Volkswagen Carefree Scheduled Maintenance\n\nPrepaid maintenance programs available for 2, 3, or 4 years covering scheduled maintenance including oil changes, tire rotations, inspections, and more.\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for detailed model descriptions.\nSee [dealership.md](/datasets/dealership.md) for current offers and promotions."

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
