    "datasets/company": "# Gibson Truck World\n\nGibson Truck World is the largest used truck dealership in Florida, located on a 14-acre site in Sanford, FL. Founded in 1995 by Yves Belanger, the dealership has grown from 3 employees to over 65 team members and 150 trucks in inventory, selling approximately 150 vehicles per month.\n\n## Location\n\n- **Address**: 3455 S. Orlando Dr, Sanford, FL 32773\n- **Phone (Sales & Service)**: (407) 321-0660\n\n## Hours\n\n| Day | Hours |\n|-----|-------|\n| Mon\u2013Fri | 9:00 AM \u2013 7:00 PM |\n| Sat | 9:00 AM \u2013 6:00 PM |\n| Sun | 10:00 AM \u2013 5:00 PM |\n\n## Inventory\n\n### Pre-Owned Trucks\n- Ford: F-150, F-250, F-350 (including lifted)\n- RAM: 1500, 2500, 3500 (including lifted)\n- Chevrolet: Silverado 1500, 2500HD, 3500HD (including lifted)\n- GMC: Sierra 1500, 2500HD, 3500HD (including lifted)\n- Nissan, Toyota and other makes\n\n### Pre-Owned Cars & SUVs\n- Multi-make selection of non-truck vehicles\n\n### Lifted Trucks (GTW Customs)\n- Custom 4x4 lifted trucks\n- Aftermarket wheels, tires, and suspension\n- Power steps and accessories\n- Brand: GTW Customs\n\n## Quality Guarantees\n\n- **One-Year Bumper-to-Bumper Warranty** on every vehicle\n- **135-Point Inspection** by certified technicians\n- **15-Day Exchange Policy**\n\n## Services\n\n- Full-service maintenance and repair center\n- Custom lift kit installation\n- Aftermarket parts and accessories\n- Nationwide financing and delivery\n- We buy trucks (2018+, under 80k miles)\n\n## History\n\n- **Founded**: 1995 by Yves Belanger\n- **Originally**: Started in Canada, moved to Florida, wholesaled from Longwood\n- **Current facility**: 14-acre, $7M dealership in Sanford, FL opened 1995\n- **Recognition**: Top 50 AutoTrader.com Dealer (2009, 2010), Auto Dealer Monthly Independent Retailer Awards #18 (2011)\n- **50,000+ trucks sold** over 30 years (2025 milestone)\n- **60% of sales** from repeat and referral customers",
    "datasets/faq": "# Gibson Truck World FAQ\n\n## Vehicles\n\n**Q: What types of trucks do you sell?**\nA: We carry pre-owned trucks across Ford, RAM, Chevrolet, GMC, Nissan, Toyota, and more \u2014 including lifted and custom builds. See [used-vehicles.md](used-vehicles.md).\n\n**Q: Do you sell cars and SUVs?**\nA: Yes, alongside our massive truck inventory we offer a multi-make selection of pre-owned cars and SUVs.\n\n**Q: What is GTW Customs?**\nA: GTW Customs is our in-house custom shop specializing in lifted trucks, aftermarket wheels and tires, suspension upgrades, power steps, and accessories.\n\n**Q: What warranty comes with a vehicle?**\nA: Every vehicle includes a one-year bumper-to-bumper warranty. See [used-vehicles.md](used-vehicles.md).\n\n**Q: Do you offer a test drive?**\nA: Yes, test drives are available on all vehicles at our Sanford location.\n\n## Financing\n\n**Q: Can I get financing with bad credit?**\nA: Yes, we offer nationwide financing options for all credit situations. See [financing.md](financing.md).\n\n**Q: Do you offer online pre-approval?**\nA: Yes, apply online through our website for fast pre-approval.\n\n**Q: Can I finance a lifted truck?**\nA: Yes, GTW Customs builds and lifted trucks qualify for financing just like standard vehicles.\n\n## Service\n\n**Q: What services does your center provide?**\nA: Full maintenance and repair, custom lift kit installation, aftermarket parts, and accessories. See [service-center.md](service-center.md).\n\n**Q: Do you service non-Ford trucks?**\nA: Yes, our certified technicians service all makes and models.\n\n**Q: Can I have a lift kit installed on my existing truck?**\nA: Yes, GTW Customs can install lift kits and accessories on your current truck.\n\n## General\n\n**Q: Where is Gibson Truck World?**\nA: 3455 S Orlando Dr, Sanford, FL 32773. See [company.md](company.md).\n\n**Q: What are your hours?**\nA: Mon\u2013Fri 9AM\u20137PM, Sat 9AM\u20136PM, Sun 10AM\u20135PM.\n\n**Q: Do you buy used trucks?**\nA: Yes, we buy trucks from 2018 and newer with under 80,000 miles. See [company.md](company.md).\n\n**Q: Can you deliver a truck nationwide?**\nA: Yes, we offer nationwide delivery on purchased vehicles.",
    "datasets/financing": "# Gibson Truck World Finance Center\n\nGibson Truck World provides financing solutions for truck buyers across the country. The finance team works with multiple lenders to serve all credit situations.\n\n## Financing Options\n\n### Truck Loans\n- Competitive rates on pre-owned trucks, SUVs, and cars\n- Flexible terms to fit budgets\n- Nationwide financing available\n\n### All-Credit Programs\n- **Excellent Credit** \u2014 Best rates and terms\n- **Good Credit** \u2014 Competitive standard financing\n- **Fair Credit** \u2014 Flexible approval with reasonable terms\n- **Bad Credit / No Credit** \u2014 Special programs to help get approved\n\n### Commercial Financing\n- Business vehicle loans for work trucks\n- Fleet purchase options\n- Commercial account terms available\n\n## Buying vs Leasing\n\n| Aspect | Buying | Leasing |\n|--------|--------|---------|\n| Monthly Payment | Higher | Lower |\n| Ownership | Full ownership | Return at lease end |\n| Mileage Limits | None | Restricted |\n| Customization | Allowed | Limited |\n| Trade-In | Any time | At lease end only |\n\n## Trade-In Program\n\n- Trade any vehicle toward your purchase\n- Online trade-in valuation tool\n- We buy trucks (2018+, under 80k miles) even without a purchase\n\n## Payment Calculators\n\nOnline payment calculator on the Gibson Truck World website for estimating monthly payments.\n\nSee [company.md](company.md) for location and contact information.",
    "datasets/new-vehicles": "# Truck Inventory at Gibson Truck World\n\nGibson Truck World specializes in pre-owned trucks and custom lifted builds. With over 150 trucks in stock, it is the largest used truck dealership in Florida.\n\n## Pre-Owned Trucks\n\n| Brand | Models |\n|-------|--------|\n| Ford | F-150, F-250, F-350 (including lifted) |\n| RAM | 1500, 2500, 3500 (including lifted) |\n| Chevrolet | Silverado 1500, 2500HD, 3500HD (including lifted) |\n| GMC | Sierra 1500, 2500HD, 3500HD (including lifted) |\n| Nissan | Titan |\n| Toyota | Tundra, Tacoma |\n\n## Lifted Trucks (GTW Customs)\n\nCustom-built lifted trucks with:\n- Aftermarket suspension lifts\n- Oversized wheels and tires\n- Power steps and running boards\n- Custom bumpers and accessories\n- Performance upgrades\n\n## Pre-Owned Cars & SUVs\n\nMulti-make selection complementing the truck inventory:\n- SUVs from Jeep, Chevrolet, Ford, Toyota\n- Sedans and coupes from popular brands\n- Vans and utility vehicles\n\n## Quality Guarantees\n\n- **One-Year Bumper-to-Bumper Warranty** on every vehicle\n- **135-Point Inspection** by certified technicians\n- **15-Day Exchange Policy**\n\n## Delivery\n\nNationwide delivery available on all vehicle purchases.\n\nSee [company.md](company.md) for full dealership profile.",
    "datasets/service-center": "# Gibson Truck World Service Center\n\nGibson Truck World operates a full-service maintenance and repair center complemented by GTW Customs, a custom truck modification shop.\n\n## Maintenance & Repair\n\n- Oil changes for gas and diesel engines\n- Brake service including heavy-duty truck brakes\n- Tire rotations, balancing, and replacement\n- Engine diagnostics and repair\n- Transmission service\n- HVAC system service\n- Suspension and steering repair\n- Electrical diagnostics\n\n## GTW Customs \u2014 Lift Kit Installation\n\n- Custom 4x4 lift kit installation\n- Aftermarket wheel and tire packages\n- Suspension upgrades (leveling kits, coilovers)\n- Power step and running board installation\n- Custom bumpers and lighting\n- Bed liners and bed covers\n\n## Parts & Accessories\n\n- Aftermarket wheels and tires\n- Lift kit components\n- Truck accessories (tonneau covers, nerf bars)\n- Performance parts\n- Special order capabilities\n\n## Hours\n\n| Day | Hours |\n|-----|-------|\n| Mon\u2013Fri | 9:00 AM \u2013 7:00 PM |\n| Sat | 9:00 AM \u2013 6:00 PM |\n| Sun | 10:00 AM \u2013 5:00 PM |\n\n## Contact\n\n- **Phone:** (407) 321-0660\n- **Address:** 3455 S Orlando Dr, Sanford, FL 32773\n\nSee [company.md](company.md) for full dealership details.",
    "datasets/staff": "# Staff at Gibson Truck World\n\n## Sales Team\n\n- **Yves Belanger** \u2014 Founder / Owner, started Gibson Truck World in 1995\n- **Mike Desjardins** \u2014 General Sales Manager, 15 years with the dealership\n- **Tyler Johnson** \u2014 Truck Sales Specialist, expert in lifted and custom builds\n- **Chris Williams** \u2014 Sales Consultant, pre-owned truck specialist\n- **Amanda Torres** \u2014 Internet Sales Manager, handles nationwide leads\n- **DJ Reynolds** \u2014 Sales Consultant, commercial and fleet accounts\n- **Ryan Murphy** \u2014 Sales Consultant, car and SUV inventory\n\n## GTW Customs\n\n- **Jake Morrison** \u2014 Custom Shop Lead, 12 years in truck modification\n- **Eric Walker** \u2014 Lift Kit Installation Specialist\n- **Tony Sandoval** \u2014 Wheel and Tire Specialist\n\n## Service Center\n\n- **Scott Patterson** \u2014 Service Manager\n- **Dave Lambert** \u2014 Lead Technician, certified diesel specialist\n- **Marcus Webb** \u2014 Technician, brake and suspension expert\n\n## Finance Department\n\n- **Laura Bennett** \u2014 Finance Director\n- **Kevin Shaw** \u2014 Finance Manager\n\n## Management\n\n- **Yves Belanger** \u2014 Owner / Dealer Principal\n- **Stephane Fournier** \u2014 General Manager\n\nSee [company.md](company.md) for dealership location and contact information.",
    "datasets/used-vehicles": "# Pre-Owned Vehicles at Gibson Truck World\n\nGibson Truck World carries over 150 pre-owned vehicles on its 14-acre lot, including the largest selection of used and lifted trucks in Florida.\n\n## Truck Inventory\n\n- **Ford:** F-150, F-250, F-350 \u2014 lifted and stock\n- **RAM:** 1500, 2500, 3500 \u2014 lifted and stock\n- **Chevrolet:** Silverado 1500, 2500HD, 3500HD\n- **GMC:** Sierra 1500, 2500HD, 3500HD\n- **Nissan:** Titan\n- **Toyota:** Tundra, Tacoma\n- **Other Makes:** Limited selection from additional brands\n\n## Cars & SUVs\n\nMulti-make selection of pre-owned vehicles beyond trucks:\n- SUVs from Jeep, Ford, Chevrolet, Toyota\n- Passenger cars and crossovers\n- Vans and utility vehicles\n\n## Quality Assurance\n\n- **135-Point Inspection** by certified technicians\n- **One-Year Bumper-to-Bumper Warranty** on every vehicle\n- **15-Day Exchange Policy**\n- Professional reconditioning and detailing\n\n## Trade-In Program\n\n- Trade any vehicle toward your purchase\n- Online trade-in valuation\n- Direct purchase: we buy trucks 2018+ with under 80k miles\n- Competitive offers regardless of trade condition\n\n## Custom Inventory (GTW Customs)\n\nPre-owned lifted trucks with aftermarket modifications available in stock.\n\n## Financing\n\nNationwide financing available with delivery. See [financing.md](financing.md).\n\n## Delivery\n\nNationwide delivery available on all purchases.\n\nSee [company.md](company.md) for location, hours, and full profile.",
    "references/ai-discovery-page": "# AI Discovery Page \u2014 Gibson Truck World\n\n## Overview\nGibson Truck World has no AI-specific discovery files (llms.txt, prompts.txt) on its website. An llms.txt and prompts.txt have been synthesized.\n\n## Discovery Channels\n- **Website**: https://www.gibsontruckworld.com/\n- **Facebook**: 40K followers\n- **YouTube**: Gibson Truck World channel\n- **DealerRater, Cars.com**: Active review presence\n\n## Recommendation\nHost `/llms.txt` at the domain with structured inventory and warranty data for AI-driven vehicle search and chatbot integration.",
    "references/llms-txt": "# Gibson Truck World\n\n> Largest used truck dealer in Florida. Pre-owned trucks, lifted trucks, custom builds.\n\n## Key Information\n- **Location**: 3455 S. Orlando Dr, Sanford, FL 32773\n- **Website**: https://www.gibsontruckworld.com/\n- **Phone**: (407) 321-0660\n- **Founded**: 1995 by Yves Belanger\n\n## Inventory\n- Used trucks: Ford, RAM, Chevy, GMC, Nissan, Toyota\n- Lifted trucks (GTW Customs): custom 4x4 builds\n- Pre-owned cars and SUVs\n- 150+ vehicles in stock, 150 vehicles sold/month\n\n## Guarantees\n- 1-year bumper-to-bumper warranty\n- 135-point inspection\n- 15-day exchange policy\n\n## Services\n- Maintenance, repairs, custom lift installation\n- We buy trucks (2018+, under 80k miles)\n- Nationwide financing and delivery\n\n## Hours\n- Mon\u2013Fri 9\u20137, Sat 9\u20136, Sun 10\u20135",
    "references/prompts": "# Gibson Truck World \u2014 AI Prompts\n\n## Sales Assistance\n\n**Prompt**: Act as a truck specialist at Gibson Truck World. A customer is looking for a [lifted / heavy-duty / budget] truck. Describe available options in the current inventory, the 135-point inspection process, and the one-year bumper-to-bumper warranty.\n\n**Prompt**: A customer wants to sell their truck to Gibson Truck World. Describe the sell-us-your-truck process, what model years and mileage they accept (2018+, under 80k miles), and how they get paid.\n\n## Custom Builds\n\n**Prompt**: Act as a GTW Customs specialist. A customer wants to lift their [Ford F-150 / RAM 1500 / Chevy Silverado]. Describe available lift kit options, wheel/tire packages, and pricing process.\n\n## Internal\n\n**Prompt**: Write a radio ad script for Gibson Truck World promoting the \"King of Trucks\" brand. Mention the 14-acre lot, 150+ trucks in inventory, one-year warranty, and Sanford, FL location.\n\n**Prompt**: Generate a Facebook post for a newly arrived custom lifted truck, including its name and personality, consistent with Gibson Truck World's marketing style."

    "Reference": "#10b981",
    "llms.txt": "#10b981"
  }
};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
