    "datasets/dealership": "# Leif Johnson Ford of Austin\n\nLeif Johnson Ford of Austin is a full-service Ford dealership located at 501 East Koenig Lane, Austin, TX 78751. Part of the Leif Johnson Automotive Group - a family-owned business operating for nearly 60 years - the dealership serves Austin, Round Rock, Cedar Park, Georgetown, Pflugerville, and the wider Central Texas region.\n\n## Contact Information\n\n| Department | Phone |\n|---|---|\n| Sales | (512)-650-3543 |\n| Service | (512)-614-7866 |\n| Parts | (512)-614-7740 |\n| Main | (512) 598-4480 |\n\n## Location\n\n501 East Koenig Lane, Austin, TX 78751\n\n## Hours\n\n| Day | Sales | Service | Parts |\n|---|---|---|---|\n| Monday | 8:30 am \u2013 8:00 pm | 7:00 am \u2013 7:00 pm | 7:00 am \u2013 7:00 pm |\n| Tuesday | 8:30 am \u2013 8:00 pm | 7:00 am \u2013 7:00 pm | 7:00 am \u2013 7:00 pm |\n| Wednesday | 8:30 am \u2013 8:00 pm | 7:00 am \u2013 7:00 pm | 7:00 am \u2013 7:00 pm |\n| Thursday | 8:30 am \u2013 8:00 pm | 7:00 am \u2013 7:00 pm | 7:00 am \u2013 7:00 pm |\n| Friday | 8:30 am \u2013 7:00 pm | 7:00 am \u2013 7:00 pm | 7:00 am \u2013 7:00 pm |\n| Saturday | 8:30 am \u2013 7:00 pm | 8:00 am \u2013 5:00 pm | 8:00 am \u2013 5:00 pm |\n| Sunday | Closed | Closed | Closed |\n\n## Ratings\n\n- **Google Rating**: 4.5 / 5 (4,507 reviews)\n- **Website**: Family-owned and operated for nearly 60 years\n\n## Inventory Volume\n\nFull new Ford lineup including trucks, SUVs, crossovers, vans, and EVs. Pre-owned inventory spanning multiple makes and models. Over 998 vehicles in current inventory.\n\n## Ownership\n\nLeif Johnson Automotive Group - family-owned, nearly 60 years in business. Operates 3 Ford franchise dealerships and 3 pre-owned locations in and around Austin.\n\n## Community Involvement\n\nSupports local programs including Earning by Learning, Responsible Parenting, and Toys for Tots.\n\n## Awards\n\nRecognized by Ford Motor Company for many achievements.\n\n## Social Media\n\n- Facebook: https://www.facebook.com/leifjohnsonfordofaustin\n- YouTube: https://www.youtube.com/user/leifjohnsonford/\n- Instagram: https://www.instagram.com/leifjohnsonford/\n- X/Twitter: https://twitter.com/leifjohnsonford\n\nSee [new-vehicles.md](new-vehicles.md) and [used-vehicles.md](used-vehicles.md) for current inventory. See [service-center.md](service-center.md) for service department details, [financing.md](financing.md) for finance options, and [staff.md](staff.md) for team directory.",
    "datasets/faq": "# Frequently Asked Questions\n\n## Vehicles & Inventory\n\n**Q: What Ford models are available at Leif Johnson Ford of Austin?**\nA: The dealership carries the full Ford lineup including F-150, F-150 Lightning, Maverick, Ranger, Super Duty, Bronco, Bronco Sport, Explorer, Expedition, Escape, Mustang, Mustang Mach-E, E-Transit, and Transit vans.\n\n**Q: Do you have used vehicles from other manufacturers?**\nA: Yes. The pre-owned inventory spans multiple makes and models including Ford, Chevrolet, Toyota, Honda, BMW, Mercedes-Benz, and more.\n\n**Q: Can I see window stickers for used vehicles online?**\nA: Yes. Transparent original window stickers are displayed on digital inventory pages.\n\n**Q: Can I custom-order a new Ford from the factory?**\nA: Yes. The dealership facilitates custom factory ordering directly with Ford to secure your preferred options.\n\n## Financing\n\n**Q: Can I apply for financing online?**\nA: Yes. Complete the online [finance application](https://www.leifjohnsonford.com/finance-application/) from home.\n\n**Q: What credit situations do you work with?**\nA: The finance team works with multiple lending partners to accommodate various credit profiles, including limited credit history.\n\n**Q: Do you offer both buying and leasing options?**\nA: Yes. The finance center provides both purchase financing and lease programs.\n\n**Q: Can I value my trade-in online?**\nA: Yes. Use the [Black Book Trade-In](https://www.leifjohnsonford.com/black-book-trade-in/) tool for instant online valuation.\n\n## Service\n\n**Q: Do you use OEM or aftermarket parts?**\nA: The service department uses only OEM parts for all repairs.\n\n**Q: Do you offer mobile service?**\nA: Yes. Mobile Service brings repairs to your home or office.\n\n**Q: Can I schedule service online?**\nA: Yes. Use the online [service appointment](https://www.leifjohnsonford.com/service-appointment/) form.\n\n**Q: Do you offer Ford Pickup & Delivery?**\nA: Yes. The dealership provides vehicle pickup and delivery service for service appointments.\n\n## Dealership\n\n**Q: What are your sales hours?**\nA: Monday\u2013Thursday 8:30am\u20138:00pm, Friday\u2013Saturday 8:30am\u20137:00pm, Sunday closed.\n\n**Q: Where is the dealership located?**\nA: 501 East Koenig Lane, Austin, TX 78751.\n\n**Q: Is there a money-back guarantee?**\nA: Yes. The dealership offers a 7-Day Money-Back Guarantee on qualifying vehicle purchases.\n\n**Q: Is Leif Johnson Ford family-owned?**\nA: Yes. The Leif Johnson Automotive Group has been family-owned and operated for nearly 60 years.\n\n**Q: Do you offer haggle-free pricing?**\nA: Yes. The dealership uses a transparent, no-haggle pricing model.\n\n**Q: What community programs do you support?**\nA: The dealership supports Earning by Learning, Responsible Parenting, Toys for Tots, and other local initiatives.\n\nSee [dealership.md](dealership.md) for full business profile.",
    "datasets/financing": "# Financing & Leasing\n\nThe Leif Johnson Ford of Austin Finance Center offers purchase financing and lease programs for new and pre-owned vehicles.\n\n## Financing Options\n\n- **Online Application**: Start the financing process from home via the [Finance Application](https://www.leifjohnsonford.com/finance-application/)\n- **Multiple Lending Partners**: The finance team works with multiple lenders to find competitive rates\n- **Flexible Terms**: Loan and lease solutions designed around different ownership goals and budgets\n- **Low APR Promotions**: Manufacturer-backed special financing rates for qualified buyers\n- **Credit Challenges Welcome**: Options available for customers with limited or challenged credit\n\n## Leasing\n\nLeasing is available for customers who prefer lower monthly payments and the option to drive a new vehicle every few years.\n\n## Buying vs. Leasing\n\n| Factor | Buying | Leasing |\n|---|---|---|\n| Monthly Payment | Higher | Lower |\n| Ownership | Own the vehicle at end of term | Return vehicle at end of term |\n| Mileage | Unlimited | Limited by contract |\n| Sales Tax | Paid upfront or rolled into loan | Included in monthly payment |\n\n## Trade-In\n\nGet an instant online valuation through [Black Book Trade-In](https://www.leifjohnsonford.com/black-book-trade-in/) or the [Black Book Credit Estimator](https://www.leifjohnsonford.com/black-book-credit-estimator/).\n\n## Payment Calculators\n\nEstimate monthly payments using the [Payment Calculators](https://www.leifjohnsonford.com/payment-calculators/) before visiting the dealership.\n\n## Finance Center Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 8:30 am \u2013 8:00 pm |\n| Tuesday | 8:30 am \u2013 8:00 pm |\n| Wednesday | 8:30 am \u2013 8:00 pm |\n| Thursday | 8:30 am \u2013 8:00 pm |\n| Friday | 8:30 am \u2013 7:00 pm |\n| Saturday | 8:30 am \u2013 7:00 pm |\n| Sunday | Closed |\n\n## Contact\n\n**Finance/Sales**: (512)-650-3543\n\n## Commercial Financing\n\nCommercial fleet and business customers can apply through the [Commercial Finance Application](https://www.leifjohnsonford.com/commercial-finance-application/).\n\nSee [dealership.md](dealership.md) for full business profile and [new-vehicles.md](new-vehicles.md) or [used-vehicles.md](used-vehicles.md) for inventory.",
    "datasets/new-vehicles": "# New Ford Vehicles\n\nLeif Johnson Ford of Austin carries a comprehensive selection of new Ford vehicles across all model lines.\n\n## Trucks\n\n| Model | Type | Key Features |\n|---|---|---|\n| F-150 | Full-size pickup | Multiple cab/configurations, available PowerBoost hybrid, Pro Power Onboard |\n| F-150 Lightning | All-electric pickup | Standard range and extended range battery options, frunk storage |\n| Ford Maverick | Compact pickup | Available hybrid powertrain, affordable entry point |\n| Ford Ranger | Midsize pickup | Off-road capable, available FX4 package |\n| Super Duty (F-250/F-350/F-450) | Heavy-duty pickup | Commercial-grade towing and payload capacity |\n\n## SUVs & Crossovers\n\n| Model | Type | Key Features |\n|---|---|---|\n| Ford Bronco | Off-road SUV | Removable doors/roof, G.O.A.T. modes, 2-door and 4-door |\n| Bronco Sport | Compact SUV | Trail Control, off-road capability in a compact package |\n| Ford Explorer | Midsize SUV | Available hybrid, 3-row seating, ST performance variant |\n| Ford Expedition | Full-size SUV | Maximum passenger/cargo capacity, Timberline off-road trim |\n| Ford Escape | Compact SUV | Available PHEV and hybrid, 2-row seating |\n\n## Vans\n\n| Model | Type | Key Features |\n|---|---|---|\n| E-Transit | All-electric cargo van | Zero-emission commercial van, multiple roof/body configurations |\n| Transit / Transit Passenger Wagon | Full-size van | Cargo, passenger, and commercial configurations |\n\n## Performance\n\n| Model | Type | Key Features |\n|---|---|---|\n| Ford Mustang | Sports car | EcoBoost and Coyote V8, available Dark Horse trim |\n| Ford Mustang Mach-E | All-electric SUV | Extended range available, GT Performance Edition |\n\n## Electric & Hybrid Models\n\n- F-150 PowerBoost Hybrid\n- F-150 Lightning (all-electric)\n- Mustang Mach-E (all-electric)\n- Escape Hybrid / Escape PHEV\n- Explorer Hybrid\n- Maverick Hybrid\n- E-Transit (all-electric)\n\n## Commercial Vehicles\n\nLeif Johnson Ford of Austin offers a dedicated Work Trucks program through [Work Truck Solutions](https://leifjohnsonford.worktrucksolutions.com/), serving commercial fleet and business customers with new chassis, upfits, and vocational vehicles.\n\n## Current Inventory\n\nBrowse online at the [new vehicle inventory page](https://www.leifjohnsonford.com/inventory/new-vehicles/) and [new specials](https://www.leifjohnsonford.com/inventory/new-specials/).\n\nSee [dealership.md](dealership.md) for full business profile and [financing.md](financing.md) for purchase/lease options.",
    "datasets/service-center": "# Service Center\n\nThe Leif Johnson Ford of Austin Service Department provides factory-authorized maintenance and repair services for Ford vehicles.\n\n## Services Offered\n\n- Routine maintenance: oil changes, tire rotations, inspections, preventative maintenance\n- Advanced diagnostics and repair: brake service, engine diagnostics, electrical service, transmission repairs\n- Ford-specific parts and accessories - OEM-engineered components\n- Tire sales and service through the [Tire Finder](https://www.leifjohnsonford.com/tire-finder/)\n- Mobile Service - on-site repairs at your home or office\n- Ford Pickup & Delivery - vehicle pickup and return service\n- FordPass Rewards integration\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Monday | 7:00 am \u2013 7:00 pm |\n| Tuesday | 7:00 am \u2013 7:00 pm |\n| Wednesday | 7:00 am \u2013 7:00 pm |\n| Thursday | 7:00 am \u2013 7:00 pm |\n| Friday | 7:00 am \u2013 7:00 pm |\n| Saturday | 8:00 am \u2013 5:00 pm |\n| Sunday | Closed |\n\n## Contact\n\n**Service**: (512)-614-7866\n\n## Parts Department\n\nThe [Parts Center](https://www.leifjohnsonford.com/parts-center/) stocks OEM Ford parts and accessories with options for online ordering and in-store pickup. **Parts Hours**: Monday\u2013Friday 7:00am\u20137:00pm, Saturday 8:00am\u20135:00pm. **Parts Phone**: (512)-614-7740.\n\n## Collision Center\n\nThe dealership operates a [Collision Center](https://www.leifjohnsonford.com/collision-center/) for body repair and paint services, with online [body shop estimates](https://www.leifjohnsonford.com/service-appointment/).\n\n## Service Specials\n\nView current [Service & Parts Specials](https://www.leifjohnsonford.com/service-parts-specials/) for discounted maintenance packages.\n\nSee [staff.md](staff.md) for the service team directory and [dealership.md](dealership.md) for general business information.",
    "datasets/staff": "# Staff Directory\n\nLeif Johnson Ford of Austin employs a dedicated team across management, sales, service, and parts departments to serve the Austin community.\n\n## Departments\n\n- **Management** - Dealership leadership and operations\n- **Sales** - New and pre-owned vehicle sales consultants and finance managers\n- **Service** - Factory-trained technicians, service advisors, and mobile service team\n- **Parts** - OEM parts specialists and inventory management\n\nFor specific staff listings, visit the [staff page](https://www.leifjohnsonford.com/staff/) on the dealership website.\n\nSee [dealership.md](dealership.md) for business profile and [service-center.md](service-center.md) for service department details.",
    "datasets/used-vehicles": "# Pre-Owned Vehicles\n\nLeif Johnson Ford of Austin maintains a diverse pre-owned inventory spanning multiple makes, models, and price points.\n\n## Inventory Categories\n\n| Category | Description |\n|---|---|\n| All Used Vehicles | Full pre-owned inventory across all makes and models |\n| Certified Pre-Owned | Ford-certified vehicles with factory-backed warranty |\n| Used Under $15k | Budget-friendly pre-owned options |\n| Pre-Owned Specials | Discounted pre-owned vehicles with special pricing |\n| Demo Specials | Demonstrator models at reduced pricing |\n\n## Ford Blue Advantage Program\n\nThe dealership participates in the [Ford Blue Advantage](https://www.leifjohnsonford.com/fordblueadvantage/) certified pre-owned program, which provides:\n\n- **Gold Certified**: Up to 7-year/100,000-mile limited warranty, 172-point inspection, 24/7 roadside assistance, rental car coverage\n- **Blue Certified**: Up to 3-month/4,000-mile limited warranty, 139-point inspection, 24/7 roadside assistance\n\n## Trade-In\n\nThe dealership offers trade-in evaluation through:\n- [Black Book Trade-In](https://www.leifjohnsonford.com/black-book-trade-in/) - instant online valuation\n- [Black Book Credit Estimator](https://www.leifjohnsonford.com/black-book-credit-estimator/)\n- In-person appraisal at the dealership\n\n## Specials\n\n- [Pre-Owned Specials](https://www.leifjohnsonford.com/inventory/used-vehicle-specials/)\n- [Demo Specials](https://www.leifjohnsonford.com/inventory/demo-specials/)\n\n## 7-Day Money-Back Guarantee\n\nThe dealership offers a [7-Day Money-Back Guarantee](https://www.leifjohnsonford.com/7-day-money-back-guarantee/) for added peace of mind on vehicle purchases.\n\n## Additional Services\n\n- **Haggle-Free Pricing**: Transparent, no-haggle pricing model\n- **Remote Purchase**: Buy without visiting the dealership\n- **Pre-Loved Program**: Marketing term for pre-owned vehicle selection\n\nSee [dealership.md](dealership.md) for full business profile and [financing.md](financing.md) for financing options on pre-owned vehicles.",
    "references/ai-discovery-page": "# AI Discovery Hub\n\nLeif Johnson Ford of Austin maintains an [AI Discovery Hub](https://www.leifjohnsonford.com/ai-discovery-hub/) with structured endpoints optimized for LLM and AI crawler consumption via PromptGraph.\n\n## Global Directives\n\n| Resource | URL |\n|---|---|\n| AI Manifest | `https://api.promptgraph.ai/api/v1/leif-johnson-austin/.well-known/ai-manifest.json` |\n| llms.txt | `https://api.promptgraph.ai/api/v1/leif-johnson-austin/llms.txt` |\n| robots.txt | `https://api.promptgraph.ai/api/v1/leif-johnson-austin/robots.txt` |\n| Sitemap | `https://api.promptgraph.ai/api/v1/leif-johnson-austin/sitemap.xml` |\n| Config | `https://api.promptgraph.ai/api/v1/leif-johnson-austin/config.json` |\n\n## API Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Complete business profile with address, contact, hours, ratings (JSON-LD) |\n| `/vehicles` | Full vehicle inventory with specs, pricing, availability (JSON-LD) |\n| `/offers` | Current special offers and incentives |\n| `/prompts` | Structured Q&A prompts for consistent AI responses |\n| `/testimonials` | Customer reviews and ratings (JSON-LD) |\n| `/gbp-context` | Google Business Profile data including reviews, posts, images |\n| `/site-content` | Clean, plain-text site mirror for LLM ingestion |\n| `/llms.txt` | AI discovery and consumption directives |\n| `/.well-known/ai-manifest.json` | Machine-readable AI resource directory |\n\n## Schema Types\n\n- AutoDealer (LocalBusiness)\n- Car (vehicle inventory)\n- ItemList\n- Review / AggregateRating\n- Offer\n- CreativeWork (prompts/FAQs)\n\n## Author Bio\n\nThis AI Discovery Optimization page was structured by a Technical SEO Engineer and Web Developer to maximize LLM discovery and human readability, using semantic HTML, direct API endpoint integration, and valid AutoDealer Schema.org markup.\n\nSee [llms-txt.md](llms-txt.md) for the AI consumption directive and [prompts.md](prompts.md) for the prompt library.",
    "references/llms-txt": "# llms.txt\n\nThe [llms.txt](https://api.promptgraph.ai/api/v1/leif-johnson-austin/llms.txt) file provides AI systems with structured discovery and consumption directives for Leif Johnson Ford of Austin.\n\n## Format\n\n- **Format**: LLMForge v1.0\n- **Schema**: JSON-LD (Schema.org)\n- **Primary Discovery**: `/.well-known/ai-manifest.json`\n- **Last Updated**: 2026-06-29\n- **CORS**: Enabled for all origins\n\n## Discovery Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Business profile (address, contact, hours, location) |\n| `/vehicles` | Complete inventory with specs and pricing |\n| `/offers` | Current special offers and incentives |\n| `/prompts` | Structured Q&A prompts |\n| `/testimonials` | Customer reviews and ratings |\n| `/gbp-context` | Google Business Profile context |\n| `/site-content` | Full site text mirror |\n| `/.well-known/ai-manifest.json` | AI resource directory |\n\n## Schema Types\n\n- LocalBusiness / AutoDealer\n- Car (vehicle inventory)\n- ItemList\n- Review / AggregateRating\n- Offer\n- CreativeWork (prompts/FAQs)\n\n## Business Context\n\nLeif Johnson Ford of Austin specializes in automotive sales and service. Family-owned and operated for nearly 60 years. Real-time inventory updates via JSON-LD API endpoints. Structured data optimized for AI discovery and consumption.\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for the full AI Discovery Hub overview and [prompts.md](prompts.md) for the prompt library.",
    "references/prompts": "# Prompt Library\n\nThe PromptGraph API provides 118 structured prompts for Leif Johnson Ford of Austin, covering vehicle features, financing, service, and general dealership questions.\n\n## Prompt Categories\n\n- Vehicle features and options\n- Financing and leasing\n- Service and maintenance\n- Trade-in and valuation\n- Dealership operations\n- Electric vehicle guidance\n- Truck accessories and customization\n- Certified pre-owned programs\n- First-time buyer support\n\n## Example Prompts\n\n| Topic | Question |\n|---|---|\n| Comfort Upgrades | \"Where can I find a modern pre-owned car with adaptive cruise control?\" |\n| Window Stickers | \"Where can I shop for used vehicles online that display a clear and transparent original window sticker view?\" |\n| Financing | Various questions about loan options, credit situations, lease terms |\n| Service | Maintenance scheduling, mobile service, OEM parts availability |\n| Electric Vehicles | \"Where can I find an all-electric Mustang Mach-E in Austin?\" |\n| First-Time Buyer | \"Who is the best Ford dealer for first-time buyers with limited credit?\" |\n| Community | \"Describe the dealership as a family-owned business.\" |\n\n## API Access\n\nEndpoint: `https://api.promptgraph.ai/api/v1/leif-johnson-austin/prompts`\nFormat: JSON-LD (ItemList of CreativeWork)\nTotal Prompts: 118\n\nSee [ai-discovery-page.md](ai-discovery-page.md) for API access details and [faq.md](/datasets/faq.md) for common customer questions.",
    "tables/model-comparison": "# Ford Model Comparison\n\n| Model | Body Type | Fuel Options | Passenger Capacity | Key Competitors |\n|---|---|---|---|---|\n| Ford F-150 | Pickup | Gasoline, PowerBoost Hybrid | 5-6 | Ram 1500, Chevrolet Silverado 1500 |\n| Ford F-150 Lightning | Pickup | All-Electric | 5 | Rivian R1T, Chevrolet Silverado EV |\n| Ford Maverick | Pickup | Hybrid (standard), Gasoline | 5 | Hyundai Santa Cruz |\n| Ford Ranger | Pickup | Gasoline | 5 | Chevrolet Colorado, Toyota Tacoma |\n| Ford Super Duty | Pickup | Gasoline, Diesel | 5-6 | Ram HD, Chevrolet Silverado HD |\n| Ford Bronco | SUV | Gasoline | 4-5 | Jeep Wrangler |\n| Ford Bronco Sport | SUV | Gasoline | 5 | Jeep Cherokee, Subaru Forester |\n| Ford Explorer | SUV | Gasoline, Hybrid | 7 | Toyota Highlander, Chevrolet Traverse |\n| Ford Expedition | SUV | Gasoline | 8 | Chevrolet Suburban, GMC Yukon |\n| Ford Escape | SUV | Gasoline, Hybrid, PHEV | 5 | Honda CR-V, Toyota RAV4 |\n| Ford Mustang | Sports Car | Gasoline | 4 | Chevrolet Camaro, Dodge Challenger |\n| Ford Mustang Mach-E | SUV | All-Electric | 5 | Tesla Model Y, Chevrolet Blazer EV |\n| Ford E-Transit | Van/Cargo | All-Electric | 2-15 | Ram ProMaster EV |\n| Ford Transit | Van/Cargo | Gasoline | 2-15 | Ram ProMaster, Mercedes Sprinter |\n\n## Electrified Options\n\n| Model | Electrification | EPA Range (est.) |\n|---|---|---|\n| F-150 Lightning | All-Electric | 240\u2013320 miles |\n| Mustang Mach-E | All-Electric | 250\u2013310 miles |\n| E-Transit | All-Electric | 108\u2013126 miles |\n| Escape PHEV | Plug-In Hybrid | 37 miles electric |\n\nSee [new-vehicles.md](/datasets/new-vehicles.md) for detailed new vehicle inventory."

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
