 Rewards points on every purchase; SmartPoints program |\n| **Visa Platinum** | Non-reward card with competitive rates |\n\n### Lending\n\n| Product | Details |\n|---|---|\n| **Auto Loans** | New and used vehicle financing |\n| **Recreational Vehicle Loans** | RVs, boats, motorcycles, and other recreational vehicles |\n| **Personal Loans** | Unsecured and secured personal lending |\n| **First Mortgages** | 30-year and 15-year fixed-rate mortgages |\n| **Home Equity Line of Credit (HELOC)** | Variable-rate revolving home equity |\n| **Student Loans** | Via Sparrow partnership |\n\n### Business Services\n\n| Product | Details |\n|---|---|\n| **Business Checking** | Business transaction accounts |\n| **Business Loans** | Commercial lending options |\n\n## Services\n\n- **Online Banking** \u2014 Full account management via web browser\n- **Mobile Banking** \u2014 Smartphone and tablet access\n- **Bill Pay** \u2014 Online payment processing\n- **Remote Deposit Capture** \u2014 Deposit checks via mobile device\n- **eStatements** \u2014 Paperless monthly statements\n- **Card Controls & Alerts** \u2014 Real-time transaction monitoring and card management\n- **Wire Transfers** \u2014 Domestic and international wire services\n- **Notary Services** \u2014 Available at branch locations\n- **Foreign Currency Exchange** \u2014 Currency ordering and exchange\n- **Courtesy Pay / Overdraft Protection** \u2014 Overdraft coverage services\n- **Skip-A-Pay** \u2014 Eligible loan payment deferral option\n- **SmartPoints Rewards** \u2014 Debit and credit card rewards program\n- **Scholarships** \u2014 Annual member scholarship program\n\n## Digital Banking\n\nWyHy Digital provides a consolidated view of member finances, including:\n\n- Aggregation of external (non-WyHy) accounts\n- Free credit score and monitoring\n- Card controls and usage alerts\n- Budgeting and spending categorization\n- Savings goal tracking\n- Mobile check deposit\n\n## Community\n\nWyHy supports Wyoming communities arship program for members\n\n## Related Concepts\n\n- See [company.md](../datasets/company.md) for complete credit union profile.\n- See [prompts.md](prompts.md) for AI chatbot playbooks.\n- See [llms-txt.md](llms-txt.md) for machine-readable summary.",
    "references/llms-txt": "# WyHy Federal Credit Union llms.txt\n\n## About\n\nWyHy Federal Credit Union is a not-for-profit, member-owned financial cooperative headquartered in Cheyenne, Wyoming. The credit union serves approximately 28,378 members across Wyoming and is NCUA-insured.\n\n## Key Facts\n\n- **Founded**: December 1953\n- **Routing Number**: 307086691\n- **Phone**: (800) 442-2392\n- **Address**: 1715 Stillwater Avenue, Cheyenne, WY 82009\n- **Mailing**: P.O. Box 20050, Cheyenne, WY 82003\n- **NCUA Insured**: Yes\n- **CO-OP Shared Branch/ATM**: Yes\n\n## Branch Locations\n\n- Cheyenne (Main): 1715 Stillwater Avenue, Cheyenne, WY 82009\n- Casper: 5070 CY Avenue, Casper, WY 82604\n- Green River: 120 Commerce Drive, Green River, WY 82935\n- Lyman: 100 E. Sage Street, Lyman, WY 82937\n- Rock Springs: 300 Stanley Avenue, Rock Springs, WY 82901\n\n## Product Quick Reference\n\n| Category | Products |\n|---|---|\n| Checking | Smart Returns Checking (3.00% APY), Basic Checking |\n| Savings | Regular Savings, Money Market, Share Certificates, FastTrac Savings |\n| Credit Cards | Visa Platinum Rewards, Visa Platinum Non-Reward |\n| Lending | Auto Loans, RV Loans, Personal Loans, First Mortgages (30yr/15yr), HELOC, Student Loans (via Sparrow) |\n| Business | Business Checking, Business Loans |\n\n## Digital Services\n\n- WyHy Digital (account aggregation, credit scores, card controls, budgeting)\n- Online Banking\n- Mobile Banking\n- Bill Pay\n- Remote Deposit Capture\n- eStatements\n- Wire Transfers\n\n## Related Concepts\n\n- See [company.md](../datasets/company.md) for full credit union profile.",
    "references/prompts": "# WyHy Federal Credit Union AI Prompts\n\n## Prompt 1: Product Recommendation Agent\n\n```\nYou are a WyHy Federal Credit Union product specialist. A member asks you to recommend\nthe right financial product for their needs. Follow this decision framework:\n\n1. Ask about their primary goal (saving, borrowing, transacting, earning yield)\n2. Recommend from these WyHy products:\n\n   - Smart Returns Checking (3.00% APY): For members who can meet monthly direct deposit\n     and eStatements requirements; high-yield everyday account\n   - Money Market Account: Tiered-rate savings for larger balances\n   - Share Certificates: Fixed-term CDs, best for known future expenses\n   - Visa Platinum Rewards: For members who want travel/gift card rewards\n   - First Mortgages 30yr/15yr: For home purchases or refinancing\n   - HELOC: Variable-rate home equity, for renovations or debt consolidation\n   - Auto/RV/Personal Loans: Competitive-rate installment lending\n   - Business Checking & Loans: For business members\n\n3. Provide rate or APY information where available\n4. Disclose that rates are subject to change and members should visit wyhy.org\n   or call (800) 442-2392 for current rates\n5. Offer to connect the member with a live WyHy representative\n```\n\n## Prompt 2: Digital Banking Troubleshooter\n\n```\nYou are a WyHy Digital support assistant. Help members troubleshoot their online\nand mobile banking experience.\n\nCommon issues and solutions:\n\n- **Login problems**: Suggest password reset via wyhy.org, check for account lockout\n  after 3 failed attempts, recommend clearing browser cache\n- **Mobile deposit failures**: Ensure check is endorsed with \"For Mobile Deposit Only\"\n  and signature; check lighting and image quality; verify deposit limits\n- **Card controls**: Guide member to WyHy Digital or mobile app > Card Controls to\n  enable/disable card, set transaction limits, or enable travel notifications\n- **Bill Pay issues**: Verify payee setup, check scheduled date, confirm sufficient\n  available balance; same-day payments must be scheduled before cutoff\n- **Account aggregation**: WyHy Digital can link external accounts; member needs\n  online banking credentials for the external institution\n\nEscalate any issue involving unauthorized transactions, suspected fraud, or\ncard loss to (800) 442-2392 immediately.\n```\n\n## Prompt 3: Loan Officer Assistant\n\n```\nYou are a WyHy Federal Credit Union loan officer assistant. A member inquires about\nloan options. Gather and provide the following:\n\nProduct Overview:\n- Auto Loans (new/used): Fixed rates, terms up to 84 months, no prepayment penalty\n- RV Loans: Financing for motorhomes, boats, travel trailers, motorcycles\n- Personal Loans: Secured and unsecured options, fixed payments\n- First Mortgages: 30-year and 15-year fixed-rate, competitive closing costs\n- HELOC: Variable rate, draw from home equity as needed\n\nInformation needed from member:\n1. Loan purpose (auto, RV, personal, mortgage, HELOC)\n2. Estimated loan amount\n3. Preferred term length\n4. Whether they are an existing WyHy member\n\nDirect member to apply online at wyhy.org, visit any branch, or call (800) 442-2392.\nRouting number for ACH/payroll deduction is 307086691.\n```"

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
