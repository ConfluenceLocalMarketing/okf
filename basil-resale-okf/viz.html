    "datasets/commercial-trucks": "# Commercial Trucks at Basil Resale\n\nBasil Resale Sheridan carries a dedicated inventory of commercial trucks and work-ready vehicles for business owners, contractors, and fleet operators.\n\n## Available Types\n\n- **Light-duty pickups** \u2014 Half-ton trucks for daily work use\n- **Heavy-duty pickups** \u2014 Three-quarter and one-ton trucks for towing and hauling\n- **Cargo vans** \u2014 Enclosed transport and delivery vehicles\n- **Specialty commercial vehicles** \u2014 Box trucks, service bodies\n\n## Popular Brands\n\n- RAM (1500, 2500, 3500)\n- Chevrolet Silverado (1500, 2500HD, 3500HD)\n- Ford F-Series (F-150, F-250, F-350)\n- GMC Sierra\n\n## Financing for Commercial Vehicles\n\n- Multiple lender options for business and personal use\n- Online credit application\n- Competitive rates and terms\n- Trade-in appraisal for existing fleet vehicles\n\n## Service & Maintenance\n\nThe Basil Resale Sheridan service center is equipped to handle commercial vehicle maintenance and repairs:\n\n- Heavy-duty brake service\n- Transmission maintenance\n- Oil changes and fluid services\n- Tire service for commercial-grade tires\n\nSee [dealership.md](dealership.md) for full business profile and hours.\nSee [used-vehicles.md](used-vehicles.md) for general pre-owned inventory.",
    "datasets/dealership": "# Basil Resale Sheridan & Basil Resale Transit\n\nBasil Resale is a family-owned pre-owned vehicle dealership with two locations serving the Buffalo, NY area. Part of the Basil Family Dealerships \u2014 10 locations across Western New York with over 65 years of operation.\n\n## Business Profile (Schema.org AutoDealer)\n\n- **Name:** Basil Resale Sheridan\n- **Type:** AutoDealer (Used car dealer, Auto repair shop, Used truck dealer, Car leasing service, Car finance and loan company, Electric motor vehicle dealer)\n- **Rating:** 4.5 / 5.0 (2,579 reviews)\n- **Date Modified:** 2026-02-03\n\n## Locations\n\n### Basil Resale Sheridan\n\n| Detail | Info |\n|---|---|\n| Address | 4131 Sheridan Dr, Williamsville, NY 14221 |\n| Geo | 42.9779088, -78.7799943 |\n| Sales | (716) 631-0404 |\n| Service | (716) 631-0405 |\n| Main | (716) 631-0400 |\n| Email | lindsey@basilmarketinggroup.com |\n\n### Basil Resale Transit\n\n| Detail | Info |\n|---|---|\n| Address | 6868 Transit Rd, Buffalo, NY 14221 |\n\nEmail (customer service): basilcares@basilresale.com\n\n## Hours\n\n| Day | Sales | Service |\n|---|---|---|\n| Mon\u2013Thu | 9:00 AM \u2013 7:00 PM | 7:30 AM \u2013 5:00 PM |\n| Fri | 9:00 AM \u2013 6:00 PM | 7:30 AM \u2013 5:00 PM |\n| Sat | 9:00 AM \u2013 5:00 PM | 7:30 AM \u2013 3:30 PM |\n| Sun | 10:00 AM \u2013 3:00 PM | Closed |\n\n## Services\n\n- **Finance Center** \u2014 Multiple lender options, online credit application, trade-in appraisal, lease and loan options regardless of credit history\n- **Service Center** \u2014 State-of-the-art repair technologies including laser alignment machines and handheld diagnostic computers; free oil changes for life with purchase and service\n- **Collision Center** \u2014 Full collision repair services\n- **Parts Center** \u2014 Genuine and aftermarket parts\n- **Vehicle Finder Service** \u2014 Helps narrow down options to find the right vehicle\n- **Commercial Trucks** \u2014 Dedicated commercial vehicle inventory for work-ready pickups\n- **Credit Card Payments** \u2014 Pay via secure online payment portal (USAePay)\n\n## Perks\n\n- Free oil changes for life\n- Free car washes with every visit\n- Free warranty on all used cars sold\n- Free wi-fi\n- Hot popcorn in the showroom\n- Free alignment check with every visit\n- On the spot delivery\n- Highest trade-in allowance\n- $200 Sales Referral Program\n\n## Online Tools\n\n- Kelley Blue Book Instant Cash Offer\n- Online inventory browsing and filtering (by type, year, make, model)\n- Online finance application\n- Vehicle finder service\n- Online service scheduling\n- Vehicle repair updates\n- Secure credit card payment portal\n\n## Leadership\n\n- **John Basil** \u2014 President (716-631-0400)\n- **Patrick Schultz** \u2014 Business Development Manager\n- **Jess Basil** \u2014 Marketing Director\n\n## Social\n\n- Facebook: https://www.facebook.com/BasilResaleSheridan/\n- Twitter: https://twitter.com/basilcars\n- Instagram: https://www.instagram.com/basilcars/\n- YouTube: https://www.youtube.com/channel/UCo-z6B4aTt0Q9S8ENygLxjg\n\n## Platform\n\n- Website powered by **Dealer Inspire**\n- Accessibility via **AudioEye**\n- Privacy policy, sitemap, and sitemap XML available on site\n\n## AI Discovery Endpoints\n\n- API base: `https://api.promptgraph.ai/api/v1/basil-resale-sheridan/`\n- AI Manifest: `/.well-known/ai-manifest.json`\n- Business: `/business` (JSON-LD Schema.org AutoDealer)\n- Vehicles: `/vehicles` (1,411 vehicles)\n- Prompts: `/prompts` (77 Q&A prompts)\n- Testimonials: `/testimonials` (customer reviews)\n- Sitemap: `/sitemap.xml`\n- Site Content: `/site-content` (plain-text mirror)\n- GBP Context: `/gbp-context` (Google Business Profile data)\n\nSee [staff.md](staff.md) for full staff directory.\nSee [ai-discovery-page.md](/references/ai-discovery-page.md) for structured AI endpoints.",
    "datasets/faq": "# Frequently Asked Questions \u2014 Basil Resale\n\n## Inventory & Purchasing\n\n**What types of vehicles does Basil Resale carry?**\n\nBasil Resale stocks over 1,411 pre-owned vehicles including sedans, SUVs, crossovers, trucks, coupes, luxury cars, minivans, electric/hybrid vehicles, classic cars, and commercial trucks. Brands include Toyota, Hyundai, Chevrolet, BMW, Land Rover, RAM, Nissan, and more.\n\n**Does Basil Resale sell commercial trucks?**\n\nYes \u2014 Basil Resale has a dedicated commercial truck inventory for business and work use.\n\n**Does Basil Resale sell new vehicles?**\n\nBasil Resale specializes in pre-owned vehicles. The Basil Family Dealerships group sells new vehicles across 10 locations.\n\n**What is the Certified Pre-Owned program?**\n\nCPO vehicles undergo a multi-point inspection and include additional warranty coverage for added peace of mind.\n\n**Can I make a credit card payment?**\n\nYes \u2014 Basil Resale offers a secure online credit card payment portal through USAePay.\n\n**Do you sell used Toyota, Honda, Ford, Chevy?**\n\nYes \u2014 Basil Resale carries a wide selection of used Toyota, Honda, Ford, Chevrolet, Hyundai, Kia, Nissan, BMW, Mercedes-Benz, Audi, Lexus, GMC, RAM, and Jeep vehicles.\n\n**Do you carry classic and vintage cars?**\n\nYes \u2014 classic and vintage collector vehicles are part of the inventory.\n\n**What sports cars do you have?**\n\nBasil Resale carries used sports cars including Corvettes, BMWs, and other performance vehicles under $30K.\n\n## Pricing & Budget\n\n**Are there vehicles under $20,000?**\n\nYes \u2014 Basil Resale has a dedicated selection of pre-owned vehicles under $20K.\n\n**Do you offer student car buying programs?**\n\nYes \u2014 special programs for college students looking for budget-friendly vehicles.\n\n**Are there discounts for first responders?**\n\nYes \u2014 exclusive price reductions for firefighters, EMTs, and police officers.\n\n## Financing\n\n**What financing options are available?**\n\nBasil Resale works with multiple lenders to find competitive rates. Online credit application is available regardless of credit history. Lease and loan options are offered.\n\n**Do you offer guaranteed financing approval?**\n\nYes \u2014 Basil Resale offers vehicle loan financing approval regardless of past financial background.\n\n**Can I get a car with bad credit or no credit?**\n\nYes \u2014 Basil Resale offers bad credit car loans and no credit history auto financing options.\n\n**Can I value my trade-in online?**\n\nYes \u2014 an online trade-in appraisal tool and Kelley Blue Book Instant Cash Offer are available.\n\n**Do you offer leasing?**\n\nYes \u2014 leasing options are available for used vehicles.\n\n**Can I buy from Basil Resale if I live out of state?**\n\nYes \u2014 out-of-state purchasing is supported.\n\n## Service & Warranties\n\n**Does Basil Resale have a service center?**\n\nYes \u2014 Basil Resale Sheridan has a state-of-the-art service center with laser alignment machines and handheld diagnostic computers. A collision center and parts center are also available.\n\n**What warranty comes with a used car?**\n\nAll used cars sold at Basil Resale include a free warranty. Certified Pre-Owned vehicles include additional coverage.\n\n**Do I get free oil changes?**\n\nYes \u2014 free oil changes for life with vehicle purchase and service.\n\n**Do you offer a courtesy shuttle during service?**\n\nYes \u2014 a two-way courtesy shuttle is available during service appointments.\n\n**What are the service hours?**\n\nService is open Mon\u2013Thu 7:30 AM \u2013 5:00 PM, Fri 7:30 AM \u2013 5:00 PM, Sat 7:30 AM \u2013 3:30 PM, closed Sunday.\n\n**Can you diagnose a check engine light?**\n\nYes \u2014 diagnostic scanning for check engine lights is available.\n\n**Do you offer auto detailing?**\n\nYes \u2014 professional auto detailing and cleaning services are available.\n\n## Perks\n\n- Free oil changes for life\n- Free car washes with every visit\n- Free warranty on all used cars sold\n- Free alignment check with every visit\n- Free wi-fi\n- Hot popcorn in the showroom\n- $200 Sales Referral Program\n- On the spot delivery\n- Free two-way courtesy shuttle\n- Highest trade-in allowance\n\n## Dealership\n\n**What are the sales hours?**\n\nSales: Mon\u2013Thu 9\u20137, Fri 9\u20136, Sat 9\u20135, Sun 10\u20133. Basil Resale is open on Sundays!\n\n**What area does Basil Resale serve?**\n\nBasil Resale serves Williamsville, Buffalo, Amherst, Getzville, Clarence, Lockport, and the greater Western New York area.\n\n**Is Basil Resale part of a larger group?**\n\nYes \u2014 Basil Resale is part of the Basil Family Dealerships, a family-owned group with over 65 years of service and multiple locations across Western New York.\n\n**What is the \"Basil Difference\"?**\n\nThe Basil Difference includes free oil changes for life, highest trade-in allowances, free shuttle/wash/alignment perks, online financing/trade tools, in-house credit solutions, and a commitment to treating customers like family.\n\n**Can I shop online and get home delivery?**\n\nYes \u2014 Basil Resale offers virtual tours, online financing, trade-in estimators, and home delivery scheduling.\n\n**Is there a loyalty program?**\n\nYes \u2014 customer loyalty programs and repeat buyer benefits are available.\n\n## Related\n\nSee [dealership.md](dealership.md) for full business profile, hours, and contact information.\nSee [used-vehicles.md](used-vehicles.md) for the pre-owned inventory details.\nSee [commercial-trucks.md](commercial-trucks.md) for commercial vehicle inventory.\nSee [prompts.md](/references/prompts.md) for the full 77-prompt PromptGraph library.",
    "datasets/new-vehicles": "# New Vehicles \u2014 Basil Family Dealerships\n\n## Overview\n\nWhile Basil Resale specializes in pre-owned vehicles, the Basil Family Dealerships maintain a substantial new vehicle inventory across 10 locations in Western New York. Basil Resale can connect customers to new vehicle inventory through the broader family network.\n\n## Available Brands\n\nThe Basil Family Dealerships represent multiple franchises including:\n\n- Mitsubishi (Basil Mitsubishi)\n- Ford (Basil Ford, Basil Ford of Niagara Falls)\n- Chevrolet (Joe Basil Chevrolet)\n- Buick, GMC, Cadillac (Robert Basil Buick GMC Cadillac)\n- Volkswagen (Basil Volkswagen)\n- Toyota (Basil Toyota)\n- BraunAbility mobility conversions (Basil Mobility)\n\n## How It Works\n\n1. Browse new inventory online at [basilcars.com](https://www.basilcars.com/new-vehicles/)\n2. Contact Basil Resale for assistance locating a specific new vehicle\n3. Leverage the Basil Family network for competitive pricing across locations\n4. Commercial trucks also available through network\n\n## Financing\n\n- Multiple lender options through the Basil Family finance centers\n- Online credit application available\n- Competitive rates across new and used vehicles\n\n## Related\n\nSee [dealership.md](dealership.md) for full business profile and contact information.\nSee [used-vehicles.md](used-vehicles.md) for the pre-owned inventory.",
    "datasets/service-center": "# Basil Resale Service & Collision Center\n\nBasil Resale Sheridan features a state-of-the-art service center equipped with advanced diagnostic technologies including laser alignment machines and handheld diagnostic computers.\n\n## Service Hours\n\n| Day | Hours |\n|---|---|\n| Mon\u2013Thu | 7:30 AM \u2013 5:00 PM |\n| Fri | 7:30 AM \u2013 5:00 PM |\n| Sat | 7:30 AM \u2013 3:30 PM |\n| Sun | Closed |\n\n**Phone:** (716) 631-0405\n\n## Services Offered\n\n### Routine Maintenance\n- Oil changes (free for life with purchase)\n- Tire rotation and balancing\n- Battery replacement\n- Fluid replacements and top-offs\n- State inspections\n- Alignment checks (free with every visit)\n\n### Diagnostics & Repairs\n- Computer diagnostics with handheld diagnostic tools\n- Laser alignment services\n- Brake repairs\n- Engine and transmission work\n- Full mechanical repairs\n\n## Collision Center\n\nFull collision repair services for all makes and models:\n\n- Body panel repair and replacement\n- Paint matching and refinishing\n- Frame straightening\n- Dent and ding removal\n- Post-accident restoration\n\n## Parts Center\n\n- Genuine and aftermarket parts\n- Quick ordering for specialty components\n- Competitive pricing\n\n## Service Perks\n\n- Free car wash with every service visit\n- Free alignment check with every visit\n- Free wi-fi in waiting area\n- Free shuttle service\n- Online scheduling\n\nSee [dealership.md](dealership.md) for full business profile and contact information.\nSee [commercial-trucks.md](commercial-trucks.md) for commercial vehicle service.",
    "datasets/staff": "# Basil Resale Staff Directory\n\n## Leadership\n\n- **John Basil** \u2014 President (716-631-0400)\n- **Patrick Schultz** \u2014 Business Development Manager\n- **Jess Basil** \u2014 Marketing Director\n\n## Sales & Finance\n\nSales and finance teams available at both locations. Contact the Sheridan location at (716) 631-0404 for sales assistance.\n\n## Service & Parts\n\nService and parts departments staffed with certified technicians. Contact Sheridan service at (716) 631-0405.\n\nSee [dealership.md](dealership.md) for full business profile and locations.",
    "datasets/testimonials": "# Customer Testimonials \u2014 Basil Resale Sheridan\n\nBasil Resale Sheridan has an **aggregate rating of 4.5 out of 5.0** from **2,579 reviews** (per PromptGraph API / Schema.org AutoDealer business profile).\n\n## Recent Customer Reviews\n\n### Nadia Levy \u2014 \u2b50\u2b50\u2b50\u2b50\u2b50\n\"Jake and Austin provided exceptional customer service, exceeding every expectation I had when entering the dealership! They were able to assist my family and get us into a brand new vehicle with no hassle. These guys are some of the best negotiators I've ever encountered and I highly recommend them for any drivers aspiring to get a new vehicle.\"\n\n### Nick Nowicki \u2014 \u2b50\u2b50\u2b50\u2b50\u2b50\n\"Steve made the whole process seamless and painless. I bought a used Mustang and the vehicle was in great shape! Car was priced very well, and they gave me a very good trade in value! Everyone there was awesome and treated me like family. Jake in finance was awesome, he broke everything down and made sure I had a full understanding.\"\n\n### Sam Martello \u2014 \u2b50\u2b50\u2b50\u2b50\u2b50\n\"Austin was extremely knowledgeable and perspicacious regarding cars and the car buying experience. Also, not pushy, instead he tactfully met us where we were in the car buying process. Easy 5 stars out of 5.\"\n\n### Marcella Mcdowell \u2014 \u2b50\u2b50\u2b50\u2b50\u2b50\n\"I got a car from Basil Resale Sheridan with Avian. I truly appreciate Avian for continuously looking for a car for me for over two months. His patience and kindness have been a God-send.\"\n\n## Online Review Platforms\n\n- **Facebook:** 82% recommend rate (423 reviews)\n- **DealerRater:** Over 350 reviews\n- **Cars.com:** 357 reviews\n- **Edmunds:** 8 reviews (2.5 out of 5)\n- **Google Maps:** Available via GBP context\n\nSee [dealership.md](dealership.md) for full business profile and contact information.",
    "datasets/used-vehicles": "# Pre-Owned Vehicles at Basil Resale\n\nBasil Resale is Western New York's largest pre-owned vehicle center, stocking over **1,411 used vehicles** across two locations (per PromptGraph API).\n\n## Inventory Highlights\n\n- **Sedans** \u2014 Commuter-friendly options\n- **SUVs & Crossovers** \u2014 Family-hauling vehicles\n- **Trucks** \u2014 Work-ready pickups (RAM, Colorado, Tacoma)\n- **Coupes & Luxury** \u2014 BMW, Land Rover, Alfa Romeo, Corvette\n- **Minivans** \u2014 Cavernous people-movers\n- **Electric & Hybrid** \u2014 Eco-friendly options\n- **Classic Cars** \u2014 Vintage collector vehicles\n- **Commercial Trucks** \u2014 Dedicated commercial vehicle inventory for business and work use\n\nPopular brands: Toyota, Hyundai, Chevrolet, BMW, Land Rover, RAM, Nissan, Alfa Romeo, Ford, Buick.\n\n## Certified Pre-Owned Program\n\nMulti-point inspected vehicles with warranty coverage. Available across a selection of makes and models.\n\n## Vehicle Finder Service\n\nTool to narrow down options by make, model, features, and price range to find the right vehicle.\n\n## Sample Inventory (from PromptGraph)\n\n| Vehicle | VIN | Price | Mileage |\n|---|---|---|---|\n| 2019 Toyota Tundra SR5 4WD | 5TFDY5F10KX858389 | $37,077 | 81,002 |\n\n## Budget-Friendly Options\n\n- Vehicles across all price points\n- Various price tiers including budget-conscious options\n- Trade-in appraisal available to offset purchase price\n- Kelley Blue Book Instant Cash Offer for quick trade value\n\n## Financing\n\n- Multiple lenders for competitive rate shopping\n- Online credit application\n- Options regardless of credit history\n- Lease and loan options available\n\n## Value Your Trade\n\n- Kelley Blue Book Instant Cash Offer \u2014 quick online estimate\n- Get a guaranteed trade-in value from home\n- [Value Your Trade](https://www.basilresale.com/sell-trade/)\n\n## Why Buy From Basil Resale\n\n- Free warranty on all used cars sold\n- Free oil changes for life\n- Free car washes with every visit\n- Free alignment check with every visit\n- Free wi-fi, hot popcorn in the showroom\n- On the spot delivery\n- 82% recommend rate on Facebook (423 reviews)\n- Over 350 reviews on DealerRater\n\nSee [dealership.md](dealership.md) for full business profile and contact information.\nSee [commercial-trucks.md](commercial-trucks.md) for dedicated commercial vehicle inventory.",

    "references/llms-txt": "# llms.txt \u2014 Basil Resale Sheridan\n\nThe PromptGraph API at `https://api.promptgraph.ai/api/v1/basil-resale-sheridan/llms.txt` provides a comprehensive LLMForge v1.0 directive:\n\n```\n# Basil Resale Sheridan\n# Format: LLMForge v1.0\n# Last Updated: 2026-06-24T12:49:51.681Z\n# Schema: JSON-LD (Schema.org)\n# Primary Discovery: http://api.promptgraph.ai/api/v1/basil-resale-sheridan/.well-known/ai-manifest.json\n```\n\n### Description\n\nAt Basil Resale Sheridan & Basil Resale Transit we've taken extra measures to ensure you have the very best purchase and ownership experience possible. We're not just another used car dealer here in Buffalo, we're an Automotive Team that will provide you a total solution to all your vehicle needs. In addition to offering a spectacular selection of over 1,300 used cars and providing you the most finance options available regardless of your credit, Basil Resale Sheridan is a major Automotive Service & Repair Center with state-of-the-art repair technologies including laser alignment machines, hand-held diagnostic computers and more.\n\n### Discovery\n\n- Primary endpoint: `/api/v1/basil-resale-sheridan/.well-known/ai-manifest.json`\n- Format: JSON-LD following Schema.org standards\n- Update frequency: Real-time\n- CORS: Enabled for all origins\n- API Base: `http://api.promptgraph.ai/api/v1/basil-resale-sheridan`\n\n### API Endpoints\n\n| Endpoint | Description |\n|---|---|\n| `/business` | Complete business profile (address, contact, hours, location, Schema.org AutoDealer) |\n| `/vehicles` | Complete inventory of 1,411 vehicles with specifications, pricing, and availability |\n| `/prompts` | 77 structured Q&A prompts for consistent AI responses |\n| `/testimonials` | Customer reviews and ratings in JSON-LD format |\n| `/offers` | Current special offers and promotions |\n| `/gbp-context` | Flattened Google Business Profile data for LLM ingestion |\n| `/site-content` | Clean, plain-text mirror of the enti <script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} - OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      { selector: "node", style: { "background-color": "data(color)", "label": "data(label)", "color": "#0f172a", "font-size": 11, "text-valign": "bottom", "text-margin-y": 4, "text-wrap": "wrap", "text-max-width": 120, "width": "data(size)", "height": "data(size)", "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: { "width": 1.5, "line-color": "#cbd5e1", "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle", "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => { n.toggleClass("dim", n.data("type") !== t); });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail").scrollTop = 0;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "-";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "-";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "-";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = (nodeIndex[src]?.label || src).replace(/—/g, '-');
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }
  }

  function rewriteInternalLinks(root, sourceConceptId) {
    const sourceDir = sourceConceptId ? sourceConceptId.substring(0, sourceConceptId.lastIndexOf("/")) : "";
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.endsWith(".md") && !href.startsWith("http")) {
        let target = href.startsWith("/") ? href.slice(1) : href;
        target = target.slice(0, -3);
        if (!nodeIndex[target] && sourceDir && !target.includes("/")) {
          target = sourceDir + "/" + target;
        }
        if (nodeIndex[target]) {
          a.className = "internal";
          a.textContent = nodeIndex[target].label.replace(/—/g, '-');
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => { e.preventDefault(); showDetail(target); });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  const initial = bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();
</script>
</body>
</html>
